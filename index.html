<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #164E33;   /* 企業深綠 */
  --bg: #FEF8E6;     /* 你要求的米色/淺綠底色 */
  --amber: #D97706;  /* 警示黃 */
  --surface: #FFFFFF;
  --border: #D1C7A7;
  --ink: #0F172A;
  --r: 14px;
}

*{box-sizing:border-box;margin:0;padding:0}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--ink); display: flex; flex-direction: column; }

/* ── HEADER ── */
.hdr { background: var(--dark); color: white; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.hdr-title { font-size: 16px; font-weight: 900; }
.admin-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }

/* ── CONTROLS ── */
.ctrl { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; flex-shrink: 0; }
select, input { padding: 8px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit; font-size: 13px; }

/* ── TABS (自動平滑滑軌) ── */
.tabs-outer { background: var(--surface); border-bottom: 2px solid var(--border); overflow: hidden; }
.tabs-scroll { display: flex; overflow-x: auto; padding: 10px 16px; gap: 8px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
.tabs-scroll::-webkit-scrollbar { display: none; }
.tab { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); white-space: nowrap; color: #64748B; transition: 0.2s; }
.tab.active { background: var(--dark); color: white; border-color: var(--dark); }
.tab-sep { border-right: 1px solid var(--border); margin: 0 4px; }

/* ── GRID ── */
.main { flex: 1; overflow-y: auto; padding: 16px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 12px; display: flex; gap: 12px; cursor: pointer; }
.card.sel { border-color: var(--dark); background: rgba(22, 78, 51, 0.03); }
.card-img { width: 80px; height: 65px; border-radius: 8px; background: #f1f1f1; object-fit: contain; }
.qty-num { font-size: 20px; font-weight: 900; color: var(--amber); margin: 0 10px; }

/* ── FOOTER ── */
.footer { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; }
.btn-report { width: 100%; background: var(--dark); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 900; cursor: pointer; }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
.overlay.show { display: flex; }
.modal { background: white; width: 100%; max-width: 600px; border-radius: 16px; padding: 24px; max-height: 85vh; overflow-y: auto; }

/* ── PRINT 專屬樣式 ── */
@media print {
  body * { visibility: hidden; }
  #rptArea, #rptArea * { visibility: visible; }
  #rptArea { position: absolute; left: 0; top: 0; width: 100%; }
  .no-print { display: none !important; }
  .page-break { page-break-after: always; } /* 自動分頁 */
}

#rptImgOutput { width: 100%; margin-top: 20px; border: 2px solid var(--dark); display: none; }
</style>
</head>
<body>

<div class="hdr no-print">
  <div class="hdr-title">鈺通營造｜工安標語採購</div>
  <button class="admin-btn" onclick="toggleAdmin()">🔒 管理</button>
</div>

<div class="ctrl no-print">
  <select id="siteSelect" style="flex:1;"></select>
  <input type="text" id="staff" placeholder="人員" style="width:80px;">
</div>

<div class="tabs-outer no-print">
  <div class="tabs-scroll" id="tabsEl"></div>
</div>

<div class="main no-print">
  <div class="grid" id="gridEl"></div>
</div>

<div class="footer no-print">
  <div id="adminPanel" style="display:none; margin-bottom:10px; gap:5px;">
    <button onclick="addNewSign()" style="padding:5px;">➕新增</button>
    <button onclick="configImg()" style="padding:5px;">🖼路徑</button>
  </div>
  <button class="btn-report" onclick="buildReport()">📋 生成採購單 (<span id="cartCount">0</span>)</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div id="rptArea">
      <h2 style="text-align:center; color:var(--dark); margin-bottom:10px;">工安標語採購清單</h2>
      <div id="rptMeta" style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:20px; border-bottom:2px solid var(--dark); padding-bottom:10px;"></div>
      <div id="rptList"></div>
    </div>
    <div class="no-print" style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
      <button class="btn-report" onclick="window.print()">🖨 電腦存 PDF</button>
      <button class="btn-report" style="background:var(--amber);" onclick="generateImage()">📸 生成手機圖片</button>
      <img id="rptImgOutput" alt="長按儲存圖片">
      <button onclick="closeModal()" style="padding:10px; border:none; background:#eee; border-radius:8px;">返回編輯</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const SITES = ["嘉義創世基金會","嘉義嘉科實中","嘉義博愛安居","嘉義北門","嘉義民雄院區","臺南林森圖書館"];
const CATS = {A:'生活',B:'安全',C:'危險',D:'禁止',E:'交通',F:'設施',G:'規範',H:'宣導',I:'環境',J:'圖資',K:'區域'};
const STEPS = { S1:'Step1 入口', S2:'Step2 基礎', S3:'Step3 結構', S4:'Step4 裝修', S5:'Step5 景觀', S6:'Step6 完工' };

let db = JSON.parse(localStorage.getItem('ys_db')) || [
  {id:'J01', cat:'J', n:'工程告示牌', s:'120x90', m:'鍍鋅鐵板', steps:['S1']},
  {id:'B01', cat:'B', n:'進入工區請戴安全帽', s:'60x40', m:'中空板', steps:['S1','S2','S3']}
];
let cart = {};
let currentTab = 'S1';
let isAdmin = false;
let imgBase = localStorage.getItem('ys_img') || 'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';

function init() {
  const siteEl = document.getElementById('siteSelect');
  siteEl.innerHTML = SITES.map(s => `<option value="${s}">${s}</option>`).join('');
  renderTabs();
  render();
}

function renderTabs() {
  const el = document.getElementById('tabsEl');
  let html = '';
  // 1. Step 工序
  for (let k in STEPS) html += `<div class="tab ${currentTab===k?'active':''}" onclick="setTab('${k}')">${STEPS[k]}</div>`;
  html += `<span class="tab-sep"></span>`;
  // 2. 全部
  html += `<div class="tab ${currentTab==='ALL'?'active':''}" onclick="setTab('ALL')">📋 全部</div>`;
  html += `<span class="tab-sep"></span>`;
  // 3. A-K 分類
  for (let k in CATS) html += `<div class="tab ${currentTab===k?'active':''}" onclick="setTab('${k}')">${k}.${CATS[k]}</div>`;
  
  el.innerHTML = html;
}

function setTab(t) {
  currentTab = t;
  renderTabs();
  render();
  // 平滑滑軌滾動至中央
  const activeTab = document.querySelector('.tab.active');
  activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function render() {
  const grid = document.getElementById('gridEl');
  let list = db;
  if (STEPS[currentTab]) list = db.filter(i => i.steps && i.steps.includes(currentTab));
  else if (CATS[currentTab]) list = db.filter(i => i.cat === currentTab);

  grid.innerHTML = list.map(i => {
    const active = cart[i.id] ? 'sel' : '';
    const qty = cart[i.id] || 1;
    return `
      <div class="card ${active}" onclick="toggle('${i.id}')">
        <img class="card-img" src="${imgBase+i.id}.jpg" onerror="this.src='https://via.placeholder.com/80?text=No+Img'">
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:900;">${i.n}</div>
          <div style="font-size:10px; color:#64748B; margin-top:4px;">${i.s} | ${i.m}</div>
          <div style="display:flex; align-items:center; margin-top:8px;" onclick="event.stopPropagation()">
            <button onclick="adj('${i.id}',-1)">-</button>
            <span class="qty-num">${qty}</span>
            <button onclick="adj('${i.id}',1)">+</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('cartCount').innerText = Object.keys(cart).length;
}

function toggle(id) { if(cart[id]) delete cart[id]; else cart[id] = 1; render(); }
function adj(id, d) { cart[id] = Math.max(1, (cart[id]||1) + d); render(); }

function buildReport() {
  const keys = Object.keys(cart);
  if(!keys.length) return alert('尚未選擇標語');
  
  document.getElementById('rptMeta').innerHTML = `
    <div>工地：${document.getElementById('siteSelect').value}</div>
    <div>人員：${document.getElementById('staff').value}</div>
    <div>日期：${new Date().toLocaleDateString()}</div>
  `;
  
  let listHtml = '';
  keys.forEach((id, index) => {
    const item = db.find(i => i.id === id);
    // 每 10 筆強制分頁 (列印優化)
    const pageBreak = (index > 0 && index % 10 === 0) ? 'page-break' : '';
    listHtml += `
      <div class="report-item ${pageBreak}" style="display:flex; align-items:center; gap:15px; padding:10px 0; border-bottom:1px solid #eee;">
        <div style="font-weight:900; width:30px;">${index+1}</div>
        <img src="${imgBase+id}.jpg" style="width:50px; height:40px; object-fit:contain;">
        <div style="flex:1;">
          <div style="font-weight:900; font-size:14px;">${item.n}</div>
          <div style="font-size:11px; color:#666;">${item.s} | ${item.m}</div>
        </div>
        <div style="font-size:20px; font-weight:900; color:var(--dark);">${cart[id]}</div>
      </div>
    `;
  });
  
  document.getElementById('rptList').innerHTML = listHtml;
  document.getElementById('overlay').classList.add('show');
}

function generateImage() {
  const area = document.getElementById('rptArea');
  const output = document.getElementById('rptImgOutput');
  html2canvas(area, { scale: 2 }).then(canvas => {
    output.src = canvas.toDataURL("image/png");
    output.style.display = 'block';
    alert('圖片已生成在下方，請長按儲存！');
  });
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('rptImgOutput').style.display = 'none';
}

function toggleAdmin() {
  if(!isAdmin && prompt('密碼')==='751113') {
    isAdmin = true;
    document.getElementById('adminPanel').style.display = 'flex';
  } else {
    isAdmin = false;
    document.getElementById('adminPanel').style.display = 'none';
  }
}

init();
</script>
</body>
</html>
