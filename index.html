<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg); padding-bottom: 180px; }
        .header-container { background-color: var(--yt-dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .main-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.1em; }
        .admin-btn { background: white; color: var(--yt-dark); padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 3px solid var(--yt-dark); }
        .cat-tab-step { white-space: nowrap; padding: 8px 14px; border-radius: 10px; background: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; flex-shrink: 0; border: 2px solid var(--yt-dark); }
        .cat-tab-step.active { background: var(--yt-light); border-color: var(--yt-light); }
        .cat-tab-item { white-space: nowrap; padding: 8px 14px; border-radius: 10px; background: white; color: #475569; font-size: 13px; font-weight: 800; cursor: pointer; border: 2px solid #e2e8f0; flex-shrink: 0; }
        .cat-tab-item.active { background: #E6F4F1; color: var(--yt-dark); border-color: var(--yt-dark); }
        .grid-container { display: grid; gap: 12px; padding: 12px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .sign-card { background: white; border-radius: 15px; padding: 12px; border: 1px solid #D7CCC8; display: flex; gap: 10px; cursor: pointer; position: relative; align-items: center; }
        .sign-card.selected { border: 3px solid var(--yt-light); background: #f0fdf4; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .img-slot { width: 100px; height: 80px; background: #f8fafc; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid #e2e8f0; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        .qty-input { width: 50px; text-align: center; font-size: 22px; font-weight: 900; color: var(--yt-light); border-bottom: 2px solid #ddd; background: transparent; outline: none; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; flex-direction: column; }
        #hiddenCapture { position: fixed; left: -9999px; width: 450px; background: white; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="header-container">
            <span class="main-title">鈺通營造工安系統</span>
            <button onclick="toggleAdmin()" id="adminBtn" class="admin-btn">🔒 管理員</button>
        </div>
        <div class="grid grid-cols-2 gap-2 px-4 py-2 bg-white border-b">
            <div class="flex gap-1">
                <select id="siteSelect" class="flex-1 bg-gray-50 p-2 rounded-lg text-sm font-bold border border-gray-200 outline-none"></select>
                <button onclick="editSites()" class="bg-gray-100 px-2 rounded-lg text-xs font-bold border border-gray-200">＋</button>
            </div>
            <input type="text" id="staff" class="bg-gray-50 p-2 rounded-lg text-sm font-bold border border-gray-200" placeholder="填單人員">
        </div>
        <div id="tabContainer" class="flex overflow-x-auto gap-2 p-3 bg-white scrollbar-hide"></div>
    </div>

    <div id="mainGrid" class="grid-container max-w-7xl mx-auto"></div>
    <div id="hiddenCapture"></div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t border-gray-100 z-50 flex flex-col gap-2 shadow-lg">
        <button id="addItemBtn" onclick="addNewItem()" class="hidden w-full bg-orange-500 text-white py-3 rounded-xl font-bold shadow-lg">＋ 新增分類標語</button>
        <div class="flex gap-3">
            <button onclick="buildReportImage()" class="flex-[4] bg-[#095744] text-white py-4 rounded-xl font-black text-xl shadow-xl active:scale-95">📋 生成截圖</button>
            <button onclick="resetCart()" class="flex-1 bg-gray-100 text-gray-500 rounded-xl text-xs font-bold">清空</button>
        </div>
    </nav>

    <div id="modal" onclick="closeModal()">
        <p class="text-white mb-2 font-bold">↓ 長按圖片即可儲存 ↓</p>
        <div id="imgPlaceholder" class="bg-white rounded-lg overflow-hidden max-w-full" onclick="event.stopPropagation()"></div>
        <button onclick="closeModal()" class="mt-4 bg-white px-8 py-3 rounded-xl font-bold">返回</button>
    </div>

<script>
let activeDB, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, catLabels;
const GITHUB_BASE = "https://yuhtong02.github.io/-/img/";

function init() {
    activeDB = JSON.parse(localStorage.getItem('yt_db')) || [{id:'A01', cat:'A', n:'飲水機', s:'30x15', m:'中空板'}];
    guides = JSON.parse(localStorage.getItem('yt_guides')) || {'S1': {t:'預設', items:['A01']}};
    catLabels = JSON.parse(localStorage.getItem('yt_cats')) || {'ALL':'全部標語','A':'A.生活設施'};
    // 預設工地名單
    sites = JSON.parse(localStorage.getItem('yt_sites')) || ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居"];

    renderTabs(); renderSiteSelect(); render();
}

function editSites() {
    const res = prompt("請修改工地名單（用逗號隔開）：", sites.join(','));
    if(res !== null) {
        sites = res.split(/[，,]/).map(s => s.trim()).filter(s => s);
        localStorage.setItem('yt_sites', JSON.stringify(sites));
        renderSiteSelect();
    }
}

function renderTabs() {
    let h = '';
    Object.keys(guides).sort().forEach(k => {
        h += `<div class="cat-tab-step ${currentMode==='GUIDE'&&currentKey===k?'active':''}" onclick="handleTabClick('GUIDE','${k}')">Step ${k.replace('S','')}.${guides[k].t}</div>`;
    });
    h += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey=='ALL'?'active':''}" onclick="handleTabClick('CAT','ALL')">全部標語</div>`;
    Object.keys(catLabels).filter(k=>k!=='ALL').sort().forEach(k => {
        h += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey===k?'active':''}" onclick="handleTabClick('CAT','${k}')">${catLabels[k]}</div>`;
    });
    document.getElementById('tabContainer').innerHTML = h;
}

function handleTabClick(m, k) {
    if (isAdmin && k !== 'ALL') {
        const title = m === 'GUIDE' ? guides[k].t : catLabels[k];
        const res = prompt("修改標題：", title);
        if (res) { if (m === 'GUIDE') guides[k].t = res; else catLabels[k] = res; saveData(); renderTabs(); }
    }
    currentMode = m; currentKey = k; render();
}

function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? 
        (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : 
        activeDB.filter(x => guides[currentKey].items.includes(x.id));
    
    display.forEach(i => {
        const c = cart[i.id] || { sel:false, qty:1 };
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => { if(!isAdmin) { cart[i.id] = {sel: !c.sel, qty: c.qty}; render(); } };
        card.innerHTML = `
            <div class="img-slot"><img src="${GITHUB_BASE}${i.id}.JPG" onerror="this.src='${GITHUB_BASE}${i.id}.jpg';"></div>
            <div class="flex-1">
                <div class="font-black text-[#095744] text-sm">${i.n}</div>
                <div class="text-[10px] text-gray-500 mt-1">${i.s} / ${i.m}</div>
                <div class="flex items-center justify-between mt-2" onclick="event.stopPropagation()">
                    <input type="number" value="${c.qty}" oninput="if(!cart['${i.id}']) cart['${i.id}']={sel:true}; cart['${i.id}'].qty=parseInt(this.value)||1" class="qty-input">
                    <span class="text-[9px] text-gray-300 font-bold">${i.id}</span>
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

async function buildReportImage() {
    const sel = activeDB.filter(i => cart[i.id]?.sel);
    if(!sel.length) return alert("請選取標語");
    const site = document.getElementById('siteSelect').value;
    const staff = document.getElementById('staff').value || "現場人員";
    
    let h = `<div style="padding:25px; background:white; width:450px; border:5px solid #095744;">
        <h2 style="color:#095744; text-align:center; font-size:24px; font-weight:900;">工安標語採購單</h2>
        <p style="font-size:14px; margin-bottom:10px;">工地：${site} | 填單：${staff}</p>
        <table style="width:100%; border-collapse:collapse;">`;
    sel.forEach(i => {
        h += `<tr style="border-bottom:1px solid #ddd;"><td style="padding:10px 0;"><b>[${i.id}] ${i.n}</b><br><small>${i.s}</small></td>
              <td style="text-align:right; font-size:20px; font-weight:900; color:#70B934;">x ${cart[i.id].qty}</td></tr>`;
    });
    h += `</table></div>`;
    document.getElementById('hiddenCapture').innerHTML = h;
    html2canvas(document.getElementById('hiddenCapture'), { scale: 2 }).then(canvas => {
        const img = new Image();
        img.src = canvas.toDataURL("image/png");
        img.className = "max-w-full";
        document.getElementById('imgPlaceholder').innerHTML = '';
        document.getElementById('imgPlaceholder').appendChild(img);
        document.getElementById('modal').style.display = 'flex';
    });
}

function toggleAdmin() {
    if(!isAdmin && prompt("管理密碼") !== "751113") return;
    isAdmin = !isAdmin;
    document.getElementById('adminBtn').innerText = isAdmin ? "🔓 編輯中" : "🔒 管理員";
    document.getElementById('addItemBtn').classList.toggle('hidden', !isAdmin);
    render();
}

function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join(''); }
function saveData() { localStorage.setItem('yt_db', JSON.stringify(activeDB)); localStorage.setItem('yt_guides', JSON.stringify(guides)); localStorage.setItem('yt_cats', JSON.stringify(catLabels)); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function resetCart() { if(confirm("清空？")) { cart = {}; render(); } }
window.onload = init;
</script>
</body>
</html>
