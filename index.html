<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg); padding-bottom: 200px; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 4px solid var(--yt-dark); }
        
        /* 標籤樣式 */
        .cat-tab-step { white-space: nowrap; padding: 8px 14px; border-radius: 12px; background: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; border: 1px solid var(--yt-dark); }
        .cat-tab-step::before { content: "📌"; margin-right: 4px; }
        .cat-tab-step.active { background: var(--yt-light); border-color: var(--yt-light); }
        
        .cat-tab-item { white-space: nowrap; padding: 8px 18px; border-radius: 10px; background: white; color: #64748b; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid #e2e8f0; flex-shrink: 0; }
        .cat-tab-item.active { background: #E6F4F1; color: var(--yt-dark); border-color: var(--yt-dark); font-weight: 900; }
        .cat-admin { border: 1px dashed #fb923c !important; }

        .grid-container { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
        .sign-card { background: white; border-radius: 16px; padding: 16px; border: 1px solid #D7CCC8; display: flex; gap: 15px; cursor: pointer; position: relative; }
        .sign-card.selected { border: 3px solid var(--yt-light); background: #f0fdf4; }
        
        .img-slot { width: 130px; height: 90px; background: #f1f5f9; border-radius: 12px; overflow: hidden; flex-shrink: 0; border: 1px solid #e2e8f0; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        
        .qty-input { width: 60px; text-align: center; font-size: 24px; font-weight: 900; color: var(--yt-light); border-bottom: 2px solid #eee; background: transparent; }
        .admin-edit { background: #fff7ed; border: 1px dashed #fb923c; border-radius: 4px; padding: 2px 4px; font-size: 12px; width: 100%; font-weight: bold; }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="flex items-center justify-between px-4 py-3 bg-[#095744] text-white">
            <span class="text-xl font-black tracking-tight">鈺通營造工安標語</span>
            <div class="flex gap-2">
                <button onclick="exportJSON()" id="exportBtn" class="hidden text-[10px] bg-white/20 px-2 py-1 rounded">💾 導出</button>
                <button onclick="importJSON()" id="importBtn" class="hidden text-[10px] bg-white/20 px-2 py-1 rounded">📂 導入</button>
                <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] font-black bg-white text-[#095744] px-3 py-1.5 rounded-full">🔒 管理員</button>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-2 px-4 py-2 bg-white border-b">
            <div class="flex gap-1">
                <select id="siteSelect" class="flex-1 bg-white p-2 rounded-xl text-xs font-black border"></select>
                <button onclick="addNewSite()" class="bg-[#095744] text-white px-3 rounded-xl font-bold">+</button>
            </div>
            <input type="text" id="staff" class="bg-white p-2 rounded-xl text-xs font-black border" placeholder="填單人員">
        </div>
        
        <div class="flex overflow-x-auto gap-2 p-3 bg-white" id="tabContainer"></div>
    </div>

    <div id="mainGrid" class="grid-container max-w-7xl mx-auto"></div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-white/95 border-t z-50 shadow-2xl flex flex-col gap-2 backdrop-blur-sm">
        <button id="addItemBtn" onclick="addNewItem()" class="hidden w-full bg-orange-50 text-orange-700 py-2 rounded-xl font-black border border-orange-200">➕ 插入新標語 (序號自動遞補)</button>
        <div class="flex gap-3 max-w-4xl mx-auto w-full">
            <button onclick="buildReport()" class="flex-[4] bg-[#095744] text-white py-4 rounded-2xl font-black text-2xl shadow-lg active:scale-95 transition-transform">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-red-50 text-red-400 rounded-2xl text-[10px] font-bold">清空</button>
        </div>
    </nav>

    <div id="modal" onclick="closeModal()">
        <div class="bg-white w-full max-w-xl rounded-3xl p-6 overflow-y-auto max-h-[85vh]" onclick="event.stopPropagation()">
            <div id="printArea"></div>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="window.print()" class="bg-[#095744] text-white py-4 rounded-xl font-black">列印 / 存PDF</button>
                <button onclick="closeModal()" class="bg-gray-100 py-4 rounded-xl font-bold">返回</button>
            </div>
        </div>
    </div>

<script>
let activeDB, db, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, catLabels;
const GITHUB_BASE = "https://yuhtong02.github.io/-/IMG/";

// 初始化資料庫
const request = indexedDB.open("Yutong_SignSystem_V4", 1);
request.onupgradeneeded = e => e.target.result.createObjectStore("images");
request.onsuccess = e => { db = e.target.result; init(); };

function init() {
    sites = JSON.parse(localStorage.getItem('yt_sites')) || ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "嘉義北門住宅", "嘉義民雄院區", "臺南林森圖書館"];
    
    // 現有標語大全 (預填部分)
    activeDB = JSON.parse(localStorage.getItem('yt_db')) || [
        {id:'A01', cat:'A', n:'工地大門告示牌', s:'60x90', m:'中空板'},
        {id:'A02', cat:'A', n:'洗車台須知', s:'40x60', m:'中空板'},
        {id:'B01', cat:'B', n:'戴安全帽', s:'60x40', m:'中空板'},
        {id:'B02', cat:'B', n:'嚴禁煙火', s:'40x60', m:'中空板'},
        {id:'C01', cat:'C', n:'工程告示牌', s:'120x75', m:'鋁板'},
        {id:'D01', cat:'D', n:'方向指引 (左)', s:'40x20', m:'中空板'},
        {id:'E01', cat:'E', n:'高壓電危險', s:'30x40', m:'中空板'},
        {id:'F01', cat:'F', n:'限速 10 KM', s:'40x60', m:'中空板'},
        {id:'G01', cat:'G', n:'垃圾分類', s:'60x40', m:'中空板'},
        {id:'H01', cat:'H', n:'消防器材', s:'30x40', m:'中空板'}
    ];

    guides = JSON.parse(localStorage.getItem('yt_guides')) || {
        'S1': { t: '大門配置', items: ['A01','B01'] },
        'S2': { t: '基礎設施', items: [] },
        'S3': { t: '施工安全', items: [] },
        'S4': { t: '動線管制', items: [] },
        'S5': { t: '機具電力', items: [] },
        'S6': { t: '環境清潔', items: [] }
    };

    catLabels = JSON.parse(localStorage.getItem('yt_cats')) || {
        'ALL':'全部標語', 'A':'生活設施', 'B':'安全防護', 'C':'施工告示', 'D':'指引警告', 'E':'電力設備', 'F':'車輛管理', 'G':'環境衛生', 'H':'消防救護', 'I':'吊掛作業', 'J':'其他標語'
    };

    renderTabs(); renderSiteSelect(); render();
}

async function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : activeDB.filter(x => (guides[currentKey]?.items.includes(x.id)));
    display.sort((a,b) => a.id.localeCompare(b.id));

    for (const i of display) {
        const c = cart[i.id] || { sel:false, qty:1 };
        const localImg = await dbGet(i.id);
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => toggleItem(i.id);
        card.innerHTML = `
            ${isAdmin ? `<button onclick="event.stopPropagation(); deleteItem('${i.id}')" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs z-20">✕</button>` : ''}
            <div class="img-slot">
                <img src="${localImg || GITHUB_BASE + i.id + '.jpg'}" onerror="this.src='https://placehold.co/130x90?text=${i.id}'">
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-start">
                    <div class="flex-1">${isAdmin ? `<input class="admin-edit" value="${i.n}" oninput="updateI('${i.id}','n',this.value)" onclick="event.stopPropagation()">` : `<div class="font-black text-[#095744] text-lg leading-tight">${i.n}</div>`}</div>
                    <span class="text-[9px] font-bold text-slate-300 ml-1">${i.id}</span>
                </div>
                <div class="grid grid-cols-2 gap-1 mt-2 text-[11px]">
                    <div>規格：${isAdmin ? `<input class="admin-edit" value="${i.s}" oninput="updateI('${i.id}','s',this.value)" onclick="event.stopPropagation()">` : `<span class="text-red-600 font-bold">${i.s}</span>`}</div>
                    <div>材質：${isAdmin ? `<input class="admin-edit" value="${i.m||''}" oninput="updateI('${i.id}','m',this.value)" onclick="event.stopPropagation()">` : `<span class="text-blue-600 font-bold">${i.m||'中空板'}</span>`}</div>
                </div>
                <div class="flex items-center gap-3 mt-3" onclick="event.stopPropagation()">
                    <span class="text-[10px] font-black text-slate-400">數量</span>
                    <input type="number" value="${c.qty}" oninput="updateQty('${i.id}',this.value)" class="qty-input">
                    ${isAdmin && currentMode === 'CAT' ? `<select onchange="addIntoStep(this.value, '${i.id}')" class="text-[9px] border px-1 rounded"><option>加進Step...</option><option value="S1">S1</option><option value="S2">S2</option><option value="S3">S3</option><option value="S4">S4</option><option value="S5">S5</option><option value="S6">S6</option></select>` : ''}
                </div>
            </div>`;
        grid.appendChild(card);
    }
}

// 核心功能：刪除遞補
async function deleteItem(id) {
    if(!confirm(`刪除 [${id}]？後方項目將自動遞補序號`)) return;
    let prefix = id.charAt(0), startNum = parseInt(id.slice(1));
    activeDB = activeDB.filter(x => x.id !== id);
    let targets = activeDB.filter(x => x.id.startsWith(prefix) && parseInt(x.id.slice(1)) > startNum).sort((a,b) => parseInt(a.id.slice(1)) - parseInt(b.id.slice(1)));
    for(let item of targets) {
        let oldID = item.id, newID = prefix + (parseInt(oldID.slice(1)) - 1).toString().padStart(2, '0');
        let img = await dbGet(oldID); if(img) await dbSet(newID, img); item.id = newID;
    }
    saveData(); render();
}

// 核心功能：插入遞補
async function addNewItem() {
    let prefix = (currentMode === 'CAT' && currentKey !== 'ALL') ? currentKey : 'A';
    let max = 0; activeDB.filter(i => i.id.startsWith(prefix)).forEach(i => { let n = parseInt(i.id.slice(1)); if(n>max) max=n; });
    let inputID = prompt("輸入插入序號 (例如 "+prefix+"05):", prefix + (max + 1).toString().padStart(2, '0')).toUpperCase();
    if(!inputID) return;
    let startNum = parseInt(inputID.slice(1));
    let targets = activeDB.filter(x => x.id.startsWith(prefix) && parseInt(x.id.slice(1)) >= startNum).sort((a,b) => parseInt(b.id.slice(1)) - parseInt(a.id.slice(1)));
    for(let item of targets) {
        let oldID = item.id, nextID = prefix + (parseInt(oldID.slice(1)) + 1).toString().padStart(2, '0');
        let img = await dbGet(oldID); if(img) await dbSet(nextID, img); item.id = nextID;
    }
    activeDB.push({id: inputID, cat: prefix, n: "新項目", s: "60x40", m: "中空板"});
    saveData(); render();
}

function renderTabs() {
    let html = '';
    Object.keys(guides).forEach(k => html += `<div class="cat-tab-step ${currentMode==='GUIDE'&&currentKey===k?'active':''}" onclick="${isAdmin ? `renameStep('${k}')` : `setFilter('GUIDE','${k}')`}">Step ${k.replace('S','')}.${guides[k].t}</div>`);
    Object.keys(catLabels).forEach(k => html += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey===k?'active':''} ${isAdmin?'cat-admin':''}" onclick="${isAdmin && k !== 'ALL' ? `renameCat('${k}')` : `setFilter('CAT','${k}')`}">${catLabels[k]}</div>`);
    document.getElementById('tabContainer').innerHTML = html;
}

function renameStep(k) { const n = prompt("修改 Step 標題:", guides[k].t); if(n) { guides[k].t = n; saveData(); renderTabs(); } }
function renameCat(k) { const n = prompt("修改分類名稱 (請用四個字):", catLabels[k]); if(n) { catLabels[k] = n; saveData(); renderTabs(); } }
function setFilter(m, k) { currentMode=m; currentKey=k; renderTabs(); render(); }
function toggleItem(id) { if(!cart[id]) cart[id]={sel:false,qty:1}; cart[id].sel=!cart[id].sel; render(); }
function updateQty(id, v) { if(!cart[id]) cart[id]={sel:true,qty:1}; cart[id].qty=parseInt(v)||1; }
function updateI(id, f, v) { const i = activeDB.find(x => x.id === id); if(i) { i[f] = v; saveData(); }}
function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join(''); }
function addNewSite() { const n = prompt("新工地名稱:"); if(n) { sites.push(n); saveData(); renderSiteSelect(); } }

function toggleAdmin() {
    if(!isAdmin && prompt("管理密碼") !== "751113") return;
    isAdmin = !isAdmin;
    document.getElementById('adminBtn').innerText = isAdmin ? "🔓 管理中" : "🔒 管理員";
    document.getElementById('addItemBtn').classList.toggle('hidden', !isAdmin);
    document.getElementById('exportBtn').classList.toggle('hidden', !isAdmin);
    document.getElementById('importBtn').classList.toggle('hidden', !isAdmin);
    renderTabs(); render();
}

function saveData() { 
    localStorage.setItem('yt_db', JSON.stringify(activeDB)); 
    localStorage.setItem('yt_sites', JSON.stringify(sites)); 
    localStorage.setItem('yt_guides', JSON.stringify(guides)); 
    localStorage.setItem('yt_cats', JSON.stringify(catLabels));
}

// 備份與交接功能
function exportJSON() {
    const data = { activeDB, sites, guides, catLabels };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `鈺通標語備份_${new Date().toLocaleDateString()}.json`;
    a.click();
}

function importJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = e => {
            const data = JSON.parse(e.target.result);
            if(confirm("確定匯入？這會覆蓋現有所有標語設定。")) {
                activeDB = data.activeDB; sites = data.sites; guides = data.guides; catLabels = data.catLabels;
                saveData(); location.reload();
            }
        };
        reader.readAsText(e.target.files[0]);
    };
    input.click();
}

async function dbGet(k) { return new Promise(r => { const t = db.transaction("images").objectStore("images").get(k); t.onsuccess = () => r(t.result); }); }
async function dbSet(k, v) { return new Promise(r => { const t = db.transaction("images","readwrite").objectStore("images").put(v, k); t.onsuccess = () => r(); }); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function resetCart() { if(confirm("清空已選項目？")) { cart = {}; render(); } }

async function buildReport() {
    const sel = activeDB.filter(i => cart[i.id]?.sel);
    if(!sel.length) return alert("請勾選標語");
    let h = `<div style="border:4px solid #095744; padding:20px; font-family:sans-serif;">
        <h2 style="text-align:center; color:#095744; margin-bottom:5px;">鈺通營造工安標語採購單</h2>
        <p style="text-align:center; font-size:12px; margin-bottom:15px;">日期：${new Date().toLocaleDateString()}</p>
        <div style="display:flex; justify-content:space-between; font-weight:bold; border-bottom:2px solid #095744; padding-bottom:5px;">
            <span>工地：${document.getElementById('siteSelect').value}</span>
            <span>填單人：${document.getElementById('staff').value}</span>
        </div>`;
    for(let i of sel) {
        h += `<div style="display:flex; align-items:center; gap:15px; border-bottom:1px solid #eee; padding:10px 0;">
            <img src="${GITHUB_BASE + i.id + '.jpg'}" style="width:70px; height:50px; object-fit:contain;" onerror="this.style.display='none'">
            <div style="flex:1;"><b>[${i.id}] ${i.n}</b><br><small style="color:gray">${i.s} / ${i.m||'中空板'}</small></div>
            <div style="font-size:24px; font-weight:900; color:#70B934;">x ${cart[i.id].qty}</div>
        </div>`;
    }
    document.getElementById('printArea').innerHTML = h + `</div>`;
    document.getElementById('modal').style.display = 'flex';
}
</script>
</body>
</html>
