<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg); padding-bottom: 180px; }
        .header-container { background-color: var(--yt-dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .main-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.1em; }
        .admin-btn { background: white; color: var(--yt-dark); padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 3px solid var(--yt-dark); }
        .cat-tab-step { white-space: nowrap; padding: 8px 14px; border-radius: 10px; background: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; flex-shrink: 0; border: 2px solid var(--yt-dark); }
        .cat-tab-step.active { background: var(--yt-light); border-color: var(--yt-light); }
        .cat-tab-item { white-space: nowrap; padding: 8px 14px; border-radius: 10px; background: white; color: #475569; font-size: 13px; font-weight: 800; cursor: pointer; border: 2px solid #e2e8f0; flex-shrink: 0; }
        .cat-tab-item.active { background: #E6F4F1; color: var(--yt-dark); border-color: var(--yt-dark); }
        .grid-container { display: grid; gap: 12px; padding: 12px; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
        .sign-card { background: white; border-radius: 15px; padding: 12px; border: 1px solid #D7CCC8; display: flex; gap: 10px; cursor: pointer; position: relative; }
        .sign-card.selected { border: 3px solid var(--yt-light); background: #f0fdf4; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .img-slot { width: 100px; height: 80px; background: #f8fafc; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid #e2e8f0; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        .qty-input { width: 50px; text-align: center; font-size: 22px; font-weight: 900; color: var(--yt-light); border-bottom: 2px solid #ddd; background: transparent; outline: none; }
        .edit-input { background: #fff7ed; border: 1px solid #ffedd5; border-radius: 4px; padding: 2px 4px; width: 100%; font-size: 12px; margin-bottom: 2px; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; z-index: 10; }
        
        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 20px; }
            .no-print { display: none !important; }
        }
        #printSection { display: none; background: white; }
    </style>
</head>
<body>

    <div class="sticky-header no-print">
        <div class="header-container">
            <span class="main-title">鈺通營造工安系統</span>
            <div class="flex gap-2">
                <div id="adminTools" class="hidden flex gap-1">
                    <button onclick="exportData()" class="text-[10px] bg-white/20 px-2 py-1 rounded">💾 備份</button>
                    <button onclick="importData()" class="text-[10px] bg-white/20 px-2 py-1 rounded">📂 還原</button>
                </div>
                <button onclick="toggleAdmin()" id="adminBtn" class="admin-btn">🔒 管理員</button>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2 px-4 py-2 bg-white border-b">
            <div class="flex gap-1">
                <select id="siteSelect" class="flex-1 bg-gray-50 p-2 rounded-lg text-sm font-bold border border-gray-200 outline-none"></select>
                <button onclick="editSites()" class="bg-gray-100 px-3 rounded-lg text-xs font-bold border border-gray-200">＋</button>
            </div>
            <input type="text" id="staff" class="bg-gray-50 p-2 rounded-lg text-sm font-bold border border-gray-200" placeholder="填單人員">
        </div>
        <div class="flex overflow-x-auto gap-2 p-3 bg-white scrollbar-hide" id="tabContainer"></div>
    </div>

    <div id="mainGrid" class="grid-container max-w-7xl mx-auto no-print"></div>
    <div id="printSection"></div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t border-gray-100 z-50 flex flex-col gap-2 no-print">
        <button id="addItemBtn" onclick="addNewItem()" class="hidden w-full bg-orange-500 text-white py-3 rounded-xl font-bold shadow-lg">＋ 新增標語 (自動編號)</button>
        <div class="flex gap-3">
            <button onclick="buildReport()" class="flex-[4] bg-[#095744] text-white py-4 rounded-xl font-black text-xl shadow-xl active:scale-95 transition-transform">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-gray-100 text-gray-500 rounded-xl text-xs font-bold">清空</button>
        </div>
    </nav>

<script>
let activeDB, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, catLabels;
const GITHUB_BASE = "https://yuhtong02.github.io/-/img/";

const defaultDB = [
    // A.生活與辦公設施
    {id:'A01', cat:'A', n:'辦公室 (監造/管理/統包商)', s:'60x20', m:'中空板', steps:['S2']},
    {id:'A02', cat:'A', n:'會議室', s:'60x20', m:'中空板', steps:['S2']},
    {id:'A03', cat:'A', n:'倉庫', s:'60x20', m:'中空板', steps:['S2']},
    {id:'A04', cat:'A', n:'建材展覽室', s:'60x20', m:'中空板', steps:['S2']},
    {id:'A05', cat:'A', n:'休息區', s:'120x60', m:'帆布', steps:['S2']},
    {id:'A06', cat:'A', n:'飲水機', s:'30x15', m:'中空板', steps:['S2']},
    {id:'A07', cat:'A', n:'急救箱', s:'20x20', m:'貼紙', steps:['S2']},
    {id:'A08', cat:'A', n:'男/女化妝室', s:'30x15', m:'中空板', steps:['S2']},
    {id:'A09', cat:'A', n:'小便斗', s:'10x10', m:'貼紙', steps:['S2']},
    {id:'A10', cat:'A', n:'守衛室', s:'60x40', m:'中空板', steps:['S1']},
    {id:'A11', cat:'A', n:'工具箱會議', s:'90x60', m:'中空板', steps:['S1']},

    // B.安全防護與告示
    {id:'B01', cat:'B', n:'工程告示牌', s:'120x90', m:'中空板', steps:['S1']},
    {id:'B02', cat:'B', n:'安衛告示牌', s:'90x60', m:'中空板', steps:['S1']},
    {id:'B03', cat:'B', n:'今日危害因素告示牌', s:'90x60', m:'白板材', steps:['S1']},
    {id:'B04', cat:'B', n:'工安公布宣導欄', s:'180x90', m:'帆布', steps:['S1']},
    {id:'B05', cat:'B', n:'背負式安全帶穿戴步驟', s:'60x90', m:'中空板', steps:['S3']},
    {id:'B06', cat:'B', n:'熱危害宣導', s:'60x40', m:'中空板', steps:['S3']},
    {id:'B07', cat:'B', n:'進入工區請戴安全帽', s:'60x40', m:'中空板', steps:['S1']},
    {id:'B08', cat:'B', n:'嚴禁酒後進場', s:'60x40', m:'中空板', steps:['S1']},

    // C.危險警示
    {id:'C01', cat:'C', n:'有電危險請勿觸碰', s:'30x20', m:'中空板', steps:['S5']},
    {id:'C02', cat:'C', n:'高壓電勿近', s:'40x30', m:'中空板', steps:['S5']},
    {id:'C03', cat:'C', n:'開口危險小心墜落', s:'60x40', m:'中空板', steps:['S5']},
    {id:'C04', cat:'C', n:'升降梯開口危險', s:'60x40', m:'中空板', steps:['S5']},

    // D.禁止事項
    {id:'D01', cat:'D', n:'非工作人員禁止進入', s:'60x40', m:'中空板', steps:['S1','S4']},
    {id:'D02', cat:'D', n:'欄杆禁止跨越或攀爬', s:'40x30', m:'中空板', steps:['S5']},
    {id:'D03', cat:'D', n:'施工架嚴禁堆置物料', s:'60x40', m:'中空板', steps:['S5']},
    {id:'D04', cat:'D', n:'非施工必要禁止進入', s:'60x40', m:'中空板', steps:['S4']},

    // E.交通與動線
    {id:'E01', cat:'E', n:'汽車停放區', s:'60x40', m:'中空板', steps:['S4']},
    {id:'E02', cat:'E', n:'機車停放區', s:'60x40', m:'中空板', steps:['S4']},
    {id:'E03', cat:'E', n:'進入工區請緩慢行駛', s:'60x40', m:'中空板', steps:['S1']},
    {id:'E04', cat:'E', n:'工區施工請勿停車', s:'60x40', m:'中空板', steps:['S1']},

    // F.設施位置與消防
    {id:'F01', cat:'F', n:'滅火器', s:'10x30', m:'貼紙', steps:['S2','S5']},
    {id:'F02', cat:'F', n:'安全出口', s:'30x15', m:'中空板', steps:['S4']},
    {id:'F03', cat:'F', n:'施工電梯', s:'60x40', m:'中空板', steps:['S5']},
    {id:'F04', cat:'F', n:'吊料電梯專用口', s:'60x40', m:'中空板', steps:['S5']},

    // G.環境管理與垃圾
    {id:'G01', cat:'G', n:'一般垃圾/資源回收/廚餘', s:'40x20', m:'中空板', steps:['S6']},
    {id:'G02', cat:'G', n:'鐵鋁罐/玻璃類/塑膠類/紙容器', s:'30x10', m:'貼紙', steps:['S6']},
    {id:'G03', cat:'G', n:'垃圾管道傾倒口', s:'60x40', m:'中空板', steps:['S6']},
    {id:'G04', cat:'G', n:'物料暫置區', s:'90x60', m:'中空板', steps:['S6']},
    {id:'G05', cat:'G', n:'放置鋼筋材料', s:'90x60', m:'中空板', steps:['S6']},
    {id:'G06', cat:'G', n:'營建廢棄物堆置區', s:'90x60', m:'中空板', steps:['S6']},

    // H.宣導標語
    {id:'H01', cat:'H', n:'安全第一；品質至上', s:'120x30', m:'中空板', steps:['S3']},
    {id:'H02', cat:'H', n:'存好心做好事說好話', s:'120x30', m:'中空板', steps:['S3']},
    {id:'H03', cat:'H', n:'工安標語6S', s:'60x90', m:'中空板', steps:['S3']},
    {id:'H04', cat:'H', n:'關懷標語/生活點滴', s:'60x40', m:'中空板', steps:['S3']},

    // J.圖資與名稱
    {id:'J01', cat:'J', n:'樓層標示/樓梯標示', s:'30x30', m:'中空板', steps:['S4']},
    {id:'J02', cat:'J', n:'工地/學校名稱', s:'180x40', m:'帆布', steps:['S1']},
    {id:'J03', cat:'J', n:'各棟別名稱', s:'60x20', m:'中空板', steps:['S2']},
    {id:'J04', cat:'J', n:'工地上梁典禮', s:'200x60', m:'帆布', steps:['S1']}
];

const defaultGuides = {
    'S1': { t: '工地入口/大門' }, 'S2': { t: '辦公與生活區' }, 'S3': { t: '安全宣導區' },
    'S4': { t: '交通與動線管理' }, 'S5': { t: '施工現場/危險點' }, 'S6': { t: '資材與環境管理' }
};
const defaultCats = {
    'ALL':'全部標語', 'A':'A.生活與辦公', 'B':'B.安全告示', 'C':'C.危險警示', 'D':'D.禁止事項', 'E':'E.交通動線', 'F':'F.消防設施', 'G':'G.環境管理', 'H':'H.精神宣導', 'J':'J.圖資名稱'
};

// ... 原有的 JS 邏輯不變 (init, renderTabs, handleTabClick, render, updateItemStep, updateItem, deleteItem, addNewItem, toggleAdmin, editSites, renderSiteSelect, saveData, exportData, importData, buildReport, resetCart)
function init() {
    activeDB = JSON.parse(localStorage.getItem('yt_db')) || defaultDB;
    guides = JSON.parse(localStorage.getItem('yt_guides')) || defaultGuides;
    catLabels = JSON.parse(localStorage.getItem('yt_cats')) || defaultCats;
    sites = JSON.parse(localStorage.getItem('yt_sites')) || ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "臺南林森圖書館"];
    renderTabs(); renderSiteSelect(); render();
}

function renderTabs() {
    let html = '';
    Object.keys(guides).sort().forEach(k => {
        html += `<div class="cat-tab-step ${currentMode==='GUIDE'&&currentKey===k?'active':''}" onclick="handleTabClick('GUIDE','${k}')">Step ${k.replace('S','')}.${guides[k].t}</div>`;
    });
    html += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey==='ALL'?'active':''}" onclick="handleTabClick('CAT','ALL')">全部標語</div>`;
    Object.keys(catLabels).filter(k=>k!=='ALL').sort().forEach(k => {
        html += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey===k?'active':''}" onclick="handleTabClick('CAT','${k}')">${catLabels[k]}</div>`;
    });
    document.getElementById('tabContainer').innerHTML = html;
}

function handleTabClick(m, k) {
    if (isAdmin && k !== 'ALL') {
        const currentTitle = m === 'GUIDE' ? guides[k].t : catLabels[k];
        const newTitle = prompt("修改名稱：", currentTitle);
        if (newTitle) {
            if (m === 'GUIDE') guides[k].t = newTitle;
            else catLabels[k] = newTitle;
            saveData(); renderTabs();
        }
    }
    currentMode = m; currentKey = k; render();
}

function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? 
        (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : 
        activeDB.filter(x => x.steps && x.steps.includes(currentKey));
    
    display.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));

    display.forEach(i => {
        const c = cart[i.id] || { sel:false, qty:1 };
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => { if(!isAdmin) { cart[i.id] = {sel: !c.sel, qty: c.qty}; render(); } };
        
        let stepOptions = Object.keys(guides).map(sk => 
            `<label class="flex items-center gap-1"><input type="checkbox" ${i.steps?.includes(sk)?'checked':''} onchange="updateItemStep('${i.id}','${sk}',this.checked)"> ${sk}</label>`
        ).join('');

        card.innerHTML = `
            ${isAdmin ? `<div class="delete-btn" onclick="event.stopPropagation(); deleteItem('${i.id}')">✕</div>` : ''}
            <div class="img-slot"><img src="${GITHUB_BASE}${i.id}.JPG" onerror="this.src='${GITHUB_BASE}${i.id}.jpg'; this.onerror=null; this.parentElement.innerHTML='<div class=p-4 text-[10px]>無圖</div>'"></div>
            <div class="flex-1">
                ${isAdmin ? 
                    `<input class="edit-input font-bold" value="${i.n}" onchange="updateItem('${i.id}','n',this.value)">
                     <div class="grid grid-cols-2 gap-1">
                        <input class="edit-input text-[10px]" value="${i.s}" onchange="updateItem('${i.id}','s',this.value)">
                        <input class="edit-input text-[10px]" value="${i.m}" onchange="updateItem('${i.id}','m',this.value)">
                     </div>
                     <div class="flex flex-wrap gap-2 mt-1 text-[9px] bg-gray-50 p-1 rounded" onclick="event.stopPropagation()">${stepOptions}</div>` :
                    `<div class="font-black text-[#095744] text-sm">${i.n}</div>
                     <div class="text-[10px] text-gray-500 mt-1">規格：<span class="text-red-500">${i.s}</span> / 材質：<span class="text-blue-500">${i.m}</span></div>`
                }
                <div class="flex items-center justify-between mt-2" onclick="event.stopPropagation()">
                    <input type="number" value="${c.qty}" oninput="if(!cart['${i.id}']) cart['${i.id}']={sel:true}; cart['${i.id}'].qty=parseInt(this.value)||1" class="qty-input">
                    <span class="text-[9px] text-gray-300 font-bold">${i.id}</span>
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

function updateItemStep(id, stepKey, isChecked) {
    const item = activeDB.find(x => x.id === id);
    if (!item.steps) item.steps = [];
    if (isChecked) { if(!item.steps.includes(stepKey)) item.steps.push(stepKey); }
    else { item.steps = item.steps.filter(s => s !== stepKey); }
    saveData();
}

function updateItem(id, field, value) {
    const item = activeDB.find(x => x.id === id);
    if (item) { item[field] = value; saveData(); }
}

function deleteItem(id) {
    if (confirm(`確定刪除 [${id}]？`)) { 
        activeDB = activeDB.filter(x => x.id !== id); 
        saveData(); render(); 
    }
}

function addNewItem() {
    const cat = prompt("分類 (A-J):", "A")?.toUpperCase();
    if (!catLabels[cat]) return;
    const sameCat = activeDB.filter(x => x.cat === cat);
    const nextNum = sameCat.length > 0 ? Math.max(...sameCat.map(x => parseInt(x.id.replace(cat, "")) || 0)) + 1 : 1;
    const newID = cat + (nextNum < 10 ? "0" + nextNum : nextNum);
    activeDB.push({ id: newID, cat, n: "新標語", s: "60x40", m: "中空板", steps: [currentMode==='GUIDE'?currentKey:''] });
    saveData(); render();
}

function toggleAdmin() {
    if(!isAdmin && prompt("管理密碼") !== "751113") return;
    isAdmin = !isAdmin;
    document.getElementById('adminBtn').innerText = isAdmin ? "🔓 結束編輯" : "🔒 管理員";
    document.getElementById('addItemBtn').classList.toggle('hidden', !isAdmin);
    document.getElementById('adminTools').classList.toggle('hidden', !isAdmin);
    render();
}

function editSites() {
    const res = prompt("修改工地名單：", sites.join(', '));
    if (res) { sites = res.split(/[，,]/).map(s => s.trim()).filter(s => s); saveData(); renderSiteSelect(); }
}

function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join(''); }
function saveData() { 
    localStorage.setItem('yt_db', JSON.stringify(activeDB)); 
    localStorage.setItem('yt_guides', JSON.stringify(guides)); 
    localStorage.setItem('yt_cats', JSON.stringify(catLabels)); 
    localStorage.setItem('yt_sites', JSON.stringify(sites)); 
}

function exportData() {
    const data = { activeDB, guides, catLabels, sites };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `鈺通工安系統備份_${new Date().toLocaleDateString()}.json`;
    a.click();
}

function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = f => {
            try {
                const data = JSON.parse(f.target.result);
                if(data.activeDB) {
                    activeDB = data.activeDB; guides = data.guides; catLabels = data.catLabels; sites = data.sites;
                    saveData(); location.reload();
                }
            } catch(e) { alert("檔案格式錯誤"); }
        };
        reader.readAsText(file);
    };
    input.click();
}

function buildReport() {
    const sel = activeDB.filter(i => cart[i.id]?.sel);
    if(!sel.length) return alert("請選取標語");
    const site = document.getElementById('siteSelect').value;
    const staff = document.getElementById('staff').value || "現場人員";
    const date = new Date().toLocaleString();
    let h = `
        <div style="border: 2px solid #000; padding: 20px; color: #000;">
            <h1 style="text-align:center; margin:0; font-size:24px;">鈺通營造工安標語採購單</h1>
            <div style="display:flex; justify-content:space-between; margin: 20px 0; border-bottom: 2px solid #000; padding-bottom: 10px;">
                <span>工地：${site}</span>
                <span>填單人：${staff}</span>
            </div>
            <table style="width:100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid #000;">
                        <th style="text-align:left; padding: 8px;">項目內容</th>
                        <th style="text-align:center; padding: 8px; width: 60px;">數量</th>
                    </tr>
                </thead>
                <tbody>`;
    sel.forEach(i => {
        h += `<tr style="border-bottom: 1px solid #eee;"><td style="padding: 10px 8px;"><b style="font-size: 16px;">[${i.id}] ${i.n}</b><br><small>規格：${i.s} / 材質：${i.m}</small></td><td style="text-align:center; font-size: 20px; font-weight: bold;">${cart[i.id].qty}</td></tr>`;
    });
    h += `</tbody></table><div style="margin-top: 30px; text-align: right; font-size: 12px;">列印時間：${date}</div></div>
        <div class="no-print" style="margin-top:20px; display:flex; gap:10px;"><button onclick="window.print()" style="flex:1; background:#095744; color:white; padding:15px; border-radius:10px; font-weight:bold;">確認列印 / 另存 PDF</button><button onclick="document.getElementById('printSection').style.display='none'" style="flex:1; background:#eee; padding:15px; border-radius:10px;">取消</button></div>`;
    const ps = document.getElementById('printSection');
    ps.innerHTML = h; ps.style.display = 'block'; window.scrollTo(0, 0);
}

function resetCart() { if(confirm("清空選取？")) { cart = {}; render(); } }
window.onload = init;
</script>
