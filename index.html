<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--yt-bg); 
            padding-bottom: 220px; 
            touch-action: manipulation;
        }
        .header-container { background-color: var(--yt-dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .main-title { font-size: 1.4rem; font-weight: 900; letter-spacing: 0.1em; }
        .admin-btn { background: white; color: var(--yt-dark); padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 3px solid var(--yt-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .cat-tab-step { white-space: nowrap; padding: 10px 16px; border-radius: 12px; background: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; flex-shrink: 0; border: 2px solid var(--yt-dark); }
        .cat-tab-step.active { background: var(--yt-light); border-color: var(--yt-light); }
        .cat-tab-item { white-space: nowrap; padding: 10px 16px; border-radius: 12px; background: white; color: #475569; font-size: 13px; font-weight: 800; cursor: pointer; border: 2px solid #e2e8f0; flex-shrink: 0; }
        .cat-tab-item.active { background: #E6F4F1; color: var(--yt-dark); border-color: var(--yt-dark); }

        /* 卡片優化 */
        .grid-container { display: grid; gap: 12px; padding: 12px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .sign-card { background: white; border-radius: 16px; padding: 14px; border: 2px solid transparent; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; gap: 12px; cursor: pointer; transition: all 0.15s ease; -webkit-tap-highlight-color: transparent; }
        .sign-card:active { transform: scale(0.96); }
        .sign-card.selected { border-color: var(--yt-light); background: #f0fdf4; box-shadow: 0 8px 15px rgba(112, 185, 52, 0.15); }
        
        .img-slot { width: 85px; height: 85px; background: #f8fafc; border-radius: 12px; overflow: hidden; flex-shrink: 0; border: 1px solid #e2e8f0; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        
        .qty-input { width: 65px; text-align: center; font-size: 24px; font-weight: 900; color: var(--yt-dark); border-bottom: 3px solid var(--yt-light); background: transparent; outline: none; }
        
        /* 採購單全螢幕蓋板 */
        #printSection { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: white; 
            z-index: 9999; 
            padding: 20px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { position: absolute; left: 0; top: 0; width: 100%; display: block; }
        }
    </style>
</head>
<body>

    <div class="sticky-header no-print">
        <div class="header-container">
            <span class="main-title">鈺通營造工安系統</span>
            <button onclick="toggleAdmin()" id="adminBtn" class="admin-btn">🔒 管理員</button>
        </div>
        <div class="grid grid-cols-2 gap-2 px-4 py-3 bg-white border-b">
            <div class="flex gap-1">
                <select id="siteSelect" class="flex-1 bg-gray-50 p-2 rounded-xl text-sm font-bold border border-gray-200 h-11"></select>
                <button onclick="editSites()" class="bg-gray-100 px-4 rounded-xl font-bold border border-gray-200 h-11">＋</button>
            </div>
            <input type="text" id="staff" class="bg-gray-50 p-2 rounded-xl text-sm font-bold border border-gray-200 h-11" placeholder="填單人員">
        </div>
        <div class="flex overflow-x-auto gap-2 p-3 bg-white scrollbar-hide" id="tabContainer"></div>
    </div>

    <div id="mainGrid" class="grid-container max-w-7xl mx-auto no-print"></div>

    <div id="printSection"></div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-white/95 border-t border-gray-100 z-[1100] flex flex-col gap-2 no-print shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <div class="flex gap-3">
            <button id="reportBtn" onclick="buildReport()" ontouchstart="" class="flex-[4] bg-[#095744] text-white py-4 rounded-2xl font-black text-xl shadow-xl active:bg-[#063d30]">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-gray-100 text-gray-400 rounded-2xl text-sm font-bold">清空</button>
        </div>
    </nav>

<script>
let activeDB, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, catLabels;
// 圖片路徑優化：直接讀取你存放的 img 資料夾
const IMG_PATH = "img/"; 

const defaultDB = [
    {id:'A01', cat:'A', n:'辦公室 (監造/管理/統包商)', s:'60x20', m:'中空板', steps:['S2']},
    {id:'A02', cat:'A', n:'會議室', s:'60x20', m:'中空板', steps:['S2']},
    {id:'B01', cat:'B', n:'工程告示牌', s:'120x90', m:'中空板', steps:['S1']},
    {id:'B07', cat:'B', n:'進入工區請戴安全帽', s:'60x40', m:'中空板', steps:['S1']},
    {id:'C01', cat:'C', n:'有電危險請勿觸碰', s:'30x20', m:'中空板', steps:['S5']},
    {id:'E03', cat:'E', n:'進入工區請緩慢行駛', s:'60x40', m:'中空板', steps:['S1']}
];

function init() {
    activeDB = JSON.parse(localStorage.getItem('yt_db')) || defaultDB;
    guides = JSON.parse(localStorage.getItem('yt_guides')) || {'S1':{t:'工地入口'},'S2':{t:'辦公區域'},'S3':{t:'安全宣導'},'S4':{t:'動線管理'},'S5':{t:'施工現場'},'S6':{t:'環境管理'}};
    catLabels = JSON.parse(localStorage.getItem('yt_cats')) || {'ALL':'全部標語','A':'A.生活辦公','B':'B.安全告示','C':'C.危險警示','D':'D.禁止事項','E':'E.交通動線','F':'F.消防設施','G':'G.環境管理','H':'H.精神宣導','J':'J.圖資名稱'};
    // 使用正確的六個工地
    sites = JSON.parse(localStorage.getItem('yt_sites')) || ["嘉義創世基金會", "嘉義嘉科實中", "嘉義北門住宅", "嘉義博愛安居", "嘉義民雄院區", "臺南林森圖書館"];
    
    renderTabs(); 
    renderSiteSelect(); 
    render();
}

function render() {
    const grid = document.getElementById('mainGrid'); 
    grid.innerHTML = '';
    
    let display = (currentMode === 'CAT') ? 
        (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : 
        activeDB.filter(x => x.steps && x.steps.includes(currentKey));
    
    display.forEach(i => {
        const c = cart[i.id] || { sel:false, qty:1 };
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        
        card.onclick = (e) => {
            if(e.target.tagName === 'INPUT') return;
            cart[i.id] = { sel: !c.sel, qty: c.qty };
            render();
        };

        card.innerHTML = `
            <div class="img-slot">
                <img src="${IMG_PATH}${i.id}.png" onerror="this.src='${IMG_PATH}${i.id}.jpg'; this.onerror=null; this.parentElement.innerHTML='<div class=p-5 text-[10px] text-gray-300>無圖</div>'">
            </div>
            <div class="flex-1 pr-10">
                <div class="font-black text-[#095744] text-[15px] leading-tight">${i.n}</div>
                <div class="text-[11px] text-gray-500 mt-1">規格：<span class="text-red-500">${i.s}</span> / ${i.m}</div>
            </div>
            <div class="absolute bottom-3 right-3 flex flex-col items-end">
                <input type="number" value="${c.qty}" oninput="updateQty('${i.id}', this.value)" class="qty-input" onclick="event.stopPropagation()">
                <span class="text-[9px] text-gray-300 font-bold mt-1">${i.id}</span>
            </div>`;
        grid.appendChild(card);
    });
}

function updateQty(id, val) {
    const q = parseInt(val) || 1;
    if(!cart[id]) cart[id] = { sel: true, qty: q };
    else cart[id].qty = q;
}

function buildReport() {
    const selIDs = Object.keys(cart).filter(id => cart[id].sel);
    if(selIDs.length === 0) return alert("請先點選標語卡片！");

    const site = document.getElementById('siteSelect').value;
    const staff = document.getElementById('staff').value || "現場人員";
    const date = new Date().toLocaleDateString('zh-TW');

    let h = `
        <div style="max-width: 800px; margin: auto; background: white; padding-bottom: 50px;">
            <div style="text-align:center; border-bottom: 3px solid #000; padding-bottom: 10px;">
                <h1 style="font-size:24px; margin:0;">鈺通營造工安標語採購單</h1>
            </div>
            <div style="display:flex; justify-content:space-between; padding: 15px 5px; font-weight: bold;">
                <span>工地：${site}</span>
                <span>日期：${date} ｜ 填單：${staff}</span>
            </div>
            <table style="width:100%; border-collapse: collapse; border: 2px solid #000;">
                <tr style="background: #f2f2f2;">
                    <th style="padding: 10px; border: 1px solid #000; width: 100px;">樣圖(可長按儲存)</th>
                    <th style="padding: 10px; border: 1px solid #000;">品項與規格</th>
                    <th style="padding: 10px; border: 1px solid #000; width: 60px;">數量</th>
                </tr>`;
    
    selIDs.forEach(id => {
        const item = activeDB.find(x => x.id === id);
        if(item) {
            h += `
                <tr>
                    <td style="padding: 5px; border: 1px solid #000; text-align:center;">
                        <img src="${IMG_PATH}${item.id}.png" style="max-width:80px; max-height:80px;" onerror="this.src='${IMG_PATH}${item.id}.jpg'; this.onerror=null;">
                    </td>
                    <td style="padding: 10px; border: 1px solid #000;">
                        <div style="font-weight: bold; font-size: 16px;">${item.n}</div>
                        <div style="font-size: 12px; color: #666;">編號：${item.id} ｜ 規格：${item.s} ｜ 材質：${item.m}</div>
                    </td>
                    <td style="text-align:center; border: 1px solid #000; font-size: 24px; font-weight: 900;">${cart[id].qty}</td>
                </tr>`;
        }
    });

    h += `</table>
            <div class="no-print" style="margin-top:30px; display:flex; gap:10px;">
                <button onclick="window.print()" style="flex:2; background:#095744; color:white; padding:20px; border-radius:15px; font-weight:bold; font-size:18px;">列印或存 PDF</button>
                <button onclick="document.getElementById('printSection').style.display='none'" style="flex:1; background:#eee; padding:20px; border-radius:15px; font-weight:bold;">返回系統</button>
            </div>
        </div>`;

    const ps = document.getElementById('printSection');
    ps.innerHTML = h;
    ps.style.display = 'block';
    window.scrollTo(0, 0);
}

function renderTabs() {
    let html = '';
    Object.keys(guides).sort().forEach(k => {
        html += `<div class="cat-tab-step ${currentMode==='GUIDE'&&currentKey===k?'active':''}" onclick="handleTabClick('GUIDE','${k}')">Step ${k.replace('S','')}.${guides[k].t}</div>`;
    });
    html += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey==='ALL'?'active':''}" onclick="handleTabClick('CAT','ALL')">全部</div>`;
    Object.keys(catLabels).filter(k=>k!=='ALL').sort().forEach(k => {
        html += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey===k?'active':''}" onclick="handleTabClick('CAT','${k}')">${catLabels[k]}</div>`;
    });
    document.getElementById('tabContainer').innerHTML = html;
}

function handleTabClick(m, k) { currentMode = m; currentKey = k; render(); renderTabs(); }
function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join(''); }
function resetCart() { if(confirm("清空目前選取？")) { cart = {}; render(); } }
function toggleAdmin() { if(!isAdmin && prompt("密碼")!=="751113") return; isAdmin = !isAdmin; document.getElementById('adminBtn').innerText = isAdmin?"🔓 結束":"🔒 管理員"; render(); }
function editSites() { const res = prompt("編輯名單(逗號分隔):", sites.join(',')); if(res){ sites=res.split(',').map(s=>s.trim()); saveData(); renderSiteSelect(); } }
function saveData() { localStorage.setItem('yt_sites', JSON.stringify(sites)); }
window.onload = init;
</script>
</body>
</html>
