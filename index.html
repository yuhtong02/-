<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語採購系統 V7.0.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; --yt-card-border: #D7CCC8; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg); padding-bottom: 160px; color: #1e293b; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: var(--yt-bg); border-bottom: 3px solid var(--yt-dark); }
        .category-scroller { display: flex; overflow-x: auto; gap: 6px; padding: 8px 12px; background: white; -webkit-overflow-scrolling: touch; }
        .cat-tab { white-space: nowrap; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 900; cursor: pointer; border: 1px solid #e2e8f0; }
        .cat-tab.step { background-color: var(--yt-dark); color: white; }
        .cat-tab.active { background-color: var(--yt-light); color: white; border-color: var(--yt-light); }
        
        .sign-card { background: white; border-radius: 12px; padding: 10px; border: 1px solid var(--yt-card-border); display: flex; gap: 10px; height: 115px; position: relative; }
        .sign-card.selected { border: 3px solid var(--yt-light); background: #f0fdf4; }
        
        .touch-zone { width: 130px; height: 95px; flex-shrink: 0; position: relative; cursor: pointer; }
        .img-slot { width: 100%; height: 100%; background: #f8fafc; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        .check-badge { position: absolute; top: -6px; left: -6px; width: 26px; height: 26px; background: white; border: 2px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; z-index: 10; color: transparent; }
        .selected .check-badge { background: var(--yt-light); border-color: white; color: white; }
        
        .edit-zone { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
        .admin-input { background: #fff7ed !important; border: 1px dashed #fb923c !important; border-radius: 4px; padding: 2px 4px; font-size: 11px; color: #9a3412; font-weight: 900; width: 100%; outline: none; }
        .qty-input { width: 50px; text-align: center; font-size: 24px; font-weight: 900; color: var(--yt-light); border-bottom: 2px solid #ddd; background: transparent; outline: none; }
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px; border-top: 1px solid #eee; z-index: 2000; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="sticky-header no-print">
        <div class="flex items-center justify-between px-4 py-2">
            <div id="mainTitleContainer"></div>
            <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] font-black bg-white text-[#095744] px-3 py-1.5 rounded-full border">🔒 管理員模式</button>
        </div>
        <div class="grid grid-cols-2 gap-2 px-4 pb-2">
            <div class="flex gap-1">
                <select id="siteSelect" class="flex-1 bg-white p-2 rounded-lg text-xs font-black border" onchange="save()"></select>
                <button onclick="addNewSite()" class="bg-[#095744] text-white px-3 rounded-lg font-bold shadow-md">+</button>
            </div>
            <input type="text" id="staff" class="bg-white p-2 rounded-lg text-xs font-black border" placeholder="填單人" oninput="save()">
        </div>
        <div id="tabContainer" class="category-scroller"></div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 p-2" id="mainGrid"></div>

    <nav class="footer-nav no-print">
        <div id="adminPanel" class="hidden flex justify-center gap-2 mb-2">
            <button onclick="exportData()" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-[10px] font-bold">📤 備份</button>
            <button onclick="importData()" class="bg-purple-600 text-white px-4 py-1.5 rounded-lg text-[10px] font-bold">📥 還原</button>
            <button onclick="deleteSite()" class="bg-red-500 text-white px-4 py-1.5 rounded-lg text-[10px] font-bold">🗑️ 刪除工地</button>
        </div>
        <div class="flex w-full max-w-6xl gap-2 mx-auto">
            <button onclick="buildReport()" class="flex-[4] bg-[#095744] text-white py-4 rounded-xl font-black text-xl shadow-lg">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-red-50 text-red-500 rounded-xl text-[10px] font-black border border-red-100">重選</button>
        </div>
    </nav>

    <div id="modal" class="no-print" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px;">
        <div style="background: white; width: 100%; max-width: 650px; border-radius: 16px; padding: 20px; max-height: 90vh; overflow-y: auto;">
            <div id="printArea"></div>
            <div class="grid grid-cols-1 gap-2 mt-4">
                <button onclick="window.print()" class="bg-[#095744] text-white py-3 rounded-lg font-black shadow">1. 確認列印</button>
                <button onclick="captureToImage()" class="bg-amber-500 text-white py-3 rounded-lg font-black shadow">2. 轉為圖片分享</button>
                <button onclick="closeModal()" class="bg-slate-100 text-slate-500 py-2 rounded-lg font-bold">返回編輯</button>
            </div>
        </div>
    </div>

<script>
const GITHUB_BASE = "https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/";
let activeDB, cart = {}, sites = [], isAdmin = false, currentFilter = 'ALL', config = {}, stepData = {}, cats = {};

const DEFAULT_SITES = ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "嘉義北門集合住宅", "嘉義民雄院區", "臺南林森圖書館"];

// 根據你的圖表建立初始資料庫
const RAW_SIGNS = [
    {id:'A01', cat:'A', n:'男化妝室', s:'30x10', m:'PVC'},
    {id:'A02', cat:'A', n:'女化妝室', s:'30x10', m:'PVC'},
    {id:'A03', cat:'A', n:'小便斗', s:'30x10', m:'PVC'},
    {id:'A04', cat:'A', n:'休息區', s:'60x40', m:'中空板'},
    {id:'B01', cat:'B', n:'戴安全帽', s:'60x40', m:'中空板'},
    {id:'C01', cat:'C', n:'開口危險小心墜落', s:'60x40', m:'中空板'},
    {id:'D01', cat:'D', n:'嚴禁酒後進場', s:'60x40', m:'中空板'},
    {id:'E01', cat:'E', n:'安全出口', s:'30x10', m:'PVC'},
    {id:'F01', cat:'F', n:'急救箱', s:'20x20', m:'貼紙'},
    {id:'F02', cat:'F', n:'滅火器', s:'20x20', m:'貼紙'},
    {id:'G01', cat:'G', n:'工具箱會議', s:'60x40', m:'中空板'},
    {id:'H01', cat:'H', n:'安全第一', s:'60x40', m:'中空板'},
    {id:'I01', cat:'I', n:'物料暫置區', s:'60x40', m:'中空板'},
    {id:'J01', cat:'J', n:'工程告示牌', s:'120x90', m:'鍍鋅鐵板'},
    {id:'K01', cat:'K', n:'守衛室', s:'30x10', m:'PVC'}
];

// 圖表對應的 11 大類
const DEFAULT_CATEGORIES = { 
    'ALL':'全部標語', 
    'A':'A. 生活設施', 
    'B':'B. 安全防護', 
    'C':'C. 危險警示', 
    'D':'D. 禁止事項', 
    'E':'E. 交通與動線',
    'F':'F. 設備設施位置',
    'G':'G. 作業規範',
    'H':'H. 宣導標語',
    'I':'I. 物料環境管理',
    'J':'J. 圖資與指引',
    'K':'K. 區域單位標示'
};

// Step 1~6 的工進分配
const DEFAULT_STEP_DATA = { 
    'S1': { t:'📌 Step 1 入口', items:['J01','K01','B01','D01','E01'] }, 
    'S2': { t:'📌 Step 2 基礎', items:['G01','I01','F02'] },
    'S3': { t:'📌 Step 3 結構', items:['C01','B01'] },
    'S4': { t:'📌 Step 4 裝修', items:['A01','A02','F01'] },
    'S5': { t:'📌 Step 5 景觀', items:['E01','H01'] },
    'S6': { t:'📌 Step 6 完工', items:['K01'] }
};

function init() {
    activeDB = JSON.parse(localStorage.getItem('yt_db_v704')) || RAW_SIGNS;
    cart = JSON.parse(localStorage.getItem('yt_cart')) || {};
    sites = JSON.parse(localStorage.getItem('yt_sites')) || DEFAULT_SITES;
    config = JSON.parse(localStorage.getItem('yt_config')) || { title: "鈺通營造工安標語採購系統" };
    stepData = JSON.parse(localStorage.getItem('yt_stepData')) || DEFAULT_STEP_DATA;
    cats = JSON.parse(localStorage.getItem('yt_cats')) || DEFAULT_CATEGORIES;
    document.getElementById('staff').value = localStorage.getItem('yt_staff') || '';
    updateTitleUI(); renderSites(); renderTabs(); render();
}

function updateTitleUI() {
    const container = document.getElementById('mainTitleContainer');
    container.innerHTML = isAdmin ? 
        `<input type="text" class="bg-transparent border-b border-dashed border-[#095744] text-lg font-black text-[#095744] w-64 outline-none" value="${config.title}" oninput="config.title=this.value;save()">` : 
        `<span class="text-lg font-black text-[#095744]">${config.title}</span>`;
}

function renderSites() {
    const sel = document.getElementById('siteSelect');
    sel.innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join('');
    sel.value = localStorage.getItem('yt_current_site') || sites[0];
}

function addNewSite() { const n = prompt("新增工地："); if(n){sites.push(n); renderSites(); save();} }
function deleteSite() { if(confirm("確定刪除此工地？")){sites=sites.filter(s=>s!==document.getElementById('siteSelect').value); renderSites(); save();} }

function renderTabs() {
    let h = '';
    Object.keys(stepData).sort().forEach(k => { h += `<div class="cat-tab step ${currentFilter===k?'active':''}" onclick="setFilter('${k}')">${isAdmin ? `<input class="bg-transparent text-white w-20 text-center font-black" value="${stepData[k].t}" onclick="event.stopPropagation()" oninput="stepData['${k}'].t=this.value;save()">` : stepData[k].t}</div>`; });
    Object.keys(cats).sort().forEach(k => { h += `<div class="cat-tab ${currentFilter===k?'active':''}" onclick="setFilter('${k}')">${isAdmin && k!=='ALL' ? `<input class="bg-transparent text-black w-20 text-center font-black" value="${cats[k]}" onclick="event.stopPropagation()" oninput="cats['${k}']=this.value;save()">` : cats[k]}</div>`; });
    document.getElementById('tabContainer').innerHTML = h;
}

function setFilter(f) { currentFilter = f; renderTabs(); render(); }

function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let list = stepData[currentFilter] ? activeDB.filter(x => stepData[currentFilter].items.includes(x.id)) : 
               (currentFilter === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentFilter));

    list.forEach((item) => {
        const st = cart[item.id] || { sel: false, qty: 1 };
        const card = document.createElement('div');
        card.className = `sign-card ${st.sel ? 'selected' : ''}`;
        
        card.innerHTML = `
            <div class="touch-zone" onclick="toggleItem('${item.id}')">
                <div class="check-badge">${st.sel ? '✓' : ''}</div>
                <div class="img-slot"><img src="${GITHUB_BASE + item.id + '.jpg'}" onerror="handleImgErr(this)"></div>
            </div>
            <div class="edit-zone">
                <div>
                    <div class="text-[9px] font-bold text-gray-400">ID: ${item.id}</div>
                    ${isAdmin ? `<input class="admin-input mb-1" value="${item.n}" oninput="updateDB('${item.id}','n',this.value)">` : `<div class="font-black text-[14px] text-[#095744] truncate">${item.n}</div>`}
                    <div class="flex gap-1">
                        <div class="flex-1 flex items-center min-w-0">
                            <span class="text-[9px] font-bold text-red-600 mr-0.5">規:</span>
                            ${isAdmin ? `<input class="admin-input" value="${item.s}" oninput="updateDB('${item.id}','s',this.value)">` : `<span class="text-[9px] font-bold text-red-600 truncate">${item.s}</span>`}
                        </div>
                        <div class="flex-1 flex items-center min-w-0">
                            <span class="text-[9px] font-bold text-blue-600 mr-0.5">材:</span>
                            ${isAdmin ? `<input class="admin-input" value="${item.m}" oninput="updateDB('${item.id}','m',this.value)">` : `<span class="text-[9px] font-bold text-blue-600 truncate">${item.m}</span>`}
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    ${isAdmin ? `<select class="bg-orange-50 text-[9px] rounded font-black p-0.5 border" onchange="autoRelocateID('${item.id}', this.value)">
                        ${Object.keys(cats).filter(c=>c!=='ALL').sort().map(k => `<option value="${k}" ${item.cat===k?'selected':''}>分類 ${k}</option>`).join('')}
                    </select>` : '<div></div>'}
                    <input type="number" value="${st.qty}" oninput="updateQty('${item.id}',this.value)" class="qty-input">
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

function autoRelocateID(oldID, newCat) {
    const item = activeDB.find(x => x.id === oldID);
    if (!item || item.cat === newCat) return;
    const brothers = activeDB.filter(x => x.cat === newCat);
    let nextNum = 1;
    if (brothers.length > 0) {
        const nums = brothers.map(b => parseInt(b.id.substring(1))).filter(n => !isNaN(n));
        nextNum = nums.length > 0 ? Math.max(...nums) + 1 : 1;
    }
    const newID = newCat + nextNum.toString().padStart(2, '0');
    Object.keys(stepData).forEach(k => { stepData[k].items = stepData[k].items.map(id => id === oldID ? newID : id); });
    if (cart[oldID]) { cart[newID] = cart[oldID]; delete cart[oldID]; }
    item.cat = newCat; item.id = newID;
    save(); render();
}

function updateDB(id, f, v) { const i = activeDB.find(x => x.id === id); if (i) { i[f] = v; save(); } }
function toggleItem(id) { if (!cart[id]) cart[id] = { sel: false, qty: 1 }; cart[id].sel = !cart[id].sel; save(); render(); }
function updateQty(id, v) { if (!cart[id]) cart[id] = { sel: true, qty: 1 }; cart[id].qty = parseInt(v) || 1; save(); }
function handleImgErr(i) { if (i.src.includes('.jpg')) { i.src = i.src.replace('.jpg', '.JPG'); } else { i.onerror = null; i.src = 'https://via.placeholder.com/150?text=無照片'; } }

function save() {
    localStorage.setItem('yt_db_v704', JSON.stringify(activeDB));
    localStorage.setItem('yt_cart', JSON.stringify(cart));
    localStorage.setItem('yt_staff', document.getElementById('staff').value);
    localStorage.setItem('yt_current_site', document.getElementById('siteSelect').value);
    localStorage.setItem('yt_config', JSON.stringify(config));
    localStorage.setItem('yt_stepData', JSON.stringify(stepData));
    localStorage.setItem('yt_cats', JSON.stringify(cats));
    localStorage.setItem('yt_sites', JSON.stringify(sites));
}

function toggleAdmin() {
    if (!isAdmin) { if (prompt("密碼") === "751113") { isAdmin = true; document.getElementById('adminBtn').innerText = "🔓 管理中"; document.getElementById('adminPanel').classList.remove('hidden'); } } 
    else { isAdmin = false; document.getElementById('adminBtn').innerText = "🔒 管理員模式"; document.getElementById('adminPanel').classList.add('hidden'); }
    updateTitleUI(); renderTabs(); render();
}

function buildReport() {
    const sel = activeDB.filter(i => cart[i.id]?.sel);
    if (!sel.length) return alert("請先選取項目");
    let h = `<div id="captureTarget" style="padding:20px; background:white; border:4px solid #095744; border-radius:10px;">
        <h2 style="text-align:center; color:#095744; margin-bottom:15px; font-weight:900;">${config.title}</h2>
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">
            <span>工地：${document.getElementById('siteSelect').value}</span>
            <span>負責：${document.getElementById('staff').value}</span>
        </div>
        <table style="width:100%; border-collapse:collapse;">`;
    sel.forEach((i, idx) => {
        h += `<tr style="border-bottom:1px solid #eee;">
                <td style="padding:10px; font-weight:bold;">${idx+1}</td>
                <td style="padding:10px;"><img src="${GITHUB_BASE+i.id+'.jpg'}" style="width:60px;" onerror="handleImgErr(this)"></td>
                <td style="padding:10px; font-size:13px;"><b>[${i.id}] ${i.n}</b><br><span style="color:#666;">規：${i.s} / 材：${i.m}</span></td>
                <td style="padding:10px; text-align:right; font-size:24px; font-weight:900; color:#095744;">${cart[i.id].qty}</td>
              </tr>`;
    });
    document.getElementById('printArea').innerHTML = h + `</table></div>`;
    document.getElementById('modal').style.display = 'flex';
}

function captureToImage() {
    html2canvas(document.getElementById('captureTarget'), { useCORS: true }).then(canvas => {
        document.getElementById('printArea').innerHTML = `<p style="color:red; font-weight:bold; margin-bottom:10px;">✓ 生成成功！請長按圖片儲存。</p><img src="${canvas.toDataURL("image/png")}" style="width:100%; border:1px solid #ddd;">`;
    });
}

function exportData() {
    const blob = new Blob([JSON.stringify({ db: activeDB, sites: sites, config: config, stepData: stepData, cats: cats })], {type: 'text/plain'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `標語備份.txt`; a.click();
}

function importData() {
    const j = prompt("請貼上備份代碼：");
    if (j) { try { const d=JSON.parse(j); activeDB=d.db; sites=d.sites; config=d.config; stepData=d.stepData; cats=d.cats; save(); location.reload(); } catch(e){alert("格式錯誤");} }
}

function resetCart() { if(confirm("確定重選？")) { cart = {}; save(); render(); } }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
init();
</script>
</body>
</html>
