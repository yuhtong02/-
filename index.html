<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統 (完整版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; --yt-card-border: #D7CCC8; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg) !important; padding-bottom: 180px; color: #1e293b; overflow-x: hidden; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: var(--yt-bg); border-bottom: 4px solid var(--yt-dark) !important; }
        .category-scroller { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: white; border-bottom: 1px solid #D7CCC8 !important; }
        .cat-tab-step { white-space: nowrap; padding: 8px 16px; border-radius: 12px; background-color: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; flex-shrink: 0; border: 1px solid var(--yt-dark) !important; }
        .cat-tab-step.active { background-color: var(--yt-light); border-color: var(--yt-light) !important; }
        .cat-tab-item { white-space: nowrap; padding: 8px 18px; border-radius: 10px; background-color: white; color: #64748b; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid #e2e8f0 !important; flex-shrink: 0; }
        .cat-tab-item.active { background-color: #E6F4F1; color: var(--yt-dark); border-color: var(--yt-dark) !important; font-weight: 900; }
        .grid-container { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
        .sign-card { background: white; border-radius: 16px; padding: 16px; border: 1px solid var(--yt-card-border) !important; display: flex; gap: 16px; cursor: pointer; position: relative; }
        .sign-card.selected { border: 3px solid var(--yt-light) !important; background: #f0fdf4; }
        .img-slot { width: 140px; height: 100px; background: #f1f5f9; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #e2e8f0 !important; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; } 
        .qty-input { width: 60px; text-align: center; font-size: 22px; font-weight: 900; color: var(--yt-light); background: transparent; border-bottom: 2px solid #eee !important; }
        .admin-input { background: #fff7ed; border: 1px dashed #fb923c !important; border-radius: 4px; padding: 2px 6px; font-size: 11px; width: 100%; color: #9a3412; font-weight: bold; }
        .guide-box { grid-column: 1 / -1; background: linear-gradient(135deg, #095744 0%, #1a7a63 100%); color: white; padding: 20px; border-radius: 20px; margin-bottom: 10px; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="flex items-center justify-between px-4 py-2">
            <span class="text-xl font-black text-[#095744]">鈺通營造工安標語系統</span>
            <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] font-black bg-white text-[#095744] px-3 py-1.5 rounded-full border border-[#095744]/20">🔒 管理員</button>
        </div>
        <div class="grid grid-cols-2 gap-2 px-4 pb-2">
            <div class="flex gap-1">
                <select id="siteSelect" class="flex-1 bg-white p-2 rounded-xl text-xs font-black border" onchange="autoSave()"></select>
                <button onclick="addNewSite()" class="bg-[#095744] text-white px-3 rounded-xl font-bold">+</button>
            </div>
            <input type="text" id="staff" class="bg-white p-2 rounded-xl text-xs font-black border" placeholder="填單人員" oninput="autoSave()">
        </div>
        <div class="category-scroller" id="tabContainer"></div>
    </div>

    <div class="grid-container max-w-7xl mx-auto" id="mainGrid"></div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t z-50 shadow-2xl">
        <button id="addItemBtn" onclick="addNewItem()" class="hidden w-full bg-amber-50 text-amber-700 py-2 mb-2 rounded-xl font-black border border-amber-200">➕ 插入項目並重排序號 (管理員)</button>
        <div class="flex gap-3 max-w-3xl mx-auto">
            <button onclick="buildReport()" class="flex-[4] bg-[#095744] text-white py-4 rounded-2xl font-black text-xl shadow-lg">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-red-50 text-red-400 rounded-2xl text-[10px] font-bold">重選</button>
            <button onclick="hardReset()" class="flex-1 bg-slate-100 text-slate-400 rounded-2xl text-[10px] font-bold">還原</button>
        </div>
    </nav>

    <div id="modal">
        <div class="bg-white w-full max-w-xl rounded-3xl p-6 max-h-[90vh] overflow-y-auto m-4">
            <div id="printArea"></div>
            <div class="grid grid-cols-2 gap-2 mt-4">
                <button onclick="window.print()" class="bg-[#095744] text-white py-3 rounded-xl font-bold">列印/存PDF</button>
                <button onclick="closeModal()" class="bg-gray-100 py-3 rounded-xl font-bold text-gray-500">返回修改</button>
            </div>
        </div>
    </div>

    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhoto(this)">

<script>
const CAT_LABELS = {'ALL':'全部','A':'A類','B':'B類','C':'C類','D':'D類','E':'E類','F':'F類','G':'G類','H':'H類','I':'I類','J':'J類','K':'K類'};
let activeDB, db, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, curEditImgId;

const request = indexedDB.open("Yutong_SignSystem_Updated", 1);
request.onupgradeneeded = e => e.target.result.createObjectStore("images");
request.onsuccess = e => { db = e.target.result; init(); };

function init() {
    sites = JSON.parse(localStorage.getItem('yt_sites')) || ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "嘉義北門集合住宅", "嘉義民雄院區", "臺南林森圖書館"];
    activeDB = JSON.parse(localStorage.getItem('yt_active_db')) || [{id:'A01', cat:'A', n:'飲水機', s:'30x20', m:'中空板'}];
    guides = JSON.parse(localStorage.getItem('yt_guides')) || {
        'S1': { t: 'Step 1. 大門與管制', d: '告示牌、門禁管制', items: ['A01'] },
        'S2': { t: 'Step 2. 生活設施', d: '辦公區、休息室', items: [] }
    };
    cart = JSON.parse(localStorage.getItem('yt_cart')) || {};
    
    // 讀取暫存資訊
    if(localStorage.getItem('yt_lastSite')) document.getElementById('siteSelect').value = localStorage.getItem('yt_lastSite');
    if(localStorage.getItem('yt_lastStaff')) document.getElementById('staff').value = localStorage.getItem('yt_lastStaff');

    renderTabs(); renderSiteSelect(); render();
}

async function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? 
        (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : 
        activeDB.filter(x => (guides[currentKey] && guides[currentKey].items.includes(x.id)));

    display.sort((a, b) => a.id.localeCompare(b.id));

    if(currentMode === 'GUIDE' && guides[currentKey]) {
        grid.innerHTML = `<div class="guide-box"><h2 class="text-xl font-black">${guides[currentKey].t}</h2><p class="text-xs opacity-80">${guides[currentKey].d}</p></div>`;
    }

    for (const i of display) {
        const c = cart[i.id] || { sel:false, qty:1 };
        const localImg = await dbGet(i.id);
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => toggleItem(i.id);
        card.innerHTML = `
            ${isAdmin ? `<button onclick="event.stopPropagation(); deleteItem('${i.id}')" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs z-20">✕</button>` : ''}
            <div class="img-slot" onclick="handleImgClick(event, '${i.id}')">
                <img src="${localImg || 'img/'+i.id+'.jpg'}" onerror="this.src='https://placehold.co/150x100?text=${i.id}';">
            </div>
            <div class="flex-1">
                <div class="flex justify-between">
                    <div class="flex-1">${isAdmin ? `<input class="admin-input" value="${i.n}" oninput="updateI('${i.id}','n',this.value)" onclick="event.stopPropagation()">` : `<div class="font-black text-[#095744] text-lg leading-tight">${i.n}</div>`}</div>
                    <span class="text-[9px] font-bold text-slate-300 ml-1">${i.id}</span>
                </div>
                <div class="grid grid-cols-2 gap-1 mt-1 text-[11px]">
                    <div>規格：${isAdmin ? `<input class="admin-input" value="${i.s}" oninput="updateI('${i.id}','s',this.value)" onclick="event.stopPropagation()">` : `<span class="text-red-600 font-bold">${i.s}</span>`}</div>
                    <div>材質：${isAdmin ? `<input class="admin-input" value="${i.m||''}" oninput="updateI('${i.id}','m',this.value)" onclick="event.stopPropagation()">` : `<span class="text-blue-600 font-bold">${i.m||'中空板'}</span>`}</div>
                </div>
                <div class="flex items-center gap-2 mt-2" onclick="event.stopPropagation()">
                    <span class="text-[10px] font-black text-slate-400">數量</span>
                    <input type="number" value="${c.qty}" oninput="updateQty('${i.id}',this.value)" class="qty-input">
                </div>
            </div>`;
        grid.appendChild(card);
    }
}

// 核心重排功能 (帶圖片轉移)
async function addNewItem() {
    let prefix = currentKey !== 'ALL' && currentMode === 'CAT' ? currentKey : 'A';
    let max = 0;
    activeDB.filter(i => i.id.startsWith(prefix)).forEach(i => { let n = parseInt(i.id.slice(1)); if(n>max) max=n; });
    let suggestID = prefix + (max + 1).toString().padStart(2, '0');
    let inputID = prompt("請輸入序號 (重複將自動後移):", suggestID);
    if(!inputID) return;
    inputID = inputID.toUpperCase();

    if(activeDB.some(x => x.id === inputID)) {
        if(confirm(`編號 ${inputID} 已存在，要將此編號後的所有項目自動往後推嗎？`)) {
            let startNum = parseInt(inputID.slice(1));
            let targets = activeDB.filter(x => x.id.startsWith(prefix) && parseInt(x.id.slice(1)) >= startNum)
                                  .sort((a,b) => parseInt(b.id.slice(1)) - parseInt(a.id.slice(1)));
            for(let item of targets) {
                let oldID = item.id;
                let nextID = prefix + (parseInt(oldID.slice(1)) + 1).toString().padStart(2, '0');
                let imgData = await dbGet(oldID);
                if(imgData) await dbSet(nextID, imgData); // 圖片跟著跳號
                if(cart[oldID]) { cart[nextID] = cart[oldID]; delete cart[oldID]; } // 數量跟著跳號
                item.id = nextID;
            }
        }
    }
    activeDB.push({id: inputID, cat: inputID.charAt(0), n:"新標語", s:"60x40", m:"中空板"});
    saveDB(); render();
}

function renderTabs() {
    let html = '';
    Object.keys(guides).sort().forEach(k => {
        html += `<div class="cat-tab-step ${currentMode==='GUIDE'&&currentKey===k?'active':''}" onclick="setFilter('GUIDE','${k}')">Step ${k.replace('S','')}</div>`;
    });
    Object.keys(CAT_LABELS).forEach(k => {
        html += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey===k?'active':''}" onclick="setFilter('CAT','${k}')">${CAT_LABELS[k]}</div>`;
    });
    document.getElementById('tabContainer').innerHTML = html;
}

function autoSave() {
    localStorage.setItem('yt_cart', JSON.stringify(cart));
    localStorage.setItem('yt_lastSite', document.getElementById('siteSelect').value);
    localStorage.setItem('yt_lastStaff', document.getElementById('staff').value);
}

function saveDB() { localStorage.setItem('yt_active_db', JSON.stringify(activeDB)); }
function setFilter(m, k) { currentMode=m; currentKey=k; renderTabs(); render(); }
function toggleItem(id) { if(!cart[id]) cart[id]={sel:false,qty:1}; cart[id].sel=!cart[id].sel; autoSave(); render(); }
function updateQty(id, v) { if(!cart[id]) cart[id]={sel:true,qty:1}; cart[id].qty=parseInt(v)||1; autoSave(); }
function deleteItem(id) { if(confirm(`刪除 [${id}]？`)){ activeDB = activeDB.filter(x => x.id !== id); saveDB(); render(); }}
function renderSiteSelect() { const sel = document.getElementById('siteSelect'); sel.innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join(''); }
function addNewSite() { const n = prompt("新工地:"); if(n) { sites.push(n); localStorage.setItem('yt_sites', JSON.stringify(sites)); renderSiteSelect(); document.getElementById('siteSelect').value = n; autoSave(); }}
function toggleAdmin() { isAdmin = !isAdmin; if(isAdmin && prompt("管理密碼") !== "751113") { isAdmin = false; return; } document.getElementById('adminBtn').innerText = isAdmin ? "🔓 管理中" : "🔒 管理員"; document.getElementById('addItemBtn').classList.toggle('hidden', !isAdmin); render(); }
function handleImgClick(e, id) { if(isAdmin) { e.stopPropagation(); curEditImgId = id; document.getElementById('photoInput').click(); }}
async function dbGet(k) { return new Promise(r => { const t = db.transaction("images").objectStore("images").get(k); t.onsuccess = () => r(t.result); }); }
async function dbSet(k, v) { return new Promise(r => { const t = db.transaction("images","readwrite").objectStore("images").put(v, k); t.onsuccess = () => r(); }); }
async function handlePhoto(input) { if(input.files[0]) { const reader = new FileReader(); reader.onload = async e => { await dbSet(curEditImgId, e.target.result); render(); }; reader.readAsDataURL(input.files[0]); }}
function updateI(id, f, v) { const i = activeDB.find(x => x.id === id); if(i) { i[f] = v; saveDB(); }}
function hardReset() { if(confirm("確定還原？")) { localStorage.clear(); location.reload(); }}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function buildReport() {
    const sel = activeDB.filter(i => cart[i.id]?.sel).sort((a,b) => a.id.localeCompare(b.id));
    if(!sel.length) return alert("請勾選標語");
    
    let h = `<div style="border:2px solid #095744; padding:15px; background:white;">
        <h2 style="text-align:center; color:#095744; font-size:22px; font-weight:900; border-bottom:2px solid #095744; padding-bottom:10px; margin-bottom:10px;">鈺通營造工安標語採購單</h2>
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:15px; font-size:13px;">
            <span>工地：${document.getElementById('siteSelect').value}</span>
            <span>填單人：${document.getElementById('staff').value}</span>
        </div>
        <table style="width:100%; border-collapse:collapse;">`;
    
    for(let i of sel) {
        const img = await dbGet(i.id) || 'img/'+i.id+'.jpg';
        h += `<tr style="border-bottom:1px solid #eee;">
            <td style="padding:10px 0; width:80px;"><img src="${img}" style="width:70px; height:50px; object-fit:contain;" onerror="this.src='https://placehold.co/70x50?text=無圖';"></td>
            <td style="padding:10px; font-size:14px;"><b>[${i.id}] ${i.n}</b><br><small style="color:gray;">${i.s} / ${i.m||'中空板'}</small></td>
            <td style="padding:10px; text-align:right; font-size:20px; color:#70B934; font-weight:900;">x ${cart[i.id].qty}</td>
        </tr>`;
    }
    document.getElementById('printArea').innerHTML = h + `</table></div>`;
    document.getElementById('modal').style.display = 'flex';
}
</script>
</body>
</html>
