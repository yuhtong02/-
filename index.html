<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#064E3B;      /* 深綠 */
  --mid:#10B981;       /* 中間綠 */
  --light:#34D399;     /* 淺綠 */
  --pale:#D1FAE5;      
  --pale2:#ECFDF5;
  
  --ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#94A3B8;
  
  --bg:#FEF8E6;        /* 核心色調底色 */
  --surface:#FFFFFF;   /* 卡片底色 */
  --border:#E9E1C8;    /* 配合背景的邊框色 */
  --border2:#064E3B;   /* 深綠邊框 */
  
  --red:#DC2626;--amber:#D97706;--blue:#1D4ED8;
  --r:14px;--r2:10px;--r3:8px;
  --shadow:0 1px 3px rgba(6,78,59,0.08),0 4px 12px rgba(6,78,59,0.05);
}
html,body{height:100%;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column; overflow-x: hidden;}

/* ── HEADER ── */
.hdr{background:var(--dark);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden;}
.hdr::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:grid;place-items:center;font-size:16px;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:900;letter-spacing:0.3px;}
.hdr-ver{font-size:10px;opacity:0.5;font-weight:400;margin-top:1px;}
.admin-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background 0.15s;}
.admin-btn:hover{background:rgba(255,255,255,0.22);}
.admin-btn.active{background:rgba(255,183,0,0.25);border-color:rgba(255,183,0,0.4);color:#FCD34D;}

/* ── CONTROLS ── */
.ctrl{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:wrap;}
.ctrl-group{display:flex;gap:6px;align-items:center;flex:1;min-width:150px;}
select,input[type=text]{font-family:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r3);background:var(--bg);color:var(--ink);outline:none;transition:border-color 0.15s;}
select:focus,input[type=text]:focus{border-color:var(--mid);}
select{flex:1;}
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;border-radius:var(--r3);border:none;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-green{background:var(--dark);color:white;}.btn-green:hover{background:var(--mid);}
.btn-red{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;}.btn-red:hover{background:#FEE2E2;}
.btn-blue{background:#EFF6FF;color:var(--blue);border:1.5px solid #BFDBFE;}.btn-blue:hover{background:#DBEAFE;}
.btn-purple{background:#F5F3FF;color:#6D28D9;border:1.5px solid #DDD6FE;}.btn-purple:hover{background:#EDE9FE;}

/* ── TABS ── */
.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;}
.tabs-scroll{display:flex;overflow-x:auto;padding:12px 16px;gap:6px;-webkit-overflow-scrolling:touch; scrollbar-width: thin; scrollbar-color: var(--mid) var(--bg);}
.tabs-scroll::-webkit-scrollbar{height:5px; display: block;}
.tabs-scroll::-webkit-scrollbar-track{background:var(--bg); border-radius: 10px;}
.tabs-scroll::-webkit-scrollbar-thumb{background:var(--border); border-radius: 10px;}
.tabs-scroll::-webkit-scrollbar-thumb:hover{background:var(--mid);}

.tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--ink3);white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.tab:hover{border-color:var(--mid);color:var(--mid);}
.tab.step-tab{background:var(--pale2);border-color:var(--border2);color:var(--dark);}
.tab.step-tab:hover{background:var(--pale);border-color:var(--mid);}
.tab.active{background:var(--dark);color:white;border-color:var(--dark);box-shadow:0 2px 8px rgba(6,78,59,0.25);}
.tab-sep{width:1.5px;background:var(--border);flex-shrink:0;align-self:stretch;margin:0 4px;}

/* ── MAIN GRID ── */
.main{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
.empty-state{text-align:center;padding:80px 20px;color:var(--ink4);}

/* ── CARD ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;display:flex;gap:12px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;position:relative;box-shadow:var(--shadow);}
.card-img{width:90px;height:75px;flex-shrink:0;border-radius:var(--r3);border:1.5px solid var(--border);overflow:hidden;background:#F8FAFC;display:flex;align-items:center;justify-content:center;position:relative;}
.card-img img{width:100%;height:100%;object-fit:contain;}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;}
.card-name{font-size:14px;font-weight:900;color:var(--dark);line-height:1.3;margin-bottom:4px;}
.card-specs{display:flex;gap:4px;flex-wrap:wrap;}
.spec-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px; display:inline-block;}
.spec-r{background:#FEF2F2;color:var(--red);}
.spec-m{background:#EFF6FF;color:var(--blue);}
.qty-num{font-size:22px;font-weight:900;color:var(--dark);min-width:28px;text-align:center;}

/* ── FOOTER ── */
.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:12px 16px;flex-shrink:0;}
.footer-main{display:flex;gap:10px;align-items:stretch;}
.btn-report{flex:1;background:var(--dark);color:white;border:none;padding:14px 16px;border-radius:var(--r2);font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}

/* ── MODAL & PRINTING ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:white;width:100%;max-width:680px;border-radius:20px 20px 0 0;padding:20px;max-height:92vh;overflow-y:auto;position:relative;}

/* PDF 分頁支援與雜物清理 */
@media print{
  .hdr, .ctrl, .tabs-outer, .footer, .no-print, #captureResult, .modal-actions, .admin-btn, .admin-panel, .qty-ctrl, .card-check, .btn-reset { display:none !important; }
  html, body { height: auto !important; overflow: visible !important; background: white !important; }
  .overlay { position: static !important; display: block !important; background: none !important; }
  .modal { 
    position: static !important; 
    max-height: none !important; 
    overflow: visible !important; 
    width: 100% !important; 
    padding: 0 !important; 
    border-radius: 0 !important;
    box-shadow: none !important;
  }
  #modalPrintArea { width: 100% !important; }
  .report-item { page-break-inside: avoid; border-bottom: 1px solid #eee !important; }
}

.report-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #F1F5F9;}
.rpt-img{width:52px;height:44px;border-radius:6px;object-fit:contain;background:#F8FAFC;border:1px solid var(--border);}
.rpt-info{flex:1;}
.rpt-name{font-size:13px;font-weight:900;}
.rpt-qty{font-size:26px;font-weight:900;color:var(--dark);text-align:right;}
.modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }

.card-check{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:white;display:grid;place-items:center;font-size:12px;z-index:2;}
.card.sel .card-check{background:var(--dark);border-color:var(--dark);color:white;}
.card.sel .card-check::after{content:'✓';display:block;color:white;font-weight:900;font-size:11px;}
.card.sel{border-color:var(--dark);background:rgba(6, 78, 59, 0.03);border-width:2px;}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.card-id{font-size:10px;font-weight:700;background:var(--pale);color:var(--dark);padding:2px 6px;border-radius:4px;}
.card-cat{font-size:10px;color:var(--ink4);}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.qty-ctrl{display:flex;align-items:center;gap:8px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:16px;display:grid;place-items:center;}
.a-name{background:#FFF7ED;border:1.5px dashed #FB923C;border-radius:4px;padding:2px 4px;font-size:14px;font-weight:900;color:#9A3412;width:100%;font-family:inherit;outline:none;margin-bottom:4px;display:block;}
.a-spec{background:white;border:1px dashed #CBD5E1;font-size:10px;width:65px;font-family:inherit;outline:none;padding:1px 4px;border-radius:3px;}
.a-id{background:transparent;border:none;border-bottom:1px dashed var(--dark);font-size:10px;width:35px;font-family:inherit;outline:none;color:var(--dark);font-weight:700;}
.admin-panel{display:none;margin-bottom:10px;}
.admin-panel.show{display:flex;gap:6px;flex-wrap:wrap;}
.cart-badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px;font-size:13px;min-width:28px;}
.btn-reset{padding:0 10px; font-size:12px; font-weight:700; background:#f1f1f1; border:1px solid #ccc; border-radius:8px; cursor:pointer;}
#captureResult{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:10000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#captureResult.show{display:flex;}
#captureResult img{max-width:100%;max-height:80vh;border-radius:8px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🦺</div>
    <div>
      <div class="hdr-title" id="titleEl">工安標語採購系統</div>
      <div class="hdr-ver">鈺通營造 Construction Safety</div>
    </div>
  </div>
  <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 管理員</button>
</div>

<div class="ctrl">
  <div class="ctrl-group">
    <select id="siteSelect" onchange="save()"></select>
    <button class="btn btn-green" onclick="addSite()">＋</button>
  </div>
  <input type="text" id="staffInput" placeholder="填單人員" style="width:120px;" oninput="save()">
</div>

<div class="tabs-outer">
  <div class="tabs-scroll" id="tabsEl"></div>
</div>

<div class="main">
  <div class="grid" id="gridEl"></div>
</div>

<div class="footer no-print">
  <div class="admin-panel" id="adminPanel">
    <button class="btn btn-blue" onclick="addNewSign()">➕ 新增標語</button>
    <button class="btn btn-blue" onclick="exportData()">📤 備份</button>
    <button class="btn btn-purple" onclick="importData()">📥 還原</button>
    <button class="btn btn-red" onclick="deleteSite()">🗑 刪除工地</button>
    <button class="btn btn-blue" onclick="configImgBase()">🖼 設定圖片路徑</button>
  </div>
  <div class="footer-main">
    <button class="btn-report" onclick="buildReport()">
      <span>📋 生成採購單</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
    <button class="btn-reset" onclick="resetCart()">清除<br>重選</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBox">
    <div id="modalPrintArea">
        <div class="modal-title" id="rptTitle" style="text-align:center;font-weight:900;font-size:18px;margin-bottom:10px;">採購單</div>
        <div id="rptMeta" style="display:flex;justify-content:space-around;font-size:12px;border-bottom:1px solid #eee;padding-bottom:10px;margin-bottom:10px;"></div>
        <div id="rptList"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-green" style="padding:12px" onclick="window.print()">🖨 列印清單 (PDF)</button>
      <button class="btn btn-blue" style="padding:12px;background:#F59E0B;color:white;border:none;" onclick="captureReport()">📸 儲存為圖片</button>
      <button class="btn" style="padding:12px;background:#eee;" onclick="closeModal()">返回編輯</button>
    </div>
  </div>
</div>

<div id="captureResult" onclick="this.classList.remove('show')">
  <img id="previewImg" src="">
  <div style="color:white;margin-top:10px;">☝️ 長按圖片即可直接儲存</div>
</div>

  S6:{t:'🏁 Step6 完工',items:['K01','K05','H01','H02','J03','F02']},
};

let db,cart,sites,config,stepData,cats,imgBase,isAdmin=false,currentTab='S1';

function init(){
  db=JSON.parse(localStorage.getItem('ys2_db'))||DEF_DB;
  sites=JSON.parse(localStorage.getItem('ys2_sites'))||DEF_SITES;
  config=JSON.parse(localStorage.getItem('ys2_config'))||{title:'工安標語採購系統'};
  stepData=JSON.parse(localStorage.getItem('ys2_steps'))||DEF_STEPS;
  cats=JSON.parse(localStorage.getItem('ys2_cats'))||DEF_CATS;
  imgBase=localStorage.getItem('ys2_imgBase')||'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';
  cart={}; 
  localStorage.removeItem('ys2_cart'); 
  document.getElementById('staffInput').value=localStorage.getItem('ys2_staff')||'';
  renderTitle();renderSites();renderTabs();render();updateBadge();
}

function renderTitle(){
  const el=document.getElementById('titleEl');
  el.innerHTML=isAdmin ? `<input style="background:rgba(255,255,255,0.15);border:none;border-bottom:1.5px solid rgba(255,255,255,0.4);color:white;font-size:16px;font-weight:900;font-family:inherit;outline:none;width:200px;padding:0;" value="${config.title}" oninput="config.title=this.value;save()">` : config.title;
}

function renderSites(){
  const s=document.getElementById('siteSelect');
  s.innerHTML=sites.map(x=>`<option value="${x}">${x}</option>`).join('');
  s.value=localStorage.getItem('ys2_site')||sites[0];
}

function renderTabs(){
  let h='';
  Object.keys(stepData).sort().forEach(k=>{
    const t=stepData[k].t;
    const isActive=currentTab===k;
    h+=`<div class="tab step-tab${isActive?' active':''}" onclick="setTab('${k}')">${isAdmin?`<input style="background:transparent;border:none;font-weight:700;font-size:12px;color:inherit;font-family:inherit;width:90px;outline:none;" value="${t}" onclick="event.stopPropagation()" oninput="stepData['${k}'].t=this.value;save()">`:t}</div>`;
  });
  h+=`<span class="tab-sep"></span>`;
  h+=`<div class="tab${currentTab==='ALL'?' active':''}" onclick="setTab('ALL')">${cats['ALL']}</div>`;
  CAT_KEYS.forEach(k=>{ h+=`<div class="tab${currentTab===k?' active':''}" onclick="setTab('${k}')">${cats[k]||k}</div>`; });
  document.getElementById('tabsEl').innerHTML=h;
}

function setTab(t){currentTab=t;renderTabs();render();}

function render(){
  let list;
  if(stepData[currentTab]) list=db.filter(x=>stepData[currentTab].items.includes(x.id));
  else if(currentTab==='ALL') list=[...db];
  else list=db.filter(x=>x.cat===currentTab);

  const grid=document.getElementById('gridEl');
  if(!list.length){
    grid.innerHTML=`<div class="empty-state">🔍 此分類暫無標語</div>`;
    return;
  }
  grid.innerHTML='';
  list.forEach(item=>{
    const st=cart[item.id]||{sel:false,qty:1};
    const d=document.createElement('div');
    d.className='card'+(st.sel?' sel':'');
    const imgUrl=imgBase+item.id+'.jpg';
    
    const nameHtml=isAdmin ? `<input class="a-name" value="${item.n}" oninput="updateField('${item.id}','n',this.value)" onclick="event.stopPropagation()">` : `<div class="card-name">${item.n}</div>`;
    const specRHtml=isAdmin?`<input class="a-spec" value="${item.s}" oninput="updateField('${item.id}','s',this.value)" onclick="event.stopPropagation()">`:`<span class="spec-tag spec-r">${item.s}</span>`;
    const specMHtml=isAdmin?`<input class="a-spec" value="${item.m}" oninput="updateField('${item.id}','m',this.value)" onclick="event.stopPropagation()">`:`<span class="spec-tag spec-m">${item.m}</span>`;
    const idHtml=isAdmin?`<input class="a-id" value="${item.id}" onchange="updateID('${item.id}',this.value)" onclick="event.stopPropagation()">`:`${item.id}`;

    d.innerHTML=`
      <div class="card-check"></div>
      <div class="card-img"><img src="${imgUrl}" onerror="this.style.display='none'"></div>
      <div class="card-body">
        <div>
          <div class="card-meta"><span class="card-id">${idHtml}</span><span class="card-cat">${cats[item.cat]||item.cat}</span></div>
          ${nameHtml}
          <div class="card-specs">${specRHtml}${specMHtml}</div>
        </div>
        <div class="card-footer">
          <span></span>
          <div class="qty-ctrl" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="adjQty('${item.id}',-1)">−</button>
            <span class="qty-num">${st.qty||1}</span>
            <button class="qty-btn" onclick="adjQty('${item.id}',1)">＋</button>
          </div>
        </div>
      </div>`;
    d.onclick=()=>toggleItem(item.id);
    grid.appendChild(d);
  });
}

function toggleItem(id){
  if(!cart[id])cart[id]={sel:false,qty:1};
  cart[id].sel=!cart[id].sel;
  save();render();updateBadge();
}
function adjQty(id,d){
  if(!cart[id])cart[id]={sel:true,qty:1};
  cart[id].qty=Math.max(1,(cart[id].qty||1)+d);
  if(d>0) cart[id].sel=true;
  save();render();updateBadge();
}
function updateField(id,f,v){const i=db.find(x=>x.id===id);if(i){i[f]=v;save();}}
function updateID(old,nid){
  nid=nid.toUpperCase().trim();
  if(!nid||nid===old)return;
  if(db.some(x=>x.id===nid))return alert('ID已存在');
  const item=db.find(x=>x.id===old);
  item.id=nid; item.cat=nid[0];
  save();render();
}
function updateBadge(){
  const n=db.filter(x=>cart[x.id]?.sel).length;
  document.getElementById('cartBadge').textContent=n;
}
function toggleAdmin(){
  if(!isAdmin){
    if(prompt('請輸入管理員密碼：')==='751113'){
      isAdmin=true;
      document.getElementById('adminBtn').textContent='助 管理中';
      document.getElementById('adminPanel').classList.add('show');
    }
  } else {
    isAdmin=false;
    document.getElementById('adminBtn').textContent='🔒 管理員';
    document.getElementById('adminPanel').classList.remove('show');
  }
  renderTitle();renderTabs();render();
}
function save(){
  localStorage.setItem('ys2_db',JSON.stringify(db));
  localStorage.setItem('ys2_cart',JSON.stringify(cart));
  localStorage.setItem('ys2_staff',document.getElementById('staffInput').value);
  localStorage.setItem('ys2_site',document.getElementById('siteSelect').value);
}
function resetCart(){if(confirm('確認清除？')){cart={};save();render();updateBadge();}}
function addSite(){const n=prompt('工地名稱：');if(n){sites.push(n);renderSites();save();}}
function deleteSite(){const v=document.getElementById('siteSelect').value; sites=sites.filter(x=>x!==v); renderSites(); save();}
function addNewSign(){
  const id=prompt('新 ID：')?.toUpperCase();
  if(id){db.push({id,cat:id[0],n:'新標語',s:'60x40',m:'中空板'});render();save();}
}

function buildReport(){
  const selectedItems = db.filter(x => cart[x.id]?.sel);
  if(selectedItems.length === 0) return alert('請先選擇標語');

  const site = document.getElementById('siteSelect').value;
  const staff = document.getElementById('staffInput').value || '(未填)';
  const date = new Date().toLocaleDateString('zh-TW', {year: 'numeric', month: '2-digit', day: '2-digit'});

  document.getElementById('rptMeta').innerHTML = `
    <div style="text-align:center"><b>${site}</b><br><span style="color:#666">工地名稱</span></div>
    <div style="text-align:center"><b>${staff}</b><br><span style="color:#666">負責人員</span></div>
    <div style="text-align:center"><b>${date}</b><br><span style="color:#666">填單日期</span></div>
  `;
  
  let rows = '';
  selectedItems.forEach((i, idx) => {
    const qty = cart[i.id].qty || 1;
    rows += `<div class="report-item">
            <div style="width:25px; font-size:12px; color:#94A3B8; font-weight:bold">${idx + 1}</div>
            <img class="rpt-img" src="${imgBase + i.id}.jpg" onerror="this.style.opacity='0.2'">
            <div class="rpt-info">
              <div class="rpt-name">[${i.id}] ${i.n}</div>
              <div style="font-size:10px; color:#64748B">規格：${i.s} ｜ 材質：${i.m}</div>
            </div>
            <div class="rpt-qty">${qty}</div>
          </div>`;
  });

  const totalItems = selectedItems.length;
  const totalQty = selectedItems.reduce((acc, cur) => acc + (cart[cur.id].qty || 1), 0);
  
  rows += `<div style="display:flex; justify-content:space-between; padding:15px 5px; font-weight:bold; font-size:14px; color:var(--dark); border-top:2px solid #eee">
            <span>合計 ${totalItems} 品項</span>
            <span>共計 ${totalQty} 件</span>
           </div>`;

  document.getElementById('rptList').innerHTML = rows;
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){document.getElementById('overlay').classList.remove('show');}

function captureReport(){
  const area = document.getElementById('modalPrintArea');
  html2canvas(area,{
      useCORS:true,
      scale:2,
      backgroundColor: "#FFFFFF"
  }).then(c=>{
    document.getElementById('previewImg').src=c.toDataURL();
    document.getElementById('captureResult').classList.add('show');
  });
}

function configImgBase(){
  const n = prompt('輸入圖片資料夾路徑 (最後需含 /)：', imgBase);
  if(n){ imgBase = n; localStorage.setItem('ys2_imgBase', n); render(); }
}

init();
</script>
</body>
</html>
