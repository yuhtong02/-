<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#064E3B; --mid:#10B981; --light:#34D399; --pale:#D1FAE5; --pale2:#ECFDF5;
  --ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#94A3B8;
  --bg:#FEF8E6; --surface:#FFFFFF; --border:#E9E1C8; --border2:#064E3B;
  --red:#DC2626;--amber:#D97706;--blue:#1D4ED8;
  --r:14px;--r2:10px;--r3:8px;
  --shadow:0 1px 3px rgba(6,78,59,0.08),0 4px 12px rgba(6,78,59,0.05);
}
html,body{height:100%;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column; overflow-x: hidden;}

/* ── UI 元素 ── */
.hdr{background:var(--dark);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:grid;place-items:center;font-size:16px;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:900;letter-spacing:0.3px;}
.hdr-ver{font-size:10px;opacity:0.5;font-weight:400;margin-top:1px;}
.admin-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}

.ctrl{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:wrap;}
.ctrl-group{display:flex;gap:6px;align-items:center;flex:1;min-width:150px;}
select,input[type=text]{font-family:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r3);background:var(--bg);color:var(--ink);outline:none;}
select{flex:1;}

.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;}
.tabs-scroll{display:flex;overflow-x:auto;padding:12px 16px;gap:6px;-webkit-overflow-scrolling:touch;}
.tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--ink3);white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.tab.active{background:var(--dark);color:white;border-color:var(--dark);}
.tab-sep{width:1.5px;background:var(--border);flex-shrink:0;align-self:stretch;margin:0 4px;}

.main{flex:1;overflow-y:auto;padding:14px 16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}

.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;display:flex;gap:12px;cursor:pointer;position:relative;box-shadow:var(--shadow);}
.card-img{width:90px;height:75px;flex-shrink:0;border-radius:var(--r3);border:1.5px solid var(--border);overflow:hidden;background:#F8FAFC;display:flex;align-items:center;justify-content:center;}
.card-img img{width:100%;height:100%;object-fit:contain;}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;}
.card-name{font-size:14px;font-weight:900;color:var(--dark);line-height:1.3;}
.spec-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px; display:inline-block;}
.spec-r{background:#FEF2F2;color:var(--red);}
.spec-m{background:#EFF6FF;color:var(--blue);}

.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:12px 16px;flex-shrink:0;}
.footer-main{display:flex;gap:10px;align-items:stretch;}
.btn-report{flex:1;background:var(--dark);color:white;border:none;padding:14px 16px;border-radius:var(--r2);font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;border-radius:var(--r3);border:none;cursor:pointer;white-space:nowrap;}
.btn-green{background:var(--dark);color:white;}
.btn-blue{background:#EFF6FF;color:var(--blue);border:1.5px solid #BFDBFE;}
.btn-red{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;}
.btn-purple{background:#F5F3FF;color:#6D28D9;border:1.5px solid #DDD6FE;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:white;width:100%;max-width:680px;border-radius:20px 20px 0 0;padding:20px;max-height:92vh;overflow-y:auto;position:relative;}

.report-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid #F1F5F9;}
.rpt-img{width:60px;height:50px;border-radius:6px;object-fit:contain;background:#F8FAFC;border:1px solid var(--border);}
.rpt-info{flex:1;}
.rpt-name{font-size:14px;font-weight:900;}
.rpt-qty{font-size:28px;font-weight:900;color:var(--dark);text-align:right;}

.card-check{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:white;display:grid;place-items:center;z-index:2;}
.card.sel{border-color:var(--dark);background:rgba(6, 78, 59, 0.03);border-width:2px;}
.card.sel .card-check{background:var(--dark);border-color:var(--dark);}
.card.sel .card-check::after{content:'✓';color:white;font-weight:900;font-size:11px;}
.qty-ctrl{display:flex;align-items:center;gap:8px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:white;cursor:pointer;display:grid;place-items:center;}
.qty-num{font-size:22px;font-weight:900;color:var(--dark);min-width:28px;text-align:center;}
.admin-panel{display:none;margin-bottom:10px;gap:6px;flex-wrap:wrap;}
.admin-panel.show{display:flex;}
.cart-badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px;font-size:13px;}
#captureResult{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:10000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#captureResult.show{display:flex;}
#captureResult img{max-width:100%;max-height:80vh;border-radius:8px;}

/* ── 🔥 核心關鍵：徹底解決列印問題 ── */
@media print {
  /* 1. 隱藏所有不需要的東西，包括 overlay 的背景色 */
  .hdr, .ctrl, .tabs-outer, .main, .footer, .no-print, .modal-actions, .admin-btn, #captureResult, .qty-ctrl { 
    display: none !important; 
  }
  
  /* 2. 重置 Body，確保沒有背景色，內容從頂部開始 */
  body, html { 
    background: #fff !important; 
    height: auto !important; 
    overflow: visible !important; 
  }

  /* 3. 將彈窗層設為靜態，取消原本的 flex 對齊，使其像一般文件 */
  .overlay { 
    position: absolute !important; 
    display: block !important; 
    background: none !important; 
    padding: 0 !important;
    left: 0 !important;
    top: 0 !important;
  }

  /* 4. 強制模態視窗占滿寬度，並拔除陰影與圓角 */
  .modal { 
    position: static !important; 
    width: 100% !important; 
    max-width: 100% !important;
    max-height: none !important; 
    padding: 0 !important; 
    box-shadow: none !important; 
    border: none !important;
  }

  /* 5. 確保標題與清單不會被截斷 */
  .report-item { 
    page-break-inside: avoid; 
    border-bottom: 1px solid #eee !important; 
  }
  
  /* 6. 隱藏返回按鈕等行為 */
  .modal-actions { display: none !important; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🦺</div>
    <div>
      <div class="hdr-title" id="titleEl">工安標語採購系統</div>
      <div class="hdr-ver">鈺通營造 Construction Safety</div>
    </div>
  </div>
  <button class="admin-btn no-print" id="adminBtn" onclick="toggleAdmin()">🔒 管理員</button>
</div>

<div class="ctrl no-print">
  <div class="ctrl-group">
    <select id="siteSelect" onchange="save()"></select>
    <button class="btn btn-green" onclick="addSite()">＋</button>
  </div>
  <input type="text" id="staffInput" placeholder="負責人員" style="width:120px;" oninput="save()">
</div>

<div class="tabs-outer no-print">
  <div class="tabs-scroll" id="tabsEl"></div>
</div>

<div class="main no-print">
  <div class="grid" id="gridEl"></div>
</div>

<div class="footer no-print">
  <div class="admin-panel" id="adminPanel">
    <button class="btn btn-blue" onclick="addNewSign()">➕ 新增標語</button>
    <button class="btn btn-blue" onclick="exportData()">📤 備份</button>
    <button class="btn btn-purple" onclick="importData()">📥 還原</button>
    <button class="btn btn-red" onclick="deleteSite()">🗑 刪除工地</button>
  </div>
  <div class="footer-main">
    <button class="btn-report" onclick="buildReport()">
      <span>📋 生成採購單</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
    <button class="btn-reset" style="padding:0 10px; font-size:12px; cursor:pointer;" onclick="resetCart()">重置</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBox">
    <div id="modalPrintArea">
        <div style="text-align:center;font-weight:900;font-size:22px;margin-bottom:15px;color:var(--dark);">採購清單</div>
        <div id="rptMeta" style="display:flex;justify-content:space-around;font-size:13px;border-bottom:2px solid var(--dark);padding-bottom:15px;margin-bottom:10px;"></div>
        <div id="rptList"></div>
    </div>
    <div class="modal-actions no-print" style="display: flex; flex-direction: column; gap: 8px; margin-top: 15px;">
      <button class="btn btn-green" style="padding:14px; font-size:16px;" onclick="window.print()">🖨 下載 PDF / 列印</button>
      <button class="btn btn-blue" style="padding:14px; background:#F59E0B; color:white; border:none;" onclick="captureReport()">📸 儲存為圖片</button>
      <button class="btn" style="padding:12px;background:#eee;" onclick="closeModal()">返回修改</button>
    </div>
  </div>
</div>

<div id="captureResult" class="no-print" onclick="this.classList.remove('show')">
  <img id="previewImg" src="">
  <div style="color:white;margin-top:10px;">☝️ 長按圖片即可直接儲存</div>
</div>

<script>
// 此處內容完全保留你提供的資料結構與邏輯，僅修正列印觸發機制
const DEF_SITES=["嘉義創世基金會","嘉義嘉科實中","嘉義博愛安居","嘉義北門集合住宅","嘉義民雄院區","臺南林森圖書館"];

  {id:'K09',cat:'K',n:'飲水機',s:'20x10',m:'PVC'},

  {id:'K13',cat:'K',n:'工地／學校名稱',s:'依需求',m:'鍍鋅鐵板'},
  {id:'K14',cat:'K',n:'各棟別名稱',s:'依需求',m:'鍍鋅鐵板'},
  {id:'A01',cat:'A',n:'男化妝室',s:'30x10',m:'PVC'},
  {id:'A02',cat:'A',n:'女化妝室',s:'30x10',m:'PVC'},
  {id:'A03',cat:'A',n:'小便斗',s:'20x10',m:'PVC'},
  {id:'B01',cat:'B',n:'進入工區請戴安全帽',s:'60x40',m:'中空板'},
  {id:'B02',cat:'B',n:'背負式安全帶穿戴步驟',s:'60x40',m:'中空板'},
  {id:'B03',cat:'B',n:'打開柵門作業請穿戴背負式安全帶',s:'60x40',m:'中空板'},
  {id:'B04',cat:'B',n:'施工架相關規定',s:'60x40',m:'中空板'},
  {id:'B05',cat:'B',n:'今日危害因素告示牌',s:'60x40',m:'中空板'},
  {id:'B06',cat:'B',n:'工具箱會議',s:'60x40',m:'中空板'},
  {id:'B07',cat:'B',n:'熱危害宣導',s:'60x40',m:'中空板'},
  {id:'B08',cat:'B',n:'安全第一',s:'60x20',m:'中空板'},
  {id:'C01',cat:'C',n:'開口危險小心墜落',s:'60x40',m:'中空板'},
  {id:'C02',cat:'C',n:'升降梯開口危險',s:'60x40',m:'中空板'},

  {id:'D02',cat:'D',n:'非工作人員禁止進入',s:'60x40',m:'中空板'},
  {id:'D03',cat:'D',n:'非施工必要禁止進入',s:'60x40',m:'中空板'},
  {id:'E01',cat:'E',n:'工區施工請勿停車',s:'60x40',m:'中空板'},
  {id:'E02',cat:'E',n:'進入工區請緩慢行駛',s:'60x40',m:'中空板'},

  {id:'F02',cat:'F',n:'安全出口',s:'30x15',m:'燈箱'},
  {id:'F03',cat:'F',n:'樓梯標示',s:'20x10',m:'PVC'},
  {id:'F04',cat:'F',n:'樓層標示',s:'20x10',m:'PVC'},
  {id:'F05',cat:'F',n:'放置鋼筋材料',s:'60x40',m:'中空板'},
  {id:'G01',cat:'G',n:'工安標語6S',s:'60x40',m:'中空板'},
  {id:'H01',cat:'H',n:'安全第一；品質至上',s:'60x20',m:'中空板'},

  {id:'H03',cat:'H',n:'生活點滴',s:'60x40',m:'中空板'},
  {id:'H04',cat:'H',n:'關懷標語',s:'60x20',m:'中空板'},

  {id:'H06',cat:'H',n:'存好心做好事說好話',s:'60x20',m:'中空板'},
  {id:'I01',cat:'I',n:'一般垃圾',s:'30x20',m:'PVC'},
  {id:'I02',cat:'I',n:'資源回收',s:'30x20',m:'PVC'},

  {id:'I05',cat:'I',n:'玻璃類',s:'30x20',m:'PVC'},
  {id:'I06',cat:'I',n:'塑膠類',s:'30x20',m:'PVC'},
  {id:'I07',cat:'I',n:'紙容器',s:'30x20',m:'PVC'},
  {id:'I08',cat:'I',n:'廚餘宣傳',s:'60x40',m:'中空板'},
  {id:'I09',cat:'I',n:'垃圾管道傾倒口',s:'30x20',m:'PVC'},
  {id:'I10',cat:'I',n:'物料暫置區',s:'60x40',m:'中空板'},
  {id:'I11',cat:'I',n:'營建廢棄物堆置區',s:'60x40',m:'中空板'},
];

const DEF_CATS={A:'A. 生活設施',B:'B. 安全防護',C:'C. 危險警示',D:'D. 禁止事項',E:'E. 交通動線',F:'F. 設施位置',G:'G. 作業規範',H:'H. 宣導標語',I:'I. 環境管理',J:'J. 圖資指引',K:'K. 區域標示',ALL:'📋 全部標語'};
const CAT_KEYS=['A','B','C','D','E','F','G','H','I','J','K'];

const DEF_STEPS={
  S1:{t:'🚧 Step1 入口',items:['J01','K01','B01','D01','E01','E02','D02']},
  S2:{t:'🏗 Step2 基礎',items:['B01','B05','C01','D03','B06']},
  S3:{t:'🔩 Step3 結構',items:['B01','B02','B03','C01','C02','C03','C07']},
  S4:{t:'🪟 Step4 裝修',items:['A01','A02','A03','K08','K09','K10','F01']},
  S5:{t:'🌿 Step5 景觀',items:['E01','E02','I01','I02','I03','H04']},
  S6:{t:'🏁 Step6 完工',items:['K01','K05','H01','H02','J03','F02']},
};

let db,cart,sites,config,stepData,cats,imgBase,isAdmin=false,currentTab='S1';

function init(){
  db=JSON.parse(localStorage.getItem('ys2_db'))||DEF_DB;
  sites=JSON.parse(localStorage.getItem('ys2_sites'))||DEF_SITES;
  config=JSON.parse(localStorage.getItem('ys2_config'))||{title:'工安標語採購系統'};
  stepData=JSON.parse(localStorage.getItem('ys2_steps'))||DEF_STEPS;
  cats=JSON.parse(localStorage.getItem('ys2_cats'))||DEF_CATS;
  imgBase=localStorage.getItem('ys2_imgBase')||'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';
  cart={}; 
  document.getElementById('staffInput').value=localStorage.getItem('ys2_staff')||'';
  renderTitle();renderSites();renderTabs();render();updateBadge();
}

function renderTitle(){ document.getElementById('titleEl').textContent = config.title; }

function renderSites(){
  const s=document.getElementById('siteSelect');
  s.innerHTML=sites.map(x=>`<option value="${x}">${x}</option>`).join('');
  s.value=localStorage.getItem('ys2_site')||sites[0];
}

function renderTabs(){
  let h='';
  Object.keys(stepData).sort().forEach(k=>{
    h+=`<div class="tab${currentTab===k?' active':''}" onclick="setTab('${k}')">${stepData[k].t}</div>`;
  });
  h+=`<span class="tab-sep"></span>`;
  h+=`<div class="tab${currentTab==='ALL'?' active':''}" onclick="setTab('ALL')">${cats['ALL']}</div>`;
  CAT_KEYS.forEach(k=>{ h+=`<div class="tab${currentTab===k?' active':''}" onclick="setTab('${k}')">${cats[k]}</div>`; });
  document.getElementById('tabsEl').innerHTML=h;
}

function setTab(t){currentTab=t;renderTabs();render();}

function render(){
  let list;
  if(stepData[currentTab]) list=db.filter(x=>stepData[currentTab].items.includes(x.id));
  else if(currentTab==='ALL') list=[...db];
  else list=db.filter(x=>x.cat===currentTab);

  const grid=document.getElementById('gridEl');
  grid.innerHTML='';
  list.forEach(item=>{
    const st=cart[item.id]||{sel:false,qty:1};
    const d=document.createElement('div');
    d.className='card'+(st.sel?' sel':'');
    d.innerHTML=`
      <div class="card-check"></div>
      <div class="card-img"><img src="${imgBase+item.id}.jpg" onerror="this.style.opacity='0.1'"></div>
      <div class="card-body">
        <div>
          <div class="card-meta"><span class="card-id">${item.id}</span></div>
          <div class="card-name">${item.n}</div>
          <div class="card-specs">
            <span class="spec-tag spec-r">${item.s}</span>
            <span class="spec-tag spec-m">${item.m}</span>
          </div>
        </div>
        <div class="card-footer">
          <span></span>
          <div class="qty-ctrl" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="adjQty('${item.id}',-1)">−</button>
            <span class="qty-num">${st.qty||1}</span>
            <button class="qty-btn" onclick="adjQty('${item.id}',1)">＋</button>
          </div>
        </div>
      </div>`;
    d.onclick=()=>toggleItem(item.id);
    grid.appendChild(d);
  });
}

function toggleItem(id){
  if(!cart[id])cart[id]={sel:false,qty:1};
  cart[id].sel=!cart[id].sel;
  save();render();updateBadge();
}
function adjQty(id,d){
  if(!cart[id])cart[id]={sel:true,qty:1};
  cart[id].qty=Math.max(1,(cart[id].qty||1)+d);
  if(d>0) cart[id].sel=true;
  save();render();updateBadge();
}
function updateBadge(){
  const n=db.filter(x=>cart[x.id]?.sel).length;
  document.getElementById('cartBadge').textContent=n;
}
function save(){
  localStorage.setItem('ys2_staff',document.getElementById('staffInput').value);
  localStorage.setItem('ys2_site',document.getElementById('siteSelect').value);
}
function resetCart(){if(confirm('重選所有品項？')){cart={};render();updateBadge();}}

function buildReport(){
  const selectedItems = db.filter(x => cart[x.id]?.sel);
  if(selectedItems.length === 0) return alert('尚未選擇任何標語');

  const site = document.getElementById('siteSelect').value;
  const staff = document.getElementById('staffInput').value || '(未填)';
  const date = new Date().toLocaleDateString('zh-TW', {year: 'numeric', month: '2-digit', day: '2-digit'});

  document.getElementById('rptMeta').innerHTML = `
    <div style="text-align:center">工地名稱<br><b>${site}</b></div>
    <div style="text-align:center">負責人員<br><b>${staff}</b></div>
    <div style="text-align:center">填單日期<br><b>${date}</b></div>
  `;
  
  let rows = '';
  selectedItems.forEach((i, idx) => {
    const qty = cart[i.id].qty || 1;
    rows += `
      <div class="report-item">
        <div style="width:30px; font-weight:bold; color:#ccc">${idx+1}</div>
        <img class="rpt-img" src="${imgBase+i.id}.jpg" onerror="this.style.opacity='0.2'">
        <div class="rpt-info">
          <div class="rpt-name">[${i.id}] ${i.n}</div>
          <div style="font-size:11px; color:#666">規格：${i.s} ｜ 材質：${i.m}</div>
        </div>
        <div class="rpt-qty">${qty}</div>
      </div>`;
  });

  const totalItems = selectedItems.length;
  const totalQty = selectedItems.reduce((acc, cur) => acc + (cart[cur.id].qty || 1), 0);
  rows += `
    <div style="display:flex; justify-content:space-between; padding:20px 10px; font-weight:bold; font-size:16px; border-top:3px solid #000">
      <span>合計 ${totalItems} 品項</span>
      <span>共計 ${totalQty} 件</span>
    </div>`;

  document.getElementById('rptList').innerHTML = rows;
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){document.getElementById('overlay').classList.remove('show');}

function captureReport(){
  const area = document.getElementById('modalPrintArea');
  html2canvas(area,{useCORS:true, scale:2, backgroundColor: "#FFFFFF"}).then(c=>{
    document.getElementById('previewImg').src=c.toDataURL();
    document.getElementById('captureResult').classList.add('show');
  });
}

function toggleAdmin(){
  if(!isAdmin && prompt('管理密碼')==='751113'){
    isAdmin=true; document.getElementById('adminPanel').classList.add('show');
  } else {
    isAdmin=false; document.getElementById('adminPanel').classList.remove('show');
  }
}

init();
</script>
</body>
</html>
