<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#064E3B;--mid:#059669;--light:#34D399;--pale:#D1FAE5;--pale2:#ECFDF5;
  --ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#94A3B8;
  --bg:#F0FDF4;--surface:#FFFFFF;--border:#D1FAE5;--border2:#A7F3D0;
  --red:#DC2626;--amber:#D97706;--blue:#1D4ED8;
  --r:14px;--r2:10px;--r3:8px;
  --shadow:0 1px 3px rgba(6,78,59,0.08),0 4px 12px rgba(6,78,59,0.05);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{background:var(--dark);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden;}
.hdr::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:grid;place-items:center;font-size:16px;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:900;letter-spacing:0.3px;}
.hdr-ver{font-size:10px;opacity:0.5;font-weight:400;margin-top:1px;}
.admin-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background 0.15s;}
.admin-btn:hover{background:rgba(255,255,255,0.22);}
.admin-btn.active{background:rgba(255,183,0,0.25);border-color:rgba(255,183,0,0.4);color:#FCD34D;}

/* ── CONTROLS ── */
.ctrl{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:wrap;}
.ctrl-group{display:flex;gap:6px;align-items:center;flex:1;min-width:150px;}
select,input[type=text]{font-family:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r3);background:var(--bg);color:var(--ink);outline:none;transition:border-color 0.15s;}
select:focus,input[type=text]:focus{border-color:var(--mid);}
select{flex:1;}
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;border-radius:var(--r3);border:none;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-green{background:var(--dark);color:white;}.btn-green:hover{background:var(--mid);}
.btn-red{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;}.btn-red:hover{background:#FEE2E2;}
.btn-blue{background:#EFF6FF;color:var(--blue);border:1.5px solid #BFDBFE;}.btn-blue:hover{background:#DBEAFE;}
.btn-purple{background:#F5F3FF;color:#6D28D9;border:1.5px solid #DDD6FE;}.btn-purple:hover{background:#EDE9FE;}

/* ── TABS ── */
.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;}
.tabs-scroll{display:flex;overflow-x:auto;padding:10px 16px;gap:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs-scroll::-webkit-scrollbar{display:none;}
.tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--ink3);white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.tab:hover{border-color:var(--mid);color:var(--mid);}
.tab.step-tab{background:var(--pale2);border-color:var(--border2);color:var(--dark);}
.tab.step-tab:hover{background:var(--pale);border-color:var(--mid);}
.tab.active{background:var(--dark);color:white;border-color:var(--dark);box-shadow:0 2px 8px rgba(6,78,59,0.25);}
.tab-sep{width:1.5px;background:var(--border);flex-shrink:0;align-self:stretch;margin:0 4px;}

/* ── MAIN GRID ── */
.main{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
.empty-state{text-align:center;padding:80px 20px;color:var(--ink4);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;}

/* ── CARD ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;display:flex;gap:12px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;position:relative;box-shadow:var(--shadow);}
.card:hover{border-color:var(--light);background:#F0FDF4;box-shadow:0 4px 16px rgba(6,78,59,0.12);}
.card.sel{border-color:var(--mid);background:#F0FDF4;border-width:2px;}
.card-check{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:white;display:grid;place-items:center;font-size:12px;transition:all 0.15s;z-index:2;}
.card.sel .card-check{background:var(--mid);border-color:var(--mid);color:white;}
.card-check::after{content:'✓';display:none;color:white;font-weight:900;font-size:11px;}
.card.sel .card-check::after{display:block;}
.card-check:not(.card.sel *){}

/* IMAGE */
.card-img{width:90px;height:75px;flex-shrink:0;border-radius:var(--r3);border:1.5px solid var(--border);overflow:hidden;background:#F8FAFC;display:flex;align-items:center;justify-content:center;position:relative;}
.card-img img{width:100%;height:100%;object-fit:contain;}
.img-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink4);}
.img-placeholder span{font-size:18px;}
.img-placeholder small{font-size:9px;text-align:center;line-height:1.2;}
.img-loading{position:absolute;inset:0;background:#F8FAFC;display:grid;place-items:center;font-size:10px;color:var(--ink4);}

/* BODY */
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;}
.card-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.card-id{font-size:10px;font-weight:700;background:var(--pale);color:var(--dark);padding:2px 6px;border-radius:4px;}
.card-cat{font-size:10px;color:var(--ink4);}
.card-name{font-size:14px;font-weight:900;color:var(--dark);line-height:1.3;margin-bottom:4px;}
.card-specs{display:flex;gap:8px;flex-wrap:wrap;}
.spec-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.spec-r{background:#FEF2F2;color:var(--red);}
.spec-m{background:#EFF6FF;color:var(--blue);}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.sel-chip{font-size:10px;background:var(--pale);color:var(--dark);padding:3px 8px;border-radius:20px;font-weight:700;}
.qty-ctrl{display:flex;align-items:center;gap:8px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:16px;display:grid;place-items:center;color:var(--ink3);font-family:inherit;transition:all 0.15s;line-height:1;flex-shrink:0;}
.qty-btn:hover{border-color:var(--mid);color:var(--mid);background:var(--pale2);}
.qty-num{font-size:22px;font-weight:900;color:var(--mid);min-width:28px;text-align:center;line-height:1;}

/* admin inputs */
.a-name{background:#FFF7ED;border:1.5px dashed #FB923C;border-radius:4px;padding:3px 6px;font-size:13px;font-weight:900;color:#9A3412;width:100%;font-family:inherit;outline:none;}
.a-spec{background:transparent;border:none;border-bottom:1.5px dashed #CBD5E1;font-size:10px;width:55px;font-family:inherit;outline:none;color:inherit;padding:1px 2px;}
.a-id{background:transparent;border:none;border-bottom:1.5px dashed #CBD5E1;font-size:10px;width:32px;font-family:inherit;outline:none;color:var(--dark);font-weight:700;padding:1px;}

/* ── FOOTER ── */
.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:12px 16px;flex-shrink:0;}
.admin-panel{display:none;margin-bottom:10px;}
.admin-panel.show{display:flex;gap:6px;flex-wrap:wrap;}
.footer-main{display:flex;gap:10px;align-items:stretch;}
.btn-report{flex:1;background:var(--dark);color:white;border:none;padding:14px 16px;border-radius:var(--r2);font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:background 0.15s;box-shadow:0 4px 12px rgba(6,78,59,0.2);}
.btn-report:hover{background:var(--mid);}
.cart-badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:3px 10px;font-size:13px;font-weight:900;min-width:28px;text-align:center;}
.btn-reset{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;padding:14px 14px;border-radius:var(--r2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;white-space:nowrap;}
.btn-reset:hover{background:#FEE2E2;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;display:none;align-items:flex-end;justify-content:center;padding:0;}
.overlay.show{display:flex;}
.modal{background:white;width:100%;max-width:680px;border-radius:20px 20px 0 0;padding:20px;max-height:92vh;overflow-y:auto;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 16px;display:block;}
.modal-title{font-size:18px;font-weight:900;color:var(--dark);text-align:center;margin-bottom:4px;}
.modal-meta{display:flex;justify-content:space-around;font-size:12px;color:var(--ink3);font-weight:500;padding:10px 0 14px;border-bottom:1.5px solid var(--border);}
.modal-meta span{display:flex;flex-direction:column;align-items:center;gap:2px;}
.modal-meta strong{font-size:13px;color:var(--ink);font-weight:700;}
.report-list{margin:12px 0;}
.report-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #F1F5F9;}
.report-item:last-child{border:none;}
.rpt-num{font-size:12px;font-weight:700;color:var(--ink4);min-width:20px;}
.rpt-img{width:52px;height:44px;border-radius:6px;border:1px solid var(--border);object-fit:contain;background:#F8FAFC;flex-shrink:0;}
.rpt-info{flex:1;min-width:0;}
.rpt-name{font-size:13px;font-weight:900;color:var(--ink);}
.rpt-spec{font-size:11px;color:var(--ink3);margin-top:2px;}
.rpt-qty{font-size:26px;font-weight:900;color:var(--dark);min-width:36px;text-align:right;}
.rpt-total{display:flex;justify-content:space-between;padding:12px 0 4px;border-top:1.5px solid var(--border);margin-top:4px;font-size:13px;font-weight:700;color:var(--ink3);}
.rpt-total strong{color:var(--dark);font-size:14px;}
.modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.modal-btn{padding:13px;border-radius:var(--r3);font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s;}

/* ── PRINT ── */
@media print{
  .hdr,.ctrl,.tabs-outer,.footer,.overlay,.no-print{display:none!important;}
  .main{overflow:visible;padding:0;}
  .card{break-inside:avoid;}
}

/* ── SCROLLBAR ── */
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-track{background:transparent;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🦺</div>
    <div>
      <div class="hdr-title" id="titleEl">工安標語採購系統</div>
      <div class="hdr-ver">鈺通營造 Construction Safety</div>
    </div>
  </div>
  <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 管理員</button>
</div>

<!-- CONTROLS -->
<div class="ctrl">
  <div class="ctrl-group">
    <select id="siteSelect" onchange="save()"></select>
    <button class="btn btn-green" onclick="addSite()">＋</button>
  </div>
  <input type="text" id="staffInput" placeholder="填單人員" style="width:120px;" oninput="save()">
</div>

<!-- TABS -->
<div class="tabs-outer">
  <div class="tabs-scroll" id="tabsEl"></div>
</div>

<!-- GRID -->
<div class="main">
  <div class="grid" id="gridEl"></div>
</div>

<!-- FOOTER -->
<div class="footer no-print">
  <div class="admin-panel" id="adminPanel">
    <button class="btn btn-blue" onclick="addNewSign()">➕ 新增標語</button>
    <button class="btn btn-blue" onclick="exportData()">📤 備份</button>
    <button class="btn btn-purple" onclick="importData()">📥 還原</button>
    <button class="btn btn-red" onclick="deleteSite()">🗑 刪除工地</button>
    <button class="btn btn-blue" onclick="configImgBase()">🖼 設定圖片路徑</button>
  </div>
  <div class="footer-main">
    <button class="btn-report" onclick="buildReport()">
      <span>📋 生成採購單</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
    <button class="btn-reset" onclick="resetCart()">清除<br>重選</button>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox">
    <span class="modal-handle"></span>
    <div class="modal-title" id="rptTitle">採購單</div>
    <div class="modal-meta" id="rptMeta"></div>
    <div class="report-list" id="rptList"></div>
    <div class="rpt-total" id="rptTotal"></div>
    <div class="modal-actions">
      <button class="modal-btn" style="background:var(--dark);color:white;" onclick="window.print()">🖨 列印採購單</button>
      <button class="modal-btn" style="background:#F59E0B;color:white;" onclick="captureReport()">📸 儲存為圖片</button>
      <button class="modal-btn" style="background:#F1F5F9;color:#475569;" onclick="closeModal()">← 返回編輯</button>
    </div>
  </div>
</div>

  {id:'I04',cat:'I',n:'鐵鋁罐',s:'30x20',m:'PVC'},
  {id:'I05',cat:'I',n:'玻璃類',s:'30x20',m:'PVC'},
  {id:'I06',cat:'I',n:'塑膠類',s:'30x20',m:'PVC'},
  {id:'I07',cat:'I',n:'紙容器',s:'30x20',m:'PVC'},
  {id:'I08',cat:'I',n:'廚餘宣傳',s:'60x40',m:'中空板'},
  {id:'I09',cat:'I',n:'垃圾管道傾倒口',s:'30x20',m:'PVC'},
  {id:'I10',cat:'I',n:'物料暫置區',s:'60x40',m:'中空板'},
  {id:'I11',cat:'I',n:'營建廢棄物堆置區',s:'60x40',m:'中空板'},
];

const DEF_CATS={A:'A. 生活設施',B:'B. 安全防護',C:'C. 危險警示',D:'D. 禁止事項',E:'E. 交通動線',F:'F. 設施位置',G:'G. 作業規範',H:'H. 宣導標語',I:'I. 環境管理',J:'J. 圖資指引',K:'K. 區域標示',ALL:'📋 全部'};
const CAT_KEYS=['A','B','C','D','E','F','G','H','I','J','K'];

const DEF_STEPS={
  S1:{t:'🚧 Step1 入口',items:['J01','K01','B01','D01','E01','E02','D02']},
  S2:{t:'🏗 Step2 基礎',items:['B01','B05','C01','D03','B06']},
  S3:{t:'🔩 Step3 結構',items:['B01','B02','B03','C01','C02','C03','C07']},
  S4:{t:'🪟 Step4 裝修',items:['A01','A02','A03','K08','K09','K10','F01']},
  S5:{t:'🌿 Step5 景觀',items:['E01','E02','I01','I02','I03','H04']},
  S6:{t:'🏁 Step6 完工',items:['K01','K05','H01','H02','J03','F02']},
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let db,cart,sites,config,stepData,cats,imgBase,isAdmin=false,currentTab='S1';

function init(){
  db=JSON.parse(localStorage.getItem('ys2_db'))||DEF_DB;
  cart=JSON.parse(localStorage.getItem('ys2_cart'))||{};
  sites=JSON.parse(localStorage.getItem('ys2_sites'))||DEF_SITES;
  config=JSON.parse(localStorage.getItem('ys2_config'))||{title:'工安標語採購系統'};
  stepData=JSON.parse(localStorage.getItem('ys2_steps'))||DEF_STEPS;
  cats=JSON.parse(localStorage.getItem('ys2_cats'))||DEF_CATS;
  imgBase=localStorage.getItem('ys2_imgBase')||'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';
  document.getElementById('staffInput').value=localStorage.getItem('ys2_staff')||'';
  renderTitle();renderSites();renderTabs();render();updateBadge();
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderTitle(){
  const el=document.getElementById('titleEl');
  el.innerHTML=isAdmin
    ?`<input style="background:rgba(255,255,255,0.15);border:none;border-bottom:1.5px solid rgba(255,255,255,0.4);color:white;font-size:16px;font-weight:900;font-family:inherit;outline:none;width:200px;padding:0;" value="${config.title}" oninput="config.title=this.value;save()">`
    :config.title;
}

function renderSites(){
  const s=document.getElementById('siteSelect');
  s.innerHTML=sites.map(x=>`<option value="${x}">${x}</option>`).join('');
  s.value=localStorage.getItem('ys2_site')||sites[0];
}

function renderTabs(){
  let h='';
  Object.keys(stepData).sort().forEach(k=>{
    const t=stepData[k].t;
    const isActive=currentTab===k;
    h+=`<div class="tab step-tab${isActive?' active':''}" onclick="setTab('${k}')">${isAdmin?`<input style="background:transparent;border:none;font-weight:700;font-size:12px;color:inherit;font-family:inherit;width:90px;outline:none;" value="${t}" onclick="event.stopPropagation()" oninput="stepData['${k}'].t=this.value;save()">`:t}</div>`;
  });
  h+=`<span class="tab-sep"></span>`;
  CAT_KEYS.forEach(k=>{
    h+=`<div class="tab${currentTab===k?' active':''}" onclick="setTab('${k}')">${cats[k]||k}</div>`;
  });
  h+=`<div class="tab${currentTab==='ALL'?' active':''}" onclick="setTab('ALL')">${cats['ALL']}</div>`;
  document.getElementById('tabsEl').innerHTML=h;
}

function setTab(t){currentTab=t;renderTabs();render();}

function render(){
  let list;
  if(stepData[currentTab]) list=db.filter(x=>stepData[currentTab].items.includes(x.id));
  else if(currentTab==='ALL') list=[...db];
  else list=db.filter(x=>x.cat===currentTab);

  const grid=document.getElementById('gridEl');
  if(!list.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">此分類暫無標語</div></div>`;
    return;
  }
  grid.innerHTML='';
  list.forEach(item=>{
    const st=cart[item.id]||{sel:false,qty:1};
    const d=document.createElement('div');
    d.className='card'+(st.sel?' sel':'');
    const imgUrl=imgBase+item.id+'.jpg';
    const checkHtml=`<div class="card-check">${st.sel?'✓':''}</div>`;
    const nameHtml=isAdmin
      ?`<input class="a-name" value="${item.n}" oninput="updateField('${item.id}','n',this.value)">`
      :`<div class="card-name">${item.n}</div>`;
    const specRHtml=isAdmin?`<input class="a-spec spec-tag spec-r" value="${item.s}" oninput="updateField('${item.id}','s',this.value)">`:`<span class="spec-tag spec-r">${item.s}</span>`;
    const specMHtml=isAdmin?`<input class="a-spec spec-tag spec-m" value="${item.m}" oninput="updateField('${item.id}','m',this.value)">`:`<span class="spec-tag spec-m">${item.m}</span>`;
    const idHtml=isAdmin?`<input class="a-id" value="${item.id}" onchange="updateID('${item.id}',this.value)">`:`${item.id}`;
    d.innerHTML=`
      ${checkHtml}
      <div class="card-img">
        <img src="${imgUrl}" alt="${item.n}"
          onload="this.style.opacity=1"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          style="opacity:0;transition:opacity 0.2s">
        <div class="img-placeholder" style="display:none"><span>🖼</span><small>${item.id}<br>無圖片</small></div>
      </div>
      <div class="card-body">
        <div>
          <div class="card-meta">
            <span class="card-id">${idHtml}</span>
            <span class="card-cat">${cats[item.cat]||item.cat}</span>
          </div>
          ${nameHtml}
          <div class="card-specs">${specRHtml}${specMHtml}</div>
        </div>
        <div class="card-footer">
          ${st.sel?'<span class="sel-chip">✓ 已選取</span>':'<span></span>'}
          <div class="qty-ctrl" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="adjQty('${item.id}',-1)">−</button>
            <span class="qty-num">${st.qty||1}</span>
            <button class="qty-btn" onclick="adjQty('${item.id}',1)">＋</button>
          </div>
        </div>
      </div>`;
    d.addEventListener('click',e=>{if(e.target.tagName!=='INPUT'&&e.target.tagName!=='BUTTON')toggleItem(item.id);});
    grid.appendChild(d);
  });
}

// ─────────────────────────────────────────────
//  ACTIONS
// ─────────────────────────────────────────────
function toggleItem(id){
  if(!cart[id])cart[id]={sel:false,qty:1};
  cart[id].sel=!cart[id].sel;
  save();render();updateBadge();
}
function adjQty(id,d){
  event.stopPropagation();
  if(!cart[id])cart[id]={sel:true,qty:1};
  cart[id].qty=Math.max(1,(cart[id].qty||1)+d);
  if(d>0&&!cart[id].sel)cart[id].sel=true;
  save();render();updateBadge();
}
function updateField(id,f,v){const i=db.find(x=>x.id===id);if(i){i[f]=v;save();}}
function updateID(old,nid){
  nid=nid.toUpperCase().trim();
  if(!nid||nid===old)return;
  if(db.some(x=>x.id===nid))return alert('此 ID 已存在！');
  const item=db.find(x=>x.id===old);if(!item)return;
  const newCat=nid[0];
  item.id=nid;item.cat=newCat;
  Object.keys(stepData).forEach(k=>{stepData[k].items=stepData[k].items.map(x=>x===old?nid:x);});
  if(cart[old]){cart[nid]=cart[old];delete cart[old];}
  save();render();
}
function updateBadge(){
  const n=db.filter(x=>cart[x.id]?.sel).length;
  document.getElementById('cartBadge').textContent=n;
}
function addSite(){const n=prompt('新增工地名稱：');if(n&&n.trim()){sites.push(n.trim());renderSites();document.getElementById('siteSelect').value=n.trim();save();}}
function deleteSite(){
  const v=document.getElementById('siteSelect').value;
  if(!confirm(`確定刪除「${v}」？`))return;
  sites=sites.filter(s=>s!==v);
  if(!sites.length)sites=['新工地'];
  renderSites();save();
}
function addNewSign(){
  const id=prompt('輸入新標語 ID（如 B09）：');
  if(!id)return;
  const uid=id.toUpperCase().trim();
  if(db.some(x=>x.id===uid))return alert('ID已存在');
  const cat=uid[0];
  const n=prompt('標語名稱：')||'新標語';
  db.push({id:uid,cat,n,s:'60x40',m:'中空板'});
  save();render();
}
function configImgBase(){
  const v=prompt('圖片路徑 Base URL（請以 / 結尾）：',imgBase);
  if(v!==null&&v.trim()){imgBase=v.trim();localStorage.setItem('ys2_imgBase',imgBase);render();}
}

// ─────────────────────────────────────────────
//  REPORT
// ─────────────────────────────────────────────
function buildReport(){
  const sel=db.filter(i=>cart[i.id]?.sel);
  if(!sel.length)return alert('請先點選標語項目');
  const site=document.getElementById('siteSelect').value;
  const staff=document.getElementById('staffInput').value||'（未填）';
  const now=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
  const totalQty=sel.reduce((a,i)=>a+(cart[i.id].qty||1),0);

  document.getElementById('rptTitle').textContent=config.title+' 採購單';
  document.getElementById('rptMeta').innerHTML=
    `<span><strong>${site}</strong>工地名稱</span>
     <span><strong>${staff}</strong>負責人員</span>
     <span><strong>${now}</strong>填單日期</span>`;

  let rows='';
  sel.forEach((i,idx)=>{
    rows+=`<div class="report-item">
      <span class="rpt-num">${idx+1}</span>
      <img class="rpt-img" src="${imgBase+i.id+'.jpg'}" onerror="this.style.opacity=0.2" alt="">
      <div class="rpt-info">
        <div class="rpt-name">[${i.id}] ${i.n}</div>
        <div class="rpt-spec">規格：${i.s}　材質：${i.m}</div>
      </div>
      <div class="rpt-qty">${cart[i.id].qty||1}</div>
    </div>`;
  });
  document.getElementById('rptList').innerHTML=rows;
  document.getElementById('rptTotal').innerHTML=`<span>合計 <strong>${sel.length}</strong> 品項</span><span>合計 <strong>${totalQty}</strong> 件</span>`;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function captureReport(){
  if(typeof html2canvas==='undefined')return alert('截圖功能需要網路連線');
  html2canvas(document.getElementById('modalBox'),{useCORS:true,scale:2}).then(c=>{
    const a=document.createElement('a');a.href=c.toDataURL('image/png');
    a.download=`採購單_${document.getElementById('siteSelect').value}.png`;a.click();
  });
}

// ─────────────────────────────────────────────
//  ADMIN
// ─────────────────────────────────────────────
function toggleAdmin(){
  if(!isAdmin){
    if(prompt('請輸入管理員密碼：')==='751113'){
      isAdmin=true;
      document.getElementById('adminBtn').textContent='🔓 管理中';
      document.getElementById('adminBtn').classList.add('active');
      document.getElementById('adminPanel').classList.add('show');
    }
  } else {
    isAdmin=false;
    document.getElementById('adminBtn').textContent='🔒 管理員';
    document.getElementById('adminBtn').classList.remove('active');
    document.getElementById('adminPanel').classList.remove('show');
  }
  renderTitle();renderTabs();render();
}

// ─────────────────────────────────────────────
//  DATA PERSISTENCE
// ─────────────────────────────────────────────
function resetCart(){if(confirm('確認清除所有選取？')){cart={};save();render();updateBadge();}}
function save(){
  localStorage.setItem('ys2_db',JSON.stringify(db));
  localStorage.setItem('ys2_cart',JSON.stringify(cart));
  localStorage.setItem('ys2_staff',document.getElementById('staffInput').value);
  localStorage.setItem('ys2_site',document.getElementById('siteSelect').value);
  localStorage.setItem('ys2_config',JSON.stringify(config));
  localStorage.setItem('ys2_steps',JSON.stringify(stepData));
  localStorage.setItem('ys2_cats',JSON.stringify(cats));
  localStorage.setItem('ys2_sites',JSON.stringify(sites));
}
function exportData(){
  const d={db,sites,config,stepData,cats,imgBase};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`工安標語備份_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function importData(){
  const j=prompt('貼上備份 JSON：');
  if(!j)return;
  try{
    const d=JSON.parse(j);
    if(d.db)db=d.db;if(d.sites)sites=d.sites;if(d.config)config=d.config;
    if(d.stepData)stepData=d.stepData;if(d.cats)cats=d.cats;if(d.imgBase)imgBase=d.imgBase;
    save();location.reload();
  }catch(e){alert('格式錯誤，請確認備份檔案');}
}

// click overlay bg to close
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

init();
</script>
</body>
</html>
