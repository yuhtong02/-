<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* 鈺通專屬三色：深綠、淺綠、暖黃 */
  --dark: #064E3B;      /* 深綠 */
  --light: #10B981;     /* 淺綠 */
  --warm: #FDE68A;      /* 暖黃 (邊框/細節) */
  --bg: #FEFCE8;        /* 底色暖黃 */
  --surface: #FFFBEB;   /* 卡片暖黃 (取代白色) */
  
  --ink: #064E3B;       /* 文字深綠 */
  --ink2: #065F46;
  --ink3: #047857;
  --ink4: #34D399;
  
  --border: #FCD34D;    /* 暖黃邊框 */
  --border2: #10B981;   /* 淺綠邊框 */
  
  --red: #DC2626;       /* 警示保留紅 */
  --r:14px; --r2:10px; --r3:8px;
  --shadow: 0 4px 12px rgba(6, 78, 59, 0.1);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{background:var(--dark);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:32px;height:32px;background:var(--light);border-radius:8px;display:grid;place-items:center;font-size:16px;}
.hdr-title{font-size:16px;font-weight:900;}
.hdr-ver{font-size:10px;opacity:0.8;}
.admin-btn{background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;}
.admin-btn.active{background:var(--light);border-color:var(--light);}

/* ── CONTROLS ── */
.ctrl{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;flex-shrink:0;align-items:center;}
.ctrl-group{display:flex;gap:6px;align-items:center;flex:1;}
select,input[type=text]{font-family:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r3);background:var(--bg);color:var(--ink);outline:none;}
select:focus,input[type=text]:focus{border-color:var(--dark);}
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;border-radius:var(--r3);border:none;cursor:pointer;}
.btn-green{background:var(--dark);color:white;}
.btn-red{background:rgba(220,38,38,0.1);color:var(--red);border:1.5px solid rgba(220,38,38,0.2);}
.btn-blue, .btn-purple{background:var(--light);color:white;} /* 移除藍紫，改用淺綠 */

/* ── TABS ── */
.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;}
.tabs-scroll{display:flex;overflow-x:auto;padding:10px 16px;gap:6px;scrollbar-width:none;}
.tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--ink3);white-space:nowrap;background:var(--bg);}
.tab.active{background:var(--dark);color:white;border-color:var(--dark);}
.tab.step-tab{background:var(--warm);border-color:var(--border);color:var(--dark);}
.tab.step-tab.active{background:var(--dark);color:white;}
.tab-sep{width:1.5px;background:var(--border);margin:0 4px;}

/* ── MAIN GRID ── */
.main{flex:1;overflow-y:auto;padding:14px 16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}

/* ── CARD ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;display:flex;gap:12px;cursor:pointer;transition:all 0.2s;position:relative;box-shadow:var(--shadow);}
.card.sel{border-color:var(--dark);background:var(--warm);border-width:2px;}
.card-check{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:grid;place-items:center;}
.card.sel .card-check{background:var(--dark);border-color:var(--dark);color:white;}
.card-check::after{content:'✓';display:none;font-weight:900;}
.card.sel .card-check::after{display:block;}

.card-img{width:90px;height:75px;flex-shrink:0;border-radius:var(--r3);border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;}
.card-img img{width:100%;height:100%;object-fit:contain;}
.card-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.card-id{font-size:10px;font-weight:700;background:var(--dark);color:white;padding:2px 6px;border-radius:4px;}
.card-name{font-size:14px;font-weight:900;color:var(--dark);margin:4px 0;}
.spec-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:4px;}
.spec-r{background:var(--dark);color:white;}
.spec-m{background:var(--light);color:white;}

.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;color:var(--dark);font-weight:900;}
.qty-num{font-size:20px;font-weight:900;color:var(--dark);min-width:28px;text-align:center;}

/* ── FOOTER ── */
.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:12px 16px;flex-shrink:0;}
.admin-panel{display:none;margin-bottom:10px;gap:6px;flex-wrap:wrap;}
.admin-panel.show{display:flex;}
.btn-report{flex:1;background:var(--dark);color:white;border:none;padding:14px 16px;border-radius:var(--r2);font-size:15px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.cart-badge{background:var(--light);border-radius:20px;padding:3px 10px;font-size:13px;}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(6,78,59,0.8);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--bg);width:100%;max-width:680px;border-radius:20px 20px 0 0;padding:20px;max-height:92vh;overflow-y:auto;}
.modal-title{color:var(--dark);font-weight:900;text-align:center;}
.report-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}

/* ── PRINT ── */
@media print{
  .hdr,.ctrl,.tabs-outer,.footer,.overlay,.no-print{display:none!important;}
  .main{overflow:visible;padding:0;}
  .card{break-inside:avoid;border:1px solid #000;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">🦺</div>
    <div>
      <div class="hdr-title" id="titleEl">工安標語採購系統</div>
      <div class="hdr-ver">鈺通營造 Construction Safety</div>
    </div>
  </div>
  <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 管理員</button>
</div>

<div class="ctrl">
  <div class="ctrl-group">
    <select id="siteSelect" onchange="save()"></select>
    <button class="btn btn-green" onclick="addSite()">＋</button>
  </div>
  <input type="text" id="staffInput" placeholder="填單人員" style="width:120px;" oninput="save()">
</div>

<div class="tabs-outer">
  <div class="tabs-scroll" id="tabsEl"></div>
</div>

<div class="main">
  <div class="grid" id="gridEl"></div>
</div>

<div class="footer no-print">
  <div class="admin-panel" id="adminPanel">
    <button class="btn btn-blue" onclick="addNewSign()">➕ 新增標語</button>
    <button class="btn btn-blue" onclick="exportData()">📤 備份</button>
    <button class="btn btn-blue" onclick="importData()">📥 還原</button>
    <button class="btn btn-red" onclick="deleteSite()">🗑 刪除工地</button>
    <button class="btn btn-blue" onclick="configImgBase()">🖼 設定圖片路徑</button>
  </div>
  <div class="footer-main" style="display:flex;gap:10px;">
    <button class="btn-report" onclick="buildReport()">
      <span>📋 生成採購單</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
    <button class="btn-red" onclick="resetCart()" style="padding:0 15px; font-weight:900; border-radius:10px;">清除<br>重選</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modalBox">
    <div class="modal-title" id="rptTitle">採購單</div>
    <div id="rptMeta" style="display:flex;justify-content:space-around;padding:15px 0;border-bottom:2px solid var(--dark);font-size:12px;"></div>
    <div class="report-list" id="rptList"></div>
    <div id="rptTotal" style="display:flex;justify-content:space-between;padding:15px;font-weight:900;color:var(--dark);"></div>
    <div class="modal-actions" style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-green" style="padding:15px;" onclick="window.print()">🖨 列印採購單</button>
      <button class="btn" style="background:var(--light);color:white;padding:15px;" onclick="captureReport()">📸 儲存為圖片</button>
      <button class="btn" style="background:var(--warm);color:var(--dark);padding:15px;" onclick="closeModal()">← 返回編輯</button>
    </div>
  </div>
</div>

<script>
// 數據與邏輯完全保留原始設定
const DEF_SITES=["嘉義創世基金會","嘉義嘉科實中","嘉義博愛安居","嘉義北門集合住宅","嘉義民雄院區","臺南林森圖書館"];
const DEF_DB=[
  {id:'J01',cat:'J',n:'工程告示牌',s:'120x90',m:'鍍鋅鐵板'},{id:'J02',cat:'J',n:'安衛告示牌',s:'60x40',m:'中空板'},{id:'J03',cat:'J',n:'工地上梁典禮',s:'90x60',m:'中空板'},
  {id:'K01',cat:'K',n:'守衛室',s:'30x10',m:'PVC'},{id:'K02',cat:'K',n:'統包商辦公室',s:'30x10',m:'PVC'},{id:'K03',cat:'K',n:'監造單位辦公室',s:'30x10',m:'PVC'},
  {id:'K04',cat:'K',n:'管理單位辦公室',s:'30x10',m:'PVC'},{id:'K05',cat:'K',n:'會議室',s:'30x10',m:'PVC'},{id:'K06',cat:'K',n:'倉庫',s:'30x10',m:'PVC'},
  {id:'K07',cat:'K',n:'建材展覽室',s:'30x10',m:'PVC'},{id:'K08',cat:'K',n:'休息區',s:'30x10',m:'PVC'},{id:'K09',cat:'K',n:'飲水機',s:'20x10',m:'PVC'},
  {id:'K10',cat:'K',n:'急救箱',s:'20x10',m:'PVC'},{id:'K11',cat:'K',n:'汽車停放區',s:'60x20',m:'中空板'},{id:'K12',cat:'K',n:'機車停放區',s:'60x20',m:'中空板'},
  {id:'K13',cat:'K',n:'工地／學校名稱',s:'依需求',m:'鍍鋅鐵板'},{id:'K14',cat:'K',n:'各棟別名稱',s:'依需求',m:'鍍鋅鐵板'},
  {id:'A01',cat:'A',n:'男化妝室',s:'30x10',m:'PVC'},{id:'A02',cat:'A',n:'女化妝室',s:'30x10',m:'PVC'},{id:'A03',cat:'A',n:'小便斗',s:'20x10',m:'PVC'},
  {id:'B01',cat:'B',n:'進入工區請戴安全帽',s:'60x40',m:'中空板'},{id:'B02',cat:'B',n:'背負式安全帶穿戴步驟',s:'60x40',m:'中空板'},
  {id:'B03',cat:'B',n:'打開柵門作業請穿戴背負式安全帶',s:'60x40',m:'中空板'},{id:'B04',cat:'B',n:'施工架相關規定',s:'60x40',m:'中空板'},
  {id:'B05',cat:'B',n:'今日危害因素告示牌',s:'60x40',m:'中空板'},{id:'B06',cat:'B',n:'工具箱會議',s:'60x40',m:'中空板'},
  {id:'B07',cat:'B',n:'熱危害宣導',s:'60x40',m:'中空板'},{id:'B08',cat:'B',n:'安全第一',s:'60x20',m:'中空板'},
  {id:'C01',cat:'C',n:'開口危險小心墜落',s:'60x40',m:'中空板'},{id:'C02',cat:'C',n:'升降梯開口危險',s:'60x40',m:'中空板'},
  {id:'C03',cat:'C',n:'欄杆禁止跨越或攀爬',s:'60x40',m:'中空板'},{id:'C04',cat:'C',n:'吊料電梯專用口',s:'60x40',m:'中空板'},
  {id:'C05',cat:'C',n:'有電危險請勿觸碰',s:'60x40',m:'中空板'},{id:'C06',cat:'C',n:'高壓電勿近',s:'60x40',m:'中空板'},
  {id:'C07',cat:'C',n:'施工架嚴禁堆置物料',s:'60x40',m:'中空板'},{id:'C08',cat:'C',n:'施工電梯',s:'30x10',m:'PVC'},
  {id:'D01',cat:'D',n:'嚴禁酒後進場',s:'60x40',m:'中空板'},{id:'D02',cat:'D',n:'非工作人員禁止進入',s:'60x40',m:'中空板'},
  {id:'D03',cat:'D',n:'非施工必要禁止進入',s:'60x40',m:'中空板'},
  {id:'E01',cat:'E',n:'工區施工請勿停車',s:'60x40',m:'中空板'},{id:'E02',cat:'E',n:'進入工區請緩慢行駛',s:'60x40',m:'中空板'},
  {id:'F01',cat:'F',n:'滅火器',s:'20x10',m:'PVC'},{id:'F02',cat:'F',n:'安全出口',s:'30x15',m:'燈箱'},
  {id:'F03',cat:'F',n:'樓梯標示',s:'20x10',m:'PVC'},{id:'F04',cat:'F',n:'樓層標示',s:'20x10',m:'PVC'},
  {id:'F05',cat:'F',n:'放置鋼筋材料',s:'60x40',m:'中空板'},
  {id:'G01',cat:'G',n:'工安標語6S',s:'60x40',m:'中空板'},
  {id:'H01',cat:'H',n:'安全第一；品質至上',s:'60x20',m:'中空板'},{id:'H02',cat:'H',n:'工安公布宣導欄',s:'90x60',m:'中空板'},
  {id:'H03',cat:'H',n:'生活點滴',s:'60x40',m:'中空板'},{id:'H04',cat:'H',n:'關懷標語',s:'60x20',m:'中空板'},
  {id:'H05',cat:'H',n:'工安宣導',s:'60x40',m:'中空板'},{id:'H06',cat:'H',n:'存好心做好事說好話',s:'60x20',m:'中空板'},
  {id:'I01',cat:'I',n:'一般垃圾',s:'30x20',m:'PVC'},{id:'I02',cat:'I',n:'資源回收',s:'30x20',m:'PVC'},
  {id:'I03',cat:'I',n:'廚餘',s:'30x20',m:'PVC'},{id:'I04',cat:'I',n:'鐵鋁罐',s:'30x20',m:'PVC'},
  {id:'I05',cat:'I',n:'玻璃類',s:'30x20',m:'PVC'},{id:'I06',cat:'I',n:'塑膠類',s:'30x20',m:'PVC'},
  {id:'I07',cat:'I',n:'紙容器',s:'30x20',m:'PVC'},{id:'I08',cat:'I',n:'廚餘宣傳',s:'60x40',m:'中空板'},
  {id:'I09',cat:'I',n:'垃圾管道傾倒口',s:'30x20',m:'PVC'},{id:'I10',cat:'I',n:'物料暫置區',s:'60x40',m:'中空板'},
  {id:'I11',cat:'I',n:'營建廢棄物堆置區',s:'60x40',m:'中空板'},
];

const DEF_CATS={A:'A. 生活設施',B:'B. 安全防護',C:'C. 危險警示',D:'D. 禁止事項',E:'E. 交通動線',F:'F. 設施位置',G:'G. 作業規範',H:'H. 宣導標語',I:'I. 環境管理',J:'J. 圖資指引',K:'K. 區域標示',ALL:'📋 全部'};
const CAT_KEYS=['A','B','C','D','E','F','G','H','I','J','K'];

const DEF_STEPS={
  S1:{t:'🚧 Step1 入口',items:['J01','K01','B01','D01','E01','E02','D02']},
  S2:{t:'🏗 Step2 基礎',items:['B01','B05','C01','D03','B06']},
  S3:{t:'🔩 Step3 結構',items:['B01','B02','B03','C01','C02','C03','C07']},
  S4:{t:'🪟 Step4 裝修',items:['A01','A02','A03','K08','K09','K10','F01']},
  S5:{t:'🌿 Step5 景觀',items:['E01','E02','I01','I02','I03','H04']},
  S6:{t:'🏁 Step6 完工',items:['K01','K05','H01','H02','J03','F02']},
};

let db,cart,sites,config,stepData,cats,imgBase,isAdmin=false,currentTab='S1';

function init(){
  db=JSON.parse(localStorage.getItem('ys2_db'))||DEF_DB;
  cart=JSON.parse(localStorage.getItem('ys2_cart'))||{};
  sites=JSON.parse(localStorage.getItem('ys2_sites'))||DEF_SITES;
  config=JSON.parse(localStorage.getItem('ys2_config'))||{title:'工安標語採購系統'};
  stepData=JSON.parse(localStorage.getItem('ys2_steps'))||DEF_STEPS;
  cats=JSON.parse(localStorage.getItem('ys2_cats'))||DEF_CATS;
  imgBase=localStorage.getItem('ys2_imgBase')||'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';
  document.getElementById('staffInput').value=localStorage.getItem('ys2_staff')||'';
  renderTitle();renderSites();renderTabs();render();updateBadge();
}

function renderTitle(){
  const el=document.getElementById('titleEl');
  el.innerHTML=isAdmin?`<input style="background:rgba(255,255,255,0.2);border:none;border-bottom:1.5px solid white;color:white;width:200px;" value="${config.title}" oninput="config.title=this.value;save()">`:config.title;
}

function renderSites(){
  const s=document.getElementById('siteSelect');
  s.innerHTML=sites.map(x=>`<option value="${x}">${x}</option>`).join('');
  s.value=localStorage.getItem('ys2_site')||sites[0];
}

function renderTabs(){
  let h='';
  Object.keys(stepData).sort().forEach(k=>{
    h+=`<div class="tab step-tab${currentTab===k?' active':''}" onclick="setTab('${k}')">${isAdmin?`<input style="background:transparent;border:none;width:85px;font-weight:700;" value="${stepData[k].t}" onclick="event.stopPropagation()" oninput="stepData['${k}'].t=this.value;save()">`:stepData[k].t}</div>`;
  });
  h+=`<span class="tab-sep"></span>`;
  CAT_KEYS.forEach(k=>{ h+=`<div class="tab${currentTab===k?' active':''}" onclick="setTab('${k}')">${cats[k]}</div>`; });
  h+=`<div class="tab${currentTab==='ALL'?' active':''}" onclick="setTab('ALL')">${cats['ALL']}</div>`;
  document.getElementById('tabsEl').innerHTML=h;
}

function setTab(t){currentTab=t;renderTabs();render();}

function render(){
  let list=stepData[currentTab]?db.filter(x=>stepData[currentTab].items.includes(x.id)):(currentTab==='ALL'?db:db.filter(x=>x.cat===currentTab));
  const grid=document.getElementById('gridEl');
  grid.innerHTML='';
  list.forEach(item=>{
    const st=cart[item.id]||{sel:false,qty:1};
    const d=document.createElement('div');
    d.className='card'+(st.sel?' sel':'');
    d.innerHTML=`
      <div class="card-check">${st.sel?'✓':''}</div>
      <div class="card-img"><img src="${imgBase+item.id}.jpg" onerror="this.style.opacity=0.2"></div>
      <div class="card-body">
        <div>
          <div class="card-meta"><span class="card-id">${item.id}</span></div>
          <div class="card-name">${item.n}</div>
          <div class="card-specs"><span class="spec-tag spec-r">${item.s}</span><span class="spec-tag spec-m">${item.m}</span></div>
        </div>
        <div class="card-footer" style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
          <span style="font-size:10px;font-weight:900;">${st.sel?'✓ 已選':''}</span>
          <div class="qty-ctrl" style="display:flex;align-items:center;">
            <button class="qty-btn" onclick="adjQty('${item.id}',-1)">−</button>
            <span class="qty-num">${st.qty}</span>
            <button class="qty-btn" onclick="adjQty('${item.id}',1)">＋</button>
          </div>
        </div>
      </div>`;
    d.onclick=()=>toggleItem(item.id);
    grid.appendChild(d);
  });
}

function toggleItem(id){if(!cart[id])cart[id]={sel:false,qty:1};cart[id].sel=!cart[id].sel;save();render();updateBadge();}
function adjQty(id,v){event.stopPropagation();if(!cart[id])cart[id]={sel:true,qty:1};cart[id].qty=Math.max(1,cart[id].qty+v);save();render();}
function updateBadge(){document.getElementById('cartBadge').textContent=db.filter(i=>cart[i.id]?.sel).length;}
function save(){
  localStorage.setItem('ys2_db',JSON.stringify(db));localStorage.setItem('ys2_cart',JSON.stringify(cart));
  localStorage.setItem('ys2_staff',document.getElementById('staffInput').value);localStorage.setItem('ys2_site',document.getElementById('siteSelect').value);
  localStorage.setItem('ys2_config',JSON.stringify(config));localStorage.setItem('ys2_steps',JSON.stringify(stepData));
  localStorage.setItem('ys2_cats',JSON.stringify(cats));localStorage.setItem('ys2_sites',JSON.stringify(sites));
}
function addSite(){const n=prompt('名稱：');if(n){sites.push(n);renderSites();save();}}
function deleteSite(){if(confirm('刪除？')){sites=sites.filter(s=>s!==document.getElementById('siteSelect').value);renderSites();save();}}
function toggleAdmin(){if(!isAdmin){if(prompt('密碼')==='751113'){isAdmin=true;document.getElementById('adminPanel').classList.add('show');}}else{isAdmin=false;document.getElementById('adminPanel').classList.remove('show');}renderTitle();renderTabs();render();}
function buildReport(){
  const sel=db.filter(i=>cart[i.id]?.sel);if(!sel.length)return alert('未選擇');
  document.getElementById('rptMeta').innerHTML=`<span>工地：${document.getElementById('siteSelect').value}</span><span>人員：${document.getElementById('staffInput').value}</span>`;
  document.getElementById('rptList').innerHTML=sel.map(i=>`<div class="report-item"><div class="rpt-name">${i.n}</div><div class="rpt-qty">${cart[i.id].qty}</div></div>`).join('');
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');}
function resetCart(){if(confirm('重選？')){cart={};save();render();updateBadge();}}
function captureReport(){html2canvas(document.getElementById('modalBox')).then(c=>{const a=document.createElement('a');a.href=c.toDataURL();a.download='採購單.png';a.click();});}
init();
</script>
</body>
</html>
