<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg); padding-bottom: 120px; }
        
        /* 解決工地名稱縮短的問題 */
        .header-controls { display: flex; gap: 8px; overflow-x: auto; padding: 10px; align-items: center; }
        #siteSelect { min-width: 150px; flex-shrink: 0; background: white; border: 2px solid var(--yt-dark); border-radius: 12px; padding: 8px; font-weight: 900; }
        #staff { min-width: 100px; flex-shrink: 0; background: white; border: 2px solid #ccc; border-radius: 12px; padding: 8px; }

        .category-scroller { display: flex; overflow-x: auto; gap: 8px; padding: 12px; background: white; border-bottom: 2px solid var(--yt-dark); }
        .cat-tab { white-space: nowrap; padding: 8px 16px; border-radius: 10px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; flex-shrink: 0; }
        .cat-tab.active { background: var(--yt-dark); color: white; border-color: var(--yt-dark); }

        .grid-container { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .sign-card { background: white; border-radius: 16px; padding: 15px; border: 1px solid #D7CCC8; display: flex; gap: 12px; cursor: pointer; position: relative; transition: 0.2s; }
        .sign-card.selected { border: 3px solid var(--yt-light); background: #f0fdf4; transform: scale(1.02); }
        
        .img-slot { width: 120px; height: 90px; background: #f8fafc; border-radius: 8px; overflow: hidden; flex-shrink: 0; border: 1px solid #eee; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        
        .qty-input { width: 55px; text-align: center; font-size: 20px; font-weight: 900; color: var(--yt-light); border-bottom: 2px solid var(--yt-light); }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 10px; }
    </style>
</head>
<body>

    <div class="sticky top-0 z-50 bg-[#FFFBEC]">
        <div class="flex items-center justify-between px-4 py-3 bg-[#095744] text-white">
            <span class="text-lg font-black tracking-widest">鈺通營造工安標語</span>
            <button onclick="toggleAdmin()" id="adminBtn" class="text-xs bg-white text-[#095744] px-3 py-1 rounded-full font-bold">🔒 管理員</button>
        </div>
        
        <div class="header-controls">
            <select id="siteSelect" onchange="saveInfo()"></select>
            <button onclick="addSite()" class="bg-[#095744] text-white px-3 py-2 rounded-xl font-bold flex-shrink-0">+</button>
            <input type="text" id="staff" placeholder="填單人" oninput="saveInfo()">
        </div>

        <div class="category-scroller" id="tabContainer"></div>
    </div>

    <div id="mainGrid" class="grid-container"></div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t flex gap-2">
        <button onclick="buildReport()" class="flex-1 bg-[#095744] text-white py-4 rounded-2xl font-black text-lg shadow-xl">📋 生成採購單</button>
        <button onclick="resetAll()" class="bg-red-50 text-red-500 px-4 rounded-2xl font-bold text-xs">重選</button>
    </nav>

    <div id="modal" onclick="closeModal()">
        <div class="bg-white w-full max-w-lg rounded-3xl p-6 overflow-y-auto max-h-[80vh]" onclick="event.stopPropagation()">
            <div id="printArea"></div>
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="window.print()" class="bg-[#095744] text-white py-3 rounded-xl font-black">確認列印</button>
                <button onclick="closeModal()" class="bg-gray-100 py-3 rounded-xl font-bold">返回</button>
            </div>
        </div>
    </div>

<script>
// --- 設定區 ---
const githubUser = "你的帳號"; // 這裡改成你的 GitHub ID
const githubRepo = "你的專案名"; // 這裡改成你的倉庫名稱
const baseUrl = `https://${githubUser}.github.io/${githubRepo}/IMG/`;

let activeDB = [
    {id:'A01', cat:'A', n:'工地大門告示', s:'60x90', m:'中空板'},
    {id:'A02', cat:'A', n:'洗車台須知', s:'40x60', m:'中空板'},
    {id:'B01', cat:'B', n:'進入工區戴安全帽', s:'60x40', m:'中空板'},
    {id:'C01', cat:'C', n:'施工告示牌', s:'120x90', m:'鋁板'}
];

const catLabels = {'ALL':'全部', 'A':'A類 生活', 'B':'B類 安全', 'C':'C類 施工', 'D':'D類 指引'};
let sites = ["嘉義創世", "嘉義嘉科", "嘉義博愛", "嘉義北門", "嘉義民雄", "臺南林森"];
let cart = {}, currentCat = 'ALL', isAdmin = false;

// --- 初始化 ---
function init() {
    const savedDB = localStorage.getItem('yt_db');
    if(savedDB) activeDB = JSON.parse(savedDB);
    
    const savedSites = localStorage.getItem('yt_sites');
    if(savedSites) sites = JSON.parse(savedSites);

    renderTabs();
    renderSites();
    render();
}

function render() {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = '';
    const filtered = currentCat === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentCat);
    
    filtered.sort((a,b) => a.id.localeCompare(b.id)).forEach(i => {
        const c = cart[i.id] || { sel: false, qty: 1 };
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => toggleItem(i.id);
        
        // 這裡的照片路徑會自動根據 ID 抓取 GitHub 上的檔案
        const photoUrl = `${baseUrl}${i.id}.jpg`;

        card.innerHTML = `
            <div class="img-slot">
                <img src="${photoUrl}" onerror="this.src='https://placehold.co/120x90?text=無照片'">
            </div>
            <div class="flex-1 flex flex-col justify-between">
                <div>
                    <div class="font-black text-[#095744] text-lg leading-tight">${i.n}</div>
                    <div class="text-[10px] font-bold text-gray-400 mt-1">${i.id} | ${i.s}</div>
                </div>
                <div class="flex items-center gap-3 mt-2" onclick="event.stopPropagation()">
                    <span class="text-xs font-bold text-gray-400">數量</span>
                    <input type="number" value="${c.qty}" oninput="updateQty('${i.id}', this.value)" class="qty-input">
                </div>
            </div>
            ${isAdmin ? `<button onclick="event.stopPropagation(); deleteItem('${i.id}')" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs">✕</button>` : ''}
        `;
        grid.appendChild(card);
    });
}

function renderTabs() {
    const container = document.getElementById('tabContainer');
    container.innerHTML = Object.entries(catLabels).map(([k, v]) => `
        <div class="cat-tab ${currentCat === k ? 'active' : ''}" onclick="setCat('${k}')">${v}</div>
    `).join('');
}

function setCat(k) { currentCat = k; renderTabs(); render(); }

function toggleItem(id) {
    if(!cart[id]) cart[id] = { sel: false, qty: 1 };
    cart[id].sel = !cart[id].sel;
    render();
}

function updateQty(id, v) {
    if(!cart[id]) cart[id] = { sel: true, qty: 1 };
    cart[id].qty = parseInt(v) || 1;
}

function renderSites() {
    const sel = document.getElementById('siteSelect');
    sel.innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join('');
}

function addSite() {
    const n = prompt("輸入新工地名稱:");
    if(n) { sites.push(n); localStorage.setItem('yt_sites', JSON.stringify(sites)); renderSites(); }
}

function buildReport() {
    const selected = activeDB.filter(i => cart[i.id]?.sel);
    if(!selected.length) return alert("請先勾選標語項目");
    
    let html = `<div style="padding:10px; border:3px solid #095744; border-radius:15px;">
        <h2 style="text-align:center; font-weight:900; color:#095744;">鈺通營造採購單</h2>
        <p>工地：${document.getElementById('siteSelect').value} | 填單人：${document.getElementById('staff').value}</p>
        <hr style="margin:10px 0;">`;
    
    selected.forEach(i => {
        html += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:10px;">
            <img src="${baseUrl}${i.id}.jpg" style="width:60px; height:45px; object-fit:contain;" onerror="this.style.display='none'">
            <div style="flex:1;"><b>${i.n}</b><br><small>${i.id} | ${i.s}</small></div>
            <div style="font-size:20px; font-weight:900; color:#70B934;">x ${cart[i.id].qty}</div>
        </div>`;
    });
    
    document.getElementById('printArea').innerHTML = html + `</div>`;
    document.getElementById('modal').style.display = 'flex';
}

function toggleAdmin() {
    isAdmin = !isAdmin;
    document.getElementById('adminBtn').innerText = isAdmin ? "🔓 管理中" : "🔒 管理員";
    render();
}

function deleteItem(id) {
    if(confirm("確定刪除並重新排序？")) {
        activeDB = activeDB.filter(x => x.id !== id);
        // 簡單重新排序
        const prefix = id.charAt(0);
        let count = 1;
        activeDB.filter(x => x.id.startsWith(prefix)).forEach(x => {
            x.id = prefix + count.toString().padStart(2, '0');
            count++;
        });
        localStorage.setItem('yt_db', JSON.stringify(activeDB));
        render();
    }
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function resetAll() { if(confirm("確定要重選所有項目？")) { cart = {}; render(); } }
function saveInfo() { localStorage.setItem('yt_staff', document.getElementById('staff').value); }

window.onload = init;
</script>
</body>
</html>
