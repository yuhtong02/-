<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; --yt-card-border: #D7CCC8; --yt-btn-bg: #E6F4F1; }
        * { box-sizing: border-box; border: 0; margin: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg) !important; padding-bottom: 180px; color: #1e293b; overflow-x: hidden; }
        #lineAlert { display: none; background: #ff5252; color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 12px; position: sticky; top: 0; z-index: 5000; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: var(--yt-bg); border-bottom: 4px solid var(--yt-dark) !important; }
        .header-top-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; }
        .system-title { font-size: 20px; font-weight: 900; color: var(--yt-dark); }
        .input-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 8px; padding: 0 15px 10px; }
        .category-scroller { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: white; border-bottom: 1px solid #D7CCC8 !important; -webkit-overflow-scrolling: touch; }
        .cat-tab-step { white-space: nowrap; padding: 8px 16px; border-radius: 12px; background-color: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; border: 1px solid var(--yt-dark) !important; display: flex; align-items: center; flex-shrink: 0; }
        .cat-tab-step::before { content: "📍"; margin-right: 4px; }
        .cat-tab-step.active { background: var(--yt-light); border-color: var(--yt-light) !important; }
        .cat-tab-item { white-space: nowrap; padding: 8px 18px; border-radius: 10px; background-color: white; color: #64748b; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid #e2e8f0 !important; flex-shrink: 0; }
        .cat-tab-item.active { background-color: var(--yt-btn-bg); color: var(--yt-dark); border-color: var(--yt-dark) !important; font-weight: 900; }
        .grid-container { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
        .sign-card { background: white; border-radius: 16px; padding: 16px; border: 1px solid var(--yt-card-border) !important; display: flex; gap: 16px; cursor: pointer; position: relative; }
        .sign-card.selected { border: 3px solid var(--yt-light) !important; background: #f0fdf4; }
        .admin-input { background: #fff7ed; border: 1px dashed #fb923c !important; border-radius: 4px; padding: 4px 6px; font-size: 12px; width: 100%; color: #9a3412; font-weight: bold; pointer-events: auto; }
        .admin-step-input { background: rgba(255,255,255,0.2); border: 1px dashed white !important; color: white; width: 100%; border-radius: 4px; padding: 2px 5px; margin-top: 4px; }
        .img-slot { width: 140px; height: 100px; background: #f1f5f9; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #e2e8f0 !important; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; } 
        .qty-input { width: 60px; text-align: center; font-size: 22px; font-weight: 900; color: var(--yt-light); background: transparent; border-bottom: 2px solid #eee !important; }
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #eee !important; z-index: 2000; }
        .guide-box { grid-column: 1 / -1; background: linear-gradient(135deg, #095744 0%, #1a7a63 100%); color: white; padding: 20px; border-radius: 20px; margin-bottom: 10px; position: relative; }
        .divider { width: 2px; height: 24px; background: #e2e8f0; flex-shrink: 0; margin: 0 4px; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
        .print-paper { background: white; width: 100%; max-width: 600px; border-radius: 24px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        @media print { .no-print { display: none !important; } body { background: white !important; } }
    </style>
</head>
<body>

    <div id="lineAlert">⚠️ LINE 無法列印。請點選 [三個點] 並選「在瀏覽器中開啟」。</div>

    <div class="sticky-header no-print">
        <div class="header-top-row">
            <span class="system-title">鈺通營造工安標語系統</span>
            <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] font-black bg-white text-[#095744] px-3 py-1.5 rounded-full border border-[#095744]/20">🔒 管理員</button>
        </div>
        <div class="input-row">
            <select id="siteSelect" class="bg-white text-[#095744] p-2 rounded-xl text-xs font-black border border-[#095744]/20" onchange="autoSave()"></select>
            <input type="text" id="staff" class="bg-white text-[#095744] p-2 rounded-xl text-xs font-black border border-[#095744]/20" placeholder="填單人員" oninput="autoSave()">
        </div>
        <div class="category-scroller" id="tabContainer"></div>
    </div>

    <div class="grid-container max-w-7xl mx-auto" id="mainGrid"></div>

    <nav class="footer-nav no-print">
        <button id="addItemBtn" onclick="addNewItem()" class="hidden w-full max-w-3xl bg-amber-50 text-amber-700 py-2 mb-2 rounded-xl font-black text-sm mx-auto">➕ 新增標語項目</button>
        <div class="flex w-full max-w-3xl gap-3 px-4 mx-auto">
            <button onclick="buildReport()" class="flex-[4] bg-[#095744] text-white py-4 rounded-2xl font-black text-xl shadow-lg">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-red-50 text-red-400 rounded-2xl text-[10px] font-bold">重選</button>
            <button onclick="hardReset()" class="flex-1 bg-slate-100 text-slate-400 rounded-2xl text-[10px] font-bold">清空</button>
        </div>
    </nav>

    <div id="modal" class="no-print">
        <div class="print-paper">
            <div id="printArea"></div>
            <div class="grid grid-cols-1 gap-3 mt-6">
                <button onclick="window.print()" class="bg-[#095744] text-white py-4 rounded-xl font-black">1. 直接列印 / PDF</button>
                <button onclick="captureToImage()" class="bg-amber-500 text-white py-4 rounded-xl font-black">2. 轉為圖片 (長按儲存)</button>
                <button onclick="closeModal()" class="bg-slate-200 text-slate-500 py-3 rounded-xl font-bold">返回編輯</button>
            </div>
        </div>
    </div>

    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhoto(this)">

<script>
if (/Line/i.test(navigator.userAgent)) document.getElementById('lineAlert').style.display = 'block';

const DEFAULT_SITES = ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "嘉義北門集合住宅", "嘉義民雄院區", "臺南林森圖書館"];
const CAT_LABELS = {'ALL':'全部','A':'A類｜生活設施','B':'B類｜安全防護','C':'C類｜危險警示','D':'D類｜禁止事項','E':'E類｜交通動線','F':'F類｜設備設施','G':'G類｜作業規範','H':'H類｜宣導標語','I':'I類｜環境管理','J':'J類｜圖資指引','K':'K類｜區域單位'};

const INITIAL_DB = [
    {id:'A01', cat:'A', n:'飲水機', s:'30x20'}, {id:'A02', cat:'A', n:'洗手間', s:'30x20'},
    {id:'B01', cat:'B', n:'戴安全帽', s:'60x40'}, {id:'B02', cat:'B', n:'穿安全鞋', s:'60x40'},
    {id:'C01', cat:'C', n:'有電危險', s:'60x40'}, {id:'C02', cat:'C', n:'當心墜落', s:'60x40'},
    {id:'D01', cat:'D', n:'嚴禁煙火', s:'60x40'}, {id:'D02', cat:'D', n:'禁止進入', s:'60x40'},
    {id:'E01', cat:'E', n:'車輛進出口', s:'120x60'}, {id:'E02', cat:'E', n:'安全通道', s:'60x40'},
    {id:'F01', cat:'F', n:'滅火器', s:'30x20'}, {id:'F02', cat:'F', n:'急救箱', s:'30x20'},
    {id:'G01', cat:'G', n:'施工告示牌', s:'120x90'}, {id:'G02', cat:'G', n:'作業規範', s:'90x60'},
    {id:'H01', cat:'H', n:'酒後禁工', s:'60x40'}, {id:'H02', cat:'H', n:'工安第一', s:'60x40'},
    {id:'I01', cat:'I', n:'物料暫置', s:'60x40'}, {id:'I02', cat:'I', n:'廢棄物堆放', s:'60x40'},
    {id:'J01', cat:'J', n:'逃生路線圖', s:'客製'}, {id:'K01', cat:'K', n:'工地辦公室', s:'60x20'}
];

const DEFAULT_GUIDES = {
    'S1': { t: 'Step 1. 工區大門配置', d: '告示牌、門禁管制', items: ['G01','E01','D02'] },
    'S2': { t: 'Step 2. 基礎設施', d: '辦公區、生活區', items: ['K01','A01','A02'] },
    'S3': { t: 'Step 3. 安全警示', d: '危險項目', items: ['C01','C02','B01'] },
    'S4': { t: 'Step 4. 動線指引', d: '路徑規劃', items: ['E02','J01'] },
    'S5': { t: 'Step 5. 宣導管理', d: '工安與廢棄物', items: ['H01','F01','I01'] },
    'S6': { t: 'Step 6. 竣工收尾', d: '驗收撤場', items: [] }
};

let activeDB, db, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, curEditImgId;

// 版號更新以確保套用新邏輯
const request = indexedDB.open("Yutong_V46", 1);
request.onupgradeneeded = e => e.target.result.createObjectStore("images");
request.onsuccess = e => { db = e.target.result; init(); };

function init() {
    sites = JSON.parse(localStorage.getItem('yt_sites')) || DEFAULT_SITES;
    activeDB = JSON.parse(localStorage.getItem('yt_active_db')) || INITIAL_DB;
    guides = JSON.parse(localStorage.getItem('yt_guides')) || DEFAULT_GUIDES;
    cart = JSON.parse(localStorage.getItem('yt_cart')) || {};
    renderTabs();
    renderSiteSelect();
    document.getElementById('staff').value = localStorage.getItem('yt_staff') || '';
    document.getElementById('siteSelect').value = localStorage.getItem('yt_site') || sites[0];
    render();
}

function renderTabs() {
    let html = '';
    Object.keys(guides).sort().forEach(k => {
        html += `<div class="cat-tab-step ${currentKey===k?'active':''}" onclick="setFilter('GUIDE','${k}')">Step ${k.replace('S','')}</div>`;
    });
    html += `<div class="cat-tab-step ${isAdmin?'bg-blue-600 border-blue-600':'opacity-30'}" style="padding: 8px 12px;" onclick="manageSteps()">⚙️</div><div class="divider"></div>`;
    Object.keys(CAT_LABELS).forEach(k => {
        html += `<div class="cat-tab-item ${currentKey===k?'active':''}" onclick="setFilter('CAT','${k}')">${CAT_LABELS[k]}</div>`;
    });
    document.getElementById('tabContainer').innerHTML = html;
}

async function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : activeDB.filter(x => (guides[currentKey] && guides[currentKey].items.includes(x.id)));
    
    if(currentMode === 'GUIDE' && guides[currentKey]) {
        const g = guides[currentKey];
        let delBtn = isAdmin ? `<button onclick="deleteStep('${currentKey}')" class="absolute top-2 right-2 bg-red-500 text-white text-[10px] px-2 py-1 rounded">刪除</button>` : '';
        grid.innerHTML = `<div class="guide-box">${delBtn}${isAdmin ? `<input class="admin-step-input text-xl font-black" value="${g.t}" oninput="updateG('${currentKey}','t',this.value)">` : `<h2 class="text-xl font-black">${g.t}</h2>`}${isAdmin ? `<input class="admin-step-input text-xs" value="${g.d}" oninput="updateG('${currentKey}','d',this.value)">` : `<p class="text-xs opacity-80">${g.d}</p>`}</div>`;
    }

    for (const i of display) {
        const c = cart[i.id] || { sel:false, qty:1 };
        const localImg = await dbGet(i.id);
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => toggleItem(i.id);
        let delItemBtn = isAdmin ? `<button onclick="event.stopPropagation(); deleteItem('${i.id}')" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs z-20">✕</button>` : '';
        
        // 修正：增加 onerror 處理，並將 src 設為空白來防止閃爍
        const imgSrc = localImg ? localImg : `img/${i.id}.JPG`;

        card.innerHTML = `${delItemBtn}
            <div class="img-slot" onclick="handleImgClick(event, '${i.id}')">
                <img src="${imgSrc}" onerror="this.onerror=null; this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22150%22%20height%3D%22100%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23f1f5f9%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-family%3D%22sans-serif%22%20font-size%3D%2214%22%20fill%3D%22%2394a3b8%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%3E無照片%3C%2Ftext%3E%3C%2Fsvg%3E';">
            </div>
            <div class="flex-1">
                <div class="flex justify-between items-start">
                    <div class="flex-1">${isAdmin ? `<input class="admin-input mb-1" value="${i.n}" oninput="updateI('${i.id}','n',this.value)" onclick="event.stopPropagation()">` : `<div class="font-black text-[#095744]">${i.n}</div>`}</div>
                    <span class="text-[9px] bg-slate-100 p-1 rounded ml-1">${i.id}</span>
                </div>
                <div class="text-[13px] font-bold text-red-700 mt-1">規格：${isAdmin ? `<input class="admin-input" value="${i.s}" oninput="updateI('${i.id}','s',this.value)" onclick="event.stopPropagation()">` : i.s}</div>
                ${isAdmin ? `<button onclick="event.stopPropagation(); ${currentMode==='GUIDE'?'unlink':'linkToStep'}('${i.id}')" class="text-[10px] ${currentMode==='GUIDE'?'text-blue-500':'text-green-600'} mt-1 underline">${currentMode==='GUIDE'?'移除':'➕ 加入步驟'}</button>` : ''}
                <div class="flex items-center gap-2 mt-2" onclick="event.stopPropagation()"><span class="text-[10px] font-bold text-slate-400">數量</span><input type="number" value="${c.qty}" oninput="updateQty('${i.id}',this.value)" class="qty-input"></div>
            </div>`;
        grid.appendChild(card);
    }
}

function updateG(k, f, v) { guides[k][f] = v; localStorage.setItem('yt_guides', JSON.stringify(guides)); }
function updateI(id, f, v) { const i = activeDB.find(x => x.id === id); if(i) { i[f] = v; localStorage.setItem('yt_active_db', JSON.stringify(activeDB)); }}
function setFilter(m, k) { currentMode=m; currentKey=k; renderTabs(); render(); }
function toggleItem(id) { if(!cart[id]) cart[id]={sel:false,qty:1}; cart[id].sel=!cart[id].sel; autoSave(); render(); }
function updateQty(id, v) { if(!cart[id]) cart[id]={sel:true,qty:1}; cart[id].qty=parseInt(v)||1; autoSave(); }

function toggleAdmin() {
    if(!isAdmin) {
        if(prompt("請輸入管理員密碼") === "751113") {
            isAdmin = true;
            document.getElementById('adminBtn').innerText = "🔓 管理中";
            document.getElementById('addItemBtn').classList.remove('hidden');
        } else {
            alert("密碼錯誤！");
        }
    } else {
        isAdmin = false;
        document.getElementById('adminBtn').innerText = "🔒 管理員";
        document.getElementById('addItemBtn').classList.add('hidden');
    }
    renderTabs(); render();
}

function manageSteps() { if(!isAdmin) return alert("管理員限定"); const k = prompt("代號(如S7)"); if(k){ guides[k]={t:"新標題", d:"新說明", items:[]}; localStorage.setItem('yt_guides', JSON.stringify(guides)); renderTabs(); }}
function deleteStep(k) { if(confirm("刪除此步？")){ delete guides[k]; localStorage.setItem('yt_guides', JSON.stringify(guides)); setFilter('CAT','ALL'); }}
function linkToStep(id) { const s = prompt("加入哪步?(如S1)"); if(guides[s]){ if(!guides[s].items.includes(id)) guides[s].items.push(id); localStorage.setItem('yt_guides', JSON.stringify(guides)); alert("OK"); }}
function unlink(id) { guides[currentKey].items = guides[currentKey].items.filter(x => x !== id); localStorage.setItem('yt_guides', JSON.stringify(guides)); render(); }
function autoSave() { localStorage.setItem('yt_staff', document.getElementById('staff').value); localStorage.setItem('yt_site', document.getElementById('siteSelect').value); localStorage.setItem('yt_cart', JSON.stringify(cart)); }
function resetCart() { cart = {}; autoSave(); render(); }
function hardReset() { if(confirm("全清空？")){ localStorage.clear(); location.reload(); }}
function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join('') + `<option value="ADD">➕ 新增工地...</option>`; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function addNewItem() { const id = prompt("編號"); if(id){ activeDB.push({id, cat: id.charAt(0).toUpperCase(), n:"新標語", s:"規格"}); localStorage.setItem('yt_active_db', JSON.stringify(activeDB)); render(); }}
function deleteItem(id) { activeDB = activeDB.filter(x => x.id !== id); localStorage.setItem('yt_active_db', JSON.stringify(activeDB)); render(); }

async function buildReport() {
    const sel = activeDB.filter(i => cart[i.id] && cart[i.id].sel); if(!sel.length) return alert("未選");
    let h = `<div id="captureTarget" style="background:white; padding:20px; border:2px solid #095744;"><div style="text-align:center; border-bottom:3px solid #095744; padding-bottom:10px;"><h1 style="color:#095744">鈺通營造 標語採購單</h1><div style="display:flex; justify-content:space-between; margin-top:10px; font-weight:bold"><span>工地：${document.getElementById('siteSelect').value}</span><span>填單人：${document.getElementById('staff').value}</span></div></div><table style="width:100%; border-collapse:collapse; margin-top:10px;">`;
    for(const i of sel) { 
        const img = await dbGet(i.id) || `img/${i.id}.JPG`; 
        h += `<tr style="border-bottom:1px solid #eee"><td style="padding:10px; width:110px"><img src="${img}" style="width:100px" onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22100%22%20height%3D%2260%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23f1f5f9%22%2F%3E%3C/svg%3E';"></td><td style="padding:10px"><b>${i.n}</b><br><small>規格：${i.s}</small></td><td style="padding:10px; text-align:right; font-size:20px"><b>${cart[i.id].qty}</b></td></tr>`; 
    }
    document.getElementById('printArea').innerHTML = h + `</table></div>`; document.getElementById('modal').style.display='flex';
}

function captureToImage() { const target = document.getElementById('captureTarget'); html2canvas(target, { useCORS: true, scale: 2 }).then(canvas => { const imgData = canvas.toDataURL("image/png"); document.getElementById('printArea').innerHTML = `<p style="color:red; font-weight:bold; margin-bottom:10px;">圖片已生成！請「長按圖片」儲存。</p><img src="${imgData}" style="width:100%; border:1px solid #ddd;">`; }); }
function handleImgClick(e, id) { if(isAdmin) { e.stopPropagation(); curEditImgId = id; document.getElementById('photoInput').click(); }}
async function dbGet(k) { return new Promise(r => { const t = db.transaction("images").objectStore("images").get(k); t.onsuccess = () => r(t.result); }); }
async function dbSet(k, v) { return new Promise(r => { const t = db.transaction("images","readwrite").objectStore("images").put(v, k); t.onsuccess = () => r(); }); }
async function handlePhoto(input) { if(input.files[0]) { const reader = new FileReader(); reader.onload = async e => { await dbSet(curEditImgId, e.target.result); render(); }; reader.readAsDataURL(input.files[0]); }}
</script>
</body>
</html>
