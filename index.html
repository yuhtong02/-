<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --yt-dark: #095744 !important; 
            --yt-light: #70B934 !important; 
            --yt-bg: #FFFBEC !important; 
            --yt-card-border: #D7CCC8 !important; 
        }
        * { box-sizing: border-box; border: 0; margin: 0; }
        body { 
            font-family: 'Noto Sans TC', sans-serif !important; 
            background-color: var(--yt-bg) !important; 
            padding-bottom: 220px; 
            color: #1e293b; 
        }
        /* 標題與標語文字顏色修正 */
        .system-title { color: #095744 !important; font-weight: 900; font-size: 20px; }
        .sign-title { color: #095744 !important; font-weight: 900; font-size: 16px; }
        
        .sticky-header { 
            position: sticky; top: 0; z-index: 1000; 
            background: var(--yt-bg); 
            border-bottom: 4px solid #095744 !important; 
        }
        .category-scroller { 
            display: flex; overflow-x: auto; gap: 10px; padding: 15px; 
            background: white; border-bottom: 1px solid #D7CCC8 !important; 
        }
        .cat-tab-step { 
            white-space: nowrap; padding: 8px 16px; border-radius: 12px; 
            background-color: #095744 !important; color: white !important; 
            font-size: 13px; font-weight: 900; cursor: pointer; 
            display: flex; align-items: center; 
        }
        .cat-tab-step.active { background: #70B934 !important; }
        
        .cat-tab-item { 
            white-space: nowrap; padding: 8px 18px; border-radius: 10px; 
            background-color: white; color: #64748b; font-size: 13px; font-weight: 700; 
            cursor: pointer; border: 1px solid #e2e8f0 !important; 
        }
        .cat-tab-item.active { 
            background-color: #E6F4F1 !important; 
            color: #095744 !important; 
            border-color: #095744 !important; 
            font-weight: 900; 
        }

        .grid-container { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .sign-card { 
            background: white; border-radius: 16px; padding: 16px; 
            border: 1px solid #D7CCC8 !important; 
            display: flex; gap: 12px; cursor: pointer; position: relative; 
        }
        .sign-card.selected { border: 3px solid #70B934 !important; background: #f0fdf4; }
        
        .img-slot { 
            width: 120px; height: 90px; background: #f1f5f9; border-radius: 10px; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; 
            border: 1px solid #e2e8f0 !important; 
        }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        
        .qty-input { 
            width: 50px; text-align: center; font-size: 22px; font-weight: 900; 
            color: #70B934 !important; border-bottom: 2px solid #eee !important; 
        }

        .guide-box { 
            grid-column: 1 / -1; 
            background: linear-gradient(135deg, #095744 0%, #1a7a63 100%); 
            color: white; padding: 18px; border-radius: 18px; 
        }
        
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 2px solid #eee !important; z-index: 2000; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
        .print-paper { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        
        .admin-input { background: #fff7ed; border: 1px dashed #fb923c !important; border-radius: 4px; padding: 2px 4px; font-size: 12px; width: 100%; color: #9a3412; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sticky-header no-print">
        <div class="flex items-center justify-between p-4">
            <span class="system-title">鈺通營造工安標語系統</span>
            <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] font-black bg-white text-[#095744] px-3 py-1.5 rounded-full border border-[#095744]/20">🔒 管理員</button>
        </div>
        <div class="grid grid-cols-2 gap-3 px-4 pb-3">
            <select id="siteSelect" class="bg-white text-[#095744] p-2 rounded-xl text-xs font-black border border-[#095744]/20"></select>
            <input type="text" id="staff" class="bg-white text-[#095744] p-2 rounded-xl text-xs font-black border border-[#095744]/20" placeholder="填單人員">
        </div>
        <div class="category-scroller" id="tabContainer"></div>
    </div>

    <div class="grid-container max-w-7xl mx-auto" id="mainGrid"></div>

    <nav class="footer-nav no-print">
        <div id="adminTools" class="hidden flex gap-2 mb-3">
            <button onclick="addNewItem()" class="flex-1 bg-amber-50 text-amber-700 py-2 rounded-xl font-black text-xs">新增項</button>
            <button onclick="exportFullCode()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl font-black text-xs">💾 導出代碼</button>
        </div>
        <div class="flex gap-3 max-w-2xl mx-auto">
            <button onclick="buildReport()" class="flex-[3] bg-[#095744] text-white py-4 rounded-2xl font-black text-xl shadow-lg">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-red-50 text-red-400 rounded-2xl text-xs font-bold">重選</button>
        </div>
    </nav>

    <div id="modal" class="no-print">
        <div class="print-paper">
            <div id="printArea"></div>
            <div class="flex flex-col gap-3 mt-5">
                <button id="copyBtn" style="display:none" onclick="copyToClipboard()" class="bg-blue-600 text-white py-4 rounded-xl font-black">複製新代碼並回 GitHub 貼上</button>
                <button onclick="window.print()" class="bg-[#095744] text-white py-4 rounded-xl font-black">1. 列印 / 轉 PDF</button>
                <button onclick="captureToImage()" class="bg-amber-500 text-white py-4 rounded-xl font-black">2. 轉為圖片 (Line傳送)</button>
                <button onclick="closeModal()" class="bg-slate-200 text-slate-500 py-3 rounded-xl font-bold">返回編輯</button>
            </div>
        </div>
    </div>

    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhoto(this)">

<script>
const DEFAULT_SITES = ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "嘉義北門集合住宅", "嘉義民雄院區", "臺南林森圖書館"];
const CAT_LABELS = {'ALL':'全部','A':'A類 生活','B':'B類 防護','C':'C類 警示','D':'D類 禁止','E':'E類 交通','F':'F類 設備','G':'G類 規範','H':'H類 宣導','I':'I類 環境','J':'J類 圖資','K':'K類 區域'};

const INITIAL_DB = [
    {id:'A01', cat:'A', n:'飲水機/休息區', s:'30x20'}, {id:'A02', cat:'A', n:'洗手間', s:'30x20'},
    {id:'B01', cat:'B', n:'戴安全帽', s:'60x40'}, {id:'B02', cat:'B', n:'穿安全鞋', s:'60x40'},
    {id:'C01', cat:'C', n:'有電危險', s:'60x40'}, {id:'C02', cat:'C', n:'當心墜落', s:'60x40'},
    {id:'D01', cat:'D', n:'嚴禁煙火', s:'60x40'}, {id:'D02', cat:'D', n:'禁止進入', s:'60x40'},
    {id:'E01', cat:'E', n:'車輛進出口', s:'120x60'}, {id:'E02', cat:'E', n:'安全通道', s:'60x40'},
    {id:'F01', cat:'F', n:'滅火器', s:'30x20'}, {id:'F02', cat:'F', n:'急救箱', s:'30x20'},
    {id:'G01', cat:'G', n:'工程告示牌', s:'120x90'}, {id:'G02', cat:'G', n:'施工作業SOP', s:'90x60'},
    {id:'H01', cat:'H', n:'酒後禁工', s:'60x40'}, {id:'H02', cat:'H', n:'工安第一', s:'60x40'},
    {id:'I01', cat:'I', n:'物料暫置', s:'60x40'}, {id:'I02', cat:'I', n:'廢棄物堆放', s:'60x40'},
    {id:'J01', cat:'J', n:'逃生路線圖', s:'客製'}, {id:'K01', cat:'K', n:'工地辦公室', s:'60x20'}
];

const DEFAULT_GUIDES = {
    'S1': { t: 'Step 1. 工區大門', d: '告示牌、門禁管制', items: ['G01','E01','B01','H01'] },
    'S2': { t: 'Step 2. 基礎設施', d: '生活區、物料區', items: ['K01','A01','A02','I01'] },
    'S3': { t: 'Step 3. 施工安全', d: '防墜、動火警示', items: ['C01','C02','D01','E02'] },
    'S4': { t: 'Step 4. 機具月檢', d: '消防設備檢點', items: ['F01','F02'] },
    'S5': { t: 'Step 5. 教育宣導', d: 'SOP與工安觀念', items: ['G02','H02'] },
    'S6': { t: 'Step 6. 竣工撤場', d: '驗收與環境還原', items: ['I02','J01'] }
};

let activeDB, db, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, curEditImgId;

const req = indexedDB.open("Yutong_V70", 1);
req.onupgradeneeded = e => e.target.result.createObjectStore("images");
req.onsuccess = e => { db = e.target.result; init(); };

function init() {
    sites = JSON.parse(localStorage.getItem('yt_sites')) || DEFAULT_SITES;
    activeDB = JSON.parse(localStorage.getItem('yt_active_db')) || INITIAL_DB;
    guides = JSON.parse(localStorage.getItem('yt_guides')) || DEFAULT_GUIDES;
    cart = JSON.parse(localStorage.getItem('yt_cart')) || {};
    renderTabs(); renderSiteSelect();
    document.getElementById('staff').value = localStorage.getItem('yt_staff') || '';
    document.getElementById('siteSelect').value = localStorage.getItem('yt_site') || sites[0];
    render();
}

function renderTabs() {
    let h = '';
    Object.keys(guides).sort().forEach(k => {
        h += `<div class="cat-tab-step ${currentKey===k?'active':''}" onclick="setFilter('GUIDE','${k}')">Step ${k.replace('S','')}</div>`;
    });
    h += `<div style="width:2px; height:20px; background:#ddd; margin:0 5px; flex-shrink:0;"></div>`;
    Object.keys(CAT_LABELS).forEach(k => {
        h += `<div class="cat-tab-item ${currentKey===k?'active':''}" onclick="setFilter('CAT','${k}')">${CAT_LABELS[k]}</div>`;
    });
    document.getElementById('tabContainer').innerHTML = h;
}

async function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : activeDB.filter(x => (guides[currentKey] && guides[currentKey].items.includes(x.id)));
    if(currentMode === 'GUIDE' && guides[currentKey]) {
        grid.innerHTML = `<div class="guide-box"><h2 class="text-lg font-black">${guides[currentKey].t}</h2><p class="text-[10px] opacity-80">${guides[currentKey].d}</p></div>`;
    }
    for (const i of display) {
        const c = cart[i.id] || { sel:false, qty:1 };
        const localImg = await dbGet(i.id);
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => toggleItem(i.id);
        const imgSrc = localImg ? localImg : `data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22150%22%20height%3D%22100%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23f8fafc%22%2F%3E%3C/svg%3E`;
        card.innerHTML = `<div class="img-slot" onclick="handleImgClick(event, '${i.id}')"><img src="${imgSrc}"></div><div class="flex-1"><div><span class="text-[8px] bg-slate-100 p-1 rounded font-bold">${i.id}</span> ${isAdmin ? `<input class="admin-input" value="${i.n}" oninput="updateI('${i.id}','n',this.value)">` : `<span class="sign-title">${i.n}</span>`}</div><div class="text-[11px] text-red-600 font-bold mt-1">規格：${i.s}</div><div class="flex items-center gap-2 mt-4" onclick="event.stopPropagation()">數量 <input type="number" value="${c.qty}" oninput="updateQty('${i.id}',this.value)" class="qty-input"></div></div>`;
        grid.appendChild(card);
    }
}

function updateI(id, f, v) { const i = activeDB.find(x => x.id === id); if(i) { i[f] = v; localStorage.setItem('yt_active_db', JSON.stringify(activeDB)); }}
function setFilter(m, k) { currentMode=m; currentKey=k; renderTabs(); render(); }
function toggleItem(id) { if(!cart[id]) cart[id]={sel:false,qty:1}; cart[id].sel=!cart[id].sel; autoSave(); render(); }
function updateQty(id, v) { if(!cart[id]) cart[id]={sel:true,qty:1}; cart[id].qty=parseInt(v)||1; autoSave(); }
function autoSave() { localStorage.setItem('yt_staff', document.getElementById('staff').value); localStorage.setItem('yt_site', document.getElementById('siteSelect').value); localStorage.setItem('yt_cart', JSON.stringify(cart)); }
function resetCart() { cart = {}; autoSave(); render(); }
function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join(''); }
function toggleAdmin() { isAdmin = !isAdmin; document.getElementById('adminBtn').innerText = isAdmin ? "🔓 管理中" : "🔒 管理員"; document.getElementById('adminTools').classList.toggle('hidden'); render(); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function exportFullCode() {
    let dbStr = `const INITIAL_DB = ${JSON.stringify(activeDB)};`;
    let newCode = document.documentElement.outerHTML.replace(/const INITIAL_DB = \[[\s\S]*?\];/, dbStr);
    document.getElementById('printArea').innerHTML = `<div class="p-3 bg-slate-900 text-slate-300 text-[10px] rounded overflow-auto max-h-[300px]"><pre id="codeOutput">${newCode.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre></div>`;
    document.getElementById('copyBtn').style.display='block';
    document.getElementById('modal').style.display='flex';
}
function copyToClipboard() { navigator.clipboard.writeText(document.getElementById('codeOutput').innerText).then(() => alert("已複製！請去 GitHub 覆蓋 index.html")); }

async function buildReport() {
    const sel = activeDB.filter(i => cart[i.id] && cart[i.id].sel); if(!sel.length) return alert("未選");
    let h = `<div id="captureTarget" style="padding:15px; background:white; border:2px solid #095744;"><h2 style="color:#095744; border-bottom:3px solid #095744; padding-bottom:5px; margin-bottom:10px;">鈺通營造 標語採購清單</h2><p style="font-size:11px;">工地：${document.getElementById('siteSelect').value} | 填單人：${document.getElementById('staff').value}</p><table style="width:100%; border-collapse:collapse; margin-top:10px;">`;
    for(const i of sel) { const img = await dbGet(i.id) || ''; h += `<tr style="border-bottom:1px solid #eee"><td style="padding:8px; width:70px"><img src="${img}" style="width:60px"></td><td style="padding:8px; font-size:13px;"><b style="color:#095744">${i.n}</b><br><small>規格：${i.s}</small></td><td style="padding:8px; text-align:right"><b>x ${cart[i.id].qty}</b></td></tr>`; }
    document.getElementById('printArea').innerHTML = h + `</table></div>`; document.getElementById('modal').style.display='flex';
}
function captureToImage() { html2canvas(document.getElementById('captureTarget')).then(canvas => { document.getElementById('printArea').innerHTML = `<img src="${canvas.toDataURL()}" style="width:100%; border:1px solid #eee;">`; }); }
function handleImgClick(e, id) { if(isAdmin) { e.stopPropagation(); curEditImgId = id; document.getElementById('photoInput').click(); }}
async function dbGet(k) { return new Promise(r => { const t = db.transaction("images").objectStore("images").get(k); t.onsuccess = () => r(t.result); }); }
async function dbSet(k, v) { return new Promise(r => { const t = db.transaction("images","readwrite").objectStore("images").put(v, k); t.onsuccess = () => r(); }); }
async function handlePhoto(input) { if(input.files[0]) { const reader = new FileReader(); reader.onload = async e => { await dbSet(curEditImgId, e.target.result); render(); }; reader.readAsDataURL(input.files[0]); }}
</script>
</body>
</html>
