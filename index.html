<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>鈺通營造 | 工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dk:#164E33;--gr:#6EB831;
  --cream:#FEF8E6;--cb:#E2C96A;--cd:#B8942A;--cdp:#6B4700;
  --ink:#0F172A;--ink3:#64748B;--ink4:#94A3B8;
  --bg:#FFFDF5;--sf:#FFFFFF;--bd:#D8EAB8;
  --red:#DC2626;--blue:#1D4ED8;--purple:#6D28D9;
  --r:14px;--r2:10px;--r3:8px;
  --sh:0 1px 3px rgba(22,78,51,.06),0 3px 10px rgba(22,78,51,.04);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--dk);color:#fff;padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-logo{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;position:relative;flex-shrink:0;cursor:default}
.hdr-logo img{width:100%;height:100%;object-fit:contain}
.hdr-logo.ed{cursor:pointer}
.hdr-logo.ed::after{content:'✏';position:absolute;bottom:0;right:0;font-size:9px;background:var(--gr);color:#fff;border-radius:50%;width:13px;height:13px;display:flex;align-items:center;justify-content:center}
.hdr-title{font-size:15px;font-weight:900}
.hdr-ver{font-size:10px;opacity:.55;margin-top:1px;color:#A8D96A}
.hdr-r{display:flex;align-items:center;gap:7px}
.sdot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0;transition:background .3s}
.sdot.off{background:var(--ink4)}
.sdot.sync{background:#F59E0B;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.abtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.abtn:hover{background:rgba(255,255,255,.2)}
.abtn.on{background:rgba(110,184,49,.28);border-color:rgba(110,184,49,.5);color:#C8F07A}

/* CONTROLS */
.ctrl{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 14px;display:flex;gap:7px;flex-shrink:0;align-items:center;flex-wrap:wrap}
.ctrl-g{display:flex;gap:6px;align-items:center;flex:1;min-width:130px}
select,input[type=text]{font-family:inherit;font-size:13px;padding:7px 9px;border:1.5px solid var(--bd);border-radius:var(--r3);background:var(--cream);color:var(--ink);outline:none;transition:border-color .15s}
select:focus,input[type=text]:focus{border-color:var(--gr)}
select{flex:1}
.btn{font-family:inherit;font-size:12px;font-weight:700;padding:7px 10px;border-radius:var(--r3);border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-dk{background:var(--dk);color:#fff}.btn-dk:hover{background:#1E6840}
.btn-red{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA}.btn-red:hover{background:#FEE2E2}
.btn-blue{background:#EFF6FF;color:var(--blue);border:1.5px solid #BFDBFE}.btn-blue:hover{background:#DBEAFE}
.btn-pu{background:#F5F3FF;color:var(--purple);border:1.5px solid #DDD6FE}.btn-pu:hover{background:#EDE9FE}
.btn-cr{background:var(--cream);color:var(--cdp);border:1.5px solid var(--cb)}.btn-cr:hover{background:#FEF0C0}

/* TABS */
.tabs-wrap{background:var(--sf);border-bottom:2px solid var(--bd);flex-shrink:0;position:relative}
.tabs{display:flex;overflow-x:auto;padding:8px 14px;gap:5px;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-behavior:smooth}
.tabs::-webkit-scrollbar{display:none}
.tarr{position:absolute;top:0;bottom:0;width:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5}
.tarr.l{left:0;background:linear-gradient(to right,var(--sf) 50%,transparent)}
.tarr.r{right:0;background:linear-gradient(to left,var(--sf) 50%,transparent)}
.tarr svg{width:14px;height:14px;stroke:var(--ink3);stroke-width:2.5;fill:none}
.tab{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--bd);color:var(--ink3);white-space:nowrap;transition:all .15s;flex-shrink:0;user-select:none}
.tab:hover{border-color:var(--gr);color:var(--dk)}
.tab.t-step{background:var(--cream);border-color:var(--cb);color:var(--cdp)}
.tab.t-all{background:var(--cream);border-color:var(--cd);color:var(--cdp);font-weight:900}
.tab.t-cat{background:var(--sf);border-color:var(--bd);color:var(--ink3)}
.tab.act{background:var(--dk)!important;color:#fff!important;border-color:var(--dk)!important;box-shadow:0 2px 8px rgba(22,78,51,.25)}
.tsep{width:1.5px;background:var(--bd);flex-shrink:0;align-self:stretch;margin:0 3px;border-radius:1px}
.tei{background:transparent;border:none;font-weight:700;font-size:12px;color:inherit;font-family:inherit;width:78px;outline:none;cursor:text}

/* GRID */
.main{flex:1;overflow-y:auto;padding:11px 13px;-webkit-overflow-scrolling:touch}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px}
.empty{text-align:center;padding:70px 20px;color:var(--ink4)}
.empty-ico{font-size:38px;margin-bottom:10px}

/* CARD */
.card{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:10px;display:flex;gap:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;position:relative;box-shadow:var(--sh)}
.card:hover{border-color:var(--cb);background:var(--cream);box-shadow:0 4px 14px rgba(22,78,51,.08)}
.card.sel{border-color:var(--gr);background:#F2FCE4;border-width:2px}
.card-chk{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;border:2px solid var(--bd);background:#fff;display:grid;place-items:center;transition:all .18s;z-index:2}
.card.sel .card-chk{background:var(--gr);border-color:var(--gr)}
.chk-ico{font-size:11px;font-weight:900;color:#fff;display:none}
.card.sel .chk-ico{display:block}
.card-img{width:82px;height:68px;flex-shrink:0;border-radius:var(--r3);border:1.5px solid var(--bd);overflow:hidden;background:#F8FAFC;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:contain;transition:opacity .2s}
.no-img{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink4);font-size:9px;text-align:center}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.card-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.card-id{font-size:10px;font-weight:700;background:var(--cream);color:var(--cdp);padding:2px 6px;border-radius:4px;border:1px solid var(--cb)}
.card-cat{font-size:10px;color:var(--ink4)}
.card-name{font-size:13px;font-weight:900;color:var(--dk);line-height:1.35;margin-bottom:3px}
.card-specs{display:flex;gap:5px;flex-wrap:wrap}
.sp{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.sp-s{background:var(--cream);color:var(--cdp);border:1px solid var(--cb)}
.sp-m{background:#F0F7E6;color:#2A5A1A;border:1px solid #C5DF98}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.sel-chip{font-size:10px;background:var(--dk);color:#fff;padding:3px 8px;border-radius:20px;font-weight:700}
.qty-row{display:flex;align-items:center;gap:6px}
.qbtn{width:25px;height:25px;border-radius:50%;border:1.5px solid var(--bd);background:#fff;cursor:pointer;font-size:15px;display:grid;place-items:center;color:var(--ink3);font-family:inherit;transition:all .15s;flex-shrink:0}
.qbtn:hover{border-color:var(--gr);color:var(--gr);background:#F2FCE4}
.qnum{font-size:20px;font-weight:900;color:var(--dk);min-width:24px;text-align:center}
.del-btn{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:11px;cursor:pointer;display:none;place-items:center;z-index:3;font-family:inherit}
.is-admin .card:hover .del-btn{display:grid}
.dh{position:absolute;top:50%;left:-10px;transform:translateY(-50%);width:18px;height:26px;background:#fff;border:1px solid var(--bd);border-radius:4px;display:none;align-items:center;justify-content:center;cursor:grab;color:var(--ink4);font-size:13px;box-shadow:var(--sh);z-index:3;user-select:none}
.is-admin .card:hover .dh{display:flex}
.dh:active{cursor:grabbing}
.card.dragging{opacity:.35;border-style:dashed}
.card.drag-over{border-color:var(--gr)!important;background:#EAF9D6!important;border-width:2px!important}
.ai{background:var(--cream);border:1.5px dashed var(--cd);border-radius:4px;color:var(--cdp);padding:3px 6px;font-size:13px;font-weight:900;width:100%;font-family:inherit;outline:none}
.as{background:transparent;border:none;border-bottom:1.5px dashed #CBD5E1;font-size:10px;width:50px;font-family:inherit;outline:none;color:inherit;padding:1px 2px}
.aid{font-size:10px;font-weight:700;background:var(--cream);border:1.5px dashed var(--cd);border-radius:4px;color:var(--cdp);padding:2px 5px;width:56px;font-family:inherit;outline:none}
.aid::placeholder{color:var(--cb);opacity:.8}
.step-btn{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--cream);color:var(--cdp);border:1px solid var(--cb);cursor:pointer;font-family:inherit;white-space:nowrap}
.step-btn:hover{background:#FEF0C0}

/* FOOTER */
.footer{background:var(--sf);border-top:1.5px solid var(--bd);padding:10px 13px;flex-shrink:0}
.ap{display:none;margin-bottom:8px;flex-wrap:wrap;gap:5px}
.ap.on{display:flex}
.foot-main{display:flex;gap:8px;align-items:stretch}
.rpt-btn{flex:1;background:var(--dk);color:#fff;border:none;padding:12px 13px;border-radius:var(--r2);font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s;box-shadow:0 4px 14px rgba(22,78,51,.2)}
.rpt-btn:hover{background:#1E6840}
.badge{background:rgba(255,255,255,.22);border-radius:20px;padding:3px 10px;font-size:13px;font-weight:900;min-width:26px;text-align:center}
.hist-btn{background:var(--cream);color:var(--cdp);border:1.5px solid var(--cb);padding:12px 10px;border-radius:var(--r2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.rst-btn{background:var(--cream);color:var(--cdp);border:1.5px solid var(--cb);padding:12px 11px;border-radius:var(--r2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap}
.rst-btn:hover{background:#FEF0C0}

/* OVERLAY / SHEET */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9000;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:#fff;width:100%;max-width:700px;border-radius:20px 20px 0 0;padding:17px;max-height:92vh;overflow-y:auto;animation:up .26s cubic-bezier(.2,.7,0,1.1)}
@keyframes up{from{transform:translateY(56px);opacity:0}to{transform:translateY(0);opacity:1}}
.sh{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 13px;display:block}
.st{font-size:17px;font-weight:900;color:var(--dk);text-align:center;margin-bottom:12px}
.rpt-meta{display:flex;justify-content:space-around;font-size:12px;color:var(--ink3);padding:8px 0;background:var(--cream);border-radius:var(--r3);margin-bottom:11px;border:1px solid var(--cb)}
.rpt-meta span{display:flex;flex-direction:column;align-items:center;gap:2px;padding:3px 9px}
.rpt-meta strong{font-size:13px;color:var(--ink);font-weight:700}
.ri{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:.5px solid #F1F5F9}
.ri:last-child{border:none}
.rn{font-size:11px;font-weight:700;color:var(--ink4);min-width:16px;text-align:center}
.rimg{width:48px;height:40px;border-radius:5px;border:1px solid var(--bd);object-fit:contain;background:#F8FAFC;flex-shrink:0}
.rinfo{flex:1;min-width:0}
.rname{font-size:13px;font-weight:900;color:var(--ink)}
.rspec{font-size:11px;color:var(--ink3);margin-top:1px}
.rqty{font-size:22px;font-weight:900;color:var(--dk);min-width:30px;text-align:right}
.rtot{display:flex;justify-content:space-between;padding:9px 13px;background:var(--dk);color:#fff;border-radius:var(--r3);margin-top:9px;font-size:13px;font-weight:700}
.rtot strong{color:#A8D96A;font-size:15px}
.ma{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.mbtn{padding:12px;border-radius:var(--r3);font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.mhint{font-size:11px;color:var(--ink4);text-align:center;margin-top:5px;line-height:1.6;padding:0 6px}

/* HIST */
.hrec{background:#FAFAFA;border:1.5px solid #E2E8F0;border-radius:10px;margin-bottom:9px;overflow:hidden}
.hh{background:var(--dk);color:#fff;padding:7px 11px;display:flex;justify-content:space-between;align-items:center}
.hsub{padding:5px 10px;background:var(--cream);border-bottom:.5px solid var(--cb);font-size:11px;color:var(--ink3)}
.hrow{display:flex;justify-content:space-between;padding:4px 10px;font-size:12px;border-bottom:.5px solid #F1F5F9}
.hrow:last-child{border:none}
.hfoot{padding:5px 10px;text-align:right}

/* PRINT */
@media print{
  html,body{height:auto!important;overflow:visible!important}
  body>*:not(#pcon){display:none!important}
  #pcon{display:block!important}
  tr{page-break-inside:avoid}
  @page{margin:12mm}
}
#pcon{display:none}

/* IMG OVERLAY */
#img-ov{display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.88);flex-direction:column;align-items:center;justify-content:center;padding:18px}

/* TOAST */
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:rgba(22,78,51,.92);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:99998;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}

/* MSG MODAL */
#msg-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:99999;display:none;align-items:center;justify-content:center;padding:16px}
#msg-ov.on{display:flex}
.msg-box{background:#fff;width:100%;max-width:440px;border-radius:16px;padding:20px}
#msg-title{font-size:17px;font-weight:900;margin-bottom:10px}
#msg-body{font-size:13px;color:var(--ink3);line-height:1.7}
.msg-ok{width:100%;margin-top:16px;padding:12px;background:var(--dk);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* SCROLLBAR */
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:#C5DF98;border-radius:2px}
.sheet::-webkit-scrollbar{width:3px}
.sheet::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>

<div id="pcon"></div>
<div class="toast" id="toast"></div>

<!-- MSG MODAL -->
<div id="msg-ov">
  <div class="msg-box">
    <div id="msg-title"></div>
    <div id="msg-body"></div>
    <button class="msg-ok" onclick="closeMsgOv()">確認</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo" id="logo-el">🦺</div>
    <div>
      <div class="hdr-title" id="title-el">工安標語採購系統</div>
      <div class="hdr-ver">鈺通營造 Construction Safety</div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="sdot off" id="sdot" title="雲端同步狀態"></div>
    <button class="abtn" id="abtn" onclick="toggleAdmin()">🔒 管理員</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="ctrl">
  <div class="ctrl-g">
    <select id="site-sel" onchange="saveLocal()"></select>
    <button class="btn btn-dk" onclick="addSite()">＋</button>
  </div>
  <input type="text" id="staff-in" placeholder="填單人員" style="width:105px" oninput="saveLocal()">
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tarr l" onclick="scrollTabs(-130)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
  <div class="tabs" id="tabs-el"></div>
  <div class="tarr r" onclick="scrollTabs(130)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
</div>

<!-- GRID -->
<div class="main" id="main-area">
  <div class="grid" id="grid-el"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="ap" id="ap">
    <button class="btn btn-dk" onclick="addSign()">+ 新增標語</button>
    <button class="btn btn-dk" onclick="addStep()">+ 新增工序</button>
    <button class="btn btn-dk" onclick="addCat()">+ 新增類別</button>
    <button class="btn btn-blue" onclick="exportJSON()">📤 備份</button>
    <button class="btn btn-pu" onclick="importJSON()">📥 還原</button>
    <button class="btn btn-red" onclick="delSite()">🗑 刪除工地</button>
    <button class="btn btn-cr" onclick="cfgImgBase()">🖼 圖片路徑</button>
    <button class="btn btn-cr" onclick="changeLogo()">🏷 更換圖示</button>
    <button class="btn btn-cr" onclick="cfgCloud()">☁️ 雲端設定</button>
    <button class="btn btn-cr" onclick="pushCloud()">⬆️ 推送雲端</button>
    <button class="btn btn-cr" onclick="pullCloud(false)">⬇️ 從雲端同步</button>
  </div>
  <div class="foot-main">
    <button class="rpt-btn" onclick="buildReport()">
      <span>📋 生成採購單</span>
      <span class="badge" id="badge">0</span>
    </button>
    <button class="hist-btn" onclick="showHist()">📦<br>紀錄</button>
    <button class="rst-btn" onclick="resetCart()">清除<br>重選</button>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="ov" id="rpt-ov">
  <div class="sheet" id="rpt-box">
    <span class="sh"></span>
    <div class="st" id="rpt-title"></div>
    <div class="rpt-meta" id="rpt-meta"></div>
    <div id="rpt-list"></div>
    <div class="rtot" id="rpt-tot"></div>
    <div style="margin-top:9px">
      <div style="font-size:12px;font-weight:700;color:var(--dk);margin-bottom:4px">備註（選填）</div>
      <input id="note-in" type="text" placeholder="例：急件、請優先處理..." style="width:100%;font-size:12px;padding:8px 9px;border:1.5px solid var(--bd);border-radius:8px;background:var(--cream);font-family:inherit;outline:none">
    </div>
    <div class="ma">
      <button class="mbtn" style="background:var(--dk);color:#fff" onclick="doPrint()">🖨 列印 / 儲存 PDF</button>
      <button class="mbtn" style="background:var(--gr);color:#fff" onclick="genImg()">📥 儲存採購單圖片</button>
      <button class="mbtn" id="sub-btn" style="background:var(--cd);color:#fff" onclick="submitOrder()">📤 提交採購單至後台</button>
      <button class="mbtn" style="background:var(--cream);color:var(--cdp);border:1.5px solid var(--cb)" onclick="closeOv('rpt-ov')">← 返回編輯</button>
    </div>
    <div class="mhint" id="rpt-hint"></div>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="ov" id="hist-ov">
  <div class="sheet">
    <span class="sh"></span>
    <div class="st">📦 採購歷史紀錄</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px">
      <button class="btn btn-dk" onclick="expHistExcel()" style="flex:1">📊 匯出 Excel</button>
      <button class="btn btn-cr" onclick="expHistPdf()" style="flex:1">📄 列印 PDF</button>
      <button class="btn btn-red" onclick="clearHist()">🗑 清除</button>
      <button class="btn btn-dk" onclick="closeOv('hist-ov')" style="flex:1">← 關閉</button>
    </div>
    <div id="hist-list"></div>
  </div>
</div>

<!-- IMAGE OVERLAY -->
<div id="img-ov">
  <div style="font-size:13px;color:#fff;text-align:center;margin-bottom:12px;line-height:1.7">
    📱 <strong>手機：長按下方圖片 → 儲存至相簿</strong><br>

function computeIds(arr) {
  var cnt = {};
  return arr.map(function(item) {
    var c = item.cat || 'X';
    cnt[c] = (cnt[c] || 0) + 1;
    var auto = c + String(cnt[c]).padStart(2, '0');
    return Object.assign({}, item, {id: item.manualId || auto, _auto: auto});
  });
}
function getDB() { return computeIds(db); }
function ckey(item) { return item.cat + '::' + item.n; }

}

function toast(msg, ms) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('on'); }, ms || 2500);
}
function showMsg(title, body, type) {
  document.getElementById('msg-title').textContent = title;
  document.getElementById('msg-title').style.color = type === 'err' ? '#DC2626' : 'var(--dk)';
  document.getElementById('msg-body').innerHTML = String(body).replace(/\n/g,'<br>');

// ──────────────────────────────────────────

function renderLogo() {
  var el = document.getElementById('logo-el');
  el.className = 'hdr-logo' + (isAdmin ? ' ed' : '');
  el.innerHTML = logoSrc ? '<img src="'+logoSrc+'" alt="">' : '🦺';
  el.onclick = isAdmin ? changeLogo : null;
}
function changeLogo() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.style.cssText = 'position:fixed;top:-999px';
  inp.onchange = function(e) {
    var f = e.target.files[0]; if (!f) return;
    var rd = new FileReader();
    rd.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var MAX = 200, sc = Math.min(1, MAX / Math.max(img.width, img.height));
        var cv = document.createElement('canvas');
        cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        logoSrc = cv.toDataURL('image/png', 0.92);
        localStorage.setItem(LS+'logo', logoSrc);
        renderLogo(); toast('✅ 圖示已更新');
      };
      img.onerror = function(){ showMsg('錯誤','圖片讀取失敗','err'); };
      img.src = ev.target.result;
    };
    rd.readAsDataURL(f);
  };
  document.body.appendChild(inp); inp.click();
  setTimeout(function(){ if(inp.parentNode) inp.parentNode.removeChild(inp); }, 30000);
}

function renderTabs() {

      h += '<div class="tab t-step'+act+'" onclick="setTab(\''+k+'\')">'

         + '<span style="margin-left:2px;opacity:.5;font-size:10px;cursor:pointer" onclick="event.stopPropagation();delStep(\''+k+'\')">✕</span></div>';
    } else {
      h += '<div class="tab t-step'+act+'" onclick="setTab(\''+k+'\')">'+t+'</div>';
    }
  });
  h += '<span class="tsep"></span>';
  h += '<div class="tab t-all'+(curTab==='ALL'?' act':'')+'" onclick="setTab(\'ALL\')">📋 全部</div>';
  h += '<span class="tsep"></span>';
  catOrd.forEach(function(k) {
    if (!cats[k]) return;
    var act = curTab === k ? ' act' : '';
    if (isAdmin) {
      h += '<div class="tab t-cat'+act+'" onclick="setTab(\''+k+'\')">'
         + '<input class="tei" style="width:62px" value="'+esc(cats[k])+'" onclick="event.stopPropagation()" oninput="cats[\''+k+'\']=this.value;saveLocal()">'
         + '<span style="margin-left:2px;opacity:.45;font-size:10px;cursor:pointer" onclick="event.stopPropagation();delCat(\''+k+'\')">✕</span></div>';
    } else {
      h += '<div class="tab t-cat'+act+'" onclick="setTab(\''+k+'\')">'+cats[k]+'</div>';
    }
  });
  document.getElementById('tabs-el').innerHTML = h;
}

function setTab(t) {
  curTab = t; renderTabs(); render();
  requestAnimationFrame(function() {
    var el = document.querySelector('.tabs .tab.act');
    if (el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
}

// ──────────────────────────────────────────
// RENDER CARDS
// ──────────────────────────────────────────
function render() {
  var dbIds = getDB(), list;
  if (steps[curTab]) {
    var ids = steps[curTab].items;
    list = dbIds.filter(function(x){ return ids.indexOf(x.id) >= 0; });
  } else if (curTab === 'ALL') {
    // Sort by catOrd A->K, then preserve db order within category
    var omap = {};
    catOrd.forEach(function(k,i){ omap[k] = i; });
    list = dbIds.slice().sort(function(a,b) {
      var oa = omap[a.cat] !== undefined ? omap[a.cat] : 99;
      var ob = omap[b.cat] !== undefined ? omap[b.cat] : 99;
      if (oa !== ob) return oa - ob;
      return dbIds.indexOf(a) - dbIds.indexOf(b);
    });
  } else {
    list = dbIds.filter(function(x){ return x.cat === curTab; });
  }

  var grid = document.getElementById('grid-el');
  if (!list.length) {
    var hint = (steps[curTab] && isAdmin)
      ? '此工序尚無標語<br><small style="font-size:12px;color:var(--ink3);display:block;margin-top:6px">切換至分類 Tab，點卡片右下角 <b>Step</b> 按鈕可加入</small>'
      : '此分類暫無標語';
    grid.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div><div style="font-size:14px;color:var(--ink4)">'+hint+'</div></div>';
    document.getElementById('main-area').classList.remove('is-admin');
    return;
  }
  grid.innerHTML = '';
  list.forEach(function(item) {
    var st = cget(item);
    var d = document.createElement('div');
    d.className = 'card' + (st.sel ? ' sel' : '');
    var imgUrl = imgBase + item.id + '.jpg';

    var idBadge = isAdmin
      ? '<input class="aid" value="'+esc(item.manualId||'')+'" placeholder="'+esc(item._auto)+'" title="手動編號（空=自動）" oninput="setManId(\''+item.cat+'\',\''+escQ(item.n)+'\',this.value)">'
      : '<span class="card-id">'+item.id+'</span>';

    var namePart = isAdmin
      ? '<input class="ai" value="'+esc(item.n)+'" oninput="updName(\''+item.cat+'\',\''+escQ(item.n)+'\',this.value)">'
      : '<div class="card-name">'+item.n+'</div>';
    var specS = isAdmin
      ? '<input class="as sp sp-s" value="'+esc(item.s)+'" oninput="updField(\''+item.cat+'\',\''+escQ(item.n)+'\',\'s\',this.value)">'
      : '<span class="sp sp-s">'+item.s+'</span>';
    var specM = isAdmin
      ? '<input class="as sp sp-m" value="'+esc(item.m)+'" oninput="updField(\''+item.cat+'\',\''+escQ(item.n)+'\',\'m\',this.value)">'
      : '<span class="sp sp-m">'+item.m+'</span>';

    var stepBtnHtml = isAdmin
      ? '<button class="step-btn" onclick="event.stopPropagation();addToStep(\''+item.id+'\')">Step</button>' : '';
    var delBtnHtml = isAdmin
      ? '<button class="del-btn" onclick="event.stopPropagation();delItem(\''+item.cat+'\',\''+escQ(item.n)+'\')">✕</button>' : '';
    var dhHtml = isAdmin ? '<div class="dh">&#x22BF;</div>' : '';

    d.innerHTML = dhHtml + delBtnHtml
      + '<div class="card-chk"><span class="chk-ico">✓</span></div>'
      + '<div class="card-img">'
      + '<img src="'+imgUrl+'" onload="this.style.opacity=1" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" style="opacity:0;transition:opacity .2s" alt="">'
      + '<div class="no-img" style="display:none"><span style="font-size:18px">🖼</span>'+item.id+'<br>無圖</div>'
      + '</div>'
      + '<div class="card-body"><div>'
      + '<div class="card-meta">'+idBadge+'<span class="card-cat">'+( cats[item.cat]||item.cat)+'</span></div>'
      + namePart
      + '<div class="card-specs">'+specS+specM+'</div>'

      + (st.sel ? '<span class="sel-chip">✓ 已選取</span>' : '<span></span>')

      + stepBtnHtml
      + '<button class="qbtn" onclick="adjQty(\''+item.cat+'\',\''+escQ(item.n)+'\',-1)">&#8722;</button>'
      + '<span class="qnum">'+(st.qty||1)+'</span>'
      + '<button class="qbtn" onclick="adjQty(\''+item.cat+'\',\''+escQ(item.n)+'\',1)">＋</button>'
      + '</div></div></div>';

      if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && !e.target.classList.contains('dh'))

function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function escQ(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ──────────────────────────────────────────
// DRAG REORDER
// ──────────────────────────────────────────
var _dsc = null, _dsn = null;
function onDragStart(e) {
  _dsc = this.dataset.cat; _dsn = this.dataset.name;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e)  { e.preventDefault(); this.classList.add('drag-over'); }
function onDragLeave()  { this.classList.remove('drag-over'); }
function onDragEnd()    { this.classList.remove('dragging'); document.querySelectorAll('.card').forEach(function(c){ c.classList.remove('drag-over'); }); }
function onDrop(e) {
  e.preventDefault(); this.classList.remove('drag-over');
  var tc = this.dataset.cat, tn = this.dataset.name;
  if (_dsn === tn) return;
  var si = db.findIndex(function(x){ return x.cat===_dsc && x.n===_dsn; });
  var ti = db.findIndex(function(x){ return x.cat===tc  && x.n===tn; });
  if (si < 0 || ti < 0) return;
  var moved = db.splice(si, 1)[0];
  // if different cat, change cat
  if (_dsc !== tc) { moved.cat = tc; delete moved.manualId; }
  var newTi = db.findIndex(function(x){ return x.cat===tc && x.n===tn; });
  db.splice(newTi, 0, moved);
  saveLocal(); if (_dsc !== tc) renderTabs(); render();
}

function toggleItem(cat, n) {
  var item = db.find(function(x){ return x.cat===cat && x.n===n; });
  if (!item) return;
  var k = ckey(item);
  if (!cart[k]) cart[k] = {sel:false,qty:1};
  cart[k].sel = !cart[k].sel;
  render(); updateBadge();
}
function adjQty(cat, n, d) {
  event.stopPropagation();
  var item = db.find(function(x){ return x.cat===cat && x.n===n; });
  if (!item) return;
  var k = ckey(item);
  if (!cart[k]) cart[k] = {sel:true,qty:1};
  cart[k].qty = Math.max(1, (cart[k].qty||1) + d);
  if (d > 0 && !cart[k].sel) cart[k].sel = true;
  render(); updateBadge();
}
function updateBadge() {
  document.getElementById('badge').textContent = getDB().filter(function(x){ return cget(x).sel; }).length;
}
function resetCart() {
  if (!confirm('確認清除所有選取？')) return;

}

function updName(cat, old, nv) {

function updField(cat, n, f, v) {

function setManId(cat, n, val) {

// ──────────────────────────────────────────
// ADD SIGN / STEP / CAT
// ──────────────────────────────────────────
function addSign() {
  var catStr = catOrd.filter(function(k){ return cats[k]; }).map(function(k,i){ return (i+1)+'. '+cats[k]+' ('+k+')'; }).join('\n');
  var ch = prompt('選擇類別代碼（如 A）：\n\n'+catStr); if (!ch) return;
  var cat = ch.toUpperCase().trim();
  if (!cats[cat]) {
    if (!confirm('類別「'+cat+'」不存在，要自動建立嗎？')) return;
    cats[cat] = cat+'. 新分類'; catOrd.push(cat);
  }
  var nm = prompt('在「'+cats[cat]+'」中新增標語名稱：'); if (!nm||!nm.trim()) return;
  var name = nm.trim();
  // Detect duplicate
  var dbIds = getDB();
  var same = dbIds.filter(function(x){ return x.cat===cat && x.n===name; });
  var manId = undefined;
  if (same.length) {
    var existId = same[same.length-1].manualId || same[same.length-1].id;
    var sug = existId+'-1';
    var ans = prompt('「'+name+'」在 '+cat+' 類已存在（'+existId+'）\n建議新編號：'+sug+'\n（可修改或留空自動編號）', sug);
    if (ans === null) return;
    if (ans.trim()) manId = ans.trim();
  }
  var newItem = {cat:cat, n:name, s:'60x40', m:'中空板'};
  if (manId) newItem.manualId = manId;
  db.push(newItem);
  saveLocal(); renderTabs(); render(); setTab(cat);
}
function addStep() {
  var t = prompt('工序標籤名稱（含emoji）：', '🔧 Step'+(Object.keys(steps).length+1)+' 新工序');
  if (!t) return;
  var k = 'S'+(Object.keys(steps).length+1);
  while (steps[k]) k = 'S'+(parseInt(k.slice(1))+1);
  steps[k] = {t:t, items:[]};
  saveLocal(); renderTabs(); setTab(k);
}
function delStep(k) {
  if (!confirm('確定刪除工序「'+steps[k].t+'」？')) return;
  delete steps[k];
  if (curTab === k) curTab = 'ALL';
  saveLocal(); renderTabs(); render();
}
function addCat() {
  var k = prompt('新類別代碼（單一英文字母）：'); if (!k) return;
  k = k.toUpperCase().trim();
  if (cats[k]) { showMsg('錯誤','此類別已存在','err'); return; }
  var label = prompt('類別顯示名稱：', k+'. 新類別'); if (!label) return;
  cats[k] = label; catOrd.push(k);
  saveLocal(); renderTabs(); setTab(k);
}
function delCat(k) {
  if (db.some(function(x){ return x.cat===k; })) { showMsg('無法刪除','此類別尚有標語，請先移除所有標語後再刪除。','err'); return; }
  if (!confirm('確定刪除類別「'+cats[k]+'」？')) return;
  delete cats[k]; catOrd = catOrd.filter(function(c){ return c !== k; });
  if (curTab === k) curTab = 'ALL';
  saveLocal(); renderTabs(); render();
}

// ──────────────────────────────────────────
// ADD TO STEP
// ──────────────────────────────────────────
function addToStep(itemId) {
  var sk = Object.keys(steps).sort();
  var lines = sk.map(function(k,i) {
    var already = steps[k].items.indexOf(itemId) >= 0;
    return (i+1)+'. '+steps[k].t + (already ? ' (已加入)' : '');
  });
  var ch = prompt('將 ['+itemId+'] 加入哪個 Step？\n輸入數字，多個用逗號\n輸入「移除」可從所有 Step 移除\n\n'+lines.join('\n'));
  if (!ch) return;
  if (ch.trim() === '移除') {
    var rm = 0;
    sk.forEach(function(k) {
      var i = steps[k].items.indexOf(itemId);
      if (i >= 0) { steps[k].items.splice(i,1); rm++; }
    });
    saveLocal(); render(); toast(rm > 0 ? '已從所有 Step 移除' : '此項目不在任何 Step 中');
    return;
  }
  var nums = ch.split(',').map(function(s){ return parseInt(s.trim())-1; }).filter(function(n){ return n>=0 && n<sk.length; });
  if (!nums.length) { showMsg('輸入錯誤','請輸入有效數字','err'); return; }
  var added = 0;
  nums.forEach(function(n) {
    var k = sk[n];
    if (steps[k].items.indexOf(itemId) < 0) { steps[k].items.push(itemId); added++; }
  });
  saveLocal(); render(); toast(added > 0 ? '✅ 已加入 Step！' : '此項目已在選擇的 Step 中');
}

// ──────────────────────────────────────────
// GENERATE IMAGE
// ──────────────────────────────────────────
function genImg() {
  if (!_sel) return;
  var W=660, rowH=36, hdrH=155;
  var totalH = hdrH + _sel.length*rowH + 48;
  var cv = document.createElement('canvas');
  var dpr = 2;
  cv.width = W*dpr; cv.height = totalH*dpr;
  var ctx = cv.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.font = "400 13px 'Noto Sans TC',sans-serif";

  // bg
  ctx.fillStyle='#FFFDF5'; ctx.fillRect(0,0,W,totalH);

  // header
  ctx.fillStyle='#164E33';
  rrect(ctx,12,12,W-24,50,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font="900 15px 'Noto Sans TC',sans-serif";
  ctx.textAlign='left'; ctx.fillText(config.title+' 採購單',24,45);
  ctx.font="400 11px 'Noto Sans TC',sans-serif"; ctx.textAlign='right';
  ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fillText(_now,W-24,45);

  // meta
  var my=72;
  ctx.fillStyle='#FEF8E6';
  rrect(ctx,12,my,W-24,42,6); ctx.fill();
  ctx.strokeStyle='#E2C96A'; ctx.lineWidth=1;
  rrect(ctx,12,my,W-24,42,6); ctx.stroke();
  var metas=[['工地名稱',_site],['負責人員',_staff],['填單日期',_now]];
  var cw=(W-24)/3;
  metas.forEach(function(m,i){
    var cx=12+i*cw;
    ctx.fillStyle='#94A3B8'; ctx.font="400 9px 'Noto Sans TC',sans-serif";
    ctx.textAlign='left'; ctx.fillText(m[0],cx+9,my+14);
    ctx.fillStyle='#0F172A'; ctx.font="700 12px 'Noto Sans TC',sans-serif";
    ctx.fillText(m[1],cx+9,my+32);
    if(i<2){ctx.beginPath();ctx.strokeStyle='#E2C96A';ctx.lineWidth=.8;ctx.moveTo(cx+cw,my+5);ctx.lineTo(cx+cw,my+37);ctx.stroke();}
  });

  // table header
  var ty=124;
  ctx.fillStyle='#FEF8E6'; ctx.fillRect(12,ty,W-24,24);
  ctx.strokeStyle='#E2C96A'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(12,ty+24); ctx.lineTo(W-12,ty+24); ctx.stroke();
  var cols=[{l:'#',w:24,a:'center'},{l:'編號',w:46,a:'left'},{l:'名稱',w:W-24-24-46-52-52-40,a:'left'},{l:'規格',w:52,a:'left'},{l:'材質',w:52,a:'left'},{l:'數量',w:40,a:'right'}];
  var cx2=12;
  ctx.fillStyle='#164E33'; ctx.font="700 10px 'Noto Sans TC',sans-serif";
  cols.forEach(function(col){
    ctx.textAlign=col.a;
    var tx=col.a==='right'?cx2+col.w-4:col.a==='center'?cx2+col.w/2:cx2+5;
    ctx.fillText(col.l,tx,ty+17); cx2+=col.w;
  });

  // rows
  _sel.forEach(function(item,idx){
    var ry=ty+24+idx*rowH;
    ctx.fillStyle=idx%2===0?'#fff':'#FEFDF8'; ctx.fillRect(12,ry,W-24,rowH);
    ctx.strokeStyle='#F1F5F9'; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(12,ry+rowH); ctx.lineTo(W-12,ry+rowH); ctx.stroke();
    var qty=cget(item).qty||1;
    var vals=[idx+1,item.id,item.n,item.s,item.m,qty];
    var cx3=12;
    cols.forEach(function(col,ci){
      ctx.fillStyle=ci===1||ci===5?'#164E33':'#0F172A';
      ctx.font=(ci===2?'900':(ci===0||ci===5?'700':'400'))+' '+(ci===5?'16':'12')+"px 'Noto Sans TC',sans-serif";
      ctx.textAlign=col.a;
      var tx=col.a==='right'?cx3+col.w-4:col.a==='center'?cx3+col.w/2:cx3+5;
      var txt=String(vals[ci]);
      var maxW=col.w-8;
      if(ctx.measureText(txt).width>maxW){while(txt.length>1&&ctx.measureText(txt+'...').width>maxW)txt=txt.slice(0,-1);txt+='...';}
      ctx.fillText(txt,tx,ry+rowH/2+5);
      cx3+=col.w;
    });
  });

  // footer
  var fy=ty+24+_sel.length*rowH+6;
  ctx.fillStyle='#164E33'; rrect(ctx,12,fy,W-24,34,6); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font="700 13px 'Noto Sans TC',sans-serif";
  ctx.textAlign='left'; ctx.fillText('合計 '+_sel.length+' 品項',22,fy+23);
  ctx.textAlign='right'; ctx.fillText('合計 '+_totQty+' 件',W-22,fy+23);

  var dataUrl = cv.toDataURL('image/png');
  var isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  if (isMobile) {
    document.getElementById('rpt-img').src = dataUrl;
    document.getElementById('img-ov').style.display = 'flex';
  } else {
    var a = document.createElement('a'); a.href = dataUrl;
    a.download = '採購單_'+_site+'_'+_now.replace(/\//g,'-')+'.png';
    a.click(); toast('📥 圖片已下載');
  }
}
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ──────────────────────────────────────────
// CLOUD (JSONP - CORS-free)
// ──────────────────────────────────────────
function updateDot() {
  var d = document.getElementById('sdot');
  d.className = 'sdot' + (gsUrl ? '' : ' off');
  d.title = gsUrl ? '雲端已連線' : '未設定雲端';
}
function setDot(s) {
  document.getElementById('sdot').className = 'sdot' + (s==='sync'?' sync':s==='off'?' off':'');
}

function jsonpCall(url, ms) {
  return new Promise(function(resolve, reject) {
    var cb = '__g'+Date.now()+'_'+Math.random().toString(36).slice(2);
    var el = document.createElement('script');
    var t = setTimeout(function(){
      cleanup(); reject(new Error('逾時15秒。請確認：\n①已部署為網頁應用程式\n②存取對象=所有人（包含匿名）\n③網址結尾是/exec'));
    }, ms || 15000);
    function cleanup(){ clearTimeout(t); el.parentNode && el.parentNode.removeChild(el); delete window[cb]; }
    window[cb] = function(d){ cleanup(); resolve(d); };
    el.src = url + (url.indexOf('?')>=0?'&':'?') + 'callback=' + cb;
    el.onerror = function(){ cleanup(); reject(new Error('Script載入失敗，請確認Apps Script網址正確且已部署')); };
    document.head.appendChild(el);
  });
}

function gasGet(params) {
  if (!gsUrl) return Promise.resolve(null);
  setDot('sync');
  var pw = localStorage.getItem(LS+'apw') || '751113';
  var all = Object.assign({}, params, {pw:pw});
  var qs = Object.keys(all).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(typeof all[k]==='object'?JSON.stringify(all[k]):String(all[k])); }).join('&');
  return jsonpCall(gsUrl+'?'+qs).then(function(d){ setDot(''); return d; }).catch(function(e){ setDot('off'); return {ok:false,error:e.message}; });
}

function gasSend(action, extra) {
  if (!gsUrl) return Promise.resolve({ok:false,error:'未設定雲端'});
  setDot('sync');
  var pw = localStorage.getItem(LS+'apw') || '751113';
  var json = JSON.stringify(Object.assign({action:action}, extra, {pw:pw}));
  var enc = btoa(unescape(encodeURIComponent(json)));
  return jsonpCall(gsUrl+'?encoded='+encodeURIComponent(enc))
    .then(function(d){ setDot(''); return d; })
    .catch(function(e){ setDot('off'); return {ok:false,error:e.message}; });
}

function cfgCloud() {
  var v = prompt('請輸入 Google Apps Script 網址\n（結尾須為 /exec）：', gsUrl||'');
  if (v === null) return;
  var pw = prompt('管理員密碼（雲端用）：', localStorage.getItem(LS+'apw')||'751113');
  if (pw === null) return;
  gsUrl = v.trim();
  localStorage.setItem(LS+'gsUrl', gsUrl);
  if (pw.trim()) localStorage.setItem(LS+'apw', pw.trim());
  updateDot();
  if (gsUrl) {
    toast('☁️ 設定已儲存，測試連線中...', 5000);
    gasGet({action:'ping'}).then(function(d){
      if (d && d.ok) showMsg('✅ 連線成功','Apps Script 回應正常！\n\n現在可以推送雲端。','ok');
      else showMsg('⚠️ 連線失敗', (d?d.error:'無回應')+'\n\n請確認：\n①貼上 GoogleAppsScript_v3.js\n②部署選「新版本」\n③存取對象=所有人（包含匿名）', 'err');
    });
  }
}

function pushCloud() {
  if (!gsUrl) { cfgCloud(); return; }
  toast('⬆️ 推送中，請稍候...', 15000);
  var payload = {
    db: db.map(function(x){ var r={cat:x.cat,n:x.n,s:x.s,m:x.m}; if(x.manualId) r.manualId=x.manualId; return r; }),
    sites:sites, config:config, stepData:steps, cats:cats, catOrder:catOrd, imgBase:imgBase
  };
  gasSend('saveAll', {data:payload}).then(function(res) {
    if (res && res.ok) {
      showMsg('✅ 推送成功','資料已同步至 Google Sheets！\n採購人員重新整理頁面即可看到最新內容。','ok');
      toast('✅ 推送成功！', 4000);
    } else {
      var m = res ? res.error : '未收到回應（可能逾時）';
      showMsg('⚠️ 推送失敗', m+'\n\n請確認：\n①Apps Script 已貼上 v3 並重新部署（選新版本）\n②存取對象=所有人（包含匿名）\n③網址結尾是/exec', 'err');
    }
  });
}

function pullCloud(silent) {
  if (!gsUrl) { if (!silent) cfgCloud(); return; }
  if (!silent) toast('⬇️ 同步中...', 10000);
  gasGet({action:'loadAll'}).then(function(res) {
    if (!res || !res.ok) {
      if (!silent) showMsg('⚠️ 同步失敗', (res?res.error:'逾時或無回應')+'\n\n請確認雲端設定正確。', 'err');
      return;
    }
    var v;
    v = res.db;       if (v && v.length && v[0].cat) db = v;
    v = res.sites;    if (v && v.length) sites = v;
    v = res.config;   if (v && v.title) config = v;
    v = res.steps || res.stepData;
    if (v && !Array.isArray(v) && Object.keys(v).length) steps = v;
    v = res.cats;     if (v && !Array.isArray(v) && Object.keys(v).length) cats = v;
    v = res.catOrder; if (v && v.length) catOrd = v;
    v = res.imgBase;  if (v && v.startsWith('http')) imgBase = v;
    if (res.logo && res.logo.length > 5) { logoSrc = res.logo; localStorage.setItem(LS+'logo', logoSrc); }
    saveLocal();
    renderLogo(); renderTitle(); renderSites(); renderTabs(); render(); updateBadge();
    if (!silent) showMsg('✅ 同步成功','已載入雲端最新資料。','ok');
  });
}

// ADMIN
// ──────────────────────────────────────────
function toggleAdmin() {
  if (!isAdmin) {
    var pw = prompt('請輸入管理員密碼：');
    if (pw === '751113') {
      isAdmin = true;
      document.getElementById('abtn').textContent = '🔓 管理中';
      document.getElementById('abtn').classList.add('on');
      document.getElementById('ap').classList.add('on');
    } else if (pw !== null) { toast('密碼錯誤'); }
  } else {
    isAdmin = false;
    document.getElementById('abtn').textContent = '🔒 管理員';
    document.getElementById('abtn').classList.remove('on');
    document.getElementById('ap').classList.remove('on');
  }
  renderLogo(); renderTitle(); renderTabs(); render();
}

// ──────────────────────────────────────────
// PERSISTENCE
// ──────────────────────────────────────────
function saveLocal() {
  localStorage.setItem(LS+'db',    JSON.stringify(db));
  localStorage.setItem(LS+'sites', JSON.stringify(sites));
  localStorage.setItem(LS+'cfg',   JSON.stringify(config));
  localStorage.setItem(LS+'cats',  JSON.stringify(cats));
  localStorage.setItem(LS+'cord',  JSON.stringify(catOrd));
  localStorage.setItem(LS+'steps', JSON.stringify(steps));
  localStorage.setItem(LS+'staff', document.getElementById('staff-in').value);
  localStorage.setItem(LS+'site',  document.getElementById('site-sel').value);
}
function cfgImgBase() {
  var v = prompt('圖片路徑 Base URL（以 / 結尾）：', imgBase);
  if (v !== null && v.trim()) { imgBase = v.trim(); localStorage.setItem(LS+'imgBase', imgBase); render(); }
}
function exportJSON() {
  var d = {db:db, sites:sites, config:config, stepData:steps, cats:cats, catOrder:catOrd, imgBase:imgBase, logoSrc:logoSrc};
  var b = new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(b);
  a.download = '工安標語備份_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importJSON() {
  var j = prompt('貼上備份 JSON：'); if (!j) return;
  try {
    var d = JSON.parse(j);
    if (d.db) db = d.db;
    if (d.sites) sites = d.sites;
    if (d.config) config = d.config;
    if (d.stepData) steps = d.stepData;
    if (d.cats) cats = d.cats;
    if (d.catOrder) catOrd = d.catOrder;
    if (d.imgBase) imgBase = d.imgBase;
    if (d.logoSrc) { logoSrc = d.logoSrc; localStorage.setItem(LS+'logo', logoSrc); }
    saveLocal(); location.reload();
  } catch(e) { showMsg('格式錯誤','請確認備份檔案','err'); }
}
