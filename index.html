<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--yt-bg); 
            padding-bottom: 180px; 
            touch-action: manipulation; /* 解決手機點擊延遲 */
        }
        .header-container { background-color: var(--yt-dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .main-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.1em; }
        .admin-btn { background: white; color: var(--yt-dark); padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 3px solid var(--yt-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* 滾動選單優化 */
        .cat-tab-step { white-space: nowrap; padding: 8px 14px; border-radius: 10px; background: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; flex-shrink: 0; border: 2px solid var(--yt-dark); }
        .cat-tab-step.active { background: var(--yt-light); border-color: var(--yt-light); }
        .cat-tab-item { white-space: nowrap; padding: 8px 14px; border-radius: 10px; background: white; color: #475569; font-size: 13px; font-weight: 800; cursor: pointer; border: 2px solid #e2e8f0; flex-shrink: 0; }
        .cat-tab-item.active { background: #E6F4F1; color: var(--yt-dark); border-color: var(--yt-dark); }

        /* 卡片優化：增加觸控反饋 */
        .grid-container { display: grid; gap: 12px; padding: 12px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .sign-card { background: white; border-radius: 15px; padding: 12px; border: 1px solid #D7CCC8; display: flex; gap: 10px; cursor: pointer; position: relative; transition: transform 0.1s, box-shadow 0.1s; -webkit-tap-highlight-color: transparent; }
        .sign-card:active { transform: scale(0.98); }
        .sign-card.selected { border: 3px solid var(--yt-light); background: #f0fdf4; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        
        .img-slot { width: 90px; height: 80px; background: #f8fafc; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid #e2e8f0; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        .qty-input { width: 60px; text-align: center; font-size: 24px; font-weight: 900; color: var(--yt-light); border-bottom: 2px solid #ddd; background: transparent; outline: none; padding: 5px 0; }
        
        /* 採購單預覽區蓋掉原本內容 */
        #printSection { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 9999; padding: 20px; overflow-y: auto; }

        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="sticky-header no-print">
        <div class="header-container">
            <span class="main-title">鈺通營造工安系統</span>
            <div class="flex gap-2">
                <div id="adminTools" class="hidden flex gap-1">
                    <button onclick="exportData()" class="text-[10px] bg-white/20 px-2 py-1 rounded">💾 備份</button>
                    <button onclick="importData()" class="text-[10px] bg-white/20 px-2 py-1 rounded">📂 還原</button>
                </div>
                <button onclick="toggleAdmin()" id="adminBtn" class="admin-btn">🔒 管理員</button>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-2 px-4 py-2 bg-white border-b">
            <div class="flex gap-1">
                <select id="siteSelect" class="flex-1 bg-gray-50 p-2 rounded-lg text-sm font-bold border border-gray-200 outline-none h-11"></select>
                <button onclick="editSites()" class="bg-gray-100 px-3 rounded-lg text-xs font-bold border border-gray-200 h-11">＋</button>
            </div>
            <input type="text" id="staff" class="bg-gray-50 p-2 rounded-lg text-sm font-bold border border-gray-200 h-11" placeholder="填單人員">
        </div>
        <div class="flex overflow-x-auto gap-2 p-3 bg-white scrollbar-hide" id="tabContainer"></div>
    </div>

    <div id="mainGrid" class="grid-container max-w-7xl mx-auto no-print"></div>

    <div id="printSection"></div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-white/95 border-t border-gray-100 z-50 flex flex-col gap-2 no-print shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button id="addItemBtn" onclick="addNewItem()" class="hidden w-full bg-orange-500 text-white py-3 rounded-xl font-bold shadow-lg">＋ 新增標語</button>
        <div class="flex gap-3">
            <button onclick="buildReport()" class="flex-[4] bg-[#095744] text-white py-4 rounded-xl font-black text-xl shadow-xl active:scale-95 transition-transform">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-gray-100 text-gray-500 rounded-xl text-xs font-bold">清空</button>
        </div>
    </nav>

<script>
let activeDB, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, catLabels;
const GITHUB_BASE = "https://yuhtong02.github.io/-/img/";

const defaultDB = [
    {id:'A01', cat:'A', n:'辦公室 (監造/管理/統包商)', s:'60x20', m:'中空板', steps:['S2']},
    {id:'B01', cat:'B', n:'工程告示牌', s:'120x90', m:'中空板', steps:['S1']},
    {id:'C01', cat:'C', n:'有電危險請勿觸碰', s:'30x20', m:'中空板', steps:['S5']},
    {id:'E03', cat:'E', n:'進入工區請緩慢行駛', s:'60x40', m:'中空板', steps:['S1']}
];

function init() {
    activeDB = JSON.parse(localStorage.getItem('yt_db')) || defaultDB;
    guides = JSON.parse(localStorage.getItem('yt_guides')) || {'S1':{t:'工地入口'},'S2':{t:'辦公區域'},'S3':{t:'安全宣導'},'S4':{t:'動線管理'},'S5':{t:'施工現場'},'S6':{t:'環境管理'}};
    catLabels = JSON.parse(localStorage.getItem('yt_cats')) || {'ALL':'全部','A':'A.生活辦公','B':'B.安全告示','C':'C.危險警示','D':'D.禁止事項','E':'E.交通動線','F':'F.消防設施','G':'G.環境管理','H':'H.精神宣導','J':'J.圖資名稱'};
    
    // 正確的六個工地名稱
    sites = JSON.parse(localStorage.getItem('yt_sites')) || [
        "嘉義創世基金會", "嘉義嘉科實中", "嘉義北門住宅", 
        "嘉義博愛安居", "嘉義民雄院區", "臺南林森圖書館"
    ];
    
    renderTabs(); renderSiteSelect(); render();
}

function renderSiteSelect() {
    document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join('');
}

function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : activeDB.filter(x => x.steps && x.steps.includes(currentKey));
    display.forEach(i => {
        const c = cart[i.id] || { sel:false, qty:1 };
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = (e) => {
            if(!isAdmin && e.target.tagName !== 'INPUT') {
                cart[i.id] = { sel: !c.sel, qty: c.qty };
                render();
            }
        };
        card.innerHTML = `
            <div class="img-slot"><img src="${GITHUB_BASE}${i.id}.JPG" onerror="this.src='${GITHUB_BASE}${i.id}.jpg'; this.onerror=null; this.parentElement.innerHTML='<div class=p-4 text-[10px]>無圖</div>'"></div>
            <div class="flex-1">
                <div class="font-black text-[#095744] text-sm">${i.n}</div>
                <div class="text-[10px] text-gray-500 mt-1">規格：<span class="text-red-500">${i.s}</span> / ${i.m}</div>
                <div class="flex items-center justify-between mt-2" onclick="event.stopPropagation()">
                    <input type="number" value="${c.qty}" oninput="updateQty('${i.id}', this.value)" class="qty-input">
                    <span class="text-[9px] text-gray-300 font-bold">${i.id}</span>
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

function updateQty(id, val) {
    if(!cart[id]) cart[id] = { sel: true, qty: 1 };
    cart[id].qty = parseInt(val) || 1;
}

function buildReport() {
    const sel = activeDB.filter(i => cart[i.id]?.sel);
    if(!sel.length) return alert("請先點選標語卡片！");
    
    const site = document.getElementById('siteSelect').value;
    const staff = document.getElementById('staff').value || "現場人員";
    
    let h = `
        <div style="font-family: sans-serif; color: #000;">
            <h1 style="text-align:center;">鈺通營造工安標語採購單</h1>
            <p>工地：${site} ｜ 填單人：${staff}</p>
            <table style="width:100%; border-collapse: collapse; border: 2px solid #000;">
                <tr style="background:#eee;">
                    <th style="border: 1px solid #000; padding:8px;">項目</th>
                    <th style="border: 1px solid #000; padding:8px; width:60px;">數量</th>
                </tr>`;
    sel.forEach(i => {
        h += `<tr>
                <td style="border: 1px solid #000; padding:8px;"><b>[${i.id}] ${i.n}</b><br><small>${i.s} / ${i.m}</small></td>
                <td style="border: 1px solid #000; padding:8px; text-align:center; font-size:20px; font-weight:bold;">${cart[i.id].qty}</td>
              </tr>`;
    });
    h += `</table>
            <div class="no-print" style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="window.print()" style="flex:1; background:#095744; color:white; padding:15px; border-radius:10px; font-weight:bold;">確認列印 / 存 PDF</button>
                <button onclick="document.getElementById('printSection').style.display='none'" style="flex:1; background:#eee; padding:15px; border-radius:10px;">回系統</button>
            </div>
        </div>`;
    const ps = document.getElementById('printSection');
    ps.innerHTML = h; ps.style.display = 'block';
}

function renderTabs() {
    let html = '';
    Object.keys(guides).sort().forEach(k => {
        html += `<div class="cat-tab-step ${currentMode==='GUIDE'&&currentKey===k?'active':''}" onclick="handleTabClick('GUIDE','${k}')">Step ${k.replace('S','')}.${guides[k].t}</div>`;
    });
    html += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey==='ALL'?'active':''}" onclick="handleTabClick('CAT','ALL')">全部</div>`;
    Object.keys(catLabels).filter(k=>k!=='ALL').sort().forEach(k => {
        html += `<div class="cat-tab-item ${currentMode==='CAT'&&currentKey===k?'active':''}" onclick="handleTabClick('CAT','${k}')">${catLabels[k]}</div>`;
    });
    document.getElementById('tabContainer').innerHTML = html;
}

function handleTabClick(m, k) { currentMode = m; currentKey = k; render(); renderTabs(); }
function resetCart() { if(confirm("清空選取？")) { cart = {}; render(); } }
function toggleAdmin() { isAdmin = !isAdmin; render(); }
function editSites() {
    const res = prompt("修改工地名單(逗號分隔)：", sites.join(','));
    if(res) { sites = res.split(',').map(s=>s.trim()); saveData(); renderSiteSelect(); }
}
function saveData() { localStorage.setItem('yt_sites', JSON.stringify(sites)); }
window.onload = init;
</script>
</body>
</html>
