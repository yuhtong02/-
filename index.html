<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; --yt-card-border: #D7CCC8; --yt-btn-bg: #E6F4F1; }
        * { box-sizing: border-box; border: 0; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg) !important; padding-bottom: 160px; color: #1e293b; overflow-x: hidden; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: var(--yt-bg); border-bottom: 4px solid var(--yt-dark) !important; }
        .header-top-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; }
        .system-title { font-size: 20px; font-weight: 900; color: var(--yt-dark); }
        .input-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 8px; padding: 0 15px 10px; }
        .category-scroller { display: flex; overflow-x: auto; gap: 8px; padding: 12px 15px; background: white; border-bottom: 1px solid #D7CCC8 !important; scrollbar-width: none; -webkit-overflow-scrolling: touch; align-items: center; }
        .category-scroller::-webkit-scrollbar { display: none; }
        .cat-tab-step { white-space: nowrap; padding: 8px 16px; border-radius: 12px; background-color: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; border: 1px solid var(--yt-dark) !important; transition: all 0.2s; display: flex; align-items: center; }
        .cat-tab-step::before { content: "📍"; margin-right: 4px; }
        .cat-tab-step.active { background: var(--yt-light); border-color: var(--yt-light) !important; }
        .cat-tab-item { white-space: nowrap; padding: 6px 12px; border-radius: 8px; background-color: white; color: #64748b; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid #e2e8f0 !important; }
        .cat-tab-item.active { background-color: var(--yt-btn-bg); color: var(--yt-dark); border-color: var(--yt-dark) !important; font-weight: 900; }
        .grid-container { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
        .sign-card { background: white; border-radius: 16px; padding: 16px; border: 1px solid var(--yt-card-border) !important; display: flex; gap: 16px; cursor: pointer; position: relative; }
        .sign-card.selected { border: 3px solid var(--yt-light) !important; }
        .img-slot { width: 140px; height: 100px; background: #f8fafc; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #e2e8f0 !important; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; } 
        .spec-text { font-size: 13px; font-weight: 700; color: #b91c1c; margin-top: 8px; }
        .spec-input { background: #fff7ed; border: 1px dashed #fb923c !important; border-radius: 4px; padding: 2px 6px; font-size: 12px; width: 100%; color: #9a3412; }
        .qty-input { width: 60px; text-align: center; font-size: 22px; font-weight: 900; color: var(--yt-light); background: transparent; }
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #eee !important; z-index: 2000; }
        .guide-box { grid-column: 1 / -1; background: linear-gradient(135deg, #095744 0%, #1a7a63 100%); color: white; padding: 20px; border-radius: 20px; margin-bottom: 10px; }
        .upgrade-tag { font-size: 11px; background: #ffedd5; color: #9a3412; padding: 4px 8px; border-radius: 6px; margin-top: 6px; display: inline-block; font-weight: bold; border: 1px solid #fed7aa; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
        .divider { width: 2px; height: 24px; background: #e2e8f0; flex-shrink: 0; margin: 0 4px; }
    </style>
</head>
<body id="appBody">

    <div class="sticky-header no-print">
        <div class="header-top-row">
            <span class="system-title">鈺通營造工安標語系統</span>
            <div class="flex gap-2">
                <div id="adminControls" class="hidden flex gap-1">
                    <button onclick="exportBackup()" class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1.5 rounded-lg border border-blue-200 font-bold">💾 導出備份</button>
                    <button onclick="document.getElementById('importInput').click()" class="text-[10px] bg-purple-50 text-purple-600 px-2 py-1.5 rounded-lg border border-purple-200 font-bold">📂 導入備份</button>
                </div>
                <button id="adminBtn" onclick="toggleAdmin()" class="text-[10px] font-black bg-white text-[#095744] px-3 py-1.5 rounded-full border border-[#095744]/20">🔒 管理員</button>
            </div>
        </div>
        <div class="input-row">
            <select id="siteSelect" class="bg-white text-[#095744] p-2 rounded-xl text-xs font-black border border-[#095744]/20" onchange="handleSiteChange()"></select>
            <input type="text" id="staff" class="bg-white text-[#095744] p-2 rounded-xl text-xs font-black border border-[#095744]/20" placeholder="填單人員" oninput="autoSaveConfig()">
        </div>
        <div class="category-scroller" id="catScroller">
            <div class="cat-tab-step" onclick="filterByGuide('S1')">Step 1</div>
            <div class="cat-tab-step" onclick="filterByGuide('S2')">Step 2</div>
            <div class="cat-tab-step" onclick="filterByGuide('S3')">Step 3</div>
            <div class="cat-tab-step" onclick="filterByGuide('S4')">Step 4</div>
            <div class="cat-tab-step" onclick="filterByGuide('S5')">Step 5</div>
            <div class="cat-tab-step" onclick="filterByGuide('S6')">Step 6</div>
            <div class="divider"></div>
            <div class="cat-tab-item active" data-type="cat" onclick="filterCat('ALL')">全部</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('A')">A 生活</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('B')">B 防護</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('C')">C 警示</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('D')">D 禁止</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('E')">E 交通</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('F')">F 設備</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('G')">G 規範</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('H')">H 宣導</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('I')">I 物料</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('J')">J 圖資</div>
            <div class="cat-tab-item" data-type="cat" onclick="filterCat('K')">K 區域</div>
        </div>
    </div>

    <div class="grid-container max-w-7xl mx-auto" id="mainGrid"></div>

    <nav class="footer-nav no-print">
        <button id="addNewBtn" onclick="addNewItem()" class="hidden w-full max-w-3xl bg-amber-100 text-amber-700 py-2 mb-2 rounded-xl font-black text-sm border border-amber-200 mx-auto">➕ 新增標語項目</button>
        <div class="flex w-full max-w-3xl gap-4 px-4 mx-auto">
            <button onclick="buildReport()" class="flex-[3] bg-[#095744] text-white py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition">📋 生成採購單</button>
            <button onclick="resetAll()" class="flex-1 bg-slate-100 text-slate-400 rounded-2xl text-xs font-bold">清空</button>
        </div>
    </nav>

    <div id="modal" class="no-print">
        <div class="bg-white w-full max-w-4xl rounded-3xl p-6 max-h-[90vh] overflow-y-auto">
            <div id="printArea"></div>
            <div class="flex gap-4 mt-6">
                <button onclick="window.print()" class="flex-1 bg-[#095744] text-white py-4 rounded-xl font-black text-lg">確認列印 / PDF</button>
                <button onclick="document.getElementById('modal').style.display='none'" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-xl font-black text-lg">返回修改</button>
            </div>
        </div>
    </div>

    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="handlePhoto(this)">
    <input type="file" id="importInput" accept=".yutong" class="hidden" onchange="importBackup(this)">

<script>
const DEFAULT_GUIDES = {
    'S1': { title: 'Step 1. 工區大門配置指引', desc: 'AI人臉門禁、工程告示牌、酒測監測站', items: [{id:'B01', up:'安全門禁'}] },
    'S2': { title: 'Step 2. 轉運與環境監測指引', desc: '資源回收分類、智慧漏電偵測', items: [{id:'I01', up:'數位聯單'}] },
    'S3': { title: 'Step 3. 主體作業控制指引', desc: '開口防護、起重監控', items: [{id:'C01', up:'影像監控'}] },
    'S4': { title: 'Step 4. 即時監控與指揮', desc: '戰情室數據整合、IOT監控', items: [{id:'C01', up:'IOT監控'}] },
    'S5': { title: 'Step 5. 異常反應與決策支援', desc: '智慧廣播、APP異常推播', items: [{id:'C01', up:'異常推播'}] },
    'S6': { title: 'Step 6. 竣工移交與存證指引', desc: '撤場紀錄、廢棄物清運總表', items: [{id:'I01', up:'清運總表'}] }
};

let INITIAL_DB = [
    {id:'A01', cat:'A', n:'飲水機', s:'30x20'}, {id:'B01', cat:'B', n:'進入工地戴安全帽', s:'60x40'}, 
    {id:'C01', cat:'C', n:'有電危險', s:'30x20'}, {id:'D01', cat:'D', n:'嚴禁煙火', s:'30x20'},
    {id:'E01', cat:'E', n:'車輛進出口', s:'60x40'}, {id:'F01', cat:'F', n:'滅火器', s:'20x10'},
    {id:'G01', cat:'G', n:'作業規範', s:'A1尺寸'}, {id:'H02', cat:'H', n:'嚴禁酒後', s:'60x40'},
    {id:'I01', cat:'I', n:'物料暫置', s:'60x40'}, {id:'J01', cat:'J', n:'逃生圖', s:'依現場需求'},
    {id:'K01', cat:'K', n:'第一工區', s:'40x20'}
];

// 工地清單：已加入 嘉義創世基金會
const DEFAULT_SITES = ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "嘉義北門集合住宅", "嘉義民雄院區", "臺南林森圖書館"];

let activeDB = [], db, cart = {}, sites = [], isAdmin = false, curId = null, currentFilter = 'ALL', currentGuideItems = [], guides = {};

const request = indexedDB.open("Yutong_V22_DB", 1);
request.onupgradeneeded = e => e.target.result.createObjectStore("images");
request.onsuccess = async e => { db = e.target.result; await initApp(); };

async function initApp() {
    sites = JSON.parse(localStorage.getItem('yt_sites')) || DEFAULT_SITES;
    activeDB = JSON.parse(localStorage.getItem('yt_active_db')) || INITIAL_DB;
    guides = JSON.parse(localStorage.getItem('yt_guides')) || DEFAULT_GUIDES;
    renderSiteSelect();
    document.getElementById('staff').value = localStorage.getItem('yt_staff') || '';
    document.getElementById('siteSelect').value = localStorage.getItem('yt_current_site') || sites[0];
    cart = JSON.parse(localStorage.getItem('yt_cart')) || {};
    render();
}

async function appendCard(container, i) {
    const c = cart[i.id] || { sel:false, qty:1 };
    let localImg = await dbGet(i.id);
    const tryP1 = `img/${i.id}.jpg`;
    const tryP2 = `img/${i.id}.JPG`;
    const tryP3 = `${i.id}.jpg`;

    const card = document.createElement('div');
    card.id = `card-${i.id}`;
    card.className = `sign-card ${c.sel?'selected':''}`;
    card.onclick = () => toggleSelect(i.id);
    
    let upTag = (currentFilter === 'GUIDE' && currentGuideItems.find(g => g.id === i.id)) 
                ? `<div class="upgrade-tag">✨ ${currentGuideItems.find(g => g.id === i.id).up}</div>` : "";
    let specContent = isAdmin 
        ? `<input type="text" value="${i.s}" oninput="updateBaseSpec('${i.id}', this.value)" class="spec-input" onclick="event.stopPropagation()">`
        : `<div class="spec-text">規格：${i.s || '現場評估'}</div>`;

    card.innerHTML = `
        <div class="img-slot" id="img-${i.id}" onclick="handleImg(event, '${i.id}')">
            ${localImg ? `<img src="${localImg}">` : `
                <img src="${tryP1}" onerror="this.onerror=null; this.src='${tryP2}'; this.setAttribute('onerror', 'this.src=\\'${tryP3}\\'; this.setAttribute(\\'onerror\\', \\'this.style.display=\\\\\\'none\\\\\\'\\')');">
            `}
        </div>
        <div style="flex:1" onclick="event.stopPropagation()">
            <div class="flex justify-between font-black text-[#095744]"><span>${i.n}</span><span class="text-[10px] bg-slate-100 px-1 rounded">${i.id}</span></div>
            ${upTag}
            ${specContent}
            <div class="flex items-center gap-4 mt-2"><span class="text-xs font-bold text-slate-400">數量</span><input type="number" value="${c.qty}" oninput="updQty('${i.id}',this.value)" class="qty-input"></div>
        </div>`;
    container.appendChild(card);
}

function filterByGuide(stepKey) {
    currentFilter = 'GUIDE'; const guide = guides[stepKey]; currentGuideItems = guide.items;
    const grid = document.getElementById('mainGrid');
    
    // 管理員模式下可編輯標題
    let titleHtml = isAdmin ? 
        `<input type="text" class="text-2xl font-black mb-1 w-full bg-transparent border-b border-white/30" value="${guide.title}" oninput="updateGuideData('${stepKey}', 'title', this.value)">` : 
        `<h2 class="text-2xl font-black mb-1">${guide.title}</h2>`;
    let descHtml = isAdmin ? 
        `<input type="text" class="text-sm font-bold opacity-90 w-full bg-transparent border-b border-white/20 mt-2" value="${guide.desc}" oninput="updateGuideData('${stepKey}', 'desc', this.value)">` : 
        `<p class="text-sm font-bold opacity-90">${guide.desc}</p>`;

    grid.innerHTML = `<div class="guide-box">${titleHtml}${descHtml}</div>`;
    updateActiveTab(stepKey, 'step');
    activeDB.filter(i => currentGuideItems.map(gi => gi.id).includes(i.id)).forEach(async i => await appendCard(grid, i));
}

function updateGuideData(key, field, val) { guides[key][field] = val; localStorage.setItem('yt_guides', JSON.stringify(guides)); }
function filterCat(cat) { currentFilter = cat; updateActiveTab(cat, 'cat'); render(); }
function updateActiveTab(key, type) { document.querySelectorAll('.cat-tab-step, .cat-tab-item').forEach(t => { t.classList.remove('active'); if (type === 'step' && t.innerText.includes(key.replace('S',''))) t.classList.add('active'); if (type === 'cat' && (t.innerText.startsWith(key) || (key==='ALL' && t.innerText==='全部'))) t.classList.add('active'); }); }
async function render() { const grid = document.getElementById('mainGrid'); grid.innerHTML = ''; let items = currentFilter === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentFilter); items.sort((a,b) => a.id.localeCompare(b.id)); for (const i of items) await appendCard(grid, i); }
function toggleSelect(id) { if(!cart[id]) cart[id]={sel:false,qty:1}; cart[id].sel=!cart[id].sel; render(); autoSaveConfig(); }
function updQty(id, v) { if(!cart[id]) cart[id]={sel:true,qty:1}; cart[id].qty=v; autoSaveConfig(); }
function autoSaveConfig() { localStorage.setItem('yt_staff', document.getElementById('staff').value); localStorage.setItem('yt_current_site', document.getElementById('siteSelect').value); localStorage.setItem('yt_cart', JSON.stringify(cart)); }
function dbGet(k) { return new Promise(r => { if(!db) return r(null); const t = db.transaction("images").objectStore("images").get(k); t.onsuccess = () => r(t.result); t.onerror = () => r(null); }); }
function dbSet(k, v) { return new Promise(r => { const t = db.transaction("images","readwrite").objectStore("images").put(v, k); t.onsuccess = () => r(); }); }
function handleImg(e, id) { e.stopPropagation(); if(!isAdmin) return; curId = id; document.getElementById('photoInput').click(); }
async function handlePhoto(input) { if(input.files[0]){ const r = new FileReader(); r.onload = async e => { await dbSet(curId, e.target.result); render(); }; r.readAsDataURL(input.files[0]); }}
function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join('') + `<option value="__NEW__">➕ 新增工地...</option>`; }
function handleSiteChange() { const s = document.getElementById('siteSelect'); if(s.value==='__NEW__'){ const n=prompt("名稱？"); if(n){sites.push(n);localStorage.setItem('yt_sites',JSON.stringify(sites));renderSiteSelect();s.value=n;}} autoSaveConfig(); }
function toggleAdmin() { if(prompt("密碼")==="1234"){ isAdmin=!isAdmin; document.getElementById('addNewBtn').classList.toggle('hidden',!isAdmin); document.getElementById('adminControls').classList.toggle('hidden',!isAdmin); render(); } }
function resetAll() { if(confirm("確定清空選單？")){ cart={}; localStorage.removeItem('yt_cart'); render(); }}
function updateBaseSpec(id, val) { const item = activeDB.find(x => x.id === id); if(item) item.s = val; localStorage.setItem('yt_active_db', JSON.stringify(activeDB)); }

async function buildReport() {
    const sIds = Object.keys(cart).filter(id => cart[id].sel); if(!sIds.length) return alert('未選項目');
    let h = `<div style="text-align:center; border-bottom:4px solid #095744; padding-bottom:10px;"><h1 style="color:#095744">鈺通營造採購需求單</h1><p>${document.getElementById('siteSelect').value}</p></div><table style="width:100%; border-collapse:collapse; margin-top:10px;">`;
    for(const id of sIds) {
        const item = activeDB.find(x => x.id === id); 
        const localImg = await dbGet(id);
        const img = localImg || `img/${id}.jpg`;
        h += `<tr style="border-bottom:1px solid #eee"><td style="padding:10px; width:150px"><img src="${img}" onerror="this.onerror=null; this.src='img/${id}.JPG';" style="width:100%"></td><td style="padding:10px"><b style="font-size:18px">${item.n}</b><br><span style="color:#b91c1c; font-size:14px; font-weight:bold">規格：${item.s}</span></td><td style="padding:10px; font-size:24px; text-align:right"><b>${cart[id].qty}</b></td></tr>`;
    }
    document.getElementById('printArea').innerHTML = h + `</table>`;
    document.getElementById('modal').style.display = 'flex';
}
</script>
</body>
</html>
