<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; --yt-card-border: #D7CCC8; --yt-btn-bg: #E6F4F1; }
        * { box-sizing: border-box; border: 0; margin: 0; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg) !important; padding-bottom: 180px; color: #1e293b; overflow-x: hidden; }
        #lineAlert { display: none; background: #ff5252; color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 12px; position: sticky; top: 0; z-index: 5000; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: var(--yt-bg); border-bottom: 4px solid var(--yt-dark) !important; }
        .header-top-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; }
        .system-title { font-size: 20px; font-weight: 900; color: var(--yt-dark); }
        .input-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 8px; padding: 0 15px 10px; }
        .category-scroller { display: flex; overflow-x: auto; gap: 10px; padding: 15px; background: white; border-bottom: 1px solid #D7CCC8 !important; -webkit-overflow-scrolling: touch; }
        .cat-tab-step { white-space: nowrap; padding: 8px 16px; border-radius: 12px; background-color: var(--yt-dark); color: white; font-size: 13px; font-weight: 900; cursor: pointer; flex-shrink: 0; border: 1px solid var(--yt-dark) !important; }
        .cat-tab-step.active { background: var(--yt-light); border-color: var(--yt-light) !important; }
        .cat-tab-item { white-space: nowrap; padding: 8px 18px; border-radius: 10px; background-color: white; color: #64748b; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid #e2e8f0 !important; flex-shrink: 0; }
        .cat-tab-item.active { background-color: var(--yt-btn-bg); color: var(--yt-dark); border-color: var(--yt-dark) !important; font-weight: 900; }
        .grid-container { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
        .sign-card { background: white; border-radius: 16px; padding: 16px; border: 1px solid var(--yt-card-border) !important; display: flex; gap: 16px; cursor: pointer; position: relative; }
        .sign-card.selected { border: 3px solid var(--yt-light) !important; background: #f0fdf4; }
        .admin-input { background: #fff7ed; border: 1px dashed #fb923c !important; border-radius: 4px; padding: 4px 6px; font-size: 12px; width: 100%; color: #9a3412; font-weight: bold; }
        .img-slot { width: 130px; height: 100px; background: #f8fafc; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #e2e8f0 !important; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; } 
        .qty-input { width: 60px; text-align: center; font-size: 22px; font-weight: 900; color: var(--yt-light); background: transparent; border-bottom: 2px solid #eee !important; }
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #eee !important; z-index: 2000; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
        .print-paper { background: white; width: 100%; max-width: 600px; border-radius: 24px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .divider { width: 2px; height: 24px; background: #e2e8f0; flex-shrink: 0; margin: 0 4px; }
        @media print { .no-print { display: none !important; } body { background: white !important; } }
    </style>
</head>
<body>

    <div id="lineAlert">⚠️ LINE 無法列印。請點選右上角「...」並選「在瀏覽器中開啟」。</div>

    <div class="sticky-header no-print">
        <div class="header-top-row">
            <span class="system-title">鈺通營造工安標語系統</span>
            <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] font-black bg-white text-[#095744] px-3 py-1.5 rounded-full border border-[#095744]/20">🔒 管理員</button>
        </div>
        <div class="input-row">
            <select id="siteSelect" class="bg-white text-[#095744] p-2 rounded-xl text-xs font-black border border-[#095744]/20" onchange="autoSave()"></select>
            <input type="text" id="staff" class="bg-white text-[#095744] p-2 rounded-xl text-xs font-black border border-[#095744]/20" placeholder="填單人員" oninput="autoSave()">
        </div>
        <div class="category-scroller" id="tabContainer"></div>
    </div>

    <div class="grid-container max-w-7xl mx-auto" id="mainGrid"></div>

    <nav class="footer-nav no-print">
        <div class="flex w-full max-w-3xl gap-3 px-4 mx-auto">
            <button onclick="buildReport()" class="flex-[4] bg-[#095744] text-white py-4 rounded-2xl font-black text-xl shadow-lg">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-red-50 text-red-400 rounded-2xl text-[10px] font-bold">重選</button>
            <button onclick="hardReset()" class="flex-1 bg-slate-100 text-slate-400 rounded-2xl text-[10px] font-bold">清空</button>
        </div>
    </nav>

    <div id="modal" class="no-print">
        <div class="print-paper">
            <div id="printArea"></div>
            <div class="grid grid-cols-1 gap-3 mt-6">
                <button onclick="window.print()" class="bg-[#095744] text-white py-4 rounded-xl font-black">1. 直接列印 / PDF</button>
                <button onclick="captureToImage()" class="bg-amber-500 text-white py-4 rounded-xl font-black">2. 轉為圖片 (手機長按儲存)</button>
                <button onclick="closeModal()" class="bg-slate-200 text-slate-500 py-3 rounded-xl font-bold">返回編輯</button>
            </div>
        </div>
    </div>

<script>
if (/Line/i.test(navigator.userAgent)) document.getElementById('lineAlert').style.display = 'block';

const GITHUB_BASE = "https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/";
const DEFAULT_SITES = ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "嘉義北門集合住宅", "嘉義民雄院區", "臺南林森圖書館"];
const CAT_LABELS = {'ALL':'全部','A':'生活設施','B':'安全防護','C':'危險警示','D':'禁止事項','E':'交通動線','F':'設備設施','G':'作業規範','H':'宣導標語','I':'環境管理','J':'圖資指引','K':'區域單位'};
const DEFAULT_GUIDES = {'S1':{t:'入口配置',items:[]},'S2':{t:'基礎設施',items:[]},'S3':{t:'安全警示',items:[]},'S4':{t:'動線指引',items:[]},'S5':{t:'宣導管理',items:[]},'S6':{t:'竣工收尾',items:[]}};

const RAW_SIGNS = [
    {id:'A01', cat:'A', n:'守衛室', s:'30x10'}, {id:'A02', cat:'A', n:'工具箱會議', s:'60x40'}, {id:'A03', cat:'A', n:'統包商辦公室', s:'30x10'}, {id:'A04', cat:'A', n:'監造單位辦公室', s:'30x10'}, {id:'A05', cat:'A', n:'管理單位辦公室', s:'30x10'}, {id:'A06', cat:'A', n:'會議室', s:'30x10'}, {id:'A07', cat:'A', n:'倉庫', s:'30x10'}, {id:'A08', cat:'A', n:'建材展覽室', s:'30x10'}, {id:'A09', cat:'A', n:'男化妝室', s:'20x10'}, {id:'A10', cat:'A', n:'女化妝室', s:'20x10'}, {id:'A11', cat:'A', n:'休息區', s:'30x10'}, {id:'A12', cat:'A', n:'飲水機', s:'15x5'}, {id:'A13', cat:'A', n:'小便斗', s:'10x5'},
    {id:'B01', cat:'B', n:'工程告示牌', s:'120x90'}, {id:'B02', cat:'B', n:'安全第一', s:'60x40'}, {id:'B03', cat:'B', n:'安衛告示牌', s:'90x90'}, {id:'B04', cat:'B', n:'進入工區請戴安全帽', s:'60x40'}, {id:'B05', cat:'B', n:'今日危害因素告示牌', s:'90x60'},
    {id:'C01', cat:'C', n:'有電危險請勿觸碰', s:'30x20'}, {id:'C02', cat:'C', n:'高壓電勿近', s:'40x60'}, {id:'C03', cat:'C', n:'開口危險小心墜落', s:'60x40'}, {id:'C04', cat:'C', n:'升降梯開口危險', s:'60x40'}, {id:'C05', cat:'C', n:'吊料電梯專用口', s:'60x40'},
    {id:'D01', cat:'D', n:'嚴禁酒後進場', s:'60x40'}, {id:'D02', cat:'D', n:'非工作人員禁止進入', s:'60x40'}, {id:'D03', cat:'D', n:'非施工必要禁止進入', s:'60x40'}, {id:'D04', cat:'D', n:'欄杆禁止跨越或攀爬', s:'60x40'}, {id:'D05', cat:'D', n:'施工架嚴禁堆置物料', s:'60x40'},
    {id:'E01', cat:'E', n:'工區施工請勿停車', s:'60x40'}, {id:'E02', cat:'E', n:'汽車停放區', s:'60x40'}, {id:'E03', cat:'E', n:'機車停放區', s:'60x40'}, {id:'E04', cat:'E', n:'進入工區請緩慢行駛', s:'60x40'}, {id:'E05', cat:'E', n:'施工電梯', s:'30x10'},
    {id:'F01', cat:'F', n:'物料暫置區', s:'60x40'}, {id:'F02', cat:'F', n:'放置鋼筋材料', s:'60x40'},
    {id:'G01', cat:'G', n:'背負式安全帶穿戴步驟', s:'90x120'}, {id:'G02', cat:'G', n:'施工架相關規定', s:'60x90'}, {id:'G03', cat:'G', n:'打開柵門作業請穿戴背負式安全帶', s:'60x40'},
    {id:'H01', cat:'H', n:'工安公布宣導欄', s:'120x90'}, {id:'H02', cat:'H', n:'熱危害宣導', s:'60x40'}, {id:'H03', cat:'H', n:'生活點滴', s:'60x40'}, {id:'H04', cat:'H', n:'安全第一；品質至上', s:'120x30'}, {id:'H05', cat:'H', n:'關懷標語', s:'60x40'}, {id:'H06', cat:'H', n:'工安宣導', s:'60x40'}, {id:'H07', cat:'H', n:'工安標語6S', s:'60x40'}, {id:'H08', cat:'H', n:'存好心做好事說好話', s:'120x30'},
    {id:'I01', cat:'I', n:'一般垃圾', s:'30x40'}, {id:'I02', cat:'I', n:'資源回收', s:'30x40'}, {id:'I03', cat:'I', n:'廚餘', s:'30x40'}, {id:'I04', cat:'I', n:'鐵鋁罐', s:'20x30'}, {id:'I05', cat:'I', n:'玻璃類', s:'20x30'}, {id:'I06', cat:'I', n:'塑膠類', s:'20x30'}, {id:'I07', cat:'I', n:'紙容器', s:'20x30'}, {id:'I08', cat:'I', n:'廚餘宣傳', s:'60x40'}, {id:'I09', cat:'I', n:'垃圾管道傾倒口', s:'40x60'}, {id:'I10', cat:'I', n:'營建廢棄物堆置區', s:'60x40'},
    {id:'J01', cat:'J', n:'樓梯標示', s:'20x10'}, {id:'J02', cat:'J', n:'樓層標示', s:'20x20'}, {id:'J03', cat:'J', n:'各棟別名稱', s:'客製'},
    {id:'K01', cat:'K', n:'工地/學校名稱', s:'客製'}, {id:'K02', cat:'K', n:'工地上梁典禮', s:'客製'}, {id:'K03', cat:'K', n:'急救箱', s:'20x20'}, {id:'K04', cat:'K', n:'滅火器', s:'10x30'}, {id:'K05', cat:'K', n:'安全出口', s:'30x10'}
];

let activeDB, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides;

function init() {
    sites = JSON.parse(localStorage.getItem('yt_sites')) || DEFAULT_SITES;
    activeDB = JSON.parse(localStorage.getItem('yt_active_db')) || RAW_SIGNS;
    guides = JSON.parse(localStorage.getItem('yt_guides')) || DEFAULT_GUIDES;
    cart = JSON.parse(localStorage.getItem('yt_cart')) || {};
    document.getElementById('staff').value = localStorage.getItem('yt_staff') || '';
    renderTabs(); renderSiteSelect(); render();
}

function renderTabs() {
    let html = '';
    Object.keys(guides).forEach(k => html += `<div class="cat-tab-step ${currentKey===k?'active':''}" onclick="setFilter('GUIDE','${k}')">Step ${k.replace('S','')}</div>`);
    html += `<div class="divider"></div>`;
    Object.keys(CAT_LABELS).forEach(k => html += `<div class="cat-tab-item ${currentKey===k?'active':''}" onclick="setFilter('CAT','${k}')">${CAT_LABELS[k]}</div>`);
    document.getElementById('tabContainer').innerHTML = html;
}

function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : activeDB.filter(x => guides[currentKey]?.items.includes(x.id));
    
    display.forEach(i => {
        const c = cart[i.id] || { sel:false, qty:1 };
        const githubImg = GITHUB_BASE + i.id + '.jpg'; 
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => toggleItem(i.id);
        card.innerHTML = `
            <div class="img-slot">
                <img src="${githubImg}" 
                     onerror="handleImgError(this)">
            </div>
            <div class="flex-1">
                <div class="flex justify-between">
                    <div class="flex-1">${isAdmin ? `<input class="admin-input" value="${i.n}" oninput="updateI('${i.id}','n',this.value)" onclick="event.stopPropagation()">` : `<div class="font-black text-[#095744]">${i.n}</div>`}</div>
                    <span class="text-[9px] bg-slate-100 p-1 rounded ml-1">${i.id}</span>
                </div>
                <div class="text-[12px] font-bold text-red-700 mt-1">規格：${isAdmin ? `<input class="admin-input" value="${i.s}" oninput="updateI('${i.id}','s',this.value)" onclick="event.stopPropagation()">` : i.s}</div>
                <div class="flex items-center gap-2 mt-2" onclick="event.stopPropagation()">
                    <span class="text-[10px] font-bold text-slate-400">數量</span>
                    <input type="number" value="${c.qty}" oninput="updateQty('${i.id}',this.value)" class="qty-input">
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

// 核心：防閃退圖片處理邏輯
function handleImgError(img) {
    if (img.src.includes('.jpg')) {
        img.src = img.src.replace('.jpg', '.JPG');
    } else {
        img.onerror = null; // 停止重試，避免閃退
        img.src = 'https://via.placeholder.com/150?text=圖片待傳';
    }
}

function updateI(id, f, v) { const i = activeDB.find(x => x.id === id); if(i) { i[f] = v; localStorage.setItem('yt_active_db', JSON.stringify(activeDB)); }}
function setFilter(m, k) { currentMode=m; currentKey=k; renderTabs(); render(); }
function toggleItem(id) { if(!cart[id]) cart[id]={sel:false,qty:1}; cart[id].sel=!cart[id].sel; autoSave(); render(); }
function updateQty(id, v) { if(!cart[id]) cart[id]={sel:true,qty:1}; cart[id].qty=parseInt(v)||1; autoSave(); }
function toggleAdmin() { if(!isAdmin) { if(prompt("管理密碼")==="751113"){ isAdmin=true; document.getElementById('adminBtn').innerText="🔓 管理中"; } } else { isAdmin=false; document.getElementById('adminBtn').innerText="🔒 管理員"; } render(); }
function autoSave() { localStorage.setItem('yt_staff', document.getElementById('staff').value); localStorage.setItem('yt_site', document.getElementById('siteSelect').value); localStorage.setItem('yt_cart', JSON.stringify(cart)); }
function resetCart() { if(confirm("重置選取？")){ cart={}; autoSave(); render(); } }
function hardReset() { if(confirm("將重啟並從 GitHub 載入最新清單？")){ localStorage.clear(); location.reload(); }}
function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join(''); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function buildReport() {
    const sel = activeDB.filter(i => cart[i.id]?.sel); if(!sel.length) return alert("請選取標語");
    let h = `<div id="captureTarget" style="background:white; padding:20px; border:2px solid #095744;"><div style="text-align:center; border-bottom:3px solid #095744; padding-bottom:10px;"><h1 style="color:#095744">鈺通營造 標語採購單</h1><div style="display:flex; justify-content:space-between; margin-top:10px; font-weight:bold"><span>工地：${document.getElementById('siteSelect').value}</span><span>填單人：${document.getElementById('staff').value}</span></div></div><table style="width:100%; border-collapse:collapse; margin-top:10px;">`;
    sel.forEach(i => { 
        h += `<tr style="border-bottom:1px solid #eee">
            <td style="padding:10px; width:110px"><img src="${GITHUB_BASE+i.id+'.jpg'}" style="width:100px" onerror="handleImgError(this)"></td>
            <td style="padding:10px"><b>${i.n}</b><br><small>規格：${i.s}</small><br><small>編號：#${i.id}</small></td>
            <td style="padding:10px; text-align:right; font-size:20px"><b>${cart[i.id].qty}</b></td>
        </tr>`; 
    });
    document.getElementById('printArea').innerHTML = h + `</table></div>`; document.getElementById('modal').style.display='flex';
}

function captureToImage() {
    html2canvas(document.getElementById('captureTarget'), { useCORS: true, scale: 2 }).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        document.getElementById('printArea').innerHTML = `<p style="color:red; font-weight:bold; margin-bottom:10px;">圖片已生成！請長按圖片儲存。</p><img src="${imgData}" style="width:100%; border:1px solid #ddd;">`;
    });
}

init();
</script>
</body>
</html>
