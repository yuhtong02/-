<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ───── 基礎樣式 (採用你喜愛的深綠色調) ───── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#064E3B;      /* 深綠主色 */
  --bg:#FEF8E6;        
  --surface:#FFFFFF;   
  --border:#E9E1C8;    
  --ink:#0F172A;
  --r:14px;--r2:10px;--r3:8px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;min-height:100vh;}

/* ── 頂部導覽 ── */
.hdr{background:var(--dark);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:900;letter-spacing:0.3px;}

/* ── 操作區 ── */
.ctrl{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;}
select,input[type=text]{font-family:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r3);background:var(--bg);outline:none;}

/* ── 標籤頁 ── */
.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);overflow-x:auto;}
.tabs-scroll{display:flex;padding:12px 16px;gap:6px;}
.tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:#64748B;white-space:nowrap;}
.tab.active{background:var(--dark);color:white;border-color:var(--dark);}

/* ── 主列表 ── */
.main{flex:1;padding:14px 16px;overflow-y:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;display:flex;gap:12px;cursor:pointer;position:relative;}
.card.sel{border-color:var(--dark);background:rgba(6, 78, 59, 0.03);border-width:2px;}
.card-img{width:90px;height:75px;border-radius:var(--r3);background:#F8FAFC;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:contain;}
.card-name{font-size:14px;font-weight:900;color:var(--dark);}
.qty-num{font-size:22px;font-weight:900;color:var(--dark);margin:0 10px;}

/* ── 底部按鈕 ── */
.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:12px 16px;}
.btn-report{width:100%;background:var(--dark);color:white;border:none;padding:14px;border-radius:var(--r2);font-size:16px;font-weight:900;cursor:pointer;}

/* ── 採購單彈窗 (依照圖片修正字體與佈局) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;display:none;align-items:center;justify-content:center;padding:15px;}
.overlay.show{display:flex;}
.modal{background:white;width:100%;max-width:700px;border-radius:16px;padding:25px;max-height:95vh;overflow-y:auto;}

#modalPrintArea { background: white; padding: 10px; }
.rpt-header-title { text-align: center; font-size: 22px; font-weight: 900; color: var(--dark); margin-bottom: 20px; }
.rpt-meta-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 2px solid var(--dark); padding-bottom: 15px; margin-bottom: 15px; }
.meta-item { text-align: center; }
.meta-label { font-size: 11px; color: #64748B; margin-top: 4px; }
.meta-val { font-size: 15px; font-weight: 900; color: var(--dark); }

.report-item{display:flex;align-items:center;gap:15px;padding:12px 0;border-bottom:1px solid #EEF2F6;}
.rpt-img{width:65px;height:55px;object-fit:contain;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;}
.rpt-info{flex:1;}
.rpt-name{font-size:15px;font-weight:900;color:#0F172A;}
.rpt-spec{font-size:12px;color:#64748B;}
.rpt-qty{font-size:24px;font-weight:900;color:var(--dark);min-width:40px;text-align:right;}

/* 列印專用樣式 */
@media print {
    body * { visibility: hidden; }
    #modalPrintArea, #modalPrintArea * { visibility: visible; }
    #modalPrintArea { position: absolute; left: 0; top: 0; width: 100%; }
    .no-print { display: none !important; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title" id="titleEl">工安標語採購系統</div>
</div>

<div class="ctrl">
  <select id="siteSelect" onchange="save()"></select>
  <input type="text" id="staffInput" placeholder="負責人員" oninput="save()">
</div>

<div class="tabs-outer">
  <div class="tabs-scroll" id="tabsEl"></div>
</div>

<div class="main">
  <div class="grid" id="gridEl"></div>
</div>

<div class="footer">
  <button class="btn-report" onclick="buildReport()">📋 生成採購單 (<span id="cartBadge">0</span>)</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div id="modalPrintArea">
        <div class="rpt-header-title">工安標語採購系統 採購單</div>
        <div class="rpt-meta-grid">
            <div class="meta-item">
                <div class="meta-val" id="rptSite">嘉義工地</div>
                <div class="meta-label">工地名稱</div>
            </div>
            <div class="meta-item">
                <div class="meta-val" id="rptStaff">(未填)</div>
                <div class="meta-label">負責人員</div>
            </div>
            <div class="meta-item">
                <div class="meta-val" id="rptDate">2026/01/01</div>
                <div class="meta-label">填單日期</div>
            </div>
        </div>
        <div id="rptList"></div>
        <div id="rptSummary" style="display:flex; justify-content:space-between; padding:15px 5px; font-weight:900; font-size:16px; border-top:2px solid #000; margin-top:10px;"></div>
    </div>
    <div class="no-print" style="margin-top:20px; display:grid; gap:10px;">
        <button onclick="window.print()" style="padding:15px; background:var(--dark); color:white; border:none; border-radius:8px; font-weight:900; cursor:pointer;">🖨 下載 PDF / 列印</button>
        <button onclick="closeModal()" style="padding:12px; background:#F1F5F9; border:none; border-radius:8px; cursor:pointer;">返回修改</button>
    </div>
  </div>
</div>

<script>
const DEF_SITES=["嘉義創世基金會","嘉義嘉科實中","嘉義博愛安居","嘉義北門集合住宅","嘉義民雄院區","臺南林森圖書館"];
const DEF_DB=[
  {id:'K01',cat:'K',n:'守衛室',s:'30x10',m:'PVC'},
  {id:'K06',cat:'K',n:'倉庫',s:'30x10',m:'PVC'},
  {id:'K07',cat:'K',n:'建材展覽室',s:'30x10',m:'PVC'},
  {id:'K11',cat:'K',n:'汽車停放區',s:'60x20',m:'中空板'},
  {id:'K12',cat:'K',n:'機車停放區',s:'60x20',m:'中空板'},
  {id:'A03',cat:'A',n:'小便斗',s:'20x10',m:'PVC'},
  {id:'B01',cat:'B',n:'進入工區請戴安全帽',s:'60x40',m:'中空板'},
  {id:'B07',cat:'B',n:'熱危害宣導',s:'60x40',m:'中空板'}
];
const DEF_CATS={K:'K. 區域標示',A:'A. 生活設施',B:'B. 安全防護',ALL:'全部標語'};

let db=DEF_DB, cart={}, currentTab='ALL', imgBase='https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';

function init(){
  const s=document.getElementById('siteSelect');
  s.innerHTML=DEF_SITES.map(x=>`<option value="${x}">${x}</option>`).join('');
  renderTabs();
  render();
}

function renderTabs(){
  const keys = Object.keys(DEF_CATS);
  document.getElementById('tabsEl').innerHTML = keys.map(k=>`
    <div class="tab ${currentTab===k?'active':''}" onclick="currentTab='${k}';renderTabs();render();">${DEF_CATS[k]}</div>
  `).join('');
}

function render(){
  const list = currentTab==='ALL'?db:db.filter(x=>x.cat===currentTab);
  const grid = document.getElementById('gridEl');
  grid.innerHTML = list.map(item=>{
    const st=cart[item.id]||{sel:false,qty:1};
    return `
      <div class="card ${st.sel?'sel':''}" onclick="toggleItem('${item.id}')">
        <div class="card-img"><img src="${imgBase+item.id}.jpg" onerror="this.style.opacity='0.1'"></div>
        <div class="card-body">
          <div class="card-name">${item.n}</div>
          <div style="font-size:11px;color:#666">${item.s} / ${item.m}</div>
          <div style="margin-top:8px; display:flex; align-items:center;" onclick="event.stopPropagation()">
            <button onclick="adjQty('${item.id}',-1)" style="width:24px;height:24px;border-radius:50%;border:1px solid #ddd;">-</button>
            <span class="qty-num">${st.qty}</span>
            <button onclick="adjQty('${item.id}',1)" style="width:24px;height:24px;border-radius:50%;border:1px solid #ddd;">+</button>
          </div>
        </div>
      </div>`;
  }).join('');
  updateBadge();
}

function toggleItem(id){
  if(!cart[id]) cart[id]={sel:false,qty:1};
  cart[id].sel = !cart[id].sel;
  render();
}

function adjQty(id,d){
  if(!cart[id]) cart[id]={sel:true,qty:1};
  cart[id].qty = Math.max(1, cart[id].qty + d);
  cart[id].sel = true;
  render();
}

function updateBadge(){
  const n = Object.values(cart).filter(x=>x.sel).length;
  document.getElementById('cartBadge').textContent = n;
}

function buildReport(){
  const selected = db.filter(x=>cart[x.id]?.sel);
  if(!selected.length) return alert('請選擇品項');
  
  document.getElementById('rptSite').textContent = document.getElementById('siteSelect').value;
  document.getElementById('rptStaff').textContent = document.getElementById('staffInput').value || '(未填)';
  document.getElementById('rptDate').textContent = new Date().toLocaleDateString();

  let html = '';
  selected.forEach((item,idx)=>{
    html += `
      <div class="report-item">
        <div style="width:25px; font-weight:bold; color:#CBD5E1">${idx+1}</div>
        <img class="rpt-img" src="${imgBase+item.id}.jpg">
        <div class="rpt-info">
          <div class="rpt-name">[${item.id}] ${item.n}</div>
          <div class="rpt-spec">規格：${item.s} ｜ 材質：${item.m}</div>
        </div>
        <div class="rpt-qty">${cart[item.id].qty}</div>
      </div>`;
  });
  
  document.getElementById('rptList').innerHTML = html;
  document.getElementById('rptSummary').innerHTML = `<span>合計 ${selected.length} 品項</span><span>合計 ${selected.reduce((a,b)=>a+cart[b.id].qty,0)} 件</span>`;
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){ document.getElementById('overlay').classList.remove('show'); }
function save(){ /* 自動儲存邏輯可在此擴充 */ }

init();
</script>
</body>
</html>
