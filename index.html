<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#164E33;--green:#6EB831;
  --cream:#FEF8E6;--cream2:#FFFBF0;
  --cream-border:#E2C96A;--cream-dark:#B8942A;--cream-deep:#6B4700;
  --ink:#0F172A;--ink3:#64748B;--ink4:#94A3B8;
  --bg:#FFFDF5;--surface:#FFFFFF;--border:#D8EAB8;--card-bg:#FFFEF8;
  --red:#DC2626;--blue:#1D4ED8;--purple:#6D28D9;
  --r:14px;--r2:10px;--r3:8px;
  --shadow:0 1px 3px rgba(22,78,51,.06),0 3px 10px rgba(22,78,51,.04);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}

/* ─── HEADER ─── */
.hdr{background:var(--dark);color:white;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:default;overflow:hidden;position:relative;}
.hdr-logo img{width:100%;height:100%;object-fit:contain;display:block;}
.hdr-logo.editable{cursor:pointer;}
.hdr-logo.editable::after{content:'✏';position:absolute;bottom:0;right:0;font-size:9px;background:var(--green);color:white;border-radius:50%;width:13px;height:13px;display:flex;align-items:center;justify-content:center;}
.hdr-title{font-size:15px;font-weight:900;letter-spacing:.3px;}
.hdr-ver{font-size:10px;opacity:.55;margin-top:1px;color:#A8D96A;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;flex-shrink:0;transition:background .3s;}
.sync-dot.off{background:#94A3B8;}
.sync-dot.syncing{background:#F59E0B;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.admin-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;}
.admin-btn:hover{background:rgba(255,255,255,.2);}
.admin-btn.active{background:rgba(110,184,49,.28);border-color:rgba(110,184,49,.5);color:#C8F07A;}

/* ─── CONTROLS ─── */
.ctrl{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:wrap;}
.ctrl-group{display:flex;gap:6px;align-items:center;flex:1;min-width:140px;}
select,input[type=text]{font-family:inherit;font-size:13px;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r3);background:var(--cream2);color:var(--ink);outline:none;transition:border-color .15s;}
select:focus,input[type=text]:focus{border-color:var(--green);}
select{flex:1;}
.btn{font-family:inherit;font-size:12px;font-weight:700;padding:7px 11px;border-radius:var(--r3);border:none;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-dark{background:var(--dark);color:white;}.btn-dark:hover{background:#1E6840;}
.btn-red{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;}
.btn-blue{background:#EFF6FF;color:var(--blue);border:1.5px solid #BFDBFE;}
.btn-purple{background:#F5F3FF;color:var(--purple);border:1.5px solid #DDD6FE;}
.btn-cream{background:var(--cream);color:var(--cream-deep);border:1.5px solid var(--cream-border);}

/* ─── TABS ─── */
.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;position:relative;}
.tabs-scroll{display:flex;overflow-x:auto;padding:9px 14px;gap:5px;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-behavior:smooth;}
.tabs-scroll::-webkit-scrollbar{display:none;}
.tabs-arrow{position:absolute;top:0;bottom:0;width:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.tabs-arrow.left{left:0;background:linear-gradient(to right,var(--surface) 55%,transparent);}
.tabs-arrow.right{right:0;background:linear-gradient(to left,var(--surface) 55%,transparent);}
.tabs-arrow svg{width:15px;height:15px;stroke:var(--ink3);stroke-width:2.5;fill:none;}
.tab{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--ink3);white-space:nowrap;transition:all .15s;flex-shrink:0;user-select:none;display:flex;align-items:center;gap:4px;}
.tab:hover{border-color:var(--green);color:var(--dark);}
.tab.step-tab{background:var(--cream);border-color:var(--cream-border);color:var(--cream-deep);}
.tab.all-tab{background:var(--cream);border-color:var(--cream-dark);color:var(--cream-deep);font-weight:900;}
.tab.cat-tab{background:var(--surface);border-color:var(--border);color:var(--ink3);}
.tab.active{background:var(--dark)!important;color:white!important;border-color:var(--dark)!important;box-shadow:0 2px 8px rgba(22,78,51,.25);}
.tab-sep{width:1.5px;background:var(--border);flex-shrink:0;align-self:stretch;margin:0 4px;border-radius:1px;}
.tab-edit-input{background:transparent;border:none;font-weight:700;font-size:12px;color:inherit;font-family:inherit;width:78px;outline:none;cursor:text;}

/* ─── MAIN GRID ─── */
.main{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:11px;}
.empty-state{text-align:center;padding:80px 20px;color:var(--ink4);}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* ─── CARD ─── */
.card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--r);padding:11px;display:flex;gap:11px;cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;position:relative;box-shadow:var(--shadow);}
.card:hover{border-color:var(--cream-border);background:var(--cream2);box-shadow:0 4px 14px rgba(22,78,51,.08);}
.card.sel{border-color:var(--green);background:#F4FCE8;border-width:2px;}
.card-check{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:white;display:grid;place-items:center;transition:all .18s;z-index:2;}
.card.sel .card-check{background:var(--green);border-color:var(--green);}
.check-icon{font-size:11px;font-weight:900;color:white;display:none;}
.card.sel .check-icon{display:block;}
.card-img{width:86px;height:72px;flex-shrink:0;border-radius:var(--r3);border:1.5px solid var(--border);overflow:hidden;background:#F8FAFC;display:flex;align-items:center;justify-content:center;}
.card-img img{width:100%;height:100%;object-fit:contain;transition:opacity .2s;}
.img-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink4);}
.img-placeholder span{font-size:18px;}
.img-placeholder small{font-size:9px;text-align:center;line-height:1.2;}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;}
.card-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.card-id{font-size:10px;font-weight:700;background:var(--cream);color:var(--cream-deep);padding:2px 6px;border-radius:4px;border:1px solid var(--cream-border);}
.card-cat{font-size:10px;color:var(--ink4);}
.card-name{font-size:13px;font-weight:900;color:var(--dark);line-height:1.35;margin-bottom:4px;}
.card-specs{display:flex;gap:6px;flex-wrap:wrap;}
.spec-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.spec-r{background:var(--cream);color:var(--cream-deep);border:1px solid var(--cream-border);}
.spec-m{background:#F0F7E6;color:#2A5A1A;border:1px solid #C5DF98;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:5px;}
.sel-chip{font-size:10px;background:var(--dark);color:white;padding:3px 8px;border-radius:20px;font-weight:700;}
.qty-ctrl{display:flex;align-items:center;gap:7px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:16px;display:grid;place-items:center;color:var(--ink3);font-family:inherit;transition:all .15s;line-height:1;flex-shrink:0;}
.qty-btn:hover{border-color:var(--green);color:var(--green);background:#F4FCE8;}
.qty-num{font-size:21px;font-weight:900;color:var(--dark);min-width:26px;text-align:center;line-height:1;}
.a-name{background:var(--cream);border:1.5px dashed var(--cream-dark);border-radius:4px;padding:3px 6px;font-size:13px;font-weight:900;color:var(--cream-deep);width:100%;font-family:inherit;outline:none;}
.a-spec{background:transparent;border:none;border-bottom:1.5px dashed #CBD5E1;font-size:10px;width:52px;font-family:inherit;outline:none;color:inherit;padding:1px 2px;}
.a-id-edit{font-size:10px;font-weight:700;background:var(--cream);border:1.5px dashed var(--cream-dark);border-radius:4px;color:var(--cream-deep);padding:2px 5px;width:58px;font-family:inherit;outline:none;}
.a-id-edit::placeholder{color:var(--cream-dark);opacity:.8;}
.admin-del-btn{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;background:var(--red);border:none;color:white;font-size:11px;cursor:pointer;display:none;place-items:center;z-index:3;font-family:inherit;}
.isAdmin .card:hover .admin-del-btn{display:grid;}

/* ─── FOOTER ─── */
.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:11px 14px;flex-shrink:0;}
.admin-panel{display:none;margin-bottom:9px;flex-wrap:wrap;gap:6px;}
.admin-panel.show{display:flex;}
.footer-main{display:flex;gap:9px;align-items:stretch;}
.btn-report{flex:1;background:var(--dark);color:white;border:none;padding:13px 14px;border-radius:var(--r2);font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 4px 14px rgba(22,78,51,.2);}
.btn-report:hover{background:#1E6840;}
.cart-badge{background:rgba(255,255,255,.22);border-radius:20px;padding:3px 10px;font-size:13px;font-weight:900;min-width:28px;text-align:center;}
.btn-reset{background:var(--cream);color:var(--cream-deep);border:1.5px solid var(--cream-border);padding:13px 13px;border-radius:var(--r2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap;}
.btn-reset:hover{background:#FEF0C0;}

/* ─── MODALS base ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.sheet{background:white;width:100%;max-width:700px;border-radius:20px 20px 0 0;padding:18px;max-height:92vh;overflow-y:auto;animation:slideUp .26s cubic-bezier(.2,.7,0,1.1);}
@keyframes slideUp{from{transform:translateY(56px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 14px;display:block;}
.sheet-title{font-size:17px;font-weight:900;color:var(--dark);text-align:center;margin-bottom:14px;}
.modal-meta{display:flex;justify-content:space-around;font-size:12px;color:var(--ink3);padding:9px 0;background:var(--cream2);border-radius:var(--r3);margin-bottom:12px;border:1px solid var(--cream-border);}
.modal-meta span{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;}
.modal-meta strong{font-size:13px;color:var(--ink);font-weight:700;}
.report-item{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:.5px solid #F1F5F9;}
.report-item:last-child{border:none;}
.rpt-num{font-size:11px;font-weight:700;color:var(--ink4);min-width:18px;text-align:center;}
.rpt-img{width:50px;height:42px;border-radius:6px;border:1px solid var(--border);object-fit:contain;background:#F8FAFC;flex-shrink:0;}
.rpt-info{flex:1;min-width:0;}
.rpt-name{font-size:13px;font-weight:900;color:var(--ink);}
.rpt-spec{font-size:11px;color:var(--ink3);margin-top:1px;}
.rpt-qty{font-size:22px;font-weight:900;color:var(--dark);min-width:32px;text-align:right;}
.rpt-total{display:flex;justify-content:space-between;padding:10px 14px;background:var(--dark);color:white;border-radius:var(--r3);margin-top:10px;font-size:13px;font-weight:700;}
.rpt-total strong{color:#A8D96A;font-size:15px;}
.modal-actions{display:flex;flex-direction:column;gap:7px;margin-top:13px;}
.modal-btn{padding:13px;border-radius:var(--r3);font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;}
.hint-txt{font-size:11px;color:var(--ink4);text-align:center;margin-top:6px;line-height:1.6;}

/* ─── HISTORY ─── */
.hist-rec{background:#FAFAFA;border:1.5px solid #E2E8F0;border-radius:10px;margin-bottom:10px;overflow:hidden;}
.hist-hdr{background:var(--dark);color:white;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.hist-sub{padding:6px 10px;background:var(--cream2);border-bottom:.5px solid var(--cream-border);font-size:11px;color:var(--ink3);}
.hist-row{display:flex;justify-content:space-between;padding:5px 10px;font-size:12px;border-bottom:.5px solid #F1F5F9;}
.hist-row:last-child{border:none;}
.hist-foot{padding:6px 10px;text-align:right;}

/* ─── PRINT ─── */
@media print{
  html,body{height:auto!important;overflow:visible!important;}
  body>*:not(#printContainer){display:none!important;}
  #printContainer{display:block!important;}
  tr{page-break-inside:avoid;}
  @page{margin:12mm;}
}
#printContainer{display:none;}

/* ─── IMAGE DOWNLOAD OVERLAY ─── */
#imgOverlay{display:none;position:fixed;inset:0;z-index:99999;flex-direction:column;align-items:center;justify-content:center;}

/* ─── SYNC TOAST ─── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(22,78,51,.92);color:white;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* scrollbars */
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:#C5DF98;border-radius:2px;}
.sheet::-webkit-scrollbar{width:3px;}
.sheet::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div id="printContainer"></div>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo" id="logoEl">🦺</div>
    <div>
      <div class="hdr-title" id="titleEl">工安標語採購系統</div>
      <div class="hdr-ver">鈺通營造 Construction Safety</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="sync-dot off" id="syncDot" title="雲端同步狀態"></div>
    <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 管理員</button>
  </div>
</div>

<!-- CONTROLS -->
<div class="ctrl">
  <div class="ctrl-group">
    <select id="siteSelect" onchange="save()"></select>
    <button class="btn btn-dark" onclick="addSite()">＋</button>
  </div>
  <input type="text" id="staffInput" placeholder="填單人員" style="width:108px;" oninput="save()">
</div>

<!-- TABS -->
<div class="tabs-outer">
  <div class="tabs-arrow left" onclick="scrollTabs(-120)">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </div>
  <div class="tabs-scroll" id="tabsEl"></div>
  <div class="tabs-arrow right" onclick="scrollTabs(120)">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </div>
</div>

<!-- GRID -->
<div class="main" id="mainArea">
  <div class="grid" id="gridEl"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="admin-panel" id="adminPanel">
    <button class="btn btn-dark"   onclick="addNewSign()">➕ 新增標語</button>
    <button class="btn btn-dark"   onclick="addStep()">➕ 新增工序</button>
    <button class="btn btn-dark"   onclick="addCat()">➕ 新增類別</button>
    <button class="btn btn-blue"   onclick="exportData()">📤 備份JSON</button>
    <button class="btn btn-purple" onclick="importData()">📥 還原JSON</button>
    <button class="btn btn-red"    onclick="deleteSite()">🗑 刪除工地</button>
    <button class="btn btn-cream"  onclick="configImgBase()">🖼 圖片路徑</button>
    <button class="btn btn-cream"  onclick="changeLogo()">🏷 更換圖示</button>
    <button class="btn btn-cream"  onclick="configGSheets()">☁️ 雲端設定</button>
    <button class="btn btn-cream"  onclick="pushToCloud()">⬆️ 推送雲端</button>
    <button class="btn btn-cream"  onclick="pullFromCloud()">⬇️ 從雲端同步</button>
  </div>
  <div class="footer-main">
    <button class="btn-report" onclick="buildReport()">
      <span>📋 生成採購單</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
    <button class="btn btn-cream" style="padding:13px 10px;border-radius:var(--r2);font-size:11px;" onclick="showHistory()">📦<br>紀錄</button>
    <button class="btn-reset" onclick="resetCart()">清除<br>重選</button>
  </div>
</div>

<!-- ── REPORT MODAL ── -->
<div class="overlay" id="overlay">
  <div class="sheet" id="modalBox">
    <span class="sheet-handle"></span>
    <div class="sheet-title" id="rptTitle"></div>
    <div class="modal-meta" id="rptMeta"></div>
    <div id="rptList"></div>
    <div class="rpt-total" id="rptTotal"></div>
    <div style="margin-top:10px;">
      <div style="font-size:12px;font-weight:700;color:var(--dark);margin-bottom:5px;">備註（選填）</div>
      <input id="orderNote" type="text" placeholder="例：急件、請優先處理..." style="width:100%;font-size:12px;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--cream2);font-family:inherit;outline:none;">
    </div>
    <div class="modal-actions">
      <button class="modal-btn" style="background:var(--dark);color:white;" onclick="doPrint()">🖨 列印 ／ 儲存 PDF（電腦）</button>
      <button class="modal-btn" style="background:var(--green);color:white;" id="imgDownBtn" onclick="downloadReportImage()">📥 儲存採購單圖片（手機長按）</button>
      <button class="modal-btn" id="submitBtn" style="background:var(--cream-dark);color:white;" onclick="submitOrder()">📤 提交採購單至後台</button>
      <button class="modal-btn" style="background:var(--cream);color:var(--cream-deep);border:1.5px solid var(--cream-border);" onclick="closeModal()">← 返回編輯</button>
    </div>
    <div class="hint-txt" id="modalHint"></div>
  </div>
</div>

<!-- ── HISTORY MODAL ── -->
<div class="overlay" id="histOverlay">
  <div class="sheet" style="max-height:90vh;">
    <span class="sheet-handle"></span>
    <div class="sheet-title">📦 採購歷史紀錄</div>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
      <button class="btn btn-dark"   onclick="exportHistExcel()" style="flex:1;">📊 匯出 Excel</button>
      <button class="btn btn-cream"  onclick="exportHistPdf()"   style="flex:1;">📄 列印 PDF</button>
      <button class="btn btn-red"    onclick="clearHistory()">🗑 清除全部</button>
      <button class="btn btn-dark"   onclick="closeHistory()" style="flex:1;">← 關閉</button>
    </div>
    <div id="histList"></div>
  </div>
</div>

<!-- ── IMAGE DOWNLOAD OVERLAY ── -->
<div id="imgOverlay" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.85);align-items:center;justify-content:center;flex-direction:column;padding:20px;">
  <div style="font-size:13px;color:white;text-align:center;margin-bottom:14px;line-height:1.7;">
    📱 <strong>手機：長按下方圖片 → 儲存至相簿</strong><br>
    💻 電腦：右鍵圖片 → 另存圖片
  </div>
  <img id="reportImg" style="max-width:100%;max-height:70vh;border-radius:10px;display:block;" alt="採購單">
  <button onclick="document.getElementById('imgOverlay').style.display='none'" style="margin-top:16px;padding:12px 32px;background:white;color:#164E33;border:none;border-radius:10px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;">← 關閉</button>
</div>

<script>
/* ═══════════════════════════════════════════════

/* ═══════ AUTO-ID ═══════ */
function computeIds(arr){
  const cnt={};
  return arr.map(item=>{
    const c=item.cat||'X'; cnt[c]=(cnt[c]||0)+1;
    const autoId=c+String(cnt[c]).padStart(2,'0');
    // manualId overrides auto; keep _autoId for placeholder
    return {...item, id:item.manualId||autoId, _autoId:autoId};
  });
}
function getDbWithIds(){return computeIds(db);}
function cartKey(i){return i.cat+'::'+i.n;}
function cartGet(i){return cart[cartKey(i)]||{sel:false,qty:1};}

/* ═══════ STATE ═══════ */
const LS='ys11_'; // bumped — avoids stale localStorage from old versions
let db,cart={},sites,config,stepData,cats,catOrder,imgBase,logoSrc,gsUrl,isAdmin=false,currentTab='ALL';

function lsGet(key){
  // Safe localStorage read — returns null on any error or empty/invalid value
  try{
    const raw=localStorage.getItem(key);
    if(!raw||raw==='null'||raw==='undefined')return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

function init(){
  // Use lsGet for safe reads with proper fallbacks
  const savedDb    = lsGet(LS+'db');
  db       = (savedDb&&savedDb.length)          ? savedDb    : DEF_DB;

  const savedSites = lsGet(LS+'sites');
  sites    = (savedSites&&savedSites.length)    ? savedSites : DEF_SITES;

  const savedCfg   = lsGet(LS+'cfg');
  config   = (savedCfg&&savedCfg.title)         ? savedCfg   : {title:'工安標語採購系統'};

  const savedCats  = lsGet(LS+'cats');
  cats     = (savedCats&&Object.keys(savedCats).length) ? savedCats : DEF_CATS;

  const savedOrd   = lsGet(LS+'catOrd');
  catOrder = (savedOrd&&savedOrd.length)        ? savedOrd   : Object.keys(DEF_CATS);

  // stepData: restore defaults if missing or all items empty
  const savedSteps = lsGet(LS+'steps');
  if(savedSteps&&Object.keys(savedSteps).length){
    const hasItems=Object.values(savedSteps).some(s=>Array.isArray(s.items)&&s.items.length>0);
    stepData = hasItems ? savedSteps : DEF_STEPS;
  } else {
    stepData = DEF_STEPS;
  }

  cart    = {};
  imgBase = localStorage.getItem(LS+'imgBase') || 'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';
  logoSrc = localStorage.getItem(LS+'logo')    || '';
  gsUrl   = localStorage.getItem(LS+'gsUrl')   || '';

  document.getElementById('staffInput').value = localStorage.getItem(LS+'staff')||'';
  renderLogo();renderTitle();renderSites();renderTabs();render();updateBadge();
  updateSyncDot();
  if(gsUrl) pullFromCloud(true);
}

}

/* ═══════ LOGO ═══════ */
function renderLogo(){
  const el=document.getElementById('logoEl');
  el.className='hdr-logo'+(isAdmin?' editable':'');
  el.innerHTML=logoSrc?`<img src="${logoSrc}" alt="">`:'🦺';
  el.onclick=isAdmin?changeLogo:null;
}
function changeLogo(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.style.cssText='position:fixed;top:-999px;';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=200,scale=Math.min(1,MAX/Math.max(img.width,img.height));
        const c=document.createElement('canvas');
        c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        logoSrc=c.toDataURL('image/png',.92);
        localStorage.setItem(LS+'logo',logoSrc);
        renderLogo();showToast('✅ 圖示已更新');
      };
      img.onerror=()=>alert('圖片讀取失敗，請換一張試試');
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  document.body.appendChild(inp);inp.click();
  setTimeout(()=>{if(inp.parentNode)inp.parentNode.removeChild(inp);},30000);
}

/* ═══════ TABS ═══════ */
function scrollTabs(d){document.getElementById('tabsEl').scrollBy({left:d,behavior:'smooth'});}
function renderTabs(){
  let h='';
  Object.keys(stepData).sort().forEach(k=>{
    const t=stepData[k].t,act=currentTab===k?' active':'';
    h+=isAdmin
      ?`<div class="tab step-tab${act}" onclick="setTab('${k}')"><input class="tab-edit-input" value="${esc(t)}" onclick="event.stopPropagation()" oninput="stepData['${k}'].t=this.value;save()"><span style="margin-left:2px;opacity:.5;font-size:10px;cursor:pointer;" onclick="event.stopPropagation();deleteStep('${k}')">✕</span></div>`
      :`<div class="tab step-tab${act}" onclick="setTab('${k}')">${t}</div>`;
  });
  h+=`<span class="tab-sep"></span>`;
  h+=`<div class="tab all-tab${currentTab==='ALL'?' active':''}" onclick="setTab('ALL')">📋 全部</div>`;
  h+=`<span class="tab-sep"></span>`;
  catOrder.forEach(k=>{
    if(!cats[k])return;
    const act=currentTab===k?' active':'';
    h+=isAdmin
      ?`<div class="tab cat-tab${act}" onclick="setTab('${k}')"><input class="tab-edit-input" style="width:66px;" value="${esc(cats[k])}" onclick="event.stopPropagation()" oninput="cats['${k}']=this.value;save()"><span style="margin-left:2px;opacity:.45;font-size:10px;cursor:pointer;" onclick="event.stopPropagation();deleteCat('${k}')">✕</span></div>`
      :`<div class="tab cat-tab${act}" onclick="setTab('${k}')">${cats[k]}</div>`;
  });
  document.getElementById('tabsEl').innerHTML=h;
}
function setTab(t){
  currentTab=t;renderTabs();render();
  requestAnimationFrame(()=>{
    const el=document.querySelector('.tabs-scroll .tab.active');
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
}

/* ═══════ RENDER ═══════ */
function render(){
  const dbIds=getDbWithIds();
  let list;
  if(stepData[currentTab]) list=dbIds.filter(x=>stepData[currentTab].items.includes(x.id));
  else if(currentTab==='ALL') list=[...dbIds];
  else list=dbIds.filter(x=>x.cat===currentTab);
  const grid=document.getElementById('gridEl');
  if(!list.length){grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div style="font-size:14px;color:var(--ink4);">此分類暫無標語</div></div>`;document.getElementById('mainArea').classList.remove('isAdmin');return;}
  grid.innerHTML='';
  list.forEach(item=>{
    const st=cartGet(item);const d=document.createElement('div');
    d.className='card'+(st.sel?' sel':'');
    const imgUrl=imgBase+item.id+'.jpg';
    const idBadge=isAdmin
      ?`<input class="a-id-edit" value="${esc(item.manualId||'')}" placeholder="${item._autoId}" title="手動編號（空白=自動 ${item._autoId}）" oninput="setManualId('${item.cat}','${escQ(item.n)}',this.value)">`
      :`<span class="card-id">${item.id}</span>`;
    const nameH=isAdmin?`<input class="a-name" value="${esc(item.n)}" oninput="updateName('${item.cat}','${escQ(item.n)}',this.value)">`:`<div class="card-name">${item.n}</div>`;
    const specR=isAdmin?`<input class="a-spec spec-tag spec-r" value="${esc(item.s)}" oninput="updateField('${item.cat}','${escQ(item.n)}','s',this.value)">`:`<span class="spec-tag spec-r">${item.s}</span>`;
    const specM=isAdmin?`<input class="a-spec spec-tag spec-m" value="${esc(item.m)}" oninput="updateField('${item.cat}','${escQ(item.n)}','m',this.value)">`:`<span class="spec-tag spec-m">${item.m}</span>`;
    const delB=isAdmin?`<button class="admin-del-btn" onclick="event.stopPropagation();deleteItem('${item.cat}','${escQ(item.n)}')">✕</button>`:'';
    d.innerHTML=`${delB}<div class="card-check"><span class="check-icon">✓</span></div>
      <div class="card-img"><img src="${imgUrl}" onload="this.style.opacity=1" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="opacity:0;transition:opacity .2s" alt=""><div class="img-placeholder" style="display:none"><span>🖼</span><small>${item.id}<br>無圖</small></div></div>
      <div class="card-body"><div><div class="card-meta">${idBadge}<span class="card-cat">${cats[item.cat]||item.cat}</span></div>${nameH}<div class="card-specs">${specR}${specM}</div></div>
        <div class="card-footer">${st.sel?'<span class="sel-chip">✓ 已選取</span>':'<span></span>'}
          <div class="qty-ctrl" onclick="event.stopPropagation()"><button class="qty-btn" onclick="adjQty('${item.cat}','${escQ(item.n)}',-1)">−</button><span class="qty-num">${st.qty||1}</span><button class="qty-btn" onclick="adjQty('${item.cat}','${escQ(item.n)}',1)">＋</button></div></div></div>`;
    d.addEventListener('click',e=>{if(e.target.tagName!=='INPUT'&&e.target.tagName!=='BUTTON')toggleItem(item.cat,item.n);});
    grid.appendChild(d);
  });
  if(isAdmin)document.getElementById('mainArea').classList.add('isAdmin');
  else document.getElementById('mainArea').classList.remove('isAdmin');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function escQ(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* ═══════ CART ═══════ */
function toggleItem(cat,n){const item=db.find(x=>x.cat===cat&&x.n===n);if(!item)return;const k=cartKey(item);if(!cart[k])cart[k]={sel:false,qty:1};cart[k].sel=!cart[k].sel;render();updateBadge();}
function adjQty(cat,n,delta){event.stopPropagation();const item=db.find(x=>x.cat===cat&&x.n===n);if(!item)return;const k=cartKey(item);if(!cart[k])cart[k]={sel:true,qty:1};cart[k].qty=Math.max(1,(cart[k].qty||1)+delta);if(delta>0&&!cart[k].sel)cart[k].sel=true;render();updateBadge();}
function updateBadge(){document.getElementById('cartBadge').textContent=getDbWithIds().filter(x=>cartGet(x).sel).length;}
function resetCart(){if(confirm('確認清除所有選取？')){cart={};render();updateBadge();}}

/* ═══════ DB MUTATIONS ═══════ */
function updateName(cat,oldN,newN){const item=db.find(x=>x.cat===cat&&x.n===oldN);if(!item)return;const ok=cartKey(item),sv=cart[ok];delete cart[ok];item.n=newN;if(sv!==undefined)cart[cartKey(item)]=sv;save();}
function updateField(cat,n,f,v){const item=db.find(x=>x.cat===cat&&x.n===n);if(item){item[f]=v;save();}}
function deleteItem(cat,n){if(!confirm(`確定刪除「${n}」？`))return;const idx=db.findIndex(x=>x.cat===cat&&x.n===n);if(idx<0)return;db.splice(idx,1);delete cart[cat+'::'+n];save();render();updateBadge();}
function setManualId(cat,n,val){
  const item=db.find(x=>x.cat===cat&&x.n===n); if(!item)return;
  const v=val.trim();
  if(v) item.manualId=v; else delete item.manualId;
  save(); render();
}

/* ═══════ ADD SIGN ═══════ */
function addNewSign(){
  const catStr=catOrder.filter(k=>cats[k]).map((k,i)=>`${i+1}. ${cats[k]} (${k})`).join('\n');
  const choice=prompt(`選擇類別代碼（如 A）：\n\n${catStr}`);if(!choice)return;
  const cat=choice.toUpperCase().trim();
  if(!cats[cat]){if(!confirm(`類別「${cat}」不存在，要自動建立嗎？`))return;cats[cat]=cat+'. 新分類';catOrder.push(cat);}
  const nm=prompt(`在「${cats[cat]}」中新增標語名稱：`);if(!nm||!nm.trim())return;
  const name=nm.trim();
  // Detect duplicate or similar names in same category
  const dbIds=getDbWithIds();
  const same=dbIds.filter(x=>x.cat===cat&&x.n===name);
  const similar=dbIds.filter(x=>x.cat===cat&&x.n!==name&&(x.n.includes(name)||name.includes(x.n)));
  let manualId=undefined;
  if(same.length>0){
    // exact duplicate exists — auto-assign suffix id
    const existId=same[same.length-1].manualId||same[same.length-1].id;
    const suggested=existId+'-1';
    const ans=prompt(`「${name}」在 ${cat} 類已存在（${existId}）。\n新編號建議：${suggested}\n（可修改或留空自動編號）`, suggested);
    if(ans===null)return;
    if(ans.trim())manualId=ans.trim();
  } else if(similar.length>0){
    const names=similar.map(x=>`${x.id} ${x.n}`).join('、');
    const ans=prompt(`偵測到相似標語：${names}\n是否為新圖案指定手動編號？（留空則自動編號）`,'');
    if(ans===null)return;
    if(ans.trim())manualId=ans.trim();
  }
  const newItem={cat,n:name,s:'60x40',m:'中空板'};
  if(manualId)newItem.manualId=manualId;
  db.push(newItem);
  save();renderTabs();render();setTab(cat);
}
function addStep(){const t=prompt('工序標籤名稱（含emoji）：',`🔧 Step${Object.keys(stepData).length+1} 新工序`);if(!t)return;let key='S'+(Object.keys(stepData).length+1);while(stepData[key])key='S'+(parseInt(key.slice(1))+1);stepData[key]={t,items:[]};save();renderTabs();setTab(key);}

/* ═══════ DOWNLOAD REPORT AS IMAGE ═══════ */
function buildReportCanvas(cb){
  // Build off-screen HTML then draw to canvas via a blob URL approach
  const W=680;
  const rowH=38, headerH=170;
  const totalH=headerH+(_sel.length*rowH)+50;
  const canvas=document.createElement('canvas');
  const dpr=2; // retina
  canvas.width=W*dpr; canvas.height=totalH*dpr;
  canvas.style.width=W+'px'; canvas.style.height=totalH+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // helpers
  const rnd=(x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();};
  const font=(sz,wt)=>ctx.font=`${wt||'400'} ${sz}px 'Noto Sans TC',sans-serif`;

  // background
  ctx.fillStyle='#FFFDF5'; ctx.fillRect(0,0,W,totalH);

  // header bar
  ctx.fillStyle='#164E33'; rnd(14,14,W-28,54,8); ctx.fill();
  ctx.fillStyle='white'; font(16,'900'); ctx.textAlign='left'; ctx.fillText(config.title+' 採購單',28,49);
  font(11); ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,.75)'; ctx.fillText(_now,W-28,49);

  // meta bar
  const metaY=80; const metaH=44;
  ctx.fillStyle='#FFFBF0'; rnd(14,metaY,W-28,metaH,6); ctx.fill();
  ctx.strokeStyle='#E2C96A'; ctx.lineWidth=1; rnd(14,metaY,W-28,metaH,6); ctx.stroke();
  const labels=['工地名稱','負責人員','填單日期'];
  const vals=[_site,_staff,_now];
  const colW=(W-28)/3;
  labels.forEach((lb,i)=>{
    const cx=14+i*colW;
    ctx.fillStyle='#94A3B8'; font(9); ctx.textAlign='left'; ctx.fillText(lb,cx+10,metaY+14);
    ctx.fillStyle='#0F172A'; font(12,'700'); ctx.fillText(vals[i],cx+10,metaY+32);
    if(i<2){ctx.beginPath();ctx.strokeStyle='#E2C96A';ctx.lineWidth=1;ctx.moveTo(cx+colW,metaY+4);ctx.lineTo(cx+colW,metaY+metaH-4);ctx.stroke();}
  });

  // table header
  const tY=138;
  ctx.fillStyle='#FFFBF0'; ctx.fillRect(14,tY,W-28,26);
  ctx.strokeStyle='#E2C96A'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(14,tY+26); ctx.lineTo(W-14,tY+26); ctx.stroke();
  const cols=[{l:'#',w:28,align:'center'},{l:'編號',w:52,align:'left'},{l:'名稱',w:W-28-28-52-56-56,align:'left'},{l:'規格',w:56,align:'left'},{l:'材質',w:56,align:'left'},{l:'數量',w:46,align:'right'}];
  let cx2=14;
  cols.forEach(col=>{
    ctx.fillStyle='#164E33'; font(10,'700');
    ctx.textAlign=col.align;
    const tx=col.align==='right'?cx2+col.w-4:col.align==='center'?cx2+col.w/2:cx2+5;
    ctx.fillText(col.l,tx,tY+18);
    cx2+=col.w;
  });

  // rows
  _sel.forEach((item,idx)=>{
    const ry=tY+26+idx*rowH;
    ctx.fillStyle=idx%2===0?'#fff':'#FEFDF8'; ctx.fillRect(14,ry,W-28,rowH);
    ctx.strokeStyle='#F1F5F9'; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(14,ry+rowH); ctx.lineTo(W-14,ry+rowH); ctx.stroke();
    const qty=cartGet(item).qty||1;
    const vals2=[idx+1, item.id, item.n, item.s, item.m, qty];
    let cx3=14;
    cols.forEach((col,ci)=>{
      ctx.fillStyle=ci===1?'#164E33':ci===5?'#164E33':'#0F172A';
      const fw=ci===0||ci===5?'700':ci===2?'900':'400';
      font(ci===5?16:ci===2?13:12, fw);
      ctx.textAlign=col.align;
      const tx=col.align==='right'?cx3+col.w-4:col.align==='center'?cx3+col.w/2:cx3+5;
      // clip long text
      const maxW=col.w-8;
      const txt=String(vals2[ci]);
      let display=txt;
      if(ctx.measureText(txt).width>maxW){
        let t=txt;while(t.length>1&&ctx.measureText(t+'…').width>maxW)t=t.slice(0,-1);
        display=t+'…';
      }
      ctx.fillText(display,tx,ry+rowH/2+5);
      cx3+=col.w;
    });
  });

  // footer total bar
  const ftY=tY+26+_sel.length*rowH+8;
  ctx.fillStyle='#164E33'; rnd(14,ftY,W-28,36,6); ctx.fill();
  ctx.fillStyle='white'; font(13,'700'); ctx.textAlign='left'; ctx.fillText(`合計 ${_sel.length} 品項`,28,ftY+24);
  ctx.textAlign='right'; ctx.fillText(`合計 ${_totalQty} 件`,W-28,ftY+24);

  cb(canvas.toDataURL('image/png'));
}

/* ═══════ SUBMIT ORDER TO BACKEND ═══════ */
async function submitOrder(){
  if(!_sel||!_sel.length){alert('請先生成採購單');return;}
  const btn=document.getElementById('submitBtn');
  const hint=document.getElementById('modalHint');
  const note=document.getElementById('orderNote')?document.getElementById('orderNote').value:'';
  const record={
    id:Date.now(),date:_now,site:_site,staff:_staff,totalQty:_totalQty,
    items:_sel.map(i=>({id:i.id,n:i.n,s:i.s,m:i.m,qty:cartGet(i).qty||1})),
    note
  };
  // Always save locally first
  saveHistLocal(record);
  if(!gsUrl){
    hint.innerHTML='<span style="color:var(--green);font-weight:700;">✅ 已儲存至本機紀錄</span><br><small style="color:var(--ink3);">（未設定雲端，僅本機）</small>';
    showToast('✅ 已儲存本機紀錄');
    return;
  }
  btn.textContent='⏳ 提交中，請稍候...'; btn.disabled=true;
  hint.innerHTML='<span style="color:var(--ink3);">⏳ 正在送出...</span>';
  try{
    const res=await pushHistToCloud(record);
    if(res&&res.ok){
      hint.innerHTML='<span style="color:var(--green);font-weight:700;">✅ 採購單已送至 Google Sheets！</span>';
      showToast('✅ 採購單已提交後台！',3500);
      resetCart();
      setTimeout(closeModal,2200);
    } else {
      const err=res?res.error:'無回應';
      hint.innerHTML=`<span style="color:#DC2626;">⚠️ 雲端失敗（${err}），資料已存本機。</span>`;
      showToast('⚠️ 雲端失敗，已存本機',4000);
    }
  }catch(e){
    hint.innerHTML=`<span style="color:#DC2626;">⚠️ 錯誤：${e.message}，資料已存本機。</span>`;
    showToast('⚠️ 發生錯誤，已存本機',4000);
  }finally{
    btn.textContent='📤 提交採購單至後台'; btn.disabled=false;
  }
}

/* ── JSONP: works from any domain, no CORS issues ── */
function jsonpCall(url, ms){
  return new Promise((resolve,reject)=>{
    const cb='__gs_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const el=document.createElement('script');
    const t=setTimeout(()=>{
      cleanup();
      reject(new Error('逾時12秒。請確認：①已部署網頁應用程式 ②存取對象=所有人（包含匿名）③網址結尾是/exec'));
    }, ms||12000);
    function cleanup(){clearTimeout(t);el.parentNode&&el.parentNode.removeChild(el);delete window[cb];}
    window[cb]=d=>{cleanup();resolve(d);};
    el.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    el.onerror=()=>{cleanup();reject(new Error('無法載入 Script，請確認 Apps Script 網址正確'));};
    document.head.appendChild(el);
  });
}
function buildGasUrl(params){
  const pw=localStorage.getItem(LS+'adminPw')||'751113';
  const all={...params,pw};
  return gsUrl+'?'+Object.entries(all).map(([k,v])=>
    encodeURIComponent(k)+'='+encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)
  ).join('&');
}
function setSyncDot(state){
  const d=document.getElementById('syncDot');
  d.className='sync-dot'+(state==='off'?' off':state==='syncing'?' syncing':'');
}
async function gasGet(params){
  if(!gsUrl)return null;
  setSyncDot('syncing');
  try{const d=await jsonpCall(buildGasUrl(params));setSyncDot('ok');return d;}
  catch(e){setSyncDot('off');return{ok:false,error:e.message};}
}
/* For large payloads: encode as base64, chunk if needed */
async function gasSend(action, extra){
  if(!gsUrl)return null;
  setSyncDot('syncing');
  try{
    const pw=localStorage.getItem(LS+'adminPw')||'751113';
    const json=JSON.stringify({action,...extra,pw});
    const enc=btoa(unescape(encodeURIComponent(json)));
    const CHUNK=1600;
    if(enc.length<=CHUNK){
      const d=await jsonpCall(gsUrl+'?encoded='+encodeURIComponent(enc));
      setSyncDot('ok');return d;
    }
    // chunked
    const chunks=[];
    for(let i=0;i<enc.length;i+=CHUNK)chunks.push(enc.slice(i,i+CHUNK));
    const sid='s'+Date.now();
    for(let i=0;i<chunks.length;i++){
      const last=i===chunks.length-1;
      const url=buildGasUrl({action:'chunk',sid,idx:i,total:chunks.length,last:last?1:0,data:chunks[i]});
      const d=await jsonpCall(url);
      if(!d||!d.ok)throw new Error('第'+(i+1)+'批失敗：'+(d?d.error:'無回應'));
    }
    setSyncDot('ok');return{ok:true};
  }catch(e){setSyncDot('off');return{ok:false,error:e.message};}
}

async function pullFromCloud(silent=false){
  if(!gsUrl){if(!silent)openCloudSetup&&openCloudSetup();return;}
  const res=await gasGet({action:'loadAll'});
  if(!res||!res.ok){if(!silent)showToast('⚠️ 同步失敗：'+(res?res.error:'逾時'),5000);return;}
  if(res.db&&res.db.length)        db=res.db;
  if(res.sites&&res.sites.length)  sites=res.sites;
  if(res.config)                   config=res.config;
  if(res.steps)                    stepData=res.steps;
  if(res.cats)                     cats=res.cats;
  if(res.catOrder&&res.catOrder.length) catOrder=res.catOrder;
  if(res.imgBase)                  imgBase=res.imgBase;
  if(res.logo&&res.logo.length>5)  {logoSrc=res.logo;localStorage.setItem(LS+'logo',logoSrc);}
  save();renderLogo();renderTitle();renderSites();renderTabs();render();updateBadge();
  if(!silent)showToast('⬇️ 已從雲端同步最新內容');
}

async function pushToCloud(){
  if(!gsUrl){alert('請先設定雲端網址（管理員→☁️ 雲端設定）');return;}
  showToast('⬆️ 推送中...',10000);
  const res=await gasSend('saveAll',{data:{db,sites,config,stepData,cats,catOrder,imgBase}});
  if(res&&res.ok)showToast('✅ 已推送至 Google Sheets！');
  else{const m=res?res.error:'網路逾時';showToast('⚠️ 推送失敗：'+m,6000);}
}

async function pushHistToCloud(record){
  if(!gsUrl)return{ok:false,error:'未設定雲端'};
  return await gasSend('saveHistory',{record});
}

/* ═══════ ADMIN ═══════ */
function openCloudSetup(){
  const v=prompt('請輸入 Google Apps Script 網址（結尾須為 /exec）：',gsUrl||'');
  if(v===null)return;
  gsUrl=v.trim();
  localStorage.setItem(LS+'gsUrl',gsUrl);
  updateSyncDot();
  if(gsUrl)showToast('☁️ 雲端網址已儲存，請試試推送');
}
function toggleAdmin(){
  if(!isAdmin){
    const pw=prompt('請輸入管理員密碼：');
    if(pw==='751113'){
      isAdmin=true;localStorage.setItem(LS+'adminPw',pw);
      document.getElementById('adminBtn').textContent='🔓 管理中';
      document.getElementById('adminBtn').classList.add('active');
      document.getElementById('adminPanel').classList.add('show');
    } else if(pw!==null)alert('密碼錯誤');
  } else {
    isAdmin=false;
    document.getElementById('adminBtn').textContent='🔒 管理員';
    document.getElementById('adminBtn').classList.remove('active');
    document.getElementById('adminPanel').classList.remove('show');
  }
  renderLogo();renderTitle();renderTabs();render();
}

/* ═══════ PERSISTENCE ═══════ */
function save(){
  localStorage.setItem(LS+'db',JSON.stringify(db));
  localStorage.setItem(LS+'staff',document.getElementById('staffInput').value);
  localStorage.setItem(LS+'site',document.getElementById('siteSelect').value);
  localStorage.setItem(LS+'cfg',JSON.stringify(config));
  localStorage.setItem(LS+'steps',JSON.stringify(stepData));
  localStorage.setItem(LS+'cats',JSON.stringify(cats));
  localStorage.setItem(LS+'catOrd',JSON.stringify(catOrder));
  localStorage.setItem(LS+'sites',JSON.stringify(sites));
}
function configImgBase(){const v=prompt('圖片路徑 Base URL（以 / 結尾）：',imgBase);if(v!==null&&v.trim()){imgBase=v.trim();localStorage.setItem(LS+'imgBase',imgBase);render();}}
function exportData(){const d={db,sites,config,stepData,cats,catOrder,imgBase,logoSrc};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`工安標語備份_${new Date().toISOString().slice(0,10)}.json`;a.click();}
function importData(){const j=prompt('貼上備份 JSON：');if(!j)return;try{const d=JSON.parse(j);if(d.db)db=d.db;if(d.sites)sites=d.sites;if(d.config)config=d.config;if(d.stepData)stepData=d.stepData;if(d.cats)cats=d.cats;if(d.catOrder)catOrder=d.catOrder;if(d.imgBase)imgBase=d.imgBase;if(d.logoSrc){logoSrc=d.logoSrc;localStorage.setItem(LS+'logo',logoSrc);}save();location.reload();}catch(e){alert('格式錯誤');}}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('histOverlay').addEventListener('click',function(e){if(e.target===this)closeHistory();});
init();
</script>
