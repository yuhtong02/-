<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ───── 核心視覺樣式 (完全對齊原始深綠版) ───── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#064E3B;--mid:#10B981;--light:#34D399;--pale:#D1FAE5;--pale2:#ECFDF5;
  --ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#94A3B8;
  --bg:#FEF8E6;--surface:#FFFFFF;--border:#E9E1C8;--border2:#064E3B;
  --red:#DC2626;--amber:#D97706;--blue:#1D4ED8;
  --r:14px;--r2:10px;--r3:8px;
  --shadow:0 1px 3px rgba(6,78,59,0.08),0 4px 12px rgba(6,78,59,0.05);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;min-height:100vh;}

.hdr{background:var(--dark);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:900;letter-spacing:0.3px;}
.admin-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;}

.ctrl{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;flex-shrink:0;align-items:center;}
.ctrl select, .ctrl input{font-family:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r3);background:var(--bg);outline:none;}

.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tabs-scroll{display:flex;padding:12px 16px;gap:6px;}
.tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--ink3);white-space:nowrap;}
.tab.active{background:var(--dark);color:white;border-color:var(--dark);}

.main{flex:1;overflow-y:auto;padding:14px 16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}

.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px;display:flex;gap:12px;cursor:pointer;position:relative;box-shadow:var(--shadow);}
.card.sel{border-color:var(--dark);background:rgba(6, 78, 59, 0.03);border-width:2px;}
.card-img{width:90px;height:75px;border-radius:var(--r3);border:1.5px solid var(--border);overflow:hidden;background:#F8FAFC;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card-img img{width:100%;height:100%;object-fit:contain;}
.card-name{font-size:14px;font-weight:900;color:var(--dark);margin-bottom:4px;}
.spec-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;display:inline-block;cursor:pointer;}
.spec-r{background:#FEF2F2;color:var(--red);}
.spec-m{background:#EFF6FF;color:var(--blue);}
.qty-num{font-size:22px;font-weight:900;color:var(--dark);min-width:28px;text-align:center;}

.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:12px 16px;}
.btn-report{width:100%;background:var(--dark);color:white;border:none;padding:14px;border-radius:var(--r2);font-size:15px;font-weight:900;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:10px;}
.admin-panel{background:#F1F5F9;padding:10px;border-radius:8px;margin-bottom:10px;display:none;flex-direction:column;gap:8px;border:1px dashed var(--dark);}

/* ───── 採購單彈窗 ───── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:white;width:100%;max-width:680px;border-radius:20px 20px 0 0;padding:20px;max-height:92vh;overflow-y:auto;}
.report-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #F1F5F9;}
.rpt-img{width:60px;height:50px;object-fit:contain;background:#F8FAFC;border:1px solid var(--border);border-radius:4px;}
.rpt-qty{font-size:20px;font-weight:900;color:var(--dark);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">工安標語採購系統</div>
  <button class="admin-btn" onclick="toggleAdmin()">🔒 管理員</button>
</div>

<div class="ctrl">
  <select id="siteSelect" onchange="save()"></select>
  <input type="text" id="staffInput" placeholder="負責人員" oninput="save()">
</div>

<div class="tabs-outer">
  <div class="tabs-scroll" id="tabsEl"></div>
</div>

<div class="main">
  <div class="grid" id="gridEl"></div>
</div>

<div class="footer">
  <div class="admin-panel" id="adminPanel">
    <div style="display:flex; gap:5px;">
        <input type="text" id="imgBaseInput" placeholder="圖片路徑 (如 https://.../img/)" style="flex:1;" onchange="updateImgBase(this.value)">
        <button onclick="addNewSign()" style="padding:0 10px;">➕ 新增標語</button>
    </div>
    <div style="display:flex; gap:5px;">
        <button onclick="exportData()" style="flex:1;">📤 備份</button>
        <button onclick="importData()" style="flex:1;">📥 還原</button>
        <button onclick="deleteSite()" style="color:red;">🗑 刪除工地</button>
    </div>
  </div>
  <button class="btn-report" onclick="buildReport()">📋 生成採購單 (<span id="cartBadge">0</span>)</button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div id="modalPrintArea">
      <div style="text-align:center;font-weight:900;font-size:20px;margin-bottom:15px;color:var(--dark);">工安標語採購單</div>
      <div id="rptMeta" style="display:flex;justify-content:space-around;font-size:13px;border-bottom:2px solid var(--dark);padding-bottom:15px;margin-bottom:10px;"></div>
      <div id="rptList"></div>
      <div id="rptSummary" style="text-align:right;padding-top:15px;font-weight:900;"></div>
    </div>
    <div style="margin-top:15px; display:flex; flex-direction:column; gap:8px;">
      <button class="btn-report" onclick="window.print()">🖨 列印 / 下載 PDF</button>
      <button onclick="closeModal()" style="padding:10px; border:none; background:#eee; border-radius:8px; cursor:pointer;">返回</button>
    </div>
  </div>
</div>

<script>
/* 100% 完整原始資料回歸 */
const DEF_SITES=["嘉義創世基金會","嘉義嘉科實中","嘉義博愛安居","嘉義北門集合住宅","嘉義民雄院區","臺南林森圖書館"];
const DEF_DB=[
  {id:'J01',cat:'J',n:'工程告示牌',s:'120x90',m:'鍍鋅鐵板'},{id:'J02',cat:'J',n:'安衛告示牌',s:'60x40',m:'中空板'},{id:'J03',cat:'J',n:'工地上梁典禮',s:'90x60',m:'中空板'},
  {id:'K01',cat:'K',n:'守衛室',s:'30x10',m:'PVC'},{id:'K02',cat:'K',n:'統包商辦營室',s:'30x10',m:'PVC'},{id:'K03',cat:'K',n:'監造單位辦公室',s:'30x10',m:'PVC'},{id:'K04',cat:'K',n:'管理單位辦公室',s:'30x10',m:'PVC'},{id:'K05',cat:'K',n:'會議室',s:'30x10',m:'PVC'},{id:'K06',cat:'K',n:'倉庫',s:'30x10',m:'PVC'},{id:'K07',cat:'K',n:'建材展覽室',s:'30x10',m:'PVC'},{id:'K08',cat:'K',n:'休息區',s:'30x10',m:'PVC'},{id:'K09',cat:'K',n:'飲水機',s:'20x10',m:'PVC'},{id:'K10',cat:'K',n:'急救箱',s:'20x10',m:'PVC'},{id:'K11',cat:'K',n:'汽車停放區',s:'60x20',m:'中空板'},{id:'K12',cat:'K',n:'機車停放區',s:'60x20',m:'中空板'},{id:'K13',cat:'K',n:'工地／學校名稱',s:'依需求',m:'鍍鋅鐵板'},{id:'K14',cat:'K',n:'各棟別名稱',s:'依需求',m:'鍍鋅鐵板'},
  {id:'A01',cat:'A',n:'男化妝室',s:'30x10',m:'PVC'},{id:'A02',cat:'A',n:'女化妝室',s:'30x10',m:'PVC'},{id:'A03',cat:'A',n:'小便斗',s:'20x10',m:'PVC'},
  {id:'B01',cat:'B',n:'進入工區請戴安全帽',s:'60x40',m:'中空板'},{id:'B02',cat:'B',n:'背負式安全帶穿戴步驟',s:'60x40',m:'中空板'},{id:'B03',cat:'B',n:'打開柵門作業請穿戴背負式安全帶',s:'60x40',m:'中空板'},{id:'B04',cat:'B',n:'施工架相關規定',s:'60x40',m:'中空板'},{id:'B05',cat:'B',n:'今日危害因素告示牌',s:'60x40',m:'中空板'},{id:'B06',cat:'B',n:'工具箱會議',s:'60x40',m:'中空板'},{id:'B07',cat:'B',n:'熱危害宣導',s:'60x40',m:'中空板'},{id:'B08',cat:'B',n:'安全第一',s:'60x20',m:'中空板'},
  {id:'C01',cat:'C',n:'開口危險小心墜落',s:'60x40',m:'中空板'},{id:'C02',cat:'C',n:'升降梯開口危險',s:'60x40',m:'中空板'},{id:'C03',cat:'C',n:'欄杆禁止跨越或攀爬',s:'60x40',m:'中空板'},{id:'C04',cat:'C',n:'吊料電梯專用口',s:'60x40',m:'中空板'},{id:'C05',cat:'C',n:'有電危險請勿觸碰',s:'60x40',m:'中空板'},{id:'C06',cat:'C',n:'高壓電勿近',s:'60x40',m:'中空板'},{id:'C07',cat:'C',n:'施工架嚴禁堆置物料',s:'60x40',m:'中空板'},{id:'C08',cat:'C',n:'施工電梯',s:'30x10',m:'PVC'},
  {id:'D01',cat:'D',n:'嚴禁酒後進場',s:'60x40',m:'中空板'},{id:'D02',cat:'D',n:'非工作人員禁止進入',s:'60x40',m:'中空板'},{id:'D03',cat:'D',n:'非施工必要禁止進入',s:'60x40',m:'中空板'},
  {id:'E01',cat:'E',n:'工區施工請勿停車',s:'60x40',m:'中空板'},{id:'E02',cat:'E',n:'進入工區請緩慢行駛',s:'60x40',m:'中空板'},
  {id:'F01',cat:'F',n:'滅火器',s:'20x10',m:'PVC'},{id:'F02',cat:'F',n:'安全出口',s:'30x15',m:'燈箱'},{id:'F03',cat:'F',n:'樓梯標示',s:'20x10',m:'PVC'},{id:'F04',cat:'F',n:'樓層標示',s:'20x10',m:'PVC'},{id:'F05',cat:'F',n:'放置鋼筋材料',s:'60x40',m:'中空板'},
  {id:'I01',cat:'I',n:'一般垃圾',s:'30x20',m:'PVC'},{id:'I02',cat:'I',n:'資源回收',s:'30x20',m:'PVC'},{id:'I03',cat:'I',n:'廚餘',s:'30x20',m:'PVC'},{id:'I04',cat:'I',n:'鐵鋁罐',s:'30x20',m:'PVC'},{id:'I05',cat:'I',n:'玻璃類',s:'30x20',m:'PVC'},{id:'I06',cat:'I',n:'塑膠類',s:'30x20',m:'PVC'},{id:'I07',cat:'I',n:'紙容器',s:'30x20',m:'PVC'},{id:'I08',cat:'I',n:'廚餘宣傳',s:'60x40',m:'中空板'},{id:'I09',cat:'I',n:'垃圾管道傾倒口',s:'30x20',m:'PVC'},{id:'I10',cat:'I',n:'物料暫置區',s:'60x40',m:'中空板'},{id:'I11',cat:'I',n:'營建廢棄物堆置區',s:'60x40',m:'中空板'}
];
const DEF_CATS={A:'A.生活',B:'B.安全',C:'C.危險',D:'D.禁止',E:'E.交通',F:'F.設施',I:'I.環境',J:'J.圖資',K:'K.區域',ALL:'全部'};
const DEF_STEPS={
  S1:{t:'🚧 Step1 入口',items:['J01','K01','B01','D01','E01','E02','D02']},
  S2:{t:'🏗 Step2 基礎',items:['B01','B05','C01','D03','B06']},
  S3:{t:'🔩 Step3 結構',items:['B01','B02','B03','C01','C02','C03','C07']},
  S4:{t:'🪟 Step4 裝修',items:['A01','A02','A03','K08','K09','K10','F01']},
  S5:{t:'🌿 Step5 景觀',items:['E01','E02','I01','I02','I03']},
  S6:{t:'🏁 Step6 完工',items:['K01','K05','J03','F02']}
};

let db,cart={},sites,imgBase,isAdmin=false,currentTab='S1';

function init(){
  db=JSON.parse(localStorage.getItem('ys2_db'))||DEF_DB;
  sites=JSON.parse(localStorage.getItem('ys2_sites'))||DEF_SITES;
  imgBase=localStorage.getItem('ys2_imgBase')||'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';
  document.getElementById('imgBaseInput').value=imgBase;
  renderSites();renderTabs();render();
}

function renderSites(){
  const s=document.getElementById('siteSelect');
  s.innerHTML=sites.map(x=>`<option value="${x}">${x}</option>`).join('');
}

function renderTabs(){
  let h='';
  Object.keys(DEF_STEPS).sort().forEach(k=>h+=`<div class="tab ${currentTab===k?'active':''}" onclick="setTab('${k}')">${DEF_STEPS[k].t}</div>`);
  h+=`<div class="tab ${currentTab==='ALL'?'active':''}" onclick="setTab('ALL')">全部</div>`;
  document.getElementById('tabsEl').innerHTML=h;
}
function setTab(t){currentTab=t;renderTabs();render();}

function render(){
  let list = currentTab==='ALL'?db:db.filter(x=>DEF_STEPS[currentTab]?.items.includes(x.id));
  const grid=document.getElementById('gridEl');
  grid.innerHTML=list.map(item=>{
    const st=cart[item.id]||{sel:false,qty:1};
    return `
      <div class="card ${st.sel?'sel':''}" onclick="toggleItem('${item.id}')">
        <div class="card-img"><img src="${imgBase+item.id}.jpg" onerror="this.style.opacity='0.1'"></div>
        <div class="card-body">
          <div class="card-name">${item.n}</div>
          <div>
            <span class="spec-tag spec-r" onclick="editSpec('${item.id}','s',event)">${item.s}</span>
            <span class="spec-tag spec-m" onclick="editSpec('${item.id}','m',event)">${item.m}</span>
          </div>
          <div style="display:flex;justify-content:flex-end;align-items:center;margin-top:10px;" onclick="event.stopPropagation()">
            <button onclick="adjQty('${item.id}',-1)">-</button>
            <span class="qty-num">${st.qty}</span>
            <button onclick="adjQty('${item.id}',1)">+</button>
          </div>
        </div>
      </div>`;
  }).join('');
  updateBadge();
}

/* ───── 核心功能：修改規格與路徑 ───── */
function editSpec(id, field, e){
  e.stopPropagation();
  if(!isAdmin) return;
  const target = db.find(x=>x.id===id);
  const newVal = prompt(`修改 ${field==='s'?'規格':'材質'}`, target[field]);
  if(newVal){
    target[field] = newVal;
    localStorage.setItem('ys2_db', JSON.stringify(db));
    render();
  }
}
function updateImgBase(v){ imgBase=v; localStorage.setItem('ys2_imgBase', v); render(); }
function toggleAdmin(){
  if(!isAdmin && prompt('密碼')==='751113'){ isAdmin=true; document.getElementById('adminPanel').style.display='flex'; }
  else { isAdmin=false; document.getElementById('adminPanel').style.display='none'; }
}

function toggleItem(id){ if(!cart[id])cart[id]={sel:false,qty:1}; cart[id].sel=!cart[id].sel; render(); }
function adjQty(id,d){ if(!cart[id])cart[id]={sel:true,qty:1}; cart[id].qty=Math.max(1,cart[id].qty+d); render(); }
function updateBadge(){ document.getElementById('cartBadge').textContent=db.filter(x=>cart[x.id]?.sel).length; }
function save(){ localStorage.setItem('ys2_site', document.getElementById('siteSelect').value); }
function exportData(){ prompt('複製備份', JSON.stringify({db,sites,imgBase})); }
function importData(){ let d=prompt('貼上備份'); if(d){ let p=JSON.parse(d); localStorage.setItem('ys2_db',JSON.stringify(p.db)); location.reload(); }}
function addNewSign(){ let n=prompt('名'),s=prompt('規'),m=prompt('材'),c=prompt('類(A-K)'),i=prompt('ID'); if(n&&s&&m&&c&&i){db.push({id:i,cat:c,n,s,m}); localStorage.setItem('ys2_db',JSON.stringify(db)); render();}}
function deleteSite(){ if(confirm('刪除？')){ let i=sites.indexOf(document.getElementById('siteSelect').value); if(i>-1){sites.splice(i,1); localStorage.setItem('ys2_sites',JSON.stringify(sites)); location.reload();}}}
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

function buildReport(){
  const sel=db.filter(x=>cart[x.id]?.sel);
  if(!sel.length)return alert('未選');
  document.getElementById('rptMeta').innerHTML=`<div>工地: ${document.getElementById('siteSelect').value}</div><div>人員: ${document.getElementById('staffInput').value}</div>`;
  document.getElementById('rptList').innerHTML=sel.map(i=>`<div class="report-item"><img class="rpt-img" src="${imgBase+i.id}.jpg"><div style="flex:1;"><b>${i.n}</b><br><small>${i.s} | ${i.m}</small></div><div class="rpt-qty">${cart[i.id].qty}</div></div>`).join('');
  document.getElementById('rptSummary').textContent=`合計: ${sel.reduce((a,b)=>a+cart[b.id].qty,0)} 件`;
  document.getElementById('overlay').classList.add('show');
}

init();
</script>
</body>
</html>
