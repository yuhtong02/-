<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ───── 核心三色校正 ───── */
:root {
  --dark: #064E3B;   /* 深綠 */
  --bg: #FEF8E6;     /* 你說的淺綠(米綠) */
  --amber: #D97706;  /* 黃色 */
  --surface: #FFFFFF;
  --border: #E9E1C8;
  --red: #DC2626;
  --blue: #1D4ED8;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:#0F172A;display:flex;flex-direction:column;min-height:100vh;}

/* Header */
.hdr{background:var(--dark);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:900;}
.admin-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;}

/* Tabs */
.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tabs-scroll{display:flex;padding:12px 16px;gap:6px;}
.tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:#64748B;white-space:nowrap;}
.tab.active{background:var(--dark);color:white;border-color:var(--dark);}

/* Grid & Cards */
.main{flex:1;overflow-y:auto;padding:14px 16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px;display:flex;gap:12px;cursor:pointer;position:relative;box-shadow:0 4px 12px rgba(6,78,59,0.05);}
.card.sel{border-color:var(--dark);background:rgba(6, 78, 59, 0.03);border-width:2px;}

/* 關鍵：可修改的標籤 */
.spec-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;display:inline-block;cursor:pointer;}
.spec-r{background:#FEF2F2;color:var(--red);}
.spec-m{background:#EFF6FF;color:var(--blue);}

/* 數量顯示 */
.qty-num{font-size:22px;font-weight:900;color:var(--amber);min-width:28px;text-align:center;}

/* 管理面板 */
.admin-panel{background:#F1F5F9;padding:10px;border-radius:8px;margin-bottom:10px;display:none;flex-direction:column;gap:8px;border:1.5px dashed var(--dark);}

.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:12px 16px;}
.btn-report{width:100%;background:var(--dark);color:white;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">工安標語採購系統</div>
  <button class="admin-btn" onclick="toggleAdmin()">🔒 管理員</button>
</div>

<div class="main">
  <div id="adminPanel" class="admin-panel">
    <input type="text" id="imgBaseInput" placeholder="圖片路徑 URL" onchange="updateImgBase(this.value)" style="padding:8px; border-radius:5px; border:1px solid #ccc;">
    <div style="display:flex; gap:5px;">
        <button onclick="exportData()" style="flex:1; padding:5px;">📤 備份資料</button>
        <button onclick="importData()" style="flex:1; padding:5px;">📥 還原資料</button>
    </div>
  </div>
  <div class="grid" id="gridEl"></div>
</div>

<div class="footer">
  <button class="btn-report" onclick="alert('採購單生成中...')">📋 生成採購單</button>
</div>

<script>
let isAdmin = false;
let imgBase = localStorage.getItem('ys2_imgBase') || 'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';
let db = JSON.parse(localStorage.getItem('ys2_db')) || [
    {id:'J01', n:'工程告示牌', s:'120x90', m:'鍍鋅鐵板'},
    {id:'B01', n:'進入工區請戴安全帽', s:'60x40', m:'中空板'}
];

function render() {
    const grid = document.getElementById('gridEl');
    grid.innerHTML = db.map(item => `
        <div class="card">
            <div style="width:90px;height:75px;background:#eee;border-radius:8px;overflow:hidden;">
                <img src="${imgBase + item.id}.jpg" style="width:100%;height:100%;object-fit:contain;">
            </div>
            <div style="flex:1;">
                <div class="card-name">${item.n}</div>
                <div style="margin-top:5px;">
                    <span class="spec-tag spec-r" onclick="editSpec('${item.id}','s',event)">${item.s}</span>
                    <span class="spec-tag spec-m" onclick="editSpec('${item.id}','m',event)">${item.m}</span>
                </div>
                <div style="text-align:right; font-weight:900; color:var(--amber); font-size:20px;">1</div>
            </div>
        </div>
    `).join('');
}

function toggleAdmin() {
    if(!isAdmin && prompt('管理密碼') === '751113') {
        isAdmin = true;
        document.getElementById('adminPanel').style.display = 'flex';
        document.getElementById('imgBaseInput').value = imgBase;
    } else {
        isAdmin = false;
        document.getElementById('adminPanel').style.display = 'none';
    }
}

/* 核心回歸：修改規格/材質 */
function editSpec(id, field, e) {
    e.stopPropagation();
    if(!isAdmin) return;
    const target = db.find(x => x.id === id);
    const newVal = prompt(`修改 ${field === 's' ? '規格' : '材質'}`, target[field]);
    if(newVal) {
        target[field] = newVal;
        localStorage.setItem('ys2_db', JSON.stringify(db));
        render();
    }
}

function updateImgBase(v) {
    imgBase = v;
    localStorage.setItem('ys2_imgBase', v);
    render();
}

function exportData() { prompt('請複製備份代碼：', JSON.stringify(db)); }
function importData() { 
    let d = prompt('請貼上備份代碼：'); 
    if(d) { db = JSON.parse(d); localStorage.setItem('ys2_db', JSON.stringify(db)); render(); } 
}

render();
</script>
</body>
</html>
