<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通標語系統 V6.9.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; --yt-card-border: #D7CCC8; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg); padding-bottom: 160px; color: #1e293b; overflow-x: hidden; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: var(--yt-bg); border-bottom: 3px solid var(--yt-dark); }
        .category-scroller { display: flex; overflow-x: auto; gap: 6px; padding: 8px 12px; background: white; -webkit-overflow-scrolling: touch; }
        .cat-tab { white-space: nowrap; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 900; cursor: pointer; border: 1px solid #e2e8f0; }
        .cat-tab.step { background-color: var(--yt-dark); color: white; }
        .cat-tab.active { background-color: var(--yt-light); color: white; }
        
        .admin-edit { background: #fff7ed !important; border: 1px dashed #fb923c !important; border-radius: 4px; padding: 2px 4px; font-size: 11px; color: #9a3412; font-weight: 900; width: 100%; }
        
        .sign-card { background: white; border-radius: 12px; padding: 10px; border: 1px solid var(--yt-card-border); display: flex; gap: 10px; height: 115px; position: relative; }
        .sign-card.selected { border: 3px solid var(--yt-light); background: #f0fdf4; }
        
        .check-btn { position: absolute; top: 5px; right: 5px; width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ddd; background: white; display: flex; align-items: center; justify-content: center; z-index: 20; }
        .selected .check-btn { background: var(--yt-light); border-color: var(--yt-light); color: white; }
        
        .img-slot { width: 130px; height: 95px; background: #f8fafc; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        
        .info-zone { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }
        .qty-input { width: 45px; text-align: center; font-size: 24px; font-weight: 900; color: var(--yt-light); border-bottom: 2px solid #ddd; background: transparent; }
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px; border-top: 1px solid #eee; z-index: 2000; }
    </style>
</head>
<body>

    <div class="sticky-header no-print">
        <div class="flex items-center justify-between px-4 py-2">
            <div id="mainTitleContainer"></div>
            <button onclick="toggleAdmin()" id="adminBtn" class="text-[10px] font-black bg-white text-[#095744] px-3 py-1 rounded-full border">🔒 管理員</button>
        </div>
        <div class="grid grid-cols-2 gap-2 px-4 pb-2">
            <div class="flex gap-1">
                <select id="siteSelect" class="flex-1 bg-white p-2 rounded-lg text-xs font-black border" onchange="save()"></select>
                <button onclick="addNewSite()" class="bg-[#095744] text-white px-3 rounded-lg font-bold">+</button>
            </div>
            <input type="text" id="staff" class="bg-white p-2 rounded-lg text-xs font-black border" placeholder="填單人" oninput="save()">
        </div>
        <div id="tabContainer" class="category-scroller"></div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 p-2" id="mainGrid"></div>

    <nav class="footer-nav no-print">
        <div id="adminPanel" class="hidden flex justify-center gap-2 mb-2">
            <button onclick="exportData()" class="bg-blue-600 text-white px-4 py-1 rounded text-[10px] font-bold">📤 備份</button>
            <button onclick="importData()" class="bg-purple-600 text-white px-4 py-1 rounded text-[10px] font-bold">📥 還原</button>
            <button onclick="deleteSite()" class="bg-red-500 text-white px-4 py-1 rounded text-[10px] font-bold">🗑️ 刪除工地</button>
        </div>
        <div class="flex w-full max-w-6xl gap-2 mx-auto">
            <button onclick="buildReport()" class="flex-[4] bg-[#095744] text-white py-4 rounded-xl font-black text-xl shadow-lg transition">📋 生成採購單</button>
            <button onclick="resetCart()" class="flex-1 bg-red-50 text-red-400 rounded-xl text-[10px] font-bold">重選</button>
        </div>
    </nav>

    <div id="modal" class="no-print" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 10px;">
        <div style="background: white; width: 100%; max-width: 650px; border-radius: 16px; padding: 15px; max-height: 90vh; overflow-y: auto;">
            <div id="printArea"></div>
            <div class="grid grid-cols-1 gap-2 mt-4">
                <button onclick="window.print()" class="bg-[#095744] text-white py-3 rounded-lg font-black">1. 直接列印</button>
                <button onclick="captureToImage()" class="bg-amber-500 text-white py-3 rounded-lg font-black">2. 轉為圖片分享</button>
                <button onclick="closeModal()" class="bg-slate-200 text-slate-500 py-2 rounded-lg font-bold">返回編輯</button>
            </div>
        </div>
    </div>

<script>
const GITHUB_BASE = "https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/";
let activeDB, cart = {}, sites = [], isAdmin = false, currentFilter = 'ALL', config = {}, stepData = {}, cats = {};

const DEFAULT_STEP_DATA = { 'S1': { t:'📌 Step 1 入口', items:['A01','A02'] }, 'S2': { t:'📌 Step 2 基礎', items:['B01'] } };
const DEFAULT_CATEGORIES = { 'ALL':'全部', 'A':'A. 生活設施', 'B':'B. 安全防護', 'C':'C. 危險警示' };
const RAW_SIGNS = [ {id:'A01', cat:'A', n:'守衛室', s:'30x10', m:'PVC'}, {id:'A02', cat:'A', n:'工具箱會議', s:'60x40', m:'中空板'}, {id:'B01', cat:'B', n:'工程告示牌', s:'120x90', m:'鐵板'} ];

function init() {
    activeDB = JSON.parse(localStorage.getItem('yt_db_v697')) || RAW_SIGNS;
    cart = JSON.parse(localStorage.getItem('yt_cart')) || {};
    sites = JSON.parse(localStorage.getItem('yt_sites')) || ["嘉義工地A"];
    config = JSON.parse(localStorage.getItem('yt_config')) || { title: "鈺通營造工安標語" };
    stepData = JSON.parse(localStorage.getItem('yt_stepData')) || DEFAULT_STEP_DATA;
    cats = JSON.parse(localStorage.getItem('yt_cats')) || DEFAULT_CATEGORIES;
    document.getElementById('staff').value = localStorage.getItem('yt_staff') || '';
    updateTitleUI(); renderSites(); renderTabs(); render();
}

function updateTitleUI() {
    const container = document.getElementById('mainTitleContainer');
    container.innerHTML = isAdmin ? `<input type="text" class="bg-transparent border-b border-dashed border-[#095744] text-lg font-black" value="${config.title}" oninput="config.title=this.value;save()">` : `<span class="text-lg font-black text-[#095744]">${config.title}</span>`;
}

function renderSites() {
    const sel = document.getElementById('siteSelect');
    sel.innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join('');
    sel.value = localStorage.getItem('yt_current_site') || sites[0];
}

function addNewSite() { const name = prompt("工地名稱？"); if(name){sites.push(name); renderSites(); save();} }
function deleteSite() { if(confirm("刪除？")){sites = sites.filter(s=>s!==document.getElementById('siteSelect').value); renderSites(); save();} }

function renderTabs() {
    let h = '';
    Object.keys(stepData).forEach(k => { h += `<div class="cat-tab step ${currentFilter===k?'active':''}" onclick="setFilter('${k}')">${isAdmin ? `<input class="bg-transparent text-white w-20 text-center" value="${stepData[k].t}" onclick="event.stopPropagation()" oninput="stepData['${k}'].t=this.value;save()">` : stepData[k].t}</div>`; });
    Object.keys(cats).forEach(k => { h += `<div class="cat-tab ${currentFilter===k?'active':''}" onclick="setFilter('${k}')">${isAdmin && k!=='ALL' ? `<input class="bg-transparent text-black w-20 text-center" value="${cats[k]}" onclick="event.stopPropagation()" oninput="cats['${k}']=this.value;save()">` : cats[k]}</div>`; });
    document.getElementById('tabContainer').innerHTML = h;
}

function setFilter(f) { currentFilter = f; renderTabs(); render(); }

function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let list = stepData[currentFilter] ? activeDB.filter(x => stepData[currentFilter].items.includes(x.id)) : 
               (currentFilter === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentFilter));

    list.forEach((item, idx) => {
        const st = cart[item.id] || { sel: false, qty: 1 };
        const card = document.createElement('div');
        card.className = `sign-card ${st.sel ? 'selected' : ''}`;
        
        // 只有點擊 check-btn 或 圖片才會切換選取，確保輸入框安全
        card.innerHTML = `
            <div class="check-btn" onclick="toggleItem('${item.id}')">${st.sel ? '✓' : ''}</div>
            <div class="img-slot" onclick="toggleItem('${item.id}')"><img src="${GITHUB_BASE + item.id + '.jpg'}" onerror="handleImgErr(this)"></div>
            <div class="info-zone">
                <div>
                    <div class="flex items-center gap-1 mb-0.5">
                        <span class="text-[9px] font-bold text-gray-400">ID:</span>
                        <span class="text-[10px] font-bold text-[#095744]">${item.id}</span>
                    </div>
                    ${isAdmin ? `<input class="admin-edit mb-0.5" value="${item.n}" oninput="updateDB('${item.id}','n',this.value)">` : `<div class="font-black text-[14px] truncate">${item.n}</div>`}
                    <div class="flex gap-1 mt-0.5">
                        <div class="flex-1 flex items-center">
                            <span class="text-[9px] font-bold text-red-600 mr-0.5">規:</span>
                            ${isAdmin ? `<input class="admin-edit" value="${item.s}" oninput="updateDB('${item.id}','s',this.value)">` : `<span class="text-[9px] font-bold text-red-600 truncate">${item.s}</span>`}
                        </div>
                        <div class="flex-1 flex items-center">
                            <span class="text-[9px] font-bold text-blue-600 mr-0.5">材:</span>
                            ${isAdmin ? `<input class="admin-edit" value="${item.m}" oninput="updateDB('${item.id}','m',this.value)">` : `<span class="text-[9px] font-bold text-blue-600 truncate">${item.m}</span>`}
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-between mt-1">
                    ${isAdmin ? `<select class="bg-orange-100 text-[9px] rounded font-bold p-0.5" onchange="changeCategory('${item.id}', this.value)">
                        ${Object.keys(cats).filter(c=>c!=='ALL').map(k => `<option value="${k}" ${item.cat===k?'selected':''}>分類 ${k}</option>`).join('')}
                    </select>` : '<div></div>'}
                    <div class="flex items-center gap-1">
                        <input type="number" value="${st.qty}" oninput="updateQty('${item.id}',this.value)" class="qty-input">
                    </div>
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

// 自動重編號的核心功能
function changeCategory(oldID, newCat) {
    const item = activeDB.find(x => x.id === oldID);
    if (!item) return;

    // 計算新編號：找出該分類目前最大的序號
    const catItems = activeDB.filter(x => x.cat === newCat);
    let nextNum = 1;
    if (catItems.length > 0) {
        const nums = catItems.map(x => parseInt(x.id.replace(/[^\d]/g, ''))).filter(n => !isNaN(n));
        nextNum = nums.length > 0 ? Math.max(...nums) + 1 : 1;
    }
    const newID = newCat + nextNum.toString().padStart(2, '0');

    // 全局替換 ID (包含 Step 資料與購物車)
    Object.keys(stepData).forEach(k => { stepData[k].items = stepData[k].items.map(id => id === oldID ? newID : id); });
    if (cart[oldID]) { cart[newID] = cart[oldID]; delete cart[oldID]; }
    
    item.cat = newCat;
    item.id = newID;
    save(); render();
}

function updateDB(id, field, val) { const i = activeDB.find(x => x.id === id); if (i) { i[field] = val; save(); } }
function handleImgErr(img) { if (img.src.includes('.jpg')) { img.src = img.src.replace('.jpg', '.JPG'); } else { img.onerror = null; img.src = 'https://via.placeholder.com/150?text=圖片待傳'; } }
function toggleItem(id) { if (!cart[id]) cart[id] = { sel: false, qty: 1 }; cart[id].sel = !cart[id].sel; save(); render(); }
function updateQty(id, v) { if (!cart[id]) cart[id] = { sel: true, qty: 1 }; cart[id].qty = parseInt(v) || 1; save(); }

function save() {
    localStorage.setItem('yt_db_v697', JSON.stringify(activeDB));
    localStorage.setItem('yt_cart', JSON.stringify(cart));
    localStorage.setItem('yt_staff', document.getElementById('staff').value);
    localStorage.setItem('yt_current_site', document.getElementById('siteSelect').value);
    localStorage.setItem('yt_config', JSON.stringify(config));
    localStorage.setItem('yt_stepData', JSON.stringify(stepData));
    localStorage.setItem('yt_cats', JSON.stringify(cats));
    localStorage.setItem('yt_sites', JSON.stringify(sites));
}

function toggleAdmin() {
    if (!isAdmin) { if (prompt("密碼") === "751113") { isAdmin = true; document.getElementById('adminBtn').innerText = "🔓 管理中"; document.getElementById('adminPanel').classList.remove('hidden'); } } 
    else { isAdmin = false; document.getElementById('adminBtn').innerText = "🔒 管理員"; document.getElementById('adminPanel').classList.add('hidden'); }
    renderTabs(); render();
}

function exportData() {
    const blob = new Blob([JSON.stringify({ db: activeDB, sites: sites, config: config, stepData: stepData, cats: cats })], {type: 'text/plain'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `標語備份.txt`; a.click();
}

function importData() {
    const input = prompt("貼上備份內容");
    if (input) { try { const d = JSON.parse(input); activeDB = d.db; sites = d.sites; config = d.config; stepData = d.stepData; cats = d.cats; save(); location.reload(); } catch(e) { alert("錯誤"); } }
}

function resetCart() { if(confirm("重選？")) { cart = {}; save(); render(); } }
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function buildReport() {
    const sel = activeDB.filter(i => cart[i.id]?.sel); if (!sel.length) return alert("未選");
    let h = `<div id="captureTarget" style="padding:15px; background:white; border:2px solid #095744;"><h1 style="text-align:center; color:#095744;">${config.title} 採購單</h1><table style="width:100%; border-collapse:collapse;">`;
    sel.forEach((i, idx) => {
        h += `<tr style="border-bottom:1px solid #eee;"><td style="padding:5px;">${idx+1}</td><td style="padding:5px;"><img src="${GITHUB_BASE+i.id+'.jpg'}" style="width:50px;"></td><td style="padding:5px; font-size:12px;"><b>[${i.id}] ${i.n}</b><br>規：${i.s}<br>材：${i.m}</td><td style="padding:5px; text-align:right; font-size:18px; font-weight:900;">${cart[i.id].qty}</td></tr>`;
    });
    document.getElementById('printArea').innerHTML = h + `</table></div>`; document.getElementById('modal').style.display = 'flex';
}

function captureToImage() {
    html2canvas(document.getElementById('captureTarget'), { useCORS: true }).then(canvas => {
        document.getElementById('printArea').innerHTML = `<p>長按存圖</p><img src="${canvas.toDataURL("image/png")}" style="width:100%;">`;
    });
}
init();
</script>
</body>
</html>
