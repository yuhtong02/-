<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈺通營造工安標語系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --yt-dark: #095744; --yt-light: #70B934; --yt-bg: #FFFBEC; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--yt-bg); padding-bottom: 180px; -webkit-tap-highlight-color: transparent; }
        
        .header-container { background-color: var(--yt-dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .main-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 0.1em; }
        .admin-btn { background: white; color: var(--yt-dark); padding: 4px 12px; border-radius: 50px; font-size: 12px; font-weight: 900; cursor: pointer; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 3px solid var(--yt-dark); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .tab-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 12px; scrollbar-width: none; }
        .tab-scroll::-webkit-scrollbar { display: none; }
        .cat-tab { white-space: nowrap; padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .cat-tab.step { background: var(--yt-dark); color: white; }
        .cat-tab.step.active { background: var(--yt-light); }
        .cat-tab.item { background: #f1f5f9; color: #475569; border-color: #e2e8f0; }
        .cat-tab.item.active { background: #E6F4F1; color: var(--yt-dark); border-color: var(--yt-dark); }
        
        .grid-container { display: grid; gap: 12px; padding: 12px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .sign-card { background: white; border-radius: 16px; padding: 12px; border: 1px solid #D7CCC8; display: flex; gap: 12px; cursor: pointer; transition: 0.2s; position: relative; align-items: center; }
        .sign-card.selected { border: 3px solid var(--yt-light); background: #f0fdf4; box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1); }
        
        .img-slot { width: 90px; height: 70px; background: #f8fafc; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid #e2e8f0; }
        .img-slot img { width: 100%; height: 100%; object-fit: contain; }
        .qty-input { width: 55px; text-align: center; font-size: 24px; font-weight: 900; color: var(--yt-light); border-bottom: 2px solid #ddd; background: transparent; outline: none; }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; flex-direction: column; }
        #hiddenCapture { position: fixed; left: -9999px; width: 450px; background: white; }
        .loading-text { color: white; font-weight: 900; margin-bottom: 10px; display: none; }
        
        /* 一般人可用之工地編輯按鈕 */
        .site-edit-btn { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; padding: 0 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="header-container">
            <span class="main-title">鈺通營造工安系統</span>
            <button onclick="toggleAdmin()" id="adminBtn" class="admin-btn">🔒 管理員</button>
        </div>
        <div class="grid grid-cols-2 gap-2 px-4 py-2 bg-white border-b">
            <div class="flex gap-1 items-center overflow-hidden">
                <select id="siteSelect" class="flex-1 bg-gray-50 p-2 rounded-lg text-sm font-bold border border-gray-200 outline-none truncate"></select>
                <button onclick="editSites()" class="site-edit-btn h-full whitespace-nowrap">新增工地</button>
            </div>
            <input type="text" id="staff" class="bg-gray-50 p-2 rounded-lg text-sm font-bold border border-gray-200" placeholder="填單人員">
        </div>
        <div id="tabContainer" class="tab-scroll"></div>
    </div>

    <div id="mainGrid" class="grid-container max-w-7xl mx-auto"></div>
    <div id="hiddenCapture"></div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-white/95 border-t z-50 flex flex-col gap-2 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button id="addItemBtn" onclick="addNewItem()" class="hidden w-full bg-orange-500 text-white py-3 rounded-xl font-bold mb-1">＋ 新增標語項目</button>
        <div class="flex gap-3">
            <button onclick="buildReportImage()" class="flex-[4] bg-[#095744] text-white py-4 rounded-xl font-black text-xl shadow-xl active:scale-95 transition-transform">📋 生成截圖</button>
            <button onclick="resetCart()" class="flex-1 bg-gray-100 text-gray-400 rounded-xl text-xs font-bold">清空</button>
        </div>
    </nav>

    <div id="modal" onclick="closeModal()">
        <div id="loadingTxt" class="loading-text">正在產生圖片...</div>
        <p class="text-white mb-2 text-sm opacity-80">↓ 長按圖片即可存至相簿 ↓</p>
        <div id="imgPlaceholder" class="bg-white rounded-xl overflow-hidden shadow-2xl max-w-full" onclick="event.stopPropagation()"></div>
        <button onclick="closeModal()" class="mt-6 bg-white/20 text-white px-10 py-3 rounded-full font-bold border border-white/30">返回修改</button>
    </div>

<script>
let activeDB, cart = {}, sites, isAdmin = false, currentMode = 'CAT', currentKey = 'ALL', guides, catLabels;
const GITHUB_BASE = "https://yuhtong02.github.io/-/img/";

function init() {
    activeDB = JSON.parse(localStorage.getItem('yt_db')) || [
        {id:'A01', cat:'A', n:'飲水機', s:'30x15', m:'中空板'},
        {id:'B01', cat:'B', n:'進入工地請戴安全帽', s:'60x40', m:'中空板'}
    ];
    guides = JSON.parse(localStorage.getItem('yt_guides')) || {
        'S1': { t: '大門/圍籬區', items: ['B01'] },
        'S2': { t: '辦公/休息區', items: ['A01'] }
    };
    catLabels = JSON.parse(localStorage.getItem('yt_cats')) || {
        'ALL':'全部標語', 'A':'A.生活設施', 'B':'B.安全防護', 'C':'C.危險警示', 'D':'D.禁止事項', 'E':'E.交通與動線', 'F':'F.設施位置', 'G':'G.作業規範', 'H':'H.宣導標語', 'I':'I.環境管理', 'J':'J.圖資與指引'
    };
    sites = JSON.parse(localStorage.getItem('yt_sites')) || ["嘉義創世基金會", "嘉義嘉科實中", "嘉義博愛安居", "臺南林森圖書館"];

    renderTabs(); renderSiteSelect(); render();
}

// 開放給一般人新增工地的功能
function editSites() {
    const newList = prompt("請修改或新增工地名稱（多筆請用逗號隔開）：", sites.join(','));
    if (newList !== null) {
        sites = newList.split(/[，,]/).map(s => s.trim()).filter(s => s);
        localStorage.setItem('yt_sites', JSON.stringify(sites));
        renderSiteSelect();
    }
}

function renderTabs() {
    let h = '';
    Object.keys(guides).sort().forEach(k => {
        h += `<div class="cat-tab step ${currentMode==='GUIDE'&&currentKey===k?'active':''}" onclick="handleTabClick('GUIDE','${k}')">Step ${k.replace('S','')}.${guides[k].t}</div>`;
    });
    h += `<div class="cat-tab item ${currentMode==='CAT'&&currentKey=='ALL'?'active':''}" onclick="handleTabClick('CAT','ALL')">全部</div>`;
    Object.keys(catLabels).filter(k=>k!=='ALL').sort().forEach(k => {
        h += `<div class="cat-tab item ${currentMode==='CAT'&&currentKey===k?'active':''}" onclick="handleTabClick('CAT','${k}')">${k}類</div>`;
    });
    document.getElementById('tabContainer').innerHTML = h;
}

function handleTabClick(m, k) {
    if (isAdmin && k !== 'ALL') {
        const currentTitle = m === 'GUIDE' ? guides[k].t : catLabels[k];
        const newTitle = prompt("修改標題：", currentTitle);
        if (newTitle) { if (m === 'GUIDE') guides[k].t = newTitle; else catLabels[k] = newTitle; saveData(); renderTabs(); }
    }
    currentMode = m; currentKey = k; renderTabs(); render();
}

function render() {
    const grid = document.getElementById('mainGrid'); grid.innerHTML = '';
    let display = (currentMode === 'CAT') ? 
        (currentKey === 'ALL' ? activeDB : activeDB.filter(x => x.cat === currentKey)) : 
        activeDB.filter(x => guides[currentKey].items.includes(x.id));
    
    display.sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric: true}));

    display.forEach(i => {
        const c = cart[i.id] || { sel:false, qty:1 };
        const card = document.createElement('div');
        card.className = `sign-card ${c.sel ? 'selected' : ''}`;
        card.onclick = () => { if(!isAdmin) { cart[i.id] = {sel: !c.sel, qty: c.qty}; render(); } };
        
        card.innerHTML = `
            <div class="img-slot"><img src="${GITHUB_BASE}${i.id}.JPG" onerror="this.src='${GITHUB_BASE}${i.id}.jpg'; this.style.opacity='0.3';"></div>
            <div class="flex-1">
                <div class="font-black text-[#095744] text-sm leading-tight mb-1">${i.n}</div>
                <div class="text-[10px] text-gray-400 font-bold">${i.s} | ${i.m}</div>
                <div class="flex items-center justify-between mt-2" onclick="event.stopPropagation()">
                    <div class="flex items-center gap-2">
                        <button onclick="updateQty('${i.id}',-1)" class="w-6 h-6 bg-gray-100 rounded-full font-bold">-</button>
                        <input type="number" value="${c.qty}" onchange="cart['${i.id}'].qty=parseInt(this.value)||1; render();" class="qty-input">
                        <button onclick="updateQty('${i.id}',1)" class="w-6 h-6 bg-gray-100 rounded-full font-bold">+</button>
                    </div>
                    <span class="text-[9px] text-gray-300 font-mono">${i.id}</span>
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

function updateQty(id, delta) {
    if(!cart[id]) cart[id] = {sel:true, qty:1};
    cart[id].qty = Math.max(1, cart[id].qty + delta);
    render();
}

async function buildReportImage() {
    const sel = activeDB.filter(i => cart[i.id]?.sel);
    if(!sel.length) return alert("尚未選取項目");
    
    document.getElementById('loadingTxt').style.display = 'block';
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('imgPlaceholder').innerHTML = '';

    setTimeout(async () => {
        const site = document.getElementById('siteSelect').value;
        const staff = document.getElementById('staff').value || "現場人員";
        
        let h = `<div style="padding:30px; background:white; width:450px; border:6px solid #095744;">
            <h2 style="color:#095744; text-align:center; font-size:28px; font-weight:900; margin-bottom:20px;">鈺通營造工安標語採購單</h2>
            <div style="font-size:15px; margin-bottom:20px; border-bottom:2px solid #eee; padding-bottom:10px; color:#555;">
                工地名稱：<b style="color:#000;">${site}</b><br>
                填單人員：<b style="color:#000;">${staff}</b><br>
                產單日期：${new Date().toLocaleString()}
            </div>
            <table style="width:100%; border-collapse:collapse;">
        `;
        sel.forEach(i => {
            h += `<tr style="border-bottom:1px solid #eee;"><td style="padding:12px 0;">
                <b style="font-size:18px;">[${i.id}] ${i.n}</b><br>
                <small style="color:#888;">${i.s} / ${i.m}</small></td>
                <td style="text-align:right; font-size:24px; font-weight:900; color:#70B934;">x ${cart[i.id].qty}</td></tr>`;
        });
        h += `</table><div style="text-align:right; margin-top:20px; font-size:10px; color:#ccc;">YUH TONG CONSTRUCTION SYSTEM</div></div>`;
        
        const area = document.getElementById('hiddenCapture');
        area.innerHTML = h;

        const canvas = await html2canvas(area, { scale: 2 });
        const img = new Image();
        img.src = canvas.toDataURL("image/png");
        img.className = "max-w-full shadow-lg";
        document.getElementById('imgPlaceholder').appendChild(img);
        document.getElementById('loadingTxt').style.display = 'none';
    }, 100);
}

function toggleAdmin() {
    if(!isAdmin && prompt("管理密碼") !== "751113") return;
    isAdmin = !isAdmin;
    document.getElementById('adminBtn').innerText = isAdmin ? "🔓 編輯中" : "🔒 管理員";
    document.getElementById('addItemBtn').classList.toggle('hidden', !isAdmin);
    render();
}

function renderSiteSelect() { document.getElementById('siteSelect').innerHTML = sites.map(s => `<option value="${s}">${s}</option>`).join(''); }
function saveData() { localStorage.setItem('yt_db', JSON.stringify(activeDB)); localStorage.setItem('yt_guides', JSON.stringify(guides)); localStorage.setItem('yt_cats', JSON.stringify(catLabels)); }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function resetCart() { if(confirm("確定清空已選項目？")) { cart = {}; render(); } }

window.onload = init;
</script>
</body>
</html>
