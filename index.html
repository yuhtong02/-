<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鈺通營造｜工安標語採購系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#164E33;
  --green:#6EB831;
  --cream:#FEF8E6;
  --green-pale:#F0FAE6;
  --green-light:#DCF0B8;
  --green-mid:#8DD448;
  --cream-border:#E8D9A0;
  --cream-dark:#C8A83A;
  --cream-deep:#7A5200;
  --ink:#0F172A;--ink2:#334155;--ink3:#64748B;--ink4:#94A3B8;
  --bg:#F3FAE8;--surface:#FFFFFF;--border:#C5DF98;--border2:#9DCB5A;
  --red:#DC2626;--blue:#1D4ED8;--purple:#6D28D9;
  --r:14px;--r2:10px;--r3:8px;
  --shadow:0 1px 3px rgba(22,78,51,0.08),0 4px 12px rgba(22,78,51,0.05);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{background:var(--dark);color:white;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(110,184,49,0.18) 0%,transparent 55%);pointer-events:none;}
.hdr-brand{display:flex;align-items:center;gap:10px;position:relative;z-index:1;}
.hdr-logo{width:36px;height:36px;display:grid;place-items:center;font-size:24px;flex-shrink:0;cursor:default;line-height:1;overflow:hidden;position:relative;}
.hdr-logo img{width:100%;height:100%;object-fit:contain;}
.hdr-logo.admin-editable{cursor:pointer;}
.hdr-logo.admin-editable::after{content:'✏️';position:absolute;bottom:-1px;right:-2px;font-size:10px;background:var(--green);border-radius:50%;width:14px;height:14px;display:grid;place-items:center;}
.hdr-text{}
.hdr-title{font-size:16px;font-weight:900;letter-spacing:0.3px;}
.hdr-ver{font-size:10px;opacity:0.6;font-weight:400;margin-top:1px;color:var(--green-mid);}
.admin-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.22);color:white;padding:7px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s;position:relative;z-index:1;}
.admin-btn:hover{background:rgba(255,255,255,0.2);}
.admin-btn.active{background:rgba(110,184,49,0.3);border-color:rgba(110,184,49,0.55);color:#C8F07A;}

/* ── CONTROLS ── */
.ctrl{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:wrap;}
.ctrl-group{display:flex;gap:6px;align-items:center;flex:1;min-width:140px;}
select,input[type=text]{font-family:inherit;font-size:13px;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r3);background:var(--green-pale);color:var(--ink);outline:none;transition:border-color 0.15s;}
select:focus,input[type=text]:focus{border-color:var(--green);}
select{flex:1;}
.btn{font-family:inherit;font-size:13px;font-weight:700;padding:7px 13px;border-radius:var(--r3);border:none;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-green{background:var(--dark);color:white;}.btn-green:hover{background:var(--green);}
.btn-red{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;}.btn-red:hover{background:#FEE2E2;}
.btn-blue{background:#EFF6FF;color:var(--blue);border:1.5px solid #BFDBFE;}.btn-blue:hover{background:#DBEAFE;}
.btn-purple{background:#F5F3FF;color:var(--purple);border:1.5px solid #DDD6FE;}.btn-purple:hover{background:#EDE9FE;}
.btn-amber{background:var(--cream);color:var(--cream-deep);border:1.5px solid var(--cream-border);}.btn-amber:hover{background:#FDF3CC;}

/* ── TABS ── */
.tabs-outer{background:var(--surface);border-bottom:2px solid var(--border);flex-shrink:0;}
.tabs-scroll{display:flex;overflow-x:auto;padding:9px 14px;gap:5px;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-behavior:smooth;}
.tabs-scroll::-webkit-scrollbar{display:none;}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--ink3);white-space:nowrap;transition:all 0.15s;flex-shrink:0;user-select:none;display:flex;align-items:center;gap:4px;}
.tab:hover{border-color:var(--green);color:var(--green);}
.tab.step-tab{background:rgba(110,184,49,0.07);border-color:rgba(110,184,49,0.25);color:var(--dark);}
.tab.step-tab:hover{background:rgba(110,184,49,0.14);border-color:var(--green);}
.tab.all-tab{background:var(--cream);border-color:var(--cream-border);color:var(--cream-deep);}
.tab.all-tab:hover{background:#FDF3CC;border-color:var(--cream-dark);}
.tab.cat-tab{background:var(--green-pale);border-color:var(--border);}
.tab.active{background:var(--dark)!important;color:white!important;border-color:var(--dark)!important;box-shadow:0 2px 8px rgba(22,78,51,0.28);}
.tab-sep{width:1.5px;background:var(--border);flex-shrink:0;align-self:stretch;margin:0 3px;border-radius:1px;}
.tab-edit-input{background:transparent;border:none;font-weight:700;font-size:12px;color:inherit;font-family:inherit;width:80px;outline:none;cursor:text;}

/* ── MAIN GRID ── */
.main{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:11px;}
.empty-state{text-align:center;padding:80px 20px;color:var(--ink4);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:14px;}

/* ── CARD ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:11px;display:flex;gap:11px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;position:relative;box-shadow:var(--shadow);}
.card:hover{border-color:var(--green-mid);background:var(--green-pale);box-shadow:0 4px 16px rgba(110,184,49,0.14);}
.card.sel{border-color:var(--green);background:var(--green-light);border-width:2px;}
.card-check{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:white;display:grid;place-items:center;transition:all 0.18s;z-index:2;}
.card.sel .card-check{background:var(--green);border-color:var(--green);color:white;}
.check-icon{font-size:11px;font-weight:900;color:white;display:none;}
.card.sel .check-icon{display:block;}

/* IMAGE */
.card-img{width:86px;height:72px;flex-shrink:0;border-radius:var(--r3);border:1.5px solid var(--border);overflow:hidden;background:#F8FAFC;display:flex;align-items:center;justify-content:center;position:relative;}
.card-img img{width:100%;height:100%;object-fit:contain;transition:opacity 0.2s;}
.img-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink4);}
.img-placeholder span{font-size:18px;}
.img-placeholder small{font-size:9px;text-align:center;line-height:1.2;}

/* BODY */
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;}
.card-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.card-id{font-size:10px;font-weight:700;background:var(--green-light);color:var(--dark);padding:2px 6px;border-radius:4px;}
.card-cat{font-size:10px;color:var(--ink4);}
.card-name{font-size:13px;font-weight:900;color:var(--dark);line-height:1.35;margin-bottom:4px;}
.card-specs{display:flex;gap:6px;flex-wrap:wrap;}
.spec-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;}
.spec-r{background:var(--cream);color:var(--cream-deep);}
.spec-m{background:var(--green-pale);color:#1A5C20;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:5px;}
.sel-chip{font-size:10px;background:var(--green);color:white;padding:3px 8px;border-radius:20px;font-weight:700;}
.qty-ctrl{display:flex;align-items:center;gap:7px;}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:16px;display:grid;place-items:center;color:var(--ink3);font-family:inherit;transition:all 0.15s;line-height:1;flex-shrink:0;}
.qty-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-pale);}
.qty-num{font-size:21px;font-weight:900;color:var(--green);min-width:26px;text-align:center;line-height:1;}

/* admin card inputs */
.a-name{background:var(--cream);border:1.5px dashed var(--cream-dark);border-radius:4px;padding:3px 6px;font-size:13px;font-weight:900;color:var(--cream-deep);width:100%;font-family:inherit;outline:none;}
.a-spec{background:transparent;border:none;border-bottom:1.5px dashed #CBD5E1;font-size:10px;width:52px;font-family:inherit;outline:none;color:inherit;padding:1px 2px;}
.admin-del-btn{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;background:var(--red);border:none;color:white;font-size:11px;cursor:pointer;display:none;place-items:center;z-index:3;font-family:inherit;}
.isAdmin .card:hover .admin-del-btn{display:grid;}

/* ── FOOTER ── */
.footer{background:var(--surface);border-top:1.5px solid var(--border);padding:11px 14px;flex-shrink:0;}
.admin-panel{display:none;margin-bottom:9px;flex-wrap:wrap;gap:6px;}
.admin-panel.show{display:flex;}
.footer-main{display:flex;gap:9px;align-items:stretch;}
.btn-report{flex:1;background:var(--dark);color:white;border:none;padding:13px 14px;border-radius:var(--r2);font-size:14px;font-weight:900;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;box-shadow:0 4px 14px rgba(22,78,51,0.22);}
.btn-report:hover{background:var(--green);box-shadow:0 6px 18px rgba(110,184,49,0.32);}
.cart-badge{background:rgba(255,255,255,0.22);border-radius:20px;padding:3px 10px;font-size:13px;font-weight:900;min-width:28px;text-align:center;}
.btn-reset{background:var(--cream);color:var(--cream-deep);border:1.5px solid var(--cream-border);padding:13px 13px;border-radius:var(--r2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;white-space:nowrap;}
.btn-reset:hover{background:#FDF3CC;}

/* ── PRINT MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:9000;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:white;width:100%;max-width:700px;border-radius:20px 20px 0 0;padding:18px;max-height:92vh;overflow-y:auto;animation:slideUp 0.26s cubic-bezier(.2,.7,0,1.1);}
@keyframes slideUp{from{transform:translateY(56px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:#E2E8F0;border-radius:2px;margin:0 auto 14px;display:block;}
.modal-title{font-size:17px;font-weight:900;color:var(--dark);text-align:center;margin-bottom:8px;}
.modal-meta{display:flex;justify-content:space-around;font-size:12px;color:var(--ink3);padding:9px 0;background:var(--green-pale);border-radius:var(--r3);margin-bottom:12px;border:1px solid var(--border);}
.modal-meta span{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;}
.modal-meta strong{font-size:13px;color:var(--ink);font-weight:700;}
.report-list{margin:2px 0;}
.report-item{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:0.5px solid #F1F5F9;}
.report-item:last-child{border:none;}
.rpt-num{font-size:11px;font-weight:700;color:var(--ink4);min-width:18px;text-align:center;}
.rpt-img{width:50px;height:42px;border-radius:6px;border:1px solid var(--border);object-fit:contain;background:#F8FAFC;flex-shrink:0;}
.rpt-info{flex:1;min-width:0;}
.rpt-name{font-size:13px;font-weight:900;color:var(--ink);}
.rpt-spec{font-size:11px;color:var(--ink3);margin-top:1px;}
.rpt-qty{font-size:22px;font-weight:900;color:var(--dark);min-width:32px;text-align:right;}
.rpt-total{display:flex;justify-content:space-between;padding:10px 14px;background:var(--dark);color:white;border-radius:var(--r3);margin-top:10px;font-size:13px;font-weight:700;}
.rpt-total strong{color:var(--green-mid);font-size:15px;}
.modal-actions{display:flex;flex-direction:column;gap:7px;margin-top:13px;}
.modal-btn{padding:13px;border-radius:var(--r3);font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s;}
.modal-hint{font-size:11px;color:var(--ink4);text-align:center;margin-top:5px;line-height:1.5;}

/* ── PRINT STYLES ── */
@media print{
  html,body{height:auto!important;overflow:visible!important;}
  .hdr,.ctrl,.tabs-outer,.footer,.overlay .modal-actions,.overlay .modal-handle,.overlay .modal-hint,.no-print{display:none!important;}
  .overlay{position:static!important;display:block!important;background:none!important;padding:0!important;}
  .modal{max-height:none!important;overflow:visible!important;border-radius:0!important;animation:none!important;padding:0!important;max-width:100%!important;}
  .report-item{break-inside:avoid;page-break-inside:avoid;}
  .rpt-total{background:var(--dark)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .modal-meta{background:var(--green-pale)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:12mm 14mm;}
}

/* ── SCROLLBAR ── */
.main::-webkit-scrollbar{width:3px;}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.modal::-webkit-scrollbar{width:3px;}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo" id="logoEl">🦺</div>
    <div class="hdr-text">
      <div class="hdr-title" id="titleEl">工安標語採購系統</div>
      <div class="hdr-ver">鈺通營造 Construction Safety</div>
    </div>
  </div>
  <button class="admin-btn" id="adminBtn" onclick="toggleAdmin()">🔒 管理員</button>
</div>

<!-- CONTROLS -->
<div class="ctrl">
  <div class="ctrl-group">
    <select id="siteSelect" onchange="save()"></select>
    <button class="btn btn-green" onclick="addSite()">＋</button>
  </div>
  <input type="text" id="staffInput" placeholder="填單人員" style="width:110px;" oninput="save()">
</div>

<!-- TABS -->
<div class="tabs-outer">
  <div class="tabs-scroll" id="tabsEl"></div>
</div>

<!-- GRID -->
<div class="main" id="mainArea">
  <div class="grid" id="gridEl"></div>
</div>

<!-- FOOTER -->
<div class="footer no-print">
  <div class="admin-panel" id="adminPanel">
    <button class="btn btn-blue" onclick="addNewSign()">➕ 新增標語</button>
    <button class="btn btn-blue" onclick="addStep()">➕ 新增工序</button>
    <button class="btn btn-blue" onclick="addCat()">➕ 新增類別</button>
    <button class="btn btn-blue" onclick="exportData()">📤 備份</button>
    <button class="btn btn-purple" onclick="importData()">📥 還原</button>
    <button class="btn btn-red" onclick="deleteSite()">🗑 刪除工地</button>
    <button class="btn btn-amber" onclick="configImgBase()">🖼 圖片路徑</button>
    <button class="btn btn-amber" onclick="changeLogo()">🏷 更換圖示</button>
  </div>
  <div class="footer-main">
    <button class="btn-report" onclick="buildReport()">
      <span>📋 生成採購單</span>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
    <button class="btn-reset" onclick="resetCart()">清除<br>重選</button>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox">
    <span class="modal-handle"></span>
    <div class="modal-title" id="rptTitle"></div>
    <div class="modal-meta" id="rptMeta"></div>
    <div class="report-list" id="rptList"></div>
    <div class="rpt-total" id="rptTotal"></div>
    <div class="modal-actions no-print">
      <button class="modal-btn" style="background:var(--dark);color:white;" onclick="printReport()">🖨 列印 ／ 儲存 PDF</button>
      <button class="modal-btn" style="background:var(--green);color:white;" onclick="saveImg()">📸 儲存為圖片（手機長按）</button>
      <button class="modal-btn" style="background:var(--cream);color:var(--cream-deep);" onclick="closeModal()">← 返回編輯</button>
    </div>
    <div class="modal-hint no-print" id="modalHint"></div>
  </div>
</div>

<!-- hidden canvas for image export -->
<canvas id="imgCanvas" style="display:none;"></canvas>

/* ═══════════════════════════════════════════
   AUTO-ID
   IDs are computed on the fly; never stored.
   Cart uses "cat::name" as stable key.
═══════════════════════════════════════════ */
function computeIds(arr){
  const cnt={};
  return arr.map(item=>{
    const c=item.cat||'X';
    cnt[c]=(cnt[c]||0)+1;
    return {...item, id:c+String(cnt[c]).padStart(2,'0')};
  });
}
function getDbWithIds(){return computeIds(db);}
function cartKey(item){return item.cat+'::'+item.n;}
function cartGet(item){return cart[cartKey(item)]||{sel:false,qty:1};}

═══════════════════════════════════════════ */
let db,cart,sites,config,stepData,cats,catOrder,imgBase,logoSrc,isAdmin=false,currentTab='S1';

function init(){
  db      = JSON.parse(localStorage.getItem('ys4_db'))   || DEF_DB;
  // ★ cart is always cleared on page load
  cart    = {};
  sites   = JSON.parse(localStorage.getItem('ys4_sites')) || DEF_SITES;
  config  = JSON.parse(localStorage.getItem('ys4_cfg'))   || {title:'工安標語採購系統'};
  stepData= JSON.parse(localStorage.getItem('ys4_steps')) || DEF_STEPS;
  cats    = JSON.parse(localStorage.getItem('ys4_cats'))  || DEF_CATS;
  catOrder= JSON.parse(localStorage.getItem('ys4_catOrd'))|| Object.keys(DEF_CATS);
  imgBase = localStorage.getItem('ys4_imgBase')           || 'https://raw.githubusercontent.com/yutong888/Safety-signs/main/img/';
  logoSrc = localStorage.getItem('ys4_logo')              || '';
  document.getElementById('staffInput').value = localStorage.getItem('ys4_staff')||'';
  renderLogo();
  renderTitle();
  renderSites();
  renderTabs();
  render();
  updateBadge();
}

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
function renderLogo(){
  const el=document.getElementById('logoEl');
  el.className='hdr-logo'+(isAdmin?' admin-editable':'');
  if(logoSrc){
    el.innerHTML=`<img src="${logoSrc}" alt="logo">`;
  } else {
    el.innerHTML='🦺';
  }
  if(isAdmin){
    el.onclick=changeLogo;
  } else {
    el.onclick=null;
  }
}
function changeLogo(){
  const input=document.createElement('input');
  input.type='file';input.accept='image/*';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      logoSrc=ev.target.result;
      localStorage.setItem('ys4_logo',logoSrc);
      renderLogo();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

/* ═══════════════════════════════════════════
   RENDER TABS
   Order: Step tabs | sep | 全部 | sep | A~K cats
═══════════════════════════════════════════ */
function renderTabs(){
  let h='';

  // Step tabs
  Object.keys(stepData).sort().forEach(k=>{
    const t=stepData[k].t;
    const active=currentTab===k?' active':'';
    if(isAdmin){
      h+=`<div class="tab step-tab${active}" onclick="setTab('${k}')">
        <input class="tab-edit-input" value="${t}" onclick="event.stopPropagation()" oninput="stepData['${k}'].t=this.value;save()" title="點此編輯工序名稱">
        <span style="font-size:10px;color:rgba(255,255,255,0.5);cursor:pointer;margin-left:2px;" onclick="event.stopPropagation();deleteStep('${k}')">✕</span>
      </div>`;
    } else {
      h+=`<div class="tab step-tab${active}" onclick="setTab('${k}')">${t}</div>`;
    }
  });

  h+=`<span class="tab-sep"></span>`;

  // 全部
  h+=`<div class="tab all-tab${currentTab==='ALL'?' active':''}" onclick="setTab('ALL')">📋 全部</div>`;

  h+=`<span class="tab-sep"></span>`;

  // Category tabs
  catOrder.forEach(k=>{
    if(!cats[k])return;
    const active=currentTab===k?' active':'';
    if(isAdmin){
      h+=`<div class="tab cat-tab${active}" onclick="setTab('${k}')">
        <input class="tab-edit-input" style="width:70px;" value="${cats[k]}" onclick="event.stopPropagation()" oninput="cats['${k}']=this.value;save()" title="點此編輯分類名稱">
        <span style="font-size:10px;color:rgba(0,0,0,0.35);cursor:pointer;margin-left:2px;" onclick="event.stopPropagation();deleteCat('${k}')">✕</span>
      </div>`;
    } else {
      h+=`<div class="tab cat-tab${active}" onclick="setTab('${k}')">${cats[k]}</div>`;
    }
  });

  document.getElementById('tabsEl').innerHTML=h;
}

function setTab(t){
  currentTab=t;
  renderTabs();
  render();
  setTimeout(()=>{
    const active=document.querySelector('.tabs-scroll .tab.active');
    if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  },60);
}

/* ═══════════════════════════════════════════
   RENDER CARDS
═══════════════════════════════════════════ */
function render(){
  const dbIds=getDbWithIds();
  let list;
  if(stepData[currentTab]){
    const ids=stepData[currentTab].items;
    list=dbIds.filter(x=>ids.includes(x.id));
  } else if(currentTab==='ALL'){
    list=[...dbIds];
  } else {
    list=dbIds.filter(x=>x.cat===currentTab);
  }

  const grid=document.getElementById('gridEl');
  if(!list.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">此分類暫無標語</div></div>`;
    return;
  }
  grid.innerHTML='';
  list.forEach(item=>{
    const st=cartGet(item);
    const d=document.createElement('div');
    d.className='card'+(st.sel?' sel':'');
    const imgUrl=imgBase+item.id+'.jpg';

    const nameHtml=isAdmin
      ?`<input class="a-name" value="${esc(item.n)}" oninput="updateNameInDb('${item.cat}','${escQ(item.n)}',this.value)">`
      :`<div class="card-name">${item.n}</div>`;
    const specRHtml=isAdmin
      ?`<input class="a-spec spec-tag spec-r" value="${esc(item.s)}" oninput="updateFieldInDb('${item.cat}','${escQ(item.n)}','s',this.value)">`
      :`<span class="spec-tag spec-r">${item.s}</span>`;
    const specMHtml=isAdmin
      ?`<input class="a-spec spec-tag spec-m" value="${esc(item.m)}" oninput="updateFieldInDb('${item.cat}','${escQ(item.n)}','m',this.value)">`
      :`<span class="spec-tag spec-m">${item.m}</span>`;

    const delBtn=isAdmin
      ?`<button class="admin-del-btn" onclick="event.stopPropagation();deleteItem('${item.cat}','${escQ(item.n)}')">✕</button>`
      :'';

    d.innerHTML=`
      ${delBtn}
      <div class="card-check"><span class="check-icon">✓</span></div>
      <div class="card-img">
        <img src="${imgUrl}" alt="${item.n}" onload="this.style.opacity=1" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="opacity:0;transition:opacity 0.2s">
        <div class="img-placeholder" style="display:none"><span>🖼</span><small>${item.id}<br>無圖片</small></div>
      </div>
      <div class="card-body">
        <div>
          <div class="card-meta">
            <span class="card-id">${item.id}</span>
            <span class="card-cat">${cats[item.cat]||item.cat}</span>
          </div>
          ${nameHtml}
          <div class="card-specs">${specRHtml}${specMHtml}</div>
        </div>
        <div class="card-footer">
          ${st.sel?'<span class="sel-chip">✓ 已選取</span>':'<span></span>'}
          <div class="qty-ctrl" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="adjQty('${item.cat}','${escQ(item.n)}',-1)">−</button>
            <span class="qty-num">${st.qty||1}</span>
            <button class="qty-btn" onclick="adjQty('${item.cat}','${escQ(item.n)}',1)">＋</button>
          </div>
        </div>
      </div>`;
    d.addEventListener('click',e=>{
      if(e.target.tagName!=='INPUT'&&e.target.tagName!=='BUTTON')toggleItem(item.cat,item.n);
    });
    grid.appendChild(d);
  });

  // show del buttons on hover if admin
  if(isAdmin){
    document.getElementById('mainArea').classList.add('isAdmin');
  } else {
    document.getElementById('mainArea').classList.remove('isAdmin');
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function escQ(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* ═══════════════════════════════════════════
   CART / TOGGLE
═══════════════════════════════════════════ */
function toggleItem(cat,n){
  const item=db.find(x=>x.cat===cat&&x.n===n);if(!item)return;
  const k=cartKey(item);
  if(!cart[k])cart[k]={sel:false,qty:1};
  cart[k].sel=!cart[k].sel;
  render();updateBadge();
}
function adjQty(cat,n,delta){
  event.stopPropagation();
  const item=db.find(x=>x.cat===cat&&x.n===n);if(!item)return;
  const k=cartKey(item);
  if(!cart[k])cart[k]={sel:true,qty:1};
  cart[k].qty=Math.max(1,(cart[k].qty||1)+delta);
  if(delta>0&&!cart[k].sel)cart[k].sel=true;
  render();updateBadge();
}
function updateBadge(){
  const dbIds=getDbWithIds();
  document.getElementById('cartBadge').textContent=dbIds.filter(x=>cartGet(x).sel).length;
}
function resetCart(){if(confirm('確認清除所有選取？')){cart={};render();updateBadge();}}

/* ═══════════════════════════════════════════
   DB MUTATIONS (admin)
═══════════════════════════════════════════ */
function updateNameInDb(cat,oldN,newN){
  const item=db.find(x=>x.cat===cat&&x.n===oldN);
  if(!item)return;
  const oldKey=cartKey(item);
  const saved=cart[oldKey];
  delete cart[oldKey];
  item.n=newN;
  if(saved!==undefined)cart[cartKey(item)]=saved;
  save();
}
function updateFieldInDb(cat,n,field,val){
  const item=db.find(x=>x.cat===cat&&x.n===n);
  if(item){item[field]=val;save();}
}
function deleteItem(cat,n){
  if(!confirm(`確定刪除「${n}」？刪除後同類別後續項目將自動重新編號。`))return;
  const k=db.findIndex(x=>x.cat===cat&&x.n===n);
  if(k<0)return;
  db.splice(k,1);
  delete cart[cat+'::'+n];
  save();render();updateBadge();
}

/* ═══════════════════════════════════════════
   SITE MANAGEMENT
═══════════════════════════════════════════ */
function addSite(){
  const nm=prompt('新增工地名稱：');
  if(nm&&nm.trim()){sites.push(nm.trim());renderSites();document.getElementById('siteSelect').value=nm.trim();save();}
}
function deleteSite(){
  const v=document.getElementById('siteSelect').value;
  if(!confirm(`確定刪除「${v}」？`))return;
  sites=sites.filter(s=>s!==v);
  if(!sites.length)sites=['新工地'];
  renderSites();save();
}

/* ═══════════════════════════════════════════
   ADD SIGN / STEP / CAT
═══════════════════════════════════════════ */
function addNewSign(){
  const catInput=prompt('類別代碼（現有：'+catOrder.join('、')+'）：');
  if(!catInput)return;
  const cat=catInput.toUpperCase().trim();
  if(!cats[cat]&&!confirm(`類別「${cat}」不存在，是否自動建立？`))return;
  if(!cats[cat]){cats[cat]=cat+'. 新分類';catOrder.push(cat);}
  const n=prompt('標語名稱：');if(!n||!n.trim())return;
  db.push({cat,n:n.trim(),s:'60x40',m:'中空板'});
  save();renderTabs();render();setTab(cat);
}
function addStep(){
  const key='S'+(Object.keys(stepData).length+1);
  const t=prompt('工序標籤名稱（含 emoji）：',`🔧 Step${Object.keys(stepData).length+1} 新工序`);
  if(!t)return;
  stepData[key]={t,items:[]};
  save();renderTabs();setTab(key);
}
function deleteStep(key){
  if(!confirm(`確定刪除工序「${stepData[key].t}」？`))return;
  delete stepData[key];
  save();
  if(currentTab===key)currentTab='ALL';
  renderTabs();render();
}
function addCat(){
  const key=prompt('新類別代碼（單一英文字母，如 L）：');
  if(!key)return;
  const k=key.toUpperCase().trim();
  if(cats[k])return alert('此類別已存在');
  const label=prompt('類別顯示名稱：',k+'. 新類別');
  if(!label)return;
  cats[k]=label;catOrder.push(k);
  save();renderTabs();setTab(k);
}
function deleteCat(k){
  if(db.some(x=>x.cat===k)){alert('此類別尚有標語，請先移除所有標語後再刪除類別。');return;}
  if(!confirm(`確定刪除類別「${cats[k]}」？`))return;
  delete cats[k];
  catOrder=catOrder.filter(c=>c!==k);
  if(currentTab===k)currentTab='ALL';
  save();renderTabs();render();
}

/* ═══════════════════════════════════════════
   ADMIN TOGGLE
═══════════════════════════════════════════ */
function toggleAdmin(){
  if(!isAdmin){
    const pw=prompt('請輸入管理員密碼：');
    if(pw==='751113'){
      isAdmin=true;
      document.getElementById('adminBtn').textContent='🔓 管理中';
      document.getElementById('adminBtn').classList.add('active');
      document.getElementById('adminPanel').classList.add('show');
    } else if(pw!==null){
      alert('密碼錯誤');
    }
  } else {
    isAdmin=false;
    document.getElementById('adminBtn').textContent='🔒 管理員';
    document.getElementById('adminBtn').classList.remove('active');
    document.getElementById('adminPanel').classList.remove('show');
  }
  renderLogo();
  renderTitle();
  renderTabs();
  render();
}

/* ═══════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════ */
function configImgBase(){
  const v=prompt('圖片路徑 Base URL（請以 / 結尾）：',imgBase);
  if(v!==null&&v.trim()){imgBase=v.trim();localStorage.setItem('ys4_imgBase',imgBase);render();}
}

/* ═══════════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════════ */
function save(){
  localStorage.setItem('ys4_db',JSON.stringify(db));
  localStorage.setItem('ys4_staff',document.getElementById('staffInput').value);
  localStorage.setItem('ys4_site',document.getElementById('siteSelect').value);
  localStorage.setItem('ys4_cfg',JSON.stringify(config));
  localStorage.setItem('ys4_steps',JSON.stringify(stepData));
  localStorage.setItem('ys4_cats',JSON.stringify(cats));
  localStorage.setItem('ys4_catOrd',JSON.stringify(catOrder));
  localStorage.setItem('ys4_sites',JSON.stringify(sites));
}
function exportData(){
  const d={db,sites,config,stepData,cats,catOrder,imgBase,logoSrc};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`工安標語備份_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function importData(){
  const j=prompt('貼上備份 JSON：');
  if(!j)return;
  try{
    const d=JSON.parse(j);
    if(d.db)db=d.db;
    if(d.sites)sites=d.sites;
    if(d.config)config=d.config;
    if(d.stepData)stepData=d.stepData;
    if(d.cats)cats=d.cats;
    if(d.catOrder)catOrder=d.catOrder;
    if(d.imgBase)imgBase=d.imgBase;
    if(d.logoSrc){logoSrc=d.logoSrc;localStorage.setItem('ys4_logo',logoSrc);}
    save();location.reload();
  }catch(e){alert('格式錯誤，請確認備份檔案');}
}

   OVERLAY CLOSE

document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

/* START */
init();
