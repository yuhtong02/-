
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:0}
.tab{padding:8px 16px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--color-text-primary);border-bottom:2px solid var(--color-text-primary);font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center}
.stat-num{font-size:28px;font-weight:500;color:var(--color-text-primary)}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
.progress-bar{height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:#1D9E75;border-radius:4px;transition:width 0.3s}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);font-weight:500}
.badge-done{background:#EAF3DE;color:#27500A}
.badge-pending{background:#FAECE7;color:#712B13}
.badge-warn{background:#FAEEDA;color:#633806}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--color-text-secondary);font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
tr:last-child td{border-bottom:none}
.row-flex{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
input[type=text],select{height:36px;font-size:14px;padding:0 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);min-width:160px}
input[type=date]{height:36px;font-size:14px;padding:0 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
button{height:36px;padding:0 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:13px}
button:hover{background:var(--color-background-secondary)}
.btn-danger{border-color:#993C1D;color:#993C1D}
.btn-danger:hover{background:#FAECE7}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-primary:hover{opacity:0.85}
.btn-success{background:#0F6E56;color:#E1F5EE;border-color:#0F6E56}
.btn-success:hover{opacity:0.85}
.notify-box{background:#FAEEDA;border:0.5px solid #EF9F27;border-radius:var(--border-radius-md);padding:12px 16px;margin-bottom:1rem}
.notify-title{font-size:13px;font-weight:500;color:#633806;margin-bottom:6px}
.notify-list{font-size:12px;color:#854F0B;line-height:1.8}
.dept-header{font-size:14px;font-weight:500;margin:1rem 0 6px;color:var(--color-text-primary)}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
</style>

<div class="wrap">
<h2 class="sr-only">115上半年度員工面談管理系統</h2>

<div class="tabs">
  <button class="tab active" onclick="switchTab('dashboard')"><i class="ti ti-chart-bar" aria-hidden="true"></i> 總覽</button>
  <button class="tab" onclick="switchTab('employees')"><i class="ti ti-users" aria-hidden="true"></i> 員工名單</button>
  <button class="tab" onclick="switchTab('notify')"><i class="ti ti-bell" aria-hidden="true"></i> 未填通知</button>
  <button class="tab" onclick="switchTab('download')"><i class="ti ti-download" aria-hidden="true"></i> 下載報表</button>
</div>

<div id="sec-dashboard" class="section active">
  <div class="stats" id="stats"></div>
  <div class="card">
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:6px">截止日期</p>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <input type="date" id="deadline" onchange="saveDeadline()">
      <span id="deadline-status" style="font-size:13px"></span>
    </div>
  </div>
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin-bottom:12px;color:var(--color-text-primary)">各部門填寫進度</p>
    <div id="dept-progress"></div>
  </div>
</div>

<div id="sec-employees" class="section">
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin-bottom:12px">新增員工</p>
    <div class="row-flex">
      <input type="text" id="new-name" placeholder="姓名" style="min-width:120px;flex:1">
      <select id="new-dept" style="flex:2;min-width:180px">
        <option value="">選擇部門/工地</option>
      </select>
      <button class="btn-primary" onclick="addEmployee()"><i class="ti ti-plus" aria-hidden="true"></i> 新增</button>
    </div>
    <div class="row-flex" style="margin-top:8px">
      <input type="text" id="new-dept-input" placeholder="或輸入新部門名稱">
      <button onclick="addDept()"><i class="ti ti-plus" aria-hidden="true"></i> 新增部門</button>
    </div>
  </div>
  <div class="card">
    <div class="filter-row">
      <select id="filter-dept" onchange="renderEmployeeTable()" style="min-width:180px">
        <option value="">全部部門</option>
      </select>
      <select id="filter-status" onchange="renderEmployeeTable()">
        <option value="">全部狀態</option>
        <option value="done">已填寫</option>
        <option value="pending">未填寫</option>
      </select>
      <span id="emp-count" style="font-size:13px;color:var(--color-text-secondary);margin-left:auto"></span>
    </div>
    <table>
      <thead><tr><th>姓名</th><th>部門/工地</th><th>填寫狀態</th><th>操作</th></tr></thead>
      <tbody id="emp-table"></tbody>
    </table>
  </div>
</div>

<div id="sec-notify" class="section">
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin-bottom:8px">未填寫通知</p>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:16px">以下人員尚未填寫面談表，可複製名單進行提醒</p>
    <div id="notify-content"></div>
    <button style="margin-top:12px" onclick="copyNotify()"><i class="ti ti-copy" aria-hidden="true"></i> 複製提醒訊息</button>
  </div>
</div>

<div id="sec-download" class="section">
  <div class="card">
    <p style="font-size:13px;font-weight:500;margin-bottom:8px">下載填寫完成名單</p>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-bottom:16px">依部門分類匯出，每個部門產生獨立工作表（CSV格式）</p>
    <div class="row-flex">
      <select id="dl-filter">
        <option value="all">全部員工</option>
        <option value="done">僅已填寫</option>
        <option value="pending">僅未填寫</option>
      </select>
      <select id="dl-dept">
        <option value="all">全部部門</option>
      </select>
      <button class="btn-success" onclick="downloadCSV()"><i class="ti ti-download" aria-hidden="true"></i> 下載 CSV</button>
    </div>
    <div id="dl-preview" style="margin-top:1rem"></div>
  </div>
</div>
</div>

<script>
const DEPTS_DEFAULT = ["設計部","總辦室","管理部","業務部","稽核室","營建部-主管","營建部-行政組","營建部-民雄中科院","營建部-南華大學三好館","營建部-博愛安居社宅","營建部-林森圖書館","營建部-創世基金會","營建部-嘉科實中"];

const EMPLOYEES_DEFAULT = [
  {name:"王小明",dept:"設計部",done:false},{name:"李小華",dept:"設計部",done:true},
  {name:"陳大偉",dept:"管理部",done:false},{name:"林美玲",dept:"管理部",done:true},
  {name:"張志豪",dept:"業務部",done:true},{name:"黃淑芬",dept:"業務部",done:false},
  {name:"劉建國",dept:"營建部-主管",done:true},{name:"吳雅惠",dept:"營建部-行政組",done:false},
  {name:"鄭文傑",dept:"營建部-民雄中科院",done:false},{name:"許佳琪",dept:"總辦室",done:true},
];

let depts = JSON.parse(localStorage.getItem('depts')||'null') || [...DEPTS_DEFAULT];
let employees = JSON.parse(localStorage.getItem('emps')||'null') || [...EMPLOYEES_DEFAULT];
let deadline = localStorage.getItem('deadline') || '2025-07-10';

function save(){
  try{localStorage.setItem('depts',JSON.stringify(depts));localStorage.setItem('emps',JSON.stringify(employees));}catch(e){}
}
function saveDeadline(){
  deadline = document.getElementById('deadline').value;
  try{localStorage.setItem('deadline',deadline);}catch(e){}
  updateDeadlineStatus();renderDashboard();
}

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['dashboard','employees','notify','download'][i]===id));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  if(id==='employees')renderEmployeeTable();
  if(id==='notify')renderNotify();
  if(id==='download')renderDownloadPreview();
  if(id==='dashboard')renderDashboard();
}

function renderDashboard(){
  const total=employees.length, done=employees.filter(e=>e.done).length, pending=total-done;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">總人數</div></div>
    <div class="stat"><div class="stat-num" style="color:#0F6E56">${done}</div><div class="stat-label">已填寫</div></div>
    <div class="stat"><div class="stat-num" style="color:#993C1D">${pending}</div><div class="stat-label">未填寫</div></div>
    <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-label">完成率</div></div>`;

  const dl=document.getElementById('deadline');
  dl.value=deadline;
  updateDeadlineStatus();

  const deptMap={};
  employees.forEach(e=>{if(!deptMap[e.dept])deptMap[e.dept]={done:0,total:0};deptMap[e.dept].total++;if(e.done)deptMap[e.dept].done++;});
  let html='';
  Object.entries(deptMap).forEach(([d,v])=>{
    const p=Math.round(v.done/v.total*100);
    html+=`<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px">
        <span>${d}</span><span style="color:var(--color-text-secondary)">${v.done}/${v.total}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div></div>`;
  });
  document.getElementById('dept-progress').innerHTML=html||'<p style="color:var(--color-text-secondary);font-size:13px">尚無員工資料</p>';
}

function updateDeadlineStatus(){
  const el=document.getElementById('deadline-status');
  if(!deadline){el.textContent='';return;}
  const d=new Date(deadline),now=new Date();
  const diff=Math.ceil((d-now)/(1000*60*60*24));
  if(diff<0)el.innerHTML=`<span style="color:#993C1D;font-size:13px"><i class="ti ti-alert-circle" aria-hidden="true"></i> 已逾期 ${Math.abs(diff)} 天</span>`;
  else if(diff<=7)el.innerHTML=`<span style="color:#854F0B;font-size:13px"><i class="ti ti-clock" aria-hidden="true"></i> 距截止還有 ${diff} 天</span>`;
  else el.innerHTML=`<span style="color:#0F6E56;font-size:13px"><i class="ti ti-check" aria-hidden="true"></i> 距截止還有 ${diff} 天</span>`;
}

function populateDeptSelects(){
  ['new-dept','filter-dept','dl-dept'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const v=el.value;
    const isFilter=(id==='filter-dept'||id==='dl-dept');
    el.innerHTML=(isFilter?'<option value="">全部部門</option>':'<option value="">選擇部門/工地</option>')+depts.map(d=>`<option value="${d}">${d}</option>`).join('');
    if(v)el.value=v;
  });
}

function addDept(){
  const v=document.getElementById('new-dept-input').value.trim();
  if(!v)return;
  if(!depts.includes(v)){depts.push(v);save();populateDeptSelects();}
  document.getElementById('new-dept-input').value='';
  document.getElementById('new-dept').value=v;
}

function addEmployee(){
  const name=document.getElementById('new-name').value.trim();
  const dept=document.getElementById('new-dept').value;
  if(!name||!dept)return;
  employees.push({name,dept,done:false});save();
  document.getElementById('new-name').value='';
  renderEmployeeTable();renderDashboard();
}

function toggleDone(idx){
  employees[idx].done=!employees[idx].done;save();
  renderEmployeeTable();renderDashboard();
}

function removeEmployee(idx){
  employees.splice(idx,1);save();
  renderEmployeeTable();renderDashboard();
}

function renderEmployeeTable(){
  const fd=document.getElementById('filter-dept').value;
  const fs=document.getElementById('filter-status').value;
  const filtered=employees.map((e,i)=>({...e,i})).filter(e=>(!fd||e.dept===fd)&&(!fs||(fs==='done'?e.done:!e.done)));
  document.getElementById('emp-count').textContent=`顯示 ${filtered.length} / ${employees.length} 人`;
  document.getElementById('emp-table').innerHTML=filtered.map(e=>`
    <tr>
      <td>${e.name}</td>
      <td><span style="font-size:12px;color:var(--color-text-secondary)">${e.dept}</span></td>
      <td><span class="badge ${e.done?'badge-done':'badge-pending'}">${e.done?'已填寫':'未填寫'}</span></td>
      <td>
        <button style="font-size:12px;padding:0 10px;height:28px" onclick="toggleDone(${e.i})">${e.done?'標記未填':'標記完成'}</button>
        <button class="btn-danger" style="font-size:12px;padding:0 10px;height:28px;margin-left:4px" onclick="removeEmployee(${e.i})"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </td>
    </tr>`).join('')||'<tr><td colspan="4" style="color:var(--color-text-secondary);text-align:center;padding:24px">無符合結果</td></tr>';
}

function renderNotify(){
  const pending=employees.filter(e=>!e.done);
  const el=document.getElementById('notify-content');
  if(!pending.length){
    el.innerHTML='<div style="color:#0F6E56;font-size:14px;padding:12px 0"><i class="ti ti-check" aria-hidden="true"></i> 所有員工均已填寫完成！</div>';return;
  }
  const byDept={};
  pending.forEach(e=>{if(!byDept[e.dept])byDept[e.dept]=[];byDept[e.dept].push(e.name);});
  let html=`<div class="notify-box"><div class="notify-title"><i class="ti ti-bell" aria-hidden="true"></i> 尚有 ${pending.length} 人未填寫</div><div class="notify-list">`;
  Object.entries(byDept).forEach(([d,names])=>{html+=`<strong>${d}</strong>：${names.join('、')}<br>`;});
  html+='</div></div>';
  el.innerHTML=html;
}

function copyNotify(){
  const pending=employees.filter(e=>!e.done);
  if(!pending.length){alert('所有員工均已填寫！');return;}
  const byDept={};
  pending.forEach(e=>{if(!byDept[e.dept])byDept[e.dept]=[];byDept[e.dept].push(e.name);});
  let msg=`📋 115上半年度員工面談表 — 填寫提醒\n截止日期：${deadline}\n\n以下人員尚未填寫，請儘速完成：\n\n`;
  Object.entries(byDept).forEach(([d,names])=>{msg+=`【${d}】\n${names.map(n=>`• ${n}`).join('\n')}\n\n`;});
  msg+='感謝大家配合！🙏';
  navigator.clipboard.writeText(msg).then(()=>alert('已複製到剪貼簿！')).catch(()=>alert('請手動複製:\n'+msg));
}

function renderDownloadPreview(){
  populateDeptSelects();
  const df=document.getElementById('dl-filter').value;
  const dd=document.getElementById('dl-dept').value;
  let list=employees;
  if(df==='done')list=list.filter(e=>e.done);
  if(df==='pending')list=list.filter(e=>!e.done);
  if(dd&&dd!=='all')list=list.filter(e=>e.dept===dd);
  const byDept={};
  list.forEach(e=>{if(!byDept[e.dept])byDept[e.dept]=[];byDept[e.dept].push(e);});
  let html='';
  Object.entries(byDept).forEach(([d,arr])=>{
    html+=`<p class="dept-header"><i class="ti ti-folder" aria-hidden="true"></i> ${d} (${arr.length}人)</p>
    <table style="margin-bottom:12px">
      <thead><tr><th>姓名</th><th>填寫狀態</th></tr></thead>
      <tbody>${arr.map(e=>`<tr><td>${e.name}</td><td><span class="badge ${e.done?'badge-done':'badge-pending'}">${e.done?'已填寫':'未填寫'}</span></td></tr>`).join('')}</tbody>
    </table>`;
  });
  document.getElementById('dl-preview').innerHTML=html||'<p style="color:var(--color-text-secondary);font-size:13px">無符合條件的員工</p>';
}

function downloadCSV(){
  const df=document.getElementById('dl-filter').value;
  const dd=document.getElementById('dl-dept').value;
  let list=employees;
  if(df==='done')list=list.filter(e=>e.done);
  if(df==='pending')list=list.filter(e=>!e.done);
  if(dd&&dd!=='all')list=list.filter(e=>e.dept===dd);
  const bom='\uFEFF';
  let csv=bom+'姓名,部門/工地,填寫狀態\n';
  const byDept={};
  list.forEach(e=>{if(!byDept[e.dept])byDept[e.dept]=[];byDept[e.dept].push(e);});
  Object.entries(byDept).forEach(([d,arr])=>{
    csv+=`\n【${d}】,,\n`;
    arr.forEach(e=>{csv+=`${e.name},${e.dept},${e.done?'已填寫':'未填寫'}\n`;});
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`面談表填寫狀況_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'')}.csv`;
  a.click();URL.revokeObjectURL(url);
}

populateDeptSelects();renderDashboard();
</script>
